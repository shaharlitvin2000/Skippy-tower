                ng2.addColorStop(0,   `rgba(${nb.rgb},${(0.09 * pulse * fade).toFixed(3)})`);
                ng2.addColorStop(1,   'transparent');
                ctx.fillStyle = ng2;
                ctx.beginPath(); ctx.arc(ox, oy, nb.r * 0.55, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // ── 3. Shooting stars — pure animation, no world position ──
            for (let i = 0; i < 5; i++) {
                const rng = seededRandom(SC + i * 887 + 13);
                const speed = 90 + rng() * 120;
                const angle = 0.25 + rng() * 0.35;
                const phase = rng() * 8.0;
                const cycle = 6.5 + rng() * 4.0;
                const pos = ((t * 0.5 + phase) % cycle) / cycle;
                if (pos > 0.22) continue;
                const alpha = pos < 0.12 ? pos / 0.12 : 1 - (pos - 0.12) / 0.10;
                const startX = playL + rng() * playW;
                const startY = 60 + rng() * (BASE_H - 120);
                const dist = pos * speed;
                const tx = startX + Math.cos(angle) * dist;
                const ty = startY + Math.sin(angle) * dist;
                const tailLen = 45 + rng() * 45;
                ctx.save();
                ctx.globalAlpha = alpha * 0.80;
                const sg = ctx.createLinearGradient(
                    tx - Math.cos(angle)*tailLen, ty - Math.sin(angle)*tailLen, tx, ty
                );
                sg.addColorStop(0, 'transparent'); sg.addColorStop(1, '#ffffff');
                ctx.strokeStyle = sg; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(tx - Math.cos(angle)*tailLen, ty - Math.sin(angle)*tailLen);
                ctx.lineTo(tx, ty); ctx.stroke();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(tx, ty, 2.2, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // ── 4-6. Celestial bodies — one every 200 m (2000 px) throughout the world ──
            // Types cycle: 0=Earth 1=Mars 2=Sun 3=Moon 4=Gas Giant 5=Ice Planet
            {
                const spacing = 500; // pixels = 50 m
                const firstOffset = 200; // first appears at 20 m
                const nPlanets = Math.ceil(totalH / spacing) + 2;
                const xPositions = [0.72, 0.22, 0.68, 0.28, 0.75, 0.20, 0.65, 0.30, 0.70, 0.25, 0.60, 0.35, 0.78, 0.18];
                for (let pi = 0; pi < nPlanets; pi++) {
                    const wy = BASE_Y - firstOffset - pi * spacing;
                    const pY = wsY(wy);
                    const pR = 44 + (pi % 3) * 8; // 44 / 52 / 60 alternating
                    const fade = ef(pY, pR * 5.5);
                    if (fade <= 0.01) continue;
                    const pX = playL + playW * xPositions[pi % xPositions.length];
                    const pType = pi % 6;
                    const rng = seededRandom(pi * 3779 + SC + 1);

                    if (pType === 0) {
                        // ── Earth ──
                        ctx.save(); ctx.globalAlpha = fade * 0.90;
                        const eg = ctx.createRadialGradient(pX, pY, pR*0.75, pX, pY, pR*1.70);
                        eg.addColorStop(0, 'rgba(80,160,255,0.30)'); eg.addColorStop(1, 'transparent');
                        ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(pX, pY, pR*1.70, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#1a5acc'; ctx.beginPath(); ctx.arc(pX, pY, pR, 0, Math.PI*2); ctx.fill();
                        ctx.save(); ctx.beginPath(); ctx.arc(pX, pY, pR, 0, Math.PI*2); ctx.clip();
                        ctx.translate(pX, pY); ctx.rotate(t * 0.012);
                        ctx.fillStyle = '#226633';
                        ctx.beginPath(); ctx.ellipse(-pR*0.28, -pR*0.08, pR*0.36, pR*0.24, 0.3, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(pR*0.20, pR*0.20, pR*0.20, pR*0.28, -0.2, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(-pR*0.15, pR*0.30, pR*0.22, pR*0.14, 0.4, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = 'rgba(255,255,255,0.13)';
                        ctx.beginPath(); ctx.ellipse(pR*0.05, -pR*0.38, pR*0.28, pR*0.08, 0.1, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                        const limbG = ctx.createRadialGradient(pX+pR*0.35, pY+pR*0.35, pR*0.2, pX, pY, pR);
                        limbG.addColorStop(0.65, 'transparent'); limbG.addColorStop(1, 'rgba(0,0,20,0.55)');
                        ctx.fillStyle = limbG; ctx.beginPath(); ctx.arc(pX, pY, pR, 0, Math.PI*2); ctx.fill();
                        ctx.globalAlpha = fade * 0.22; ctx.strokeStyle = '#88bbff'; ctx.lineWidth = pR * 0.09;
                        ctx.beginPath(); ctx.arc(pX, pY, pR*1.05, 0, Math.PI*2); ctx.stroke(); ctx.restore();

                    } else if (pType === 1) {
                        // ── Mars ──
                        ctx.save(); ctx.globalAlpha = fade * 0.92;
                        const maGlow = ctx.createRadialGradient(pX, pY, pR*0.7, pX, pY, pR*1.8);
                        maGlow.addColorStop(0, 'rgba(220,80,30,0.22)'); maGlow.addColorStop(1, 'transparent');
                        ctx.fillStyle = maGlow; ctx.beginPath(); ctx.arc(pX, pY, pR*1.8, 0, Math.PI*2); ctx.fill();
                        const maGrd = ctx.createRadialGradient(pX-pR*0.3, pY-pR*0.3, pR*0.05, pX, pY, pR);
                        maGrd.addColorStop(0, '#e86030'); maGrd.addColorStop(0.5, '#cc4818'); maGrd.addColorStop(1, '#7a2208');
                        ctx.fillStyle = maGrd; ctx.beginPath(); ctx.arc(pX, pY, pR, 0, Math.PI*2); ctx.fill();
                        ctx.save(); ctx.beginPath(); ctx.arc(pX, pY, pR, 0, Math.PI*2); ctx.clip();
                        ctx.fillStyle = 'rgba(160,60,20,0.45)';
                        ctx.beginPath(); ctx.ellipse(pX+pR*0.15, pY-pR*0.10, pR*0.42, pR*0.28, -0.3, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = 'rgba(200,110,50,0.35)';
                        ctx.beginPath(); ctx.ellipse(pX-pR*0.25, pY+pR*0.30, pR*0.30, pR*0.18, 0.5, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = 'rgba(240,220,200,0.30)';
                        ctx.beginPath(); ctx.ellipse(pX+pR*0.05, -pR*0.82+pY, pR*0.18, pR*0.10, 0, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                        const maLimb = ctx.createRadialGradient(pX+pR*0.38, pY+pR*0.38, pR*0.2, pX, pY, pR);
                        maLimb.addColorStop(0.6, 'transparent'); maLimb.addColorStop(1, 'rgba(0,0,0,0.60)');
                        ctx.fillStyle = maLimb; ctx.beginPath(); ctx.arc(pX, pY, pR, 0, Math.PI*2); ctx.fill(); ctx.restore();

                    } else if (pType === 2) {
                        // ── Sun ──
                        ctx.save();
                        // Corona layers
                        for (let ci = 5; ci >= 1; ci--) {
                            ctx.globalCompositeOperation = 'lighter';
                            ctx.globalAlpha = (0.04 + 0.02 * ci) * fade;
                            const cr = pR * (1.4 + ci * 0.55);
                            const cG = ctx.createRadialGradient(pX, pY, pR*0.8, pX, pY, cr);
                            cG.addColorStop(0, 'rgba(255,200,50,0.9)'); cG.addColorStop(1, 'transparent');
                            ctx.fillStyle = cG; ctx.beginPath(); ctx.arc(pX, pY, cr, 0, Math.PI*2); ctx.fill();
                        }
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.globalAlpha = fade;
                        const sGrd = ctx.createRadialGradient(pX-pR*0.25, pY-pR*0.25, pR*0.05, pX, pY, pR);
                        sGrd.addColorStop(0, '#fff8a0'); sGrd.addColorStop(0.4, '#ffcc20'); sGrd.addColorStop(1, '#ff7700');
                        ctx.fillStyle = sGrd; ctx.beginPath(); ctx.arc(pX, pY, pR, 0, Math.PI*2); ctx.fill();
                        // Surface granules
                        ctx.save(); ctx.beginPath(); ctx.arc(pX, pY, pR, 0, Math.PI*2); ctx.clip();
                        ctx.globalAlpha = 0.12 * fade;
                        for (let gi = 0; gi < 8; gi++) {
                            const gx = pX + (rng()-0.5)*pR*1.5, gy = pY + (rng()-0.5)*pR*1.5;
                            const gr2 = pR*0.22;
                            ctx.fillStyle = rng()>0.5 ? 'rgba(255,180,0,0.8)' : 'rgba(200,80,0,0.6)';
                            ctx.beginPath(); ctx.arc(gx, gy, gr2, 0, Math.PI*2); ctx.fill();
                        }
                        ctx.restore();
                        ctx.restore();

                    } else if (pType === 3) {
                        // ── Moon ──
                        ctx.save(); ctx.globalAlpha = 0.88 * fade;
                        const moGlow = ctx.createRadialGradient(pX, pY, pR*0.6, pX, pY, pR*2.6);
                        moGlow.addColorStop(0, 'rgba(210,215,235,0.28)'); moGlow.addColorStop(1, 'transparent');

        function drawBackground(cam) {

            // Sky gradient — smoothly interpolated between scenes

                // save/restore stack entries and clipping regions from previous frames,
                // which could otherwise make the player, HUD, and touch buttons invisible.
                _bgOffCanvas.width = _bgOffCanvas.width;

                ctx.strokeStyle = 'rgba(40,160,200,0.22)';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(WALL_W, 0); ctx.lineTo(WALL_W, BASE_H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W, 0); ctx.lineTo(BASE_W - WALL_W, BASE_H); ctx.stroke();
            } else if (themeIdx === 1) {
                // Forest Canopy — walls are giant tree bark (vertical grain lines + mossy patches)
                const camInt = Math.floor(cam);
                // Vertical bark grain lines (scrolling with camera)
                const grainSpacing = 6;
                for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                    for (let gx = bx + 2; gx < bx + bw - 2; gx += grainSpacing) {
                        const worldGx = gx + camInt * 0.01;
                        const rng = seededRandom((gx * 37 + Math.floor(camInt / 80)) | 0);
                        const alpha = 0.08 + rng() * 0.14;
                        const lighter = rng() < 0.3;
                        ctx.strokeStyle = lighter ? `rgba(80,50,15,${alpha})` : `rgba(20,10,2,${alpha + 0.05})`;
                        ctx.lineWidth = 1 + (rng() < 0.2 ? 1 : 0);
                        // slightly wavy grain
                        const wave = Math.sin(camInt * 0.02 + gx * 0.3) * 2;
                        ctx.beginPath(); ctx.moveTo(gx + wave, 0); ctx.lineTo(gx - wave, BASE_H); ctx.stroke();
                    }
                }
                // Horizontal bark fissures (world-fixed)
                const fissureSpacing = 55;
                const fStart = Math.floor(camInt / fissureSpacing) - 1;
                const fEnd   = fStart + Math.ceil(BASE_H / fissureSpacing) + 2;
                for (let fi = fStart; fi <= fEnd; fi++) {
                    const wy = fi * fissureSpacing - camInt;
                    const rng = seededRandom(fi * 3571 + 9901);
                    for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                        ctx.save(); ctx.globalAlpha = 0.18 + rng() * 0.18;
                        ctx.strokeStyle = '#1a0c04'; ctx.lineWidth = 1 + (rng() < 0.25 ? 1 : 0);
                        // Wavy horizontal fissure
                        ctx.beginPath();
                        ctx.moveTo(bx, wy + rng() * 6 - 3);
                        ctx.bezierCurveTo(bx + bw * 0.3, wy + rng() * 8 - 4,
                                          bx + bw * 0.7, wy + rng() * 8 - 4,
                                          bx + bw, wy + rng() * 6 - 3);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
                // Moss patches (world-fixed green blobs)
                const mossSpacing = 120;
                const msStart = Math.floor(camInt / mossSpacing) - 1;
                const msEnd   = msStart + Math.ceil(BASE_H / mossSpacing) + 2;
                for (let mi = msStart; mi <= msEnd; mi++) {
                    const rng = seededRandom(mi * 5189 + 1021);
                    const wy = mi * mossSpacing + rng() * mossSpacing - camInt;
                    if (wy < -20 || wy > BASE_H + 20) continue;
                    for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                        ctx.save(); ctx.globalAlpha = 0.30 + rng() * 0.20;
                        const mx = bx + rng() * bw;
                        const mr = 8 + rng() * 12;
                        const mg = ctx.createRadialGradient(mx, wy, 0, mx, wy, mr);
                        mg.addColorStop(0, '#3a9018'); mg.addColorStop(0.6, '#226010'); mg.addColorStop(1, 'transparent');
                        ctx.fillStyle = mg;
                        ctx.beginPath(); ctx.ellipse(mx, wy, mr, mr * 0.55, 0, 0, Math.PI * 2); ctx.fill();
                        ctx.restore();
                    }
                }
                // Inner edge — green forest glow
                for (let i = 0; i < 7; i++) {
                    const fade = 1 - i / 7;
                    const [r, g, b] = hexToRgb(C.WALL_EDGE);
                    ctx.strokeStyle = `rgba(${r},${g},${b},${fade * 0.35})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(WALL_W - i, 0); ctx.lineTo(WALL_W - i, BASE_H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + i, 0); ctx.lineTo(BASE_W - WALL_W + i, BASE_H); ctx.stroke();
                }
            } else if (themeIdx === 5) {
                // Space — metallic hull plating with star map dots and cyan edge lights
                const camInt = Math.floor(cam);
                const plateH = 44;
                for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                    for (let row = -1; row < BASE_H / plateH + 2; row++) {
                        const worldRow = Math.floor(camInt / plateH) + row;
                        const wy = worldRow * plateH - camInt;
                        const rng = seededRandom(worldRow * 6421 + (bx > BASE_W / 2 ? 13 : 7));
                        // Alternating alloy shade
                        ctx.fillStyle = worldRow % 2 === 0 ? '#0d1a28' : '#0a1520';
                        ctx.fillRect(bx, wy, bw, plateH + 1);
                        // Subtle shimmer band near top of each plate
                        ctx.save(); ctx.globalAlpha = 0.07 + rng() * 0.06;
                        ctx.fillStyle = '#2266aa';
                        ctx.fillRect(bx, wy, bw, Math.floor(plateH * 0.22)); ctx.restore();
                        // Horizontal rivet/seam line
                        ctx.save(); ctx.globalAlpha = 0.30;
                        ctx.strokeStyle = '#1a3a58'; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(bx, wy); ctx.lineTo(bx + bw, wy); ctx.stroke(); ctx.restore();
                        // Rivet dots
                        ctx.save(); ctx.globalAlpha = 0.55; ctx.fillStyle = '#203a55';
                        for (const rx of [bx + 5, bx + bw - 5]) {
                            ctx.beginPath(); ctx.arc(rx, wy + 4, 2, 0, Math.PI*2); ctx.fill();
                        }
                        ctx.restore();
                        // Star map dot (rare)
                        if (rng() < 0.15) {
                            const dotY = wy + 8 + rng() * (plateH - 16);
                            const dotX = bx + 6 + rng() * (bw - 12);
                            ctx.save(); ctx.globalCompositeOperation = 'lighter';
                            ctx.globalAlpha = 0.20 + rng() * 0.25;
                            ctx.fillStyle = rng() > 0.5 ? '#88ccff' : '#cc88ff';
                            ctx.beginPath(); ctx.arc(dotX, dotY, 1.2 + rng() * 1.0, 0, Math.PI*2); ctx.fill();
                            ctx.restore();
                        }
                    }
                    // Warning stripe (yellow/black diagonal, near bottom)
                    const stripeY = BASE_H - 32;
                    const stripeH2 = 16;
                    ctx.save();
                    ctx.beginPath(); ctx.rect(bx, stripeY, bw, stripeH2); ctx.clip();
                    ctx.globalAlpha = 0.20;
                    for (let sx = bx - stripeH2; sx < bx + bw + stripeH2; sx += 12) {
                        ctx.fillStyle = sx % 24 < 12 ? '#ffcc00' : '#111111';
                        ctx.beginPath();
                        ctx.moveTo(sx, stripeY); ctx.lineTo(sx + stripeH2, stripeY);
                        ctx.lineTo(sx + stripeH2 + stripeH2, stripeY + stripeH2);
                        ctx.lineTo(sx + stripeH2, stripeY + stripeH2);
                        ctx.closePath(); ctx.fill();
                    }
                    ctx.restore();
                }
                // Cyan edge glow lines
                for (let i = 0; i < 8; i++) {
                    const fade = (1 - i / 8) * (1 - i / 8);
                    ctx.strokeStyle = `rgba(0,170,255,${(fade * 0.28).toFixed(3)})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(WALL_W - i, 0); ctx.lineTo(WALL_W - i, BASE_H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + i, 0); ctx.lineTo(BASE_W - WALL_W + i, BASE_H); ctx.stroke();
                }
                ctx.strokeStyle = 'rgba(0,200,255,0.35)'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(WALL_W, 0); ctx.lineTo(WALL_W, BASE_H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W, 0); ctx.lineTo(BASE_W - WALL_W, BASE_H); ctx.stroke();
            } else {
                // Inner edge glow for other themes
                for (let i = 0; i < 6; i++) {
                    const fade = 1 - i / 6;
                    const [r, g, b] = hexToRgb(C.WALL_EDGE);
                    ctx.strokeStyle = `rgba(${r},${g},${b},${fade * 0.4})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(WALL_W - i, 0); ctx.lineTo(WALL_W - i, BASE_H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + i, 0); ctx.lineTo(BASE_W - WALL_W + i, BASE_H); ctx.stroke();
                }
                // Wall crack layers
                const camInt = Math.floor(cam);
                const layerH = 36;
                for (let row = -1; row < BASE_H / layerH + 2; row++) {
                    const worldRow = Math.floor(camInt / layerH) + row;
                    const wy = worldRow * layerH - camInt;
                    const rng = seededRandom(worldRow * 7919);
                    for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                        ctx.strokeStyle = C.WALL_MID; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(bx, wy); ctx.lineTo(bx + bw, wy); ctx.stroke();
                        const nc = (rng() * 2 | 0) + 1;
                        for (let k = 0; k < nc; k++) {
                            const cx2 = bx + Math.floor(rng() * (bw - 6)) + 3;
                            const ch = Math.floor(rng() * (layerH - 8)) + 4;
                            ctx.beginPath(); ctx.moveTo(cx2, wy); ctx.lineTo(cx2, wy + ch); ctx.stroke();
                        }
                    }
                }
            }
        }

        // ─────────────────────────────────────────────
        //  HUD
        // ─────────────────────────────────────────────
        function drawHUD() {
            if (tutorialMode) return;
            const hm = Math.max(0, Math.floor((BASE_H - 120 - player.y) / 10));
            // Real-time best: reflects current run immediately, no need to die first
            const effectiveBest = Math.max(getBest(), lastRunHigh);
            // ── Unified progress bar — top-right corner (level mode solo + all MP modes) ──
            if (currentMode === 'level' || isMultiplayerGame) {
                const barH = 240, barW = 8, barX = BASE_W - 26, barY = 24;
                const isLevel = currentMode === 'level';
                const barMaxH = isLevel && levelGoal > 0
                    ? levelGoal
                    : Math.max(50, Math.floor((BASE_H - 120 - TOWER_TOP) / 10));
                const pct = barMaxH > 0 ? clamp(hm / barMaxH, 0, 1) : 0;

                ctx.save();
                // Track background
                ctx.fillStyle = '#19264a';
                ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();
                // Fill
                if (pct > 0) {
                    ctx.fillStyle = C.UI_ACCENT;
                    ctx.beginPath(); ctx.roundRect(barX, barY + barH - barH * pct, barW, barH * pct, 4); ctx.fill();
                }
                // Border
                ctx.strokeStyle = C.UI_ACCENT; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.roundRect(barX - 1, barY - 1, barW + 2, barH + 2, 4); ctx.stroke();
                // Goal label above bar
                ctx.fillStyle = C.UI_ACCENT; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'right';
                ctx.fillText(isLevel ? `${levelGoal}m` : '∞', barX + barW, barY - 4);
                ctx.textAlign = 'left';

                // Player avatars at their current heights on the bar
                const iconX = barX - 18;
                const iconScale = 0.35;
                // Local player
                const localAvatarY = Math.round(barY + barH - barH * pct);
                (SKINS[equippedSkin] || SKINS[0]).draw(iconX, localAvatarY, iconScale);
                // Remote players (multiplayer only)
                if (isMultiplayerGame) {
                    for (const [uid, pos] of Object.entries(remotePositions)) {
                        const remH = Math.max(0, Math.floor((BASE_H - 120 - (pos.y || 0)) / 10));
                        const remFrac = clamp(remH / barMaxH, 0, 1);
                        const remAvatarY = Math.round(barY + barH - barH * remFrac);
                        const slot = mpSlots[uid];
                        const remSkin = SKINS[slot ? slot.skinIdx : _mpUidToSkin(uid)] || SKINS[0];
                        ctx.save();
                        ctx.globalAlpha = 0.82;
                        remSkin.draw(iconX, remAvatarY, iconScale);
                        ctx.restore();
                    }
                }
                ctx.restore();
            }
            ctx.textAlign = 'left';
            // Solo: show current height + best
            if (!isMultiplayerGame) {
                // Height pill
                const hudHm = `↑ ${hm}m`;
                ctx.font = 'bold 22px monospace';
                const hudW = ctx.measureText(hudHm).width + 20, hudH = 34, hudX = 8, hudY = 68;
                ctx.fillStyle = 'rgba(0,0,0,0.45)';
                ctx.beginPath(); ctx.roundRect(hudX, hudY, hudW, hudH, 10); ctx.fill();
                const hudColor = hm > (getBest() * 0.9) && hm > 0 ? '#ffee44' : C.UI_TEXT;
                ctx.fillStyle = hudColor;
                ctx.shadowColor = hudColor; ctx.shadowBlur = hm > effectiveBest - 20 ? 10 : 0;
                ctx.textBaseline = 'middle';
                ctx.fillText(hudHm, hudX + 10, hudY + hudH / 2 + 1);
                ctx.shadowBlur = 0; ctx.textBaseline = 'alphabetic';
                // Best line
                ctx.fillStyle = '#ffcc44'; ctx.font = '12px monospace';
                ctx.fillText(`best: ${effectiveBest > 0 ? effectiveBest + 'm' : '-'}`, hudX + 10, hudY + hudH + 14);
            }

            // Active power-up icons
            const powers = [
                { val: player.powerSpeed, color: '#ff9f20', dur: 300, label: '⚡' },
                { val: player.powerHighJump, color: '#58e88a', dur: 280, label: '↑↑' },
                { val: player.powerShield, color: '#a06cff', dur: 350, label: '◈' },
                { val: player.powerSlow, color: '#20d0ff', dur: 320, label: '❄' },
            ];
            let py = BASE_H - 155;
            for (const pw of powers) {
                if (pw.val <= 0) continue;
                const frac = pw.val / pw.dur;
                const bx = WALL_W + 8, bw = 54, bh = 24;
                ctx.save();
                ctx.globalAlpha = 0.82;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath(); ctx.roundRect(bx - 1, py - 1, bw + 2, bh + 2, 8); ctx.fill();
                const pwg = ctx.createLinearGradient(bx, py, bx + bw * frac, py);
                pwg.addColorStop(0, pw.color); pwg.addColorStop(1, pw.color + 'aa');
                ctx.fillStyle = pwg;
                ctx.beginPath(); ctx.roundRect(bx, py, bw * frac, bh, 7); ctx.fill();
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.fillText(pw.label, bx + 5, py + bh / 2);
                ctx.restore();
                py -= 30;
            }
        }

                ctx.setLineDash([]);
                ctx.save(); ctx.globalAlpha = 0.3 + 0.15 * Math.sin(t * 2);
                ctx.font = 'bold 22px monospace'; ctx.fillStyle = '#886699';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('?', cx2 + cellW/2, cy2 + cellH/2 - 6);
                ctx.font = 'bold 9px monospace'; ctx.fillStyle = '#664488';
                ctx.textBaseline = 'alphabetic';
                ctx.fillText('COMING SOON', cx2 + cellW/2, cy2 + cellH - 10);
                ctx.restore();
            }

            if (lockerTab === 0) {
                // ── SKINS TAB ──
                const sel = SKINS[selectedSkin];

                // Grid — ALL skins + ??? slot at end
                const totalSkinSlots = SKINS.length + 1;
                const skinRows = Math.ceil(totalSkinSlots / cols);
                for (let i = 0; i < totalSkinSlots; i++) {
                    const col = i % cols, row = Math.floor(i / cols);
                    const cx2 = gx + col*(cellW+gap), cy2 = gridStartY + row*(cellH+gap);
                    if (i === SKINS.length) { drawComingSoonCell(cx2, cy2); continue; }
                    const sk = SKINS[i];
                    const isSel = i === selectedSkin;
                    ctx.fillStyle = isSel ? 'rgba(160,60,255,0.22)' : 'rgba(255,255,255,0.04)';
                    ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.fill();
                    if (isSel) {
                        const ep = 0.55 + 0.4 * Math.sin(t * 3);
                        ctx.strokeStyle = `rgba(200,80,255,${ep})`; ctx.lineWidth = 2.5;
                        ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 12;
                    } else {
                        ctx.strokeStyle = sk.unlocked ? 'rgba(120,80,200,0.35)' : 'rgba(60,50,80,0.35)';
                        ctx.lineWidth = 1; ctx.shadowBlur = 0;
                    }
                    ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.stroke();
                    ctx.shadowBlur = 0;
                    drawPlayerSkin(sk, cx2+cellW/2, cy2+cellH/2 - 8, 1.2);
                    if (!sk.unlocked) {
                        ctx.fillStyle = 'rgba(0,0,0,0.52)';
                        ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.fill();
                        ctx.font = '20px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillStyle = 'rgba(200,200,255,0.5)';
                        ctx.fillText('🔒', cx2+cellW/2, cy2+cellH/2 - 10);
                        // Name above price
                        ctx.font = 'bold 9px monospace'; ctx.textBaseline = 'alphabetic';
                        ctx.fillStyle = 'rgba(200,180,255,0.75)';
                        ctx.fillText(sk.name, cx2+cellW/2, cy2+cellH-22);
                        ctx.font = 'bold 10px monospace';
                        if (sk.shopOnly) {
                            ctx.fillStyle = '#ddaa44';
                            ctx.fillText('🛒 SHOP', cx2+cellW/2, cy2+cellH-10);
                        } else if (sk.price) {
                            ctx.fillStyle = '#aa88cc';
                            ctx.fillText(`${sk.price} pts`, cx2+cellW/2, cy2+cellH-10);
                        } else {
                            ctx.fillStyle = '#664488';
                            ctx.fillText('???', cx2+cellW/2, cy2+cellH-10);
                        }
                    } else {
                        ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
                        ctx.fillStyle = '#aa66dd'; ctx.textBaseline = 'alphabetic';
                        ctx.fillText(sk.name, cx2+cellW/2, cy2+cellH-10);
                    }
                }
                // Action button — lower (extra gap below grid)
                const btnY2 = gridStartY + skinRows*(cellH+gap) + 20;
                const btnW2 = 210, btnH2 = 46, btnX2 = cxL - btnW2/2;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (sel.unlocked) {
                    const isEq = equippedSkin === selectedSkin;
                    const ep2 = 0.5 + 0.45 * Math.sin(t * 3);
                    ctx.fillStyle = isEq ? '#0a1a0a' : '#1a003a';
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = isEq ? `rgba(80,220,120,${ep2})` : `rgba(200,80,255,${ep2})`;
                    ctx.lineWidth = 2; ctx.shadowColor = isEq ? '#44ff88' : '#cc44ff'; ctx.shadowBlur = 14*ep2;
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.font = 'bold 18px monospace'; ctx.fillStyle = isEq ? '#55ffaa' : '#ee88ff';
                    ctx.fillText(isEq ? '✓ EQUIPPED' : 'EQUIP', cxL, btnY2 + btnH2/2);
                } else if (sel.shopOnly) {
                    ctx.fillStyle = '#100800';
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = 'rgba(180,120,20,0.4)'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 15px monospace'; ctx.fillStyle = '#cc8822';
                    ctx.fillText('🛒 BUY IN SHOP', cxL, btnY2 + btnH2/2);
                } else if (sel.price) {
                    const canAfford = lockerPoints >= sel.price;
                    ctx.fillStyle = canAfford ? '#0a2010' : '#1a0a00';
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = canAfford ? 'rgba(60,220,120,0.7)' : 'rgba(180,80,0,0.5)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 18px monospace'; ctx.fillStyle = canAfford ? '#44ffaa' : '#aa5522';
                    ctx.fillText(`BUY  ⬡ ${sel.price}`, cxL, btnY2 + btnH2/2);
                } else {
                    ctx.fillStyle = '#0a0a0a';
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = 'rgba(80,50,80,0.4)'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 16px monospace'; ctx.fillStyle = 'rgba(140,100,140,0.5)';
                    ctx.fillText('🔒 NOT FOR SALE', cxL, btnY2 + btnH2/2);
                }

            } else {
                // ── TRAILS TAB ──
                const selT = TRAILS[selectedTrail];

                // Trail grid — ALL trails + ??? slot at end
                const totalTrailSlots = TRAILS.length + 1;
                const trailRows = Math.ceil(totalTrailSlots / cols);
                const tGridY = gridStartY;
                for (let i = 0; i < totalTrailSlots; i++) {
                    const col = i % cols, row = Math.floor(i / cols);
                    const cx2 = gx + col*(cellW+gap), cy2 = tGridY + row*(cellH+gap);
                    if (i === TRAILS.length) { drawComingSoonCell(cx2, cy2); continue; }
                    const tr = TRAILS[i];
                    const isSel = i === selectedTrail;
                    const isEqT = i === equippedTrail;
                    ctx.fillStyle = isSel ? 'rgba(40,160,220,0.18)' : 'rgba(255,255,255,0.04)';
                    ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.fill();
                    if (isSel) {
                        const ep = 0.55 + 0.4 * Math.sin(t * 3);
                        ctx.strokeStyle = `rgba(80,200,255,${ep})`; ctx.lineWidth = 2.5;
                        ctx.shadowColor = '#44bbff'; ctx.shadowBlur = 12;
                    } else {
                        ctx.strokeStyle = tr.unlocked ? 'rgba(60,140,180,0.4)' : 'rgba(50,50,70,0.35)';
                        ctx.lineWidth = 1; ctx.shadowBlur = 0;
                    }
                    ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.stroke();
                    ctx.shadowBlur = 0;
                    const pcxT = cx2 + cellW/2, pcyT = cy2 + cellH/2 - 8;
                    for (let j = 0; j < 8; j++) {
                        const age = ((t * 1.6 + j * 0.18) % 1);
                        const ang = (j / 8) * Math.PI * 2 + t * 0.4;
                        const r2 = 6 + age * 16;
                        tr.draw({ x: pcxT + Math.cos(ang)*r2, y: pcyT + Math.sin(ang)*r2*0.5,
                                  r: 1.5+(1-age)*2, hue: 190+j*18, life: (1-age)*20, maxLife: 20,
                                  wobble: ang, segs: [[1,2],[-1,2],[1,-1],[0,2]] },
                                 tr.unlocked ? (1-age)*0.75 : (1-age)*0.18);
                    }
                    ctx.save(); ctx.globalAlpha = tr.unlocked ? 1 : 0.3;
                    ctx.fillStyle = tr.color; ctx.shadowColor = tr.color; ctx.shadowBlur = tr.unlocked ? 8 : 0;
                    ctx.beginPath(); ctx.arc(pcxT, cy2+cellH-22, 4, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0; ctx.restore();
                    if (!tr.unlocked) {
                        ctx.fillStyle = 'rgba(0,0,0,0.45)';
                        ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.fill();
                        ctx.font = '20px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillStyle = 'rgba(180,220,255,0.45)';
                        ctx.fillText('🔒', cx2+cellW/2, cy2+cellH/2-8);
                        // Name above price
                        ctx.font = 'bold 9px monospace'; ctx.textBaseline = 'alphabetic';
                        ctx.fillStyle = 'rgba(160,220,255,0.75)';
                        ctx.fillText(tr.name, cx2+cellW/2, cy2+cellH-22);
                        ctx.font = 'bold 10px monospace';
                        if (tr.shopOnly) {
                            ctx.fillStyle = '#ddaa44';
                            ctx.fillText('🛒 SHOP', cx2+cellW/2, cy2+cellH-10);
                        } else {
                            ctx.fillStyle = '#6699aa';
                            ctx.fillText(`${tr.price} pts`, cx2+cellW/2, cy2+cellH-10);
                        }
                    } else {
                        // Name label
                        ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
                        ctx.fillStyle = isEqT ? '#55ffcc' : '#66aacc';
                        ctx.fillText(tr.name, cx2+cellW/2, cy2+cellH-10);
                        // EQUIPPED badge on cell
                        if (isEqT) {
                            ctx.fillStyle = 'rgba(10,40,25,0.88)';
                            ctx.beginPath(); ctx.roundRect(cx2+6, cy2+6, 58, 16, 5); ctx.fill();
                            ctx.strokeStyle = 'rgba(50,210,140,0.65)'; ctx.lineWidth = 1;
                            ctx.beginPath(); ctx.roundRect(cx2+6, cy2+6, 58, 16, 5); ctx.stroke();
                            ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            ctx.fillStyle = '#55ffcc';
                            ctx.fillText('✓ EQUIPPED', cx2+35, cy2+14);
                        }
                    }
                }
                // Action button — lower
                const tBtnY = tGridY + trailRows*(cellH+gap) + 20;
                const btnW2 = 210, btnH2 = 46, btnX2 = cxL - btnW2/2;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (selT.unlocked) {
                    const isEqT = equippedTrail === selectedTrail;
                    const ep2 = 0.5 + 0.45 * Math.sin(t * 3);
                    ctx.fillStyle = isEqT ? '#041814' : '#001828';
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = isEqT ? `rgba(60,220,180,${ep2})` : `rgba(60,180,255,${ep2})`;
                    ctx.lineWidth = 2; ctx.shadowColor = isEqT ? '#44ffcc' : '#44aaff'; ctx.shadowBlur = 14*ep2;
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.font = 'bold 18px monospace'; ctx.fillStyle = isEqT ? '#55ffcc' : '#88ddff';
                    ctx.fillText(isEqT ? '✓ EQUIPPED' : 'EQUIP', cxL, tBtnY + btnH2/2);
                } else if (selT.shopOnly) {
                    ctx.fillStyle = '#080a0a';
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = 'rgba(0,200,180,0.4)'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 15px monospace'; ctx.fillStyle = '#00ccbb';
                    ctx.fillText('🛒 BUY IN SHOP', cxL, tBtnY + btnH2/2);
                } else {
                    const canAfford = lockerPoints >= selT.price;
                    ctx.fillStyle = canAfford ? '#081820' : '#100808';
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = canAfford ? 'rgba(60,200,160,0.7)' : 'rgba(160,60,40,0.5)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 18px monospace'; ctx.fillStyle = canAfford ? '#44ffcc' : '#aa4422';
                    ctx.fillText(`BUY  ⬡ ${selT.price}`, cxL, tBtnY + btnH2/2);
                }
            }
            ctx.textBaseline = 'alphabetic';
        }

        function drawShop() {
            const t = Date.now() / 1000;
            const cx = BASE_W / 2;

            // Background
            ctx.fillStyle = '#05030a'; ctx.fillRect(0, 0, BASE_W, BASE_H);
            for (let i = 0; i < 20; i++) {
                const bx = (Math.sin(i*97.3)*0.5+0.5)*BASE_W;
                const by = (Math.cos(i*113.7)*0.5+0.5)*BASE_H;
                ctx.fillStyle = `rgba(255,180,50,${0.04+0.07*Math.abs(Math.sin(t*0.8+i))})`;
                ctx.beginPath(); ctx.arc(bx, by, 1.4, 0, Math.PI*2); ctx.fill();
            }

            // Header
            ctx.fillStyle = 'rgba(6,3,0,0.97)'; ctx.fillRect(0, 0, BASE_W, 58);
            ctx.strokeStyle = 'rgba(220,140,0,0.35)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0,58); ctx.lineTo(BASE_W,58); ctx.stroke();

            // Back button
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.beginPath(); ctx.roundRect(10, 12, 44, 34, 9); ctx.fill();
            ctx.strokeStyle = 'rgba(200,140,0,0.4)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(10, 12, 44, 34, 9); ctx.stroke();
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = 'bold 18px monospace'; ctx.fillStyle = '#ddaa33';
            ctx.fillText('←', 32, 29);

            // Title
            ctx.font = 'bold 22px monospace';
            ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 14;
            ctx.fillStyle = '#ffcc44';
            ctx.fillText('🛒  SHOP', cx, 30);
            ctx.shadowBlur = 0;
            // Points
            ctx.textAlign = 'right'; ctx.font = 'bold 14px monospace';
            ctx.fillStyle = '#ffcc44';
            ctx.fillText(`⬡ ${lockerPoints} pts`, BASE_W - 12, 36);

            // Items list — bundles get a taller card
            const skinItemH = 90, bundleItemH = 160, itemGap = 10;
            const itemW = BASE_W - 32, itemX = 16;
            let curY = 70;
            ctx.textAlign = 'left'; ctx.textBaseline = 'middle';

            for (let i = 0; i < SHOP_ITEMS.length; i++) {
                const item = SHOP_ITEMS[i];
                const isBundle = item.type === 'bundle';
                const isTrail = item.type === 'trail';
                const itemH = isBundle ? bundleItemH : skinItemH;
                const iy = curY;
                curY += itemH + itemGap;

                const owned = item.owned;
                const canAfford = lockerPoints >= item.price;
                const pulse = 0.55 + 0.4 * Math.sin(t * 2.5 + i);

                // card bg
                if (isBundle) {
                    const bgg = ctx.createLinearGradient(itemX, iy, itemX, iy + itemH);
                    bgg.addColorStop(0, owned ? 'rgba(10,28,16,0.95)' : 'rgba(14,10,4,0.95)');
                    bgg.addColorStop(1, owned ? 'rgba(6,18,10,0.95)' : 'rgba(8,5,0,0.95)');
                    ctx.fillStyle = bgg;
                } else {
                    ctx.fillStyle = owned ? 'rgba(10,30,10,0.9)' : 'rgba(12,8,2,0.92)';
                }
                ctx.beginPath(); ctx.roundRect(itemX, iy, itemW, itemH, 14); ctx.fill();

                // card border
                if (owned) {
                    ctx.strokeStyle = `rgba(60,200,100,${pulse * 0.7})`; ctx.lineWidth = 2;
                    ctx.shadowColor = '#44ff88'; ctx.shadowBlur = 8 * pulse;
                } else if (isBundle) {
                    ctx.strokeStyle = `rgba(${canAfford ? item.tagColor.slice(1).match(/../g).map(h=>parseInt(h,16)).join(',') : '80,60,20'},${pulse * 0.85})`;
                    ctx.lineWidth = 2; ctx.shadowColor = canAfford ? item.tagColor : 'transparent';
                    ctx.shadowBlur = canAfford ? 10 * pulse : 0;
                } else {
                    ctx.strokeStyle = `rgba(${canAfford ? '220,160,40' : '100,70,20'},${pulse * 0.7})`;
                    ctx.lineWidth = 1.5; ctx.shadowBlur = 0;
                }
                ctx.beginPath(); ctx.roundRect(itemX, iy, itemW, itemH, 14); ctx.stroke();
                ctx.shadowBlur = 0;

                if (isBundle) {
                    // ── BUNDLE LAYOUT ──
                    const skinHalfH = Math.round(itemH * 0.56); // ~90px
                    const trailHalfH = itemH - skinHalfH;       // ~70px
                    const divY = iy + skinHalfH;
                    const textX = itemX + 84; // right-column text start

                    // Divider line
                    ctx.save(); ctx.globalAlpha = 0.22;
                    ctx.strokeStyle = item.tagColor; ctx.lineWidth = 1;
                    ctx.setLineDash([5, 4]);
                    ctx.beginPath(); ctx.moveTo(itemX + 14, divY); ctx.lineTo(itemX + itemW - 14, divY); ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();

                    // ── SKIN HALF (top) ──
                    // Skin preview — left column, vertically centered
                    ctx.save();
                    ctx.translate(itemX + 50, iy + skinHalfH * 0.52);
                    ctx.scale(1.1, 1.1);
                    SKINS[item.skinIdx].draw(0, 0, 1);
                    ctx.restore();

                    // BUNDLE tag pill — top of right column
                    const tagPillX = textX, tagPillY = iy + 12;
                    ctx.fillStyle = item.tagColor + '28';
                    ctx.beginPath(); ctx.roundRect(tagPillX, tagPillY, 70, 19, 6); ctx.fill();
                    ctx.strokeStyle = item.tagColor + 'cc'; ctx.lineWidth = 1.2;
                    ctx.shadowColor = item.tagColor; ctx.shadowBlur = 5;
                    ctx.beginPath(); ctx.roundRect(tagPillX, tagPillY, 70, 19, 6); ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 9px monospace'; ctx.fillStyle = item.tagColor;
                    ctx.fillText(item.tag, tagPillX + 35, tagPillY + 9.5);

                    // Bundle name — below tag pill
                    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 15px monospace';
                    ctx.fillStyle = owned ? '#88ffaa' : (canAfford ? item.tagColor : '#886644');
                    if (canAfford && !owned) { ctx.shadowColor = item.tagColor; ctx.shadowBlur = 5; }
                    ctx.fillText(item.name, textX, iy + 44);
                    ctx.shadowBlur = 0;

                    // Skin name — below bundle name (muted, small)
                    ctx.font = '11px monospace'; ctx.fillStyle = 'rgba(180,165,130,0.6)';
                    ctx.fillText('Skin: ' + SKINS[item.skinIdx].name, textX, iy + 62);

                    // ── TRAIL HALF (bottom) ──
                    const tr = TRAILS[item.trailIdx];
                    if (tr) {
                        const trCx = itemX + 50, trCy = divY + trailHalfH * 0.5;

                        // TRAIL label
                        ctx.font = 'bold 9px monospace'; ctx.fillStyle = 'rgba(200,180,120,0.5)';
                        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
                        ctx.fillText('TRAIL', textX, divY + 10);

                        // Trail name
                        ctx.font = 'bold 14px monospace';
                        ctx.fillStyle = owned ? '#88eeff' : (canAfford ? '#aaddff' : '#446677');
                        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                        ctx.fillText(tr.name, textX, divY + trailHalfH * 0.62);

                        // Color dot after trail name
                        const tNameW = ctx.measureText(tr.name).width;
                        ctx.save(); ctx.fillStyle = tr.color;
                        ctx.shadowColor = tr.color; ctx.shadowBlur = owned ? 8 : 3;
                        ctx.beginPath(); ctx.arc(textX + tNameW + 10, divY + trailHalfH * 0.62, 4, 0, Math.PI*2); ctx.fill();
                        ctx.shadowBlur = 0; ctx.restore();

                        // Animated trail orbs (left column, trail half)
                        for (let j = 0; j < 10; j++) {
                            const age = ((t * 1.8 + j * 0.2) % 1);
                            const ang = (j / 10) * Math.PI * 2 + t * 0.6;
                            const orb = 14 + age * 17;
                            tr.draw({ x: trCx + Math.cos(ang) * orb, y: trCy + Math.sin(ang) * orb * 0.42,
                                      r: 2.8*(1-age)+0.5, hue: 190+j*18, life: (1-age)*22, maxLife: 22,
                                      wobble: ang, segs: [[2,3],[-2,2],[2,-2],[0,3]] }, (1-age)*0.85);
                        }
                    }

                } else if (isTrail) {
                    // ── TRAIL LAYOUT ──
                    const tr = TRAILS[item.trailIdx];
                    if (tr) {
                        const trCx = itemX + 44, trCy = iy + itemH/2;
                        for (let j = 0; j < 9; j++) {
                            const age = ((t * 1.9 + j * 0.18) % 1);
                            const ang = (j / 9) * Math.PI * 2 + t * 0.5;
                            const orb = 10 + age * 17;
                            tr.draw({ x: trCx + Math.cos(ang)*orb, y: trCy + Math.sin(ang)*orb*0.42,
                                      r: 2.5*(1-age)+0.4, hue: 165+j*22, life: (1-age)*22, maxLife: 22,
                                      wobble: ang, segs: [[2,3],[-2,2],[2,-2],[0,3]] }, (1-age) * (owned ? 0.85 : 0.4));
                        }
                        ctx.beginPath(); ctx.arc(trCx, trCy, 5, 0, Math.PI*2);
                        ctx.fillStyle = tr.color; ctx.shadowColor = tr.color; ctx.shadowBlur = owned ? 10 : 3;
                        ctx.fill(); ctx.shadowBlur = 0;
                    }
                    // tag pill
                    const tagXT = itemX + 80, tagYT = iy + 12;
                    ctx.fillStyle = item.tagColor + '22';
                    ctx.beginPath(); ctx.roundRect(tagXT, tagYT, 72, 18, 6); ctx.fill();
                    ctx.strokeStyle = item.tagColor + '99'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.roundRect(tagXT, tagYT, 72, 18, 6); ctx.stroke();
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 9px monospace'; ctx.fillStyle = item.tagColor;
                    ctx.fillText(item.tag, tagXT + 36, tagYT + 9);
                    // name
                    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 15px monospace';
                    ctx.fillStyle = owned ? '#88ffee' : (canAfford ? item.tagColor : '#226655');
                    if (canAfford && !owned) { ctx.shadowColor = item.tagColor; ctx.shadowBlur = 5; }
                    ctx.fillText(item.name, itemX + 82, iy + 38);
                    ctx.shadowBlur = 0;
                    // desc
                    ctx.font = '11px monospace'; ctx.fillStyle = 'rgba(120,200,190,0.7)';
                    ctx.fillText(item.desc, itemX + 82, iy + 57);
                } else {
                    // ── REGULAR SKIN LAYOUT ──
                    ctx.save();
                    ctx.translate(itemX + 44, iy + itemH/2 + 4);

                let count = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    const players = d.players || {};
                    const playerCount = Object.keys(players).length;
                    const lastSeen = d.lastSeen || d.updatedAt || 0;
                    const age = now - lastSeen;
                    // Delete if: heartbeat gone >90s, or no players, or older than 4 hours
                    if (age > 90000 || playerCount === 0 || (now - (d.updatedAt || 0)) > 4 * 3600000) {

                            fromX: prev ? prev.x : fresh.x,
                            fromY: prev ? prev.y : fresh.y,

            if (!isMultiplayerGame) return;
            const now = Date.now();
            for (const [uid, pos] of Object.entries(remotePositions)) {
                const slot = mpSlots[uid];
                const skinIdx = slot ? slot.skinIdx : _mpUidToSkin(uid);
                const name = pos.name || (slot ? slot.name : '?');
                const skin = SKINS[skinIdx] || SKINS[0];
                const facing = pos.facing || 1;
                // Smooth interpolation between last two received positions
                const span = Math.max(1, (pos.toT || now) - (pos.fromT || now));
                const alpha = Math.min(1, (now - (pos.toT || now) + span) / span);
                const ix = (pos.fromX || pos.x) + ((pos.toX || pos.x) - (pos.fromX || pos.x)) * alpha;
                const iy = (pos.fromY || pos.y) + ((pos.toY || pos.y) - (pos.fromY || pos.y)) * alpha;
                const rx = Math.floor(ix);
                const ry = Math.floor(iy - camY);
                const rcx = rx + 11;
                ctx.save();
                ctx.globalAlpha = 0.5;
                ctx.translate(rcx, ry + 17);
                ctx.scale(facing * 0.7, 0.7);
                skin.draw(0, 0, 1);
                ctx.restore();
                // Name tag above player
                ctx.save();
                ctx.globalAlpha = 0.8;
                ctx.font = 'bold 9px "Segoe UI", Arial';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
                ctx.fillText(name, rx + 11, ry - 4);
                ctx.restore();
            }
        }

        function _mpCleanup() {
            if (mpPosUnsub) { mpPosUnsub(); mpPosUnsub = null; }
            if (mpRoomEventUnsub) { mpRoomEventUnsub(); mpRoomEventUnsub = null; }
            if (mpFinishersUnsub) { mpFinishersUnsub(); mpFinishersUnsub = null; }
            if (isMultiplayerGame && mpRoomId && mpMyUid) {
                _fbDb.collection('rooms').doc(mpRoomId).collection('pos').doc(mpMyUid).delete().catch(() => {});
            }
            isMultiplayerGame = false;
            mpRoomId = null; mpMyUid = null;
            mpSlots = {}; remotePositions = {}; mpLastPosSend = 0;
            mpEndTriggered = false; mpEndAt = 0; mpWinnerName = '';
            mpGameOver = false; mpFinalScores = []; mpHostInLobby = false; mpResultsReady = false; mpEndGameConfirm = false;
            lastRunHigh = 0; // clear session height when leaving lobby
            mpInitialPowerups = [];
            mpFinishTimes = {};
            mpPausedByHost = false;
            mpHostLeft = false;
            mpHostTransferring = false;
            mpGameStartAt = 0;
            mpLastMetaSend = 0;
            mpLastSentX = null; mpLastSentY = null;
            if (_mpFinalScoresCb) { _mpFinalScoresCb = null; }
            _afkPromptActive = false;
            _afkLastActivity = Date.now();
            _worldRng = Math.random.bind(Math); // restore normal RNG for solo play
        }

        // Respawn locally after death in multiplayer — reset position, keep world intact
        function _mpRespawn() {
            SFX.play('death');
            _flushSaves();
            const startX = (mpSlots[mpMyUid] && mpSlots[mpMyUid].startX != null)
                ? mpSlots[mpMyUid].startX : BASE_W / 2 - 11;
            player.x = startX;
            player.y = startY || 680;
            player.vx = 0; player.vy = 0;
            player.onGround = false;
            // Clear carried power-ups
            player.powerSpeed = 0; player.powerHighJump = 0;
            player.powerShield = 0; player.powerSlow = 0;
            camY = player.y - BASE_H + 200; camYVel = 0;
            highestY = player.y; jumpStartY = player.y; bestJumpStartY = player.y;
            highestLandedPlatY = player.y;
            combo = 0; comboTimer = 0;
            // lastRunHigh intentionally NOT reset — preserve session high across respawns
            lastPointMilestone = 0;

            // Restore any initial powerups that were collected (coins stay gone permanently)
            for (const snap of mpInitialPowerups) {
                const stillAlive = powerups.some(pu => Math.abs(pu.x - snap.x) < 2 && Math.abs(pu.y - snap.y) < 2);
                if (!stillAlive) {
                    const restored = new PowerUp(snap.x, snap.y, snap.platform || null);
                    if (snap.typeId) restored.type = POWERUP_TYPES.find(t => t.id === snap.typeId) || restored.type;
                    if (snap.offsetX !== undefined) restored.offsetX = snap.offsetX;
                    powerups.push(restored);
                }
            }

            state = STATE.PLAY;
        }

        // Called when local player reaches top (natural win)
        function _mpTriggerEnd(winnerName) {
            if (mpEndTriggered) return; // already counting down
            mpEndTriggered = true;
            mpEndAt = Date.now() + 30000;
            mpWinnerName = winnerName;
            const finT = Date.now();
            if (mpMyUid) mpFinishTimes[mpMyUid] = finT;
            // Write winner UID + finish time so all clients (including host) can mark them finished
            _fbDb.collection('rooms').doc(mpRoomId).update({
                gameWinner: winnerName,
                gameEndAt: mpEndAt,
                gameWinnerUid: mpMyUid || null,
                gameWinnerFinishedAt: finT,
            }).catch(() => {});
        }

        // Collect scores: if someone reached top, rank by finish time; else rank by height
        function _mpBuildFinalScores() {
            const scores = [];
            const myName = (mpSlots[mpMyUid] && mpSlots[mpMyUid].name) || 'Me';
            scores.push({ uid: mpMyUid, name: myName, height: lastRunHigh, finishedAt: mpFinishTimes[mpMyUid] || null });
            for (const [uid, pos] of Object.entries(remotePositions)) {
                const name = pos.name || (mpSlots[uid] && mpSlots[uid].name) || '?';
                scores.push({ uid, name, height: pos.maxHeight || 0, finishedAt: mpFinishTimes[uid] || pos.finishedAt || null });
            }
            const anyFinished = scores.some(s => s.finishedAt);
            scores.sort((a, b) => {
                if (anyFinished) {
                    if (a.finishedAt && b.finishedAt) return a.finishedAt - b.finishedAt; // faster = better
                    if (a.finishedAt) return -1;
                    if (b.finishedAt) return 1;
                }
                return b.height - a.height; // fallback: taller = better
            });
            return scores;
        }

        // Subscribe to room doc changes during gameplay to detect winner/endAt
        function _mpSubscribeRoomEvents(roomId) {
            if (mpRoomEventUnsub) { mpRoomEventUnsub(); mpRoomEventUnsub = null; }
            mpRoomEventUnsub = _fbDb.collection('rooms').doc(roomId).onSnapshot(snap => {
                if (!snap.exists) {
                    // Host deleted the room — kick all non-host players back to main
                    if (!isRoomHost && isMultiplayerGame) { _mpCleanup(); state = STATE.MAIN; hasActiveGame = false; }
                    return;
                }
                const d = snap.data();
                if (d.gameEndAt && d.gameWinner && !mpEndTriggered) {
                    mpEndTriggered = true;
                    mpEndAt = d.gameEndAt;
                    mpWinnerName = d.gameWinner;
                    // Store winner's finish time so _mpBuildFinalScores sees them as finished
                    if (d.gameWinnerUid && d.gameWinnerFinishedAt) {
                        mpFinishTimes[d.gameWinnerUid] = d.gameWinnerFinishedAt;
                    }
                    // If gameEndAt is already past (host forced end), show results immediately
                    if (d.gameEndAt <= Date.now() + 500 && !mpGameOver) {
                        mpGameOver = true; mpResultsReady = false;
                        _mpFetchAndFinalize();
                    }
                }
                if (d.hostInLobby && !mpHostInLobby) {
                    mpHostInLobby = true;
                    if (!isRoomHost && isMultiplayerGame) {
                        // nextRoomCode is already in the snapshot — no extra Firestore round-trip
                        if (d.nextRoomCode) _mpGuestJoinNextRoom(d.nextRoomCode);
                        else                _mpGuestReturnToLobby();
                    }
                }
                if (d.hostLeft && !isRoomHost && !mpHostLeft && isMultiplayerGame) {
                    mpHostLeft = true;
                    if (!mpGameOver) {
                        mpEndTriggered = true; mpEndAt = Date.now();
                        mpGameOver = true; mpResultsReady = false;
                        _mpFetchAndFinalize().then(() => {
                            mpWinnerName = mpFinalScores.length > 0 ? mpFinalScores[0].name : '';
                        });
                    }
                }
                // Deliver finalScores to waiting guest via callback (avoids repeated .get() polling)
                if (!isRoomHost && d.finalScores && d.finalScores.length > 0 && _mpFinalScoresCb) {
                    const cb = _mpFinalScoresCb;
                    _mpFinalScoresCb = null;
                    cb(d.finalScores);
                }
                // Synchronized start: guests pick up gameStartAt written by HOST
                // Only accept a fresh timestamp (in the future) to ignore stale values from previous games
                if (!isRoomHost && d.gameStartAt && d.gameStartAt > Date.now() && mpGameStartAt === 0) {
                    mpGameStartAt = d.gameStartAt;
                    loadingMsg = 'Game starting!';
                }
                // Global pause sync (guests only — host drives this)
                if (!isRoomHost && d.paused !== undefined) {
                    if (d.paused && !mpPausedByHost && state === STATE.PLAY) {
                        mpPausedByHost = true;
                        _afkPromptActive = false;
                        state = STATE.MENU;
                    } else if (!d.paused && mpPausedByHost) {
                        mpPausedByHost = false;
                        _startGameMusic();
                        state = STATE.PLAY;
                    }
                }
                // Host transfer — show loading overlay for all, new host takes over
                if (d.transferringHost && d.newHostUid && isMultiplayerGame) {
                    mpHostTransferring = true;
                    mpPausedByHost = false;
                    if (d.newHostUid === mpMyUid && !isRoomHost) {
                        // I'm the new host!
                        isRoomHost = true;
                        setTimeout(() => {
                            _fbDb.collection('rooms').doc(mpRoomId).update({
                                hostUid: mpMyUid,
                                transferringHost: firebase.firestore.FieldValue.delete(),
                                newHostUid: firebase.firestore.FieldValue.delete(),
                            }).catch(() => {});
                            _startHostHeartbeat(mpRoomId);
                        }, 1200); // short delay so loading screen is visible
                    }
                } else if (!d.transferringHost && mpHostTransferring) {
                    mpHostTransferring = false;
                    if (state === STATE.MENU) { state = STATE.PLAY; _startGameMusic(); }
                }
            }, () => {});
        }

        // Fetch latest heights + finishers from Firestore, then reveal leaderboard.
        // HOST fetches all data, sorts, and writes canonical finalScores to room doc.
        // Guests poll for finalScores written by host so everyone sees the same table.
        async function _mpFetchAndFinalize() {
            if (!mpRoomId) { mpResultsReady = true; return; }

            // Flush own final height to Firestore before anyone fetches
            if (mpMyUid) {
                await _fbDb.collection('rooms').doc(mpRoomId).collection('pos').doc(mpMyUid).set({
                    maxHeight: lastRunHigh,
                    name: (mpSlots[mpMyUid] && mpSlots[mpMyUid].name) || (UserSystem.currentUser && UserSystem.currentUser.username) || 'Me',
                    finishedAt: mpFinishTimes[mpMyUid] || null,
                }, { merge: true }).catch(() => {});
            }

            if (isRoomHost) {
                // Wait briefly for all clients to flush their final heights
                await new Promise(r => setTimeout(r, 1000));
                if (!mpRoomId) { mpResultsReady = true; return; }
                try {
                    const [posSnap, finSnap] = await Promise.all([
                        _fbDb.collection('rooms').doc(mpRoomId).collection('pos').get(),
                        _fbDb.collection('rooms').doc(mpRoomId).collection('finishers').get(),
                    ]);
                    const map = {};
                    posSnap.forEach(doc => {
                        const d = doc.data();
                        map[doc.id] = { uid: doc.id, name: d.name || (mpSlots[doc.id] && mpSlots[doc.id].name) || '?', height: d.maxHeight || 0, finishedAt: d.finishedAt || null };
                    });
                    finSnap.forEach(doc => {
                        const d = doc.data();
                        if (d.finishedAt) {
                            if (map[doc.id]) map[doc.id].finishedAt = d.finishedAt;
                            mpFinishTimes[doc.id] = d.finishedAt;
                        }
                    });
                    const scores = Object.values(map);
                    const anyFinished = scores.some(s => s.finishedAt);
                    scores.sort((a, b) => {
                        if (anyFinished) {
                            if (a.finishedAt && b.finishedAt) return a.finishedAt - b.finishedAt;
                            if (a.finishedAt) return -1;
                            if (b.finishedAt) return 1;
                        }
                        return b.height - a.height;
                    });
                    mpFinalScores = scores;
                    // Publish canonical scores so all guests show the same leaderboard
                    if (mpRoomId) _fbDb.collection('rooms').doc(mpRoomId).update({ finalScores: scores }).catch(() => {});
                } catch(e) {
                    console.warn('[mpFetchAndFinalize]', e);
                    mpFinalScores = _mpBuildFinalScores();
                }
                mpResultsReady = true;
            } else {
                // Guests: wait for HOST to publish finalScores via the existing room subscription
                // (no extra .get() calls — the snapshot fires the callback when the field appears)
                const fs = await new Promise(resolve => {
                    const timer = setTimeout(() => { _mpFinalScoresCb = null; resolve(null); }, 6000);
                    _mpFinalScoresCb = (scores) => { clearTimeout(timer); resolve(scores); };
                });
                if (fs && fs.length > 0) {
                    const scores = [...fs];
                    const anyFinished = scores.some(s => s.finishedAt);
                    scores.sort((a, b) => {
                        if (anyFinished) {
                            if (a.finishedAt && b.finishedAt) return a.finishedAt - b.finishedAt;
                            if (a.finishedAt) return -1;
                            if (b.finishedAt) return 1;
                        }
                        return b.height - a.height;
                    });
                    mpFinalScores = scores;
                } else {
                    mpFinalScores = _mpBuildFinalScores(); // fallback if subscription timed out
                }
                mpResultsReady = true;
            }
        }

        // Subscribe to finishers sub-collection so all clients know who completed
        function _mpSubscribeFinishers(roomId) {
            if (mpFinishersUnsub) { mpFinishersUnsub(); mpFinishersUnsub = null; }
            mpFinishersUnsub = _fbDb.collection('rooms').doc(roomId).collection('finishers')
                .onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'removed') return;
                        const uid = change.doc.id;
                        const d = change.doc.data();
                        if (d.finishedAt) mpFinishTimes[uid] = d.finishedAt;
                    });
                }, () => {});
        }

        // Host: create a fresh room with same settings, signal guests, move to new lobby
        async function _mpReturnToLobby() {
            if (!isRoomHost) return;
            const oldRid   = mpRoomId;
            const uid      = _onlineUid();
            const name     = UserSystem.currentUser?.username || 'Player';
            const roomType = currentRoomData?.type || 'public';
            const savedMode = lobbyMapMode, savedLevel = lobbyMapLevel, savedTheme = lobbyMapTheme;

            const newCode = _onlineGenCode();
            try {
                await _fbDb.collection('rooms').doc(newCode).set({
                    type: roomType,
                    hostUid: uid, hostName: name,
                    mapMode: savedMode, mapLevel: savedLevel, mapTheme: savedTheme,
                    status: 'waiting',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: Date.now(), lastSeen: Date.now(),
                    players: { [uid]: { name, skin: equippedSkin || 0, joinedAt: Date.now() } }
                });
            } catch(e) {
                console.error('[mpReturnToLobby] new room failed', e);
                // Fallback: reuse old room
                await _fbDb.collection('rooms').doc(oldRid).update({
                    status: 'waiting', gameWinner: '', gameEndAt: 0, hostInLobby: true,
                }).catch(() => {});
                _mpCleanup();
                currentRoomId = oldRid; isRoomHost = true;
                lobbyMapMode = savedMode; lobbyMapLevel = savedLevel; lobbyMapTheme = savedTheme;
                _startHostHeartbeat(oldRid); _onlineSubRoom(oldRid);
                state = STATE.ONLINE; onlineScreen = 'lobby';
                return;
            }

            // Tell guests the new code, then delete old room after 30 s
            await _fbDb.collection('rooms').doc(oldRid).update({
                hostInLobby: true, nextRoomCode: newCode
            }).catch(() => {});
            setTimeout(() => _fbDb.collection('rooms').doc(oldRid).delete().catch(() => {}), 30000);

            _mpCleanup();
            lobbyStartAt = 0;
            currentRoomId = newCode; isRoomHost = true;
            lobbyMapMode = savedMode; lobbyMapLevel = savedLevel; lobbyMapTheme = savedTheme;
            _startHostHeartbeat(newCode);
            _onlineSubRoom(newCode);
            state = STATE.ONLINE; onlineScreen = 'lobby';
        }

        // Guest: join the new room the host created (nextCode comes from old room)
        async function _mpGuestJoinNextRoom(nextCode) {
            const uid  = _onlineUid();
            const name = UserSystem.currentUser?.username || 'Player';
            _mpCleanup();
            lobbyStartAt = 0;
            try {
                await _fbDb.collection('rooms').doc(nextCode).update({
                    [`players.${uid}`]: { name, skin: equippedSkin || 0, joinedAt: Date.now() },
                    updatedAt: Date.now(),
                });
                currentRoomId = nextCode; isRoomHost = false;
                _onlineSubRoom(nextCode);
                state = STATE.ONLINE; onlineScreen = 'lobby';
            } catch(e) {
                console.error('[mpGuestJoinNextRoom] failed', e);
                state = STATE.ONLINE; onlineScreen = 'main';
            }
        }

        // Guest: read nextRoomCode from old room and join it
        async function _mpGuestReturnToLobby() {
            const oldRid   = mpRoomId;
            let nextCode   = currentRoomData?.nextRoomCode || null;
            if (!nextCode && oldRid) {
                try {
                    const snap = await _fbDb.collection('rooms').doc(oldRid).get();
                    if (snap.exists) nextCode = snap.data().nextRoomCode;
                } catch(e) {}
            }
            if (nextCode) { _mpGuestJoinNextRoom(nextCode); }
            else          { _mpCleanup(); state = STATE.ONLINE; onlineScreen = 'main'; }
        }

        // Exit multiplayer: host deletes the room so all guests are kicked, guest just cleans up
        function _mpExit() {
            if (isMultiplayerGame && isRoomHost && mpRoomId) {
                _fbDb.collection('rooms').doc(mpRoomId).delete().catch(() => {});
            }
            _mpCleanup();
            MUSIC.stop();
            state = STATE.MAIN;
            hasActiveGame = false;
        }

        // Guest leaves mid-game — removes their presence from the room, exits to main
        async function _mpGuestLeave() {
            const rid = mpRoomId;
            const uid = mpMyUid;
            // Remove only this guest from the room — others continue playing
            if (rid && uid) {
                _fbDb.collection('rooms').doc(rid).update({
                    [`players.${uid}`]: firebase.firestore.FieldValue.delete()
                }).catch(() => {});
            }
            _mpCleanup(); // also deletes own pos doc
            state = STATE.MAIN; hasActiveGame = false;
        }

        // Host leaves mid-game — transfers host to a random player, or closes server if alone
        function _mpHostLeave() {
            // Prefer remotePositions (active players) over mpSlots (initial list).
            // Fall back to mpSlots in case positions haven't been published yet (early leave).
            const activeUids = Object.keys(remotePositions);
            const slotUids   = Object.keys(mpSlots).filter(uid => uid !== mpMyUid);
            const otherUids  = activeUids.length > 0 ? activeUids : slotUids;
            if (otherUids.length === 0) {
                // Host is alone — delete the room and go back to main
                const rid = mpRoomId;
                if (rid) _fbDb.collection('rooms').doc(rid).delete().catch(() => {});
                _mpCleanup();
                state = STATE.MAIN;
                hasActiveGame = false;
                return;
            }
            // Pick a random player to become the new host
            const newHostUid = otherUids[Math.floor(Math.random() * otherUids.length)];
            const rid = mpRoomId;
            // Notify everyone: show loading overlay and who's the new host
            _fbDb.collection('rooms').doc(rid).update({
                transferringHost: true,
                newHostUid: newHostUid,
                paused: false,
            }).catch(() => {});
            // Old host leaves immediately
            _mpCleanup();
            state = STATE.MAIN;
            hasActiveGame = false;
        }

        // Host-only "End Game" button in bottom-right corner during play
// Host-only "PAUSE / RESUME" button in bottom-right corner during play
function _drawMpHostEndBtn() {
            const bx = BASE_W - 84, by = BASE_H - 50, bw = 76, bh = 30;

            // ירוק כשמושהה, כתום כשרץ
            ctx.fillStyle = mpPausedByHost ? '#2ecc71' : '#e67e22';

        // Host-only overlay shown when STOP is active — RESUME or CLOSE GAME
        function _drawHostStopOverlay() {
            if (!isRoomHost || !mpPausedByHost || mpGameOver) return;
            const cx = BASE_W / 2;
            ctx.fillStyle = 'rgba(4,10,32,0.88)'; ctx.fillRect(0, 0, BASE_W, BASE_H);

        }
        function _mpHostForceEnd() {
            if (!isRoomHost || mpEndTriggered) return;
            const now = Date.now();
            mpEndTriggered = true;
            mpWinnerName = '';  // no natural winner — height decides
            mpEndAt = now;
            mpGameOver = true; mpResultsReady = false;
            _mpFetchAndFinalize().then(() => {
                mpWinnerName = mpFinalScores.length > 0 ? mpFinalScores[0].name : 'Nobody';
                // Write past timestamp so guests also show results immediately
                _fbDb.collection('rooms').doc(mpRoomId).update({
                    gameWinner: mpWinnerName,
                    gameEndAt: now - 1,   // in the past → guests trigger immediate show
                }).catch(() => {});
            });
        }

        // Loading screen shown while fetching final heights before leaderboard
        function _drawMpResultsLoading() {
            const cx = BASE_W / 2, cy = BASE_H / 2;
            const t = Date.now() / 1000;
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,8,0.88)';
            ctx.fillRect(0, 0, BASE_W, BASE_H);
            // Spinning ring
            const r = 28, lw = 4;
            ctx.strokeStyle = '#1a3a6a'; ctx.lineWidth = lw;
            ctx.beginPath(); ctx.arc(cx, cy - 20, r, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = '#3aacff'; ctx.lineWidth = lw;
            ctx.beginPath(); ctx.arc(cx, cy - 20, r, t * 3, t * 3 + 1.4); ctx.stroke();
            // Text
            ctx.textAlign = 'center'; ctx.fillStyle = '#aad4ff';
            ctx.font = 'bold 16px "Segoe UI",Arial';
            ctx.fillText('Calculating results\u2026', cx, cy + 22);
            ctx.restore();
        }

        // Draw 30-second countdown overlay in top-center during play
        function _drawMpCountdown() {
            if (!mpEndTriggered || mpGameOver) return;
            const rem = Math.max(0, Math.ceil((mpEndAt - Date.now()) / 1000));
            const cx = BASE_W / 2;
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.beginPath();
            ctx.roundRect(cx - 100, 6, 200, 34, 8);
            ctx.fill();
            ctx.textAlign = 'center';
            ctx.font = 'bold 12px "Segoe UI",Arial';
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
            ctx.fillText('\uD83C\uDFC6 ' + mpWinnerName + ' reached top!', cx, 21);
            ctx.font = 'bold 14px "Segoe UI",Arial';
            ctx.fillStyle = rem <= 10 ? '#ff4444' : '#fff';
            ctx.fillText(rem + 's', cx, 35);

        // Draw full-screen game-over results screen
        function _drawMpGameOver() {
            if (!mpGameOver) return;
            const t = Date.now() / 1000;
            const cx = BASE_W / 2;

            // Purple deep background
            const bgG = ctx.createLinearGradient(0, 0, 0, BASE_H);
            bgG.addColorStop(0, '#0c0020'); bgG.addColorStop(0.5, '#180035'); bgG.addColorStop(1, '#0a0018');
            ctx.fillStyle = bgG; ctx.fillRect(0, 0, BASE_W, BASE_H);

            // Radial celebration glow
            const rg1 = ctx.createRadialGradient(cx, BASE_H * 0.3, 0, cx, BASE_H * 0.3, 200);
            rg1.addColorStop(0, 'rgba(255,215,0,0.12)'); rg1.addColorStop(1, 'transparent');
            ctx.fillStyle = rg1; ctx.fillRect(0, 0, BASE_W, BASE_H);

            // Confetti particles
            ctx.save();
            for (let i = 0; i < 28; i++) {
                const px = (Math.sin(i * 73.1) * 0.5 + 0.5) * BASE_W;
                const baseY = (Math.cos(i * 53.7) * 0.5 + 0.5) * BASE_H;
                const py = ((baseY + t * (30 + (i % 5) * 10)) % BASE_H);
                const sz = 5 + (i % 4) * 2;
                const hue = (i * 37 + t * 40) % 360;
                ctx.fillStyle = `hsl(${hue},100%,65%)`;
                ctx.globalAlpha = 0.6;
                if (i % 3 === 0) {
                    ctx.beginPath(); ctx.arc(px, py, sz / 2, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.save(); ctx.translate(px, py); ctx.rotate(t + i);
                    ctx.fillRect(-sz / 2, -sz / 2, sz, sz); ctx.restore();
                }
            }
            ctx.globalAlpha = 1; ctx.restore();

            // Trophy icon with glow
            ctx.save();
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 30 + Math.sin(t * 2) * 8;
            ctx.font = '44px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('🏆', cx, 64);
            ctx.restore();

            // "GAME OVER" title with gold gradient
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const titleG = ctx.createLinearGradient(cx - 110, 95, cx + 110, 115);

            // Winner banner
