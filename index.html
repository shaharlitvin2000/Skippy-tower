<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>The Icy Tower</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
        }

        /* ── AUTH OVERLAY ── */
        #authOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, #0a1a2e 0%, #000810 100%);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
        }
        #authOverlay.visible { display: flex; }

        #authBox {
            background: linear-gradient(160deg, #0d1f3c 0%, #060e1a 100%);
            border: 2px solid #1a6aaa;
            border-radius: 18px;
            padding: 32px 28px 28px;
            width: 340px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(60,160,255,0.25), 0 0 80px rgba(0,80,180,0.15);
            scrollbar-width: thin;
            scrollbar-color: #1a6aaa #060e1a;
        }

        #authBox h1 {
            text-align: center;
            font-size: 22px;
            color: #55ccff;
            text-shadow: 0 0 12px rgba(85,204,255,0.7);
            margin-bottom: 6px;
            letter-spacing: 3px;
        }
        #authBox h2 {
            text-align: center;
            font-size: 14px;
            color: #4488aa;
            margin-bottom: 22px;
            letter-spacing: 1px;
        }
        #authBox label {
            display: block;
            color: #7abfdd;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 4px;
            margin-top: 14px;
            text-transform: uppercase;
        }
        #authBox input {
            width: 100%;
            background: rgba(10,30,55,0.8);
            border: 1px solid #1a4a7a;
            border-radius: 8px;
            color: #c8e8ff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 9px 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        #authBox input:focus { border-color: #55aaff; box-shadow: 0 0 8px rgba(85,170,255,0.3); }
        #authBox input.error { border-color: #ff4444; }

        #authError {
            color: #ff6666;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            min-height: 18px;
            letter-spacing: 0.5px;
        }

        .authBtn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(135deg, #1a5fa0, #0d3a6e);
            border: 1px solid #3a9adc;
            border-radius: 10px;
            color: #aadeff;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .authBtn:hover { background: linear-gradient(135deg, #2275c0, #1a4f8a); box-shadow: 0 0 16px rgba(60,160,255,0.4); color: #fff; }

        .authSwitch {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: #4a7a99;
        }
        .authSwitch span {
            color: #55aaff;
            cursor: pointer;
            text-decoration: underline;
        }
        .authSwitch span:hover { color: #88ccff; }

        .authDivider {
            border: none;
            border-top: 1px solid #1a3a5a;
            margin: 20px 0 6px;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <!-- USER TAG + LOGOUT -->
    <div id="userTag" style="display:none; position:fixed; top:10px; left:10px; z-index:1000; align-items:center; gap:8px; pointer-events:auto;">
        <div style="background:rgba(0,10,25,0.78); border:1px solid #1a5a8a; border-radius:20px; padding:5px 12px; font-family:'Courier New',monospace; font-size:13px; color:#55ccff; text-shadow:0 0 8px rgba(85,204,255,0.6); white-space:nowrap;">
            👤 <span id="userTagName"></span>
        </div>
        <button id="logoutBtn" style="background:rgba(20,0,0,0.78); border:1px solid #5a1a1a; border-radius:20px; padding:5px 12px; font-family:'Courier New',monospace; font-size:11px; color:#ff7777; cursor:pointer; letter-spacing:1px; white-space:nowrap;">
            ✕ LOGOUT
        </button>
    </div>

    <!-- LOGOUT CONFIRM POPUP -->
    <div id="logoutConfirm" style="display:none; position:fixed; inset:0; z-index:9998; align-items:center; justify-content:center; background:rgba(0,0,0,0.6);">
        <div style="background:linear-gradient(160deg,#0d1f3c,#060e1a); border:2px solid #1a4a7a; border-radius:16px; padding:28px 32px; font-family:'Courier New',monospace; text-align:center; box-shadow:0 0 40px rgba(0,80,180,0.3);">
            <div style="color:#aaddff; font-size:16px; margin-bottom:20px; letter-spacing:1px;">Are you sure you want to log out?</div>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button id="logoutConfirmYes" style="background:linear-gradient(135deg,#6a1a1a,#3a0a0a); border:1px solid #aa3333; border-radius:10px; padding:10px 24px; font-family:'Courier New',monospace; font-size:13px; color:#ff8888; cursor:pointer; letter-spacing:1px;">YES, LOG OUT</button>
                <button id="logoutConfirmNo"  style="background:linear-gradient(135deg,#1a3a6a,#0d1f3c); border:1px solid #3a7aaa; border-radius:10px; padding:10px 24px; font-family:'Courier New',monospace; font-size:13px; color:#88ccff; cursor:pointer; letter-spacing:1px;">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- AUTH OVERLAY -->
    <div id="authOverlay">
        <div id="authBox">
            <h1>❄ ICY TOWER</h1>
            <h2 id="authSubtitle">CREATE ACCOUNT</h2>

            <!-- SIGNUP FIELDS -->
            <div id="signupFields">
                <label>Username</label>
                <input id="suUsername" type="text" maxlength="20" autocomplete="username" placeholder="Choose a username">
                <div id="authErrorUsername" style="color:#ff6666;font-size:12px;min-height:16px;margin-top:4px;letter-spacing:0.5px;"></div>
                <label>Password</label>
                <input id="suPassword" type="password" autocomplete="new-password" placeholder="At least 6 characters">
                <label>Confirm Password</label>
                <input id="suConfirm" type="password" autocomplete="new-password" placeholder="Repeat password">
                <div id="authError"></div>
                <button class="authBtn" id="signupBtn">SIGN UP</button>
                <hr class="authDivider">
                <div class="authSwitch">Already have an account? <span id="switchToLogin">LOG IN</span></div>
            </div>

            <!-- LOGIN FIELDS -->
            <div id="loginFields" style="display:none">
                <label>Username</label>
                <input id="liIdentifier" type="text" autocomplete="username" placeholder="Your username">
                <label>Password</label>
                <input id="liPassword" type="password" autocomplete="current-password" placeholder="Your password">
                <div id="authError2"></div>
                <button class="authBtn" id="loginBtn">LOG IN</button>
                <hr class="authDivider">
                <div class="authSwitch">New here? <span id="switchToSignup">SIGN UP</span></div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        //  SAVE SYSTEM — Firebase-ready async storage abstraction
        //
        //  To switch to Firebase, replace only the _adapter block below with
        //  Firestore reads/writes. All game code above remains unchanged.
        //
        //  Key schema:
        //    Global  →  icyTower:global:{key}
        //    Per-user → icyTower:user:{userId}:{key}
        // ═══════════════════════════════════════════════════════════════════════
        const SaveSystem = (() => {
            const PREFIX = 'icyTower';

            // ── ADAPTER ── swap this entire block for Firebase ──────────────
            // Firebase example:
            //   get:    (raw) => getDoc(doc(db, 'kv', raw)).then(d => d.data()?.v ?? null)
            //   set:    (raw, v) => setDoc(doc(db, 'kv', raw), { v })
            //   remove: (raw) => deleteDoc(doc(db, 'kv', raw))
            const _adapter = {
                async get(rawKey) {
                    try { return JSON.parse(localStorage.getItem(rawKey)); }
                    catch { return null; }
                },
                async set(rawKey, value) {
                    localStorage.setItem(rawKey, JSON.stringify(value));
                },
                async remove(rawKey) {
                    localStorage.removeItem(rawKey);
                },
                async getAllKeys() {
                    const keys = [];
                    for (let i = 0; i < localStorage.length; i++) {
                        const k = localStorage.key(i);
                        if (k && k.startsWith(PREFIX + ':')) keys.push(k);
                    }
                    return keys;
                }
            };
            // ── END ADAPTER ──────────────────────────────────────────────────

            const _gk = (key) => `${PREFIX}:global:${key}`;
            const _uk = (uid, key) => `${PREFIX}:user:${uid}:${key}`;

            return {
                // ── Global (not user-scoped) ──
                async get(key)         { return _adapter.get(_gk(key)); },
                async set(key, value)  { return _adapter.set(_gk(key), value); },
                async remove(key)      { return _adapter.remove(_gk(key)); },
                async getAll() {
                    const pfx = `${PREFIX}:global:`;
                    const result = {};
                    for (const raw of await _adapter.getAllKeys()) {
                        if (raw.startsWith(pfx)) result[raw.slice(pfx.length)] = await _adapter.get(raw);
                    }
                    return result;
                },

                // ── Returns a user-scoped store bound to userId ──
                // Usage:
                //   const store = SaveSystem.forUser(userId);
                //   await store.set('points', 5000);
                //   const pts = await store.get('points');
                forUser(userId) {
                    return {
                        async get(key)        { return _adapter.get(_uk(userId, key)); },
                        async set(key, value) { return _adapter.set(_uk(userId, key), value); },
                        async remove(key)     { return _adapter.remove(_uk(userId, key)); },
                        async getAll() {
                            const pfx = `${PREFIX}:user:${userId}:`;
                            const result = {};
                            for (const raw of await _adapter.getAllKeys()) {
                                if (raw.startsWith(pfx)) result[raw.slice(pfx.length)] = await _adapter.get(raw);
                            }
                            return result;
                        }
                    };
                }
            };
        })();

        // ═══════════════════════════════════════════════════════════════════════
        //  USER SYSTEM
        //  Manages accounts, sessions, and authentication.
        //  Generates a unique userId per user — username is NOT the primary key.
        //
        //  Storage layout (via SaveSystem global namespace):
        //    users   → [{ userId, username, passwordHash, createdAt }]
        //    session → { userId, username }
        // ═══════════════════════════════════════════════════════════════════════
        const UserSystem = (() => {
            let _currentUser = null; // { userId, username }

            function _genId() {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
            }
            function _hash(str) {
                let h = 5381;
                for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
                return (h >>> 0).toString(16);
            }

            async function _getUsers()       { return (await SaveSystem.get('users'))   || []; }
            async function _saveUsers(users) { return SaveSystem.set('users', users); }

            async function _setSession(user) {
                await SaveSystem.set('session', user);
                _currentUser = user;
            }
            async function _clearSession() {
                await SaveSystem.remove('session');
                _currentUser = null;
            }

            // One-time migration: import accounts from old icyTowerUsers format
            async function _migrateOldAccounts() {
                if (await SaveSystem.get('__accounts_migrated_v1')) return;
                try {
                    const old = JSON.parse(localStorage.getItem('icyTowerUsers') || '[]')
                        .filter(u => u && typeof u.username === 'string' && typeof u.password === 'string');
                    if (old.length > 0) {
                        const existing = await _getUsers();
                        const seen = new Set(existing.map(u => u.username.toLowerCase()));
                        const toAdd = old
                            .filter(u => !seen.has(u.username.toLowerCase()))
                            .map(u => ({
                                userId:       'legacy_' + _genId(),
                                username:     u.username,
                                passwordHash: u.password, // same djb2 hash algo
                                createdAt:    u.createdAt || new Date().toISOString()
                            }));
                        if (toAdd.length > 0) await _saveUsers([...existing, ...toAdd]);

                        // Migrate active session (old format stored username string)
                        const oldSess = localStorage.getItem('icyTowerSession');
                        const newSess = await SaveSystem.get('session');
                        if (oldSess && !newSess) {
                            const all = await _getUsers();
                            const u = all.find(x => x.username.toLowerCase() === oldSess.toLowerCase());
                            if (u) await SaveSystem.set('session', { userId: u.userId, username: u.username });
                        }
                    }
                } catch (e) { /* non-fatal */ }
                await SaveSystem.set('__accounts_migrated_v1', true);
            }

            return {
                get currentUser() { return _currentUser; },

                // ── Restore session from storage (call on app boot) ──
                async getCurrentUser() {
                    if (_currentUser) return _currentUser;
                    await _migrateOldAccounts();
                    const session = await SaveSystem.get('session');
                    if (session && session.userId && session.username) {
                        _currentUser = { userId: session.userId, username: session.username };
                    }
                    return _currentUser;
                },

                // ── Register a new account ──
                // Throws: 'USERNAME_TAKEN'
                async register(username, password) {
                    await _migrateOldAccounts();
                    const users = await _getUsers();
                    if (users.some(u => u.username.toLowerCase() === username.toLowerCase()))
                        throw new Error('USERNAME_TAKEN');
                    const newUser = {
                        userId:       _genId(),
                        username,
                        passwordHash: _hash(password),
                        createdAt:    new Date().toISOString()
                    };
                    await _saveUsers([...users, newUser]);
                    const session = { userId: newUser.userId, username: newUser.username };
                    await _setSession(session);
                    return session;
                },

                // ── Log in with username + password ──
                // Throws: 'USER_NOT_FOUND' | 'WRONG_PASSWORD'
                async login(username, password) {
                    await _migrateOldAccounts();
                    const users = await _getUsers();
                    const user  = users.find(u => u.username.toLowerCase() === username.toLowerCase());
                    if (!user)                              throw new Error('USER_NOT_FOUND');
                    if (user.passwordHash !== _hash(password)) throw new Error('WRONG_PASSWORD');
                    const session = { userId: user.userId, username: user.username };
                    await _setSession(session);
                    return session;
                },

                // ── Log out current user ──
                async logout() {
                    await _clearSession();
                }
            };
        })();

        // ═══════════════════════════════════════════════════════════════════════
        //  AUTH UI
        // ═══════════════════════════════════════════════════════════════════════
        (async function initAuth() {
            const overlay   = document.getElementById('authOverlay');
            const signupDiv = document.getElementById('signupFields');
            const loginDiv  = document.getElementById('loginFields');
            const subtitle  = document.getElementById('authSubtitle');

            function err(id, msg) { const el = document.getElementById(id); if (el) el.textContent = msg; }
            function clearErrors() { err('authErrorUsername', ''); err('authError', ''); err('authError2', ''); }

            function showSignup() {
                signupDiv.style.display = 'block'; loginDiv.style.display = 'none';
                subtitle.textContent = 'CREATE ACCOUNT'; clearErrors();
            }
            function showLogin() {
                signupDiv.style.display = 'none'; loginDiv.style.display = 'block';
                subtitle.textContent = 'WELCOME BACK'; clearErrors();
            }

            document.getElementById('switchToLogin').addEventListener('click', showLogin);
            document.getElementById('switchToSignup').addEventListener('click', showSignup);
            document.getElementById('suUsername').addEventListener('input', () => err('authErrorUsername', ''));

            // ── Sign Up ──
            document.getElementById('signupBtn').addEventListener('click', async function() {
                clearErrors();
                const username = document.getElementById('suUsername').value.trim();
                const password = document.getElementById('suPassword').value;
                const confirm  = document.getElementById('suConfirm').value;

                if (!username)                         return err('authErrorUsername', 'Please enter a username.');
                if (username.length < 3)               return err('authErrorUsername', 'At least 3 characters required.');
                if (!/^[a-zA-Z0-9_]+$/.test(username)) return err('authErrorUsername', 'Letters, numbers and _ only.');
                if (password.length < 6)               return err('authError', 'Password must be at least 6 characters.');
                if (password !== confirm)               return err('authError', 'Passwords do not match.');

                try {
                    await UserSystem.register(username, password);
                    window.icyAutoTutorial = true;
                    await _hideAuth();
                } catch (e) {
                    err('authErrorUsername',
                        e.message === 'USERNAME_TAKEN'
                            ? `⚠ Username "${username}" is already taken.`
                            : 'An error occurred. Please try again.');
                }
            });

            // ── Log In ──
            document.getElementById('loginBtn').addEventListener('click', async function() {
                clearErrors();
                const identifier = document.getElementById('liIdentifier').value.trim().toLowerCase();
                const password   = document.getElementById('liPassword').value;

                if (!identifier) return err('authError2', 'Please enter your username.');
                if (!password)   return err('authError2', 'Please enter your password.');

                try {
                    await UserSystem.login(identifier, password);
                    window.icyAutoTutorial = false;
                    await _hideAuth();
                } catch (e) {
                    const msg = e.message === 'USER_NOT_FOUND' ? 'No account found with that username.'
                              : e.message === 'WRONG_PASSWORD' ? 'Incorrect password.'
                              : 'An error occurred. Please try again.';
                    err('authError2', msg);
                }
            });

            document.getElementById('suConfirm').addEventListener('keydown',  e => { if (e.key === 'Enter') document.getElementById('signupBtn').click(); });
            document.getElementById('liPassword').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });

            // ── User tag helpers ──
            function _showUserTag(name) {
                const tag = document.getElementById('userTag');
                if (!tag) return;
                document.getElementById('userTagName').textContent = name;
                tag.style.display = 'flex';
            }
            function _hideUserTag() {
                const tag = document.getElementById('userTag');
                if (tag) tag.style.display = 'none';
            }

            // ── Hide auth overlay + load player data ──
            async function _hideAuth() {
                overlay.classList.remove('visible');
                const user = UserSystem.currentUser;
                window.icyCurrentUser = user ? user.username : null;
                if (user) {
                    _showUserTag(user.username);
                    if (typeof window.initPlayerData === 'function') {
                        await window.initPlayerData(user.userId);
                    }
                }
            }

            // ── Logout with confirm popup ──
            const logoutConfirm = document.getElementById('logoutConfirm');
            document.getElementById('logoutBtn').addEventListener('click', () => { logoutConfirm.style.display = 'flex'; });
            document.getElementById('logoutConfirmNo').addEventListener('click', () => { logoutConfirm.style.display = 'none'; });
            document.getElementById('logoutConfirmYes').addEventListener('click', async function() {
                logoutConfirm.style.display = 'none';
                await UserSystem.logout();
                window.icyCurrentUser = null;
                _hideUserTag();
                document.getElementById('suUsername').value  = '';
                document.getElementById('suPassword').value  = '';
                document.getElementById('suConfirm').value   = '';
                clearErrors();
                showSignup();
                overlay.classList.add('visible');
            });

            // ── Boot: check for existing session ──
            const existing = await UserSystem.getCurrentUser();
            if (!existing) {
                overlay.classList.add('visible');
            } else {
                window.icyCurrentUser = existing.username;
                _showUserTag(existing.username);
                // initPlayerData will be called by the game init IIFE below
            }
        })();
    </script>

    <script>
        // ─────────────────────────────────────────────
        //  SETUP
        // ─────────────────────────────────────────────
        const canvas = document.getElementById('c');
        let ctx = canvas.getContext('2d');
        const _bgOffCanvas = document.createElement('canvas');
        _bgOffCanvas.width = 480; _bgOffCanvas.height = 800;
        const _bgOffCtx = _bgOffCanvas.getContext('2d');

        const BASE_W = 480, BASE_H = 800;
        let scale = 1;

        function resize() {
            const ww = window.innerWidth, wh = window.innerHeight;
            scale = Math.min(ww / BASE_W, wh / BASE_H);
            canvas.width = BASE_W;
            canvas.height = BASE_H;
            canvas.style.width = (BASE_W * scale) + 'px';
            canvas.style.height = (BASE_H * scale) + 'px';
            canvas.style.marginTop = ((wh - BASE_H * scale) / 2) + 'px';
        }
        resize();
        window.addEventListener('resize', resize);

        // ─────────────────────────────────────────────
        //  CONSTANTS
        // ─────────────────────────────────────────────
        const FPS = 60;
        const GRAVITY = 0.13;
        const MAX_FALL = 6;
        const WALL_W = 50;
        let TOWER_TOP = -14000;
        const LEVEL_GOALS = [0, 500, 1500, 2500, 3750, 5000]; // index = level, 0 = infinite
        let currentMode = 'infinite'; // 'infinite' | 'level'
        let currentLevel = 0;
        let levelGoal = 0;

        const C = {};
        const THEMES = [
            // 0: Infinite — Mechanical Clock Tower
            { BG_TOP:'#1a0e04', BG_BOT:'#2c1808', WALL:'#1e1006', WALL_MID:'#321808', WALL_EDGE:'#a07020',
              ICE_SHINE:'#f0c040', STALACTITE:'#7a4820', STALA_TIP:'#d4901a',
              PLAT:'#7a4820', PLAT_TOP:'#c8843c', PLAT_MOVE:'#5a3010', PLAT_MOVE_TOP:'#d4901a',
              GLOW:'#d4901a', ICE_ROCK:'#5a3418', ICE_ROCK_EDGE:'#c8901a',
              CRYSTAL:'#c8901a', CRYSTAL_GLOW:'#f0c040',
              GHOST:'#b87828', GHOST_EYE:'#2a1008',
              PARTICLE:'#d4a030', SNOW:'#f0d090', UI_TEXT:'#f0d090', UI_ACCENT:'#d4901a' },
            // 1: Level 1 — Whispering Forest Canopy
            { BG_TOP:'#0c2206', BG_BOT:'#1a500e', WALL:'#0e2a07', WALL_MID:'#1a4a0e', WALL_EDGE:'#6ac830',
              ICE_SHINE:'#f0f8a8', STALACTITE:'#3a8018', STALA_TIP:'#a0e848',
              PLAT:'#6a3c14', PLAT_TOP:'#d4a030', PLAT_MOVE:'#c86820', PLAT_MOVE_TOP:'#f0c840',
              GLOW:'#90e030', ICE_ROCK:'#2c6a10', ICE_ROCK_EDGE:'#7cd830',
              CRYSTAL:'#d8c030', CRYSTAL_GLOW:'#f4e860',
              GHOST:'#72cc42', GHOST_EYE:'#143a08',
              PARTICLE:'#cce030', SNOW:'#f0f8c0', UI_TEXT:'#ccf080', UI_ACCENT:'#7ae030' },
            // 2: Level 2 — Desert Canyon (clean pixel art)
            { BG_TOP:'#c86010', BG_BOT:'#f0c040', WALL:'#7a5828', WALL_MID:'#9a7038', WALL_EDGE:'#c89848',
              ICE_SHINE:'#f8e8b8', STALACTITE:'#7a5828', STALA_TIP:'#c8a048',
              PLAT:'#7a6848', PLAT_TOP:'#b09870', PLAT_MOVE:'#7a5020', PLAT_MOVE_TOP:'#a07030',
              GLOW:'#c89030', ICE_ROCK:'#6a5030', ICE_ROCK_EDGE:'#a88040',

        // ═════════════════════════════════════════════════════════════════════
        //  PLAYER DATA SYSTEM
        //  All player progress is stored per-user under game_users/{userId}/data.
        //  initPlayerData(userId) must be awaited before the game loop runs.
        //
        //  Example usage:
        //    // Saving score after a run:
        //    saveBest(lastRunHigh);
        //    savePoints();
        //
        //    // Loading player data (called automatically on login):
        //    await window.initPlayerData(userId);
        //    // → allTimeBests, levelWins, lockerPoints now populated
        //
        //    // Switching users (logout → login → new initPlayerData call):
        //    await UserSystem.logout();
        //    await UserSystem.login(newUsername, newPassword);
        //    await window.initPlayerData(UserSystem.currentUser.userId);
        // ═════════════════════════════════════════════════════════════════════

        const PLAYER_DATA_DEFAULTS = {
            bests:         [0, 0, 0, 0, 0, 0],
            wins:          [false, false, false, false, false, false],
            points:        20000,   // starting balance (post all legacy migrations)
            skins:         null,
            equippedSkin:  0,
            trails:        null,
            equippedTrail: 0,
            shop:          null
        };

        let _playerStore  = null;  // set by initPlayerData(); user-scoped SaveSystem
        let playerDataReady = false;

        // ── initPlayerData: call after user authenticates ──
        window.initPlayerData = async function(userId) {
            playerDataReady = false;
            _playerStore = SaveSystem.forUser(userId);

            // One-time migration from legacy flat localStorage to per-user format
            if (!(await _playerStore.get('__migrated_v1'))) {
                await _migratePlayerDataFromLegacy(_playerStore);
                await _playerStore.set('__migrated_v1', true);
            }

            allTimeBests = (await _playerStore.get('bests'))  || [...PLAYER_DATA_DEFAULTS.bests];
            levelWins    = (await _playerStore.get('wins'))   || [...PLAYER_DATA_DEFAULTS.wins];
            lockerPoints = (await _playerStore.get('points')) ?? PLAYER_DATA_DEFAULTS.points;

            await loadSkins();
            await loadTrails();
            await loadShopItems();
            playerDataReady = true;
        };

        // ── Migrate pre-UserSystem localStorage data into the user's namespace ──
        async function _migratePlayerDataFromLegacy(store) {
            try {
                const oldBests  = JSON.parse(localStorage.getItem('icyTowerBests')         || 'null');
                const oldWins   = JSON.parse(localStorage.getItem('icyTowerWins')          || 'null');
                const oldPts    = parseInt  (localStorage.getItem('icyTowerPoints')        || '0') || null;
                const oldSkins  = JSON.parse(localStorage.getItem('icyTowerSkins')         || 'null');
                const oldEqSkin = parseInt  (localStorage.getItem('icyTowerEquipped')      || '0');
                const oldTrails = JSON.parse(localStorage.getItem('icyTowerTrails')        || 'null');
                const oldEqTrl  = parseInt  (localStorage.getItem('icyTowerEquippedTrail') || '0');
                const oldShop   = JSON.parse(localStorage.getItem('icyTowerShop')          || 'null');

                if (oldBests)               await store.set('bests',         oldBests);
                if (oldWins)                await store.set('wins',          oldWins);
                if (oldPts && oldPts > 0)   await store.set('points',        oldPts);
                if (oldSkins)               await store.set('skins',         oldSkins);
                if (oldEqSkin)              await store.set('equippedSkin',  oldEqSkin);
                if (oldTrails)              await store.set('trails',        oldTrails);
                if (oldEqTrl)               await store.set('equippedTrail', oldEqTrl);
                if (oldShop)                await store.set('shop',          oldShop);
            } catch (e) { /* non-fatal — player starts with defaults */ }
        }

        // ── Mutable game state (populated by initPlayerData) ──
        let allTimeBests = [...PLAYER_DATA_DEFAULTS.bests];
        let levelWins    = [...PLAYER_DATA_DEFAULTS.wins];
        let lockerPoints = PLAYER_DATA_DEFAULTS.points;

        // ── Save helpers — fire-and-forget; safe to call without await ──
        function savePoints() {
            if (_playerStore) _playerStore.set('points', lockerPoints);
        }
        function addPoints(n) { lockerPoints += n; savePoints(); }

        function saveSkins() {
            if (!_playerStore) return;
            _playerStore.set('skins',       SKINS.map(s => s.unlocked));
            _playerStore.set('equippedSkin', equippedSkin);
        }
        async function loadSkins() {
            const saved = _playerStore ? await _playerStore.get('skins') : null;
            if (saved) saved.forEach((u, i) => { if (SKINS[i]) SKINS[i].unlocked = u; });
            equippedSkin = (_playerStore ? (await _playerStore.get('equippedSkin')) ?? 0 : 0);
            selectedSkin = equippedSkin;
        }
        function saveTrails() {
            if (!_playerStore) return;
            _playerStore.set('trails',        TRAILS.map(t => t.unlocked));
            _playerStore.set('equippedTrail', equippedTrail);
        }
        async function loadTrails() {
            const saved = _playerStore ? await _playerStore.get('trails') : null;
            if (saved) saved.forEach((u, i) => { if (TRAILS[i]) TRAILS[i].unlocked = u; });
            equippedTrail = (_playerStore ? (await _playerStore.get('equippedTrail')) ?? 0 : 0);
            selectedTrail = equippedTrail;
        }
        function getModeIdx() { return currentMode === 'level' ? currentLevel : 0; }
        function getBest() { return allTimeBests[getModeIdx()]; }
        function saveBest(h) {
            const idx = getModeIdx();
            if (h > allTimeBests[idx]) {
                allTimeBests[idx] = h;
                if (_playerStore) _playerStore.set('bests', allTimeBests);
            }
        }
        let prevBestOnDeath = 0; // stored for record screen display
        function handleDeath() {
            hasActiveGame = false;
            prevBestOnDeath = getBest();
            saveBest(lastRunHigh);
            // 1.5x bonus if beat record by 500+ meters
            const gotBonus = currentMode !== 'level' && lastRunHigh >= prevBestOnDeath + 500 && runPointsEarned > 0;
            if (gotBonus) {
                const bonus = Math.floor(runPointsEarned * 0.5);
                addPoints(bonus);
                runPointsEarned += bonus;
            }
            // Start corner animation BEFORE initWorld resets pointsBeforeRun
            if (runPointsEarned > 0) {
                cornerAnimFromPts = pointsBeforeRun;
                cornerAnimToPts = lockerPoints;
                cornerAnimBonus = gotBonus;
                cornerAnimIsRecord = currentMode !== 'level' && lastRunHigh > prevBestOnDeath;
                cornerAnimStart = Date.now();
            }
            // Show DEAD screen only for new record in infinite mode
            if (currentMode !== 'level' && lastRunHigh > prevBestOnDeath) {
                state = STATE.DEAD; deathScreenTime = Date.now();
            } else {
                initWorld(); state = STATE.PLAY; // silent restart
            }
        }

        // ─────────────────────────────────────────────
        //  HELPERS
        // ─────────────────────────────────────────────
        function lerp(a, b, t) { return a + (b - a) * t; }
        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
        function rnd(lo, hi) { return Math.random() * (hi - lo) + lo; }
        function rndInt(lo, hi) { return Math.floor(rnd(lo, hi + 1)); }
        function hexToRgb(h) {
            const r = parseInt(h.slice(1, 3), 16), g = parseInt(h.slice(3, 5), 16), b = parseInt(h.slice(5, 7), 16);
            return [r, g, b];
        }

        function drawGlow(ctx, color, x, y, radius, alpha = 80) {
            const [r, g, b] = hexToRgb(color);
            const grd = ctx.createRadialGradient(x, y, 0, x, y, radius);
            grd.addColorStop(0, `rgba(${r},${g},${b},${alpha / 255})`);
            grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        // Seeded random for deterministic wall decor
        function seededRandom(seed) {
            let s = seed;
            return function () {
                s = (s * 1664525 + 1013904223) & 0xffffffff;
                return (s >>> 0) / 0xffffffff;
            };
        }

        // ─────────────────────────────────────────────
        //  PARTICLE
        // ─────────────────────────────────────────────
        class Particle {
            constructor(x, y, vx = 0, vy = 0, life = 30, color = C.PARTICLE, size = 3) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.life = this.maxLife = life; this.color = color; this.size = size;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.08; this.life--; }
            draw(camY) {
                if (this.life <= 0) return;
                const alpha = this.life / this.maxLife;
                const r = Math.max(1, this.size * alpha);
                const sy = this.y - camY;
                if (sy < -10 || sy > BASE_H + 10) return;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, sy, r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        // ─────────────────────────────────────────────
        //  SNOWFLAKE
        // ─────────────────────────────────────────────
        class SnowFlake {
            constructor(startRandom = true) { this._reset(startRandom ? rnd(0, BASE_H) : 0); }
            _reset(y = 0) {
                this.x = rnd(WALL_W + 2, BASE_W - WALL_W - 2);
                this.y = y;
                this.vy = rnd(0.4, 1.6); this.vx = rnd(-0.25, 0.25);
                this.size = rndInt(1, 3); this.alpha = rnd(90, 200) / 255;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.x = clamp(this.x, WALL_W + 2, BASE_W - WALL_W - 2);
                if (this.y > BASE_H + 4) this._reset(0);
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = C.SNOW;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        // ─────────────────────────────────────────────
        //  PLATFORM
        // ─────────────────────────────────────────────
        class Platform {
            constructor(x, y, w, moving = false, bouncy = false) {
                this.x = x; this.y = y; this.w = w; this.h = 14;
                this.moving = moving;
                this.dir = Math.random() < 0.5 ? -1 : 1;
                this.speed = rnd(0.9, 2.0);
                this.range = rndInt(40, 90);
                this.startX = x;
                this.special = false; // gold finish platform in tutorial
                this.spikes = [];
                this.isBouncy = bouncy;
                // Fossil Canyon (level 2) platform properties
                this.fossType = 0;      // 0=bone  1=shell/fossil  2=sandstone
                this.crumble = false;   // crumbles after being stepped on
                this.crumbleTimer = -1; // -1=untriggered, 0+=elapsed seconds
                this.crumbleState = 0;  // 0=solid  1=cracking  2=fallen
                if (currentMode === 'level' && currentLevel === 2 && !this.special) {
                    const h1 = Math.abs(Math.sin(x * 0.1931 + y * 0.2741));
                    this.fossType = h1 < 0.38 ? 0 : h1 < 0.68 ? 1 : 2;
                    // crumble disabled — clean gameplay, no surprise mechanics
                    this.crumble = false;
                }
                // Forest canopy (level 1) platform properties
                this.leafType = 0;    // 0=branch  1=leaf
                this.leafSway = false; // true = leaf sways in wind
                this.swayPhase = 0;
                this.swayAmp = 0;
                this.swayFreq = 0;
                if (currentMode === 'level' && currentLevel === 1 && !this.special) {
                    const h1 = Math.abs(Math.sin(x * 0.2713 + y * 0.1591));
                    this.leafType = h1 < 0.52 ? 0 : 1;
                    if (this.leafType === 1 && !moving && !bouncy) {
                        const h2 = Math.abs(Math.sin(x * 0.0937 + y * 0.3179));
                        this.leafSway = h2 < 0.60; // 60% of leaves sway
                        this.swayPhase = (x * 0.4 + y * 0.2) % (Math.PI * 2);
                        this.swayAmp   = 18 + Math.abs(Math.sin(x * 0.17 + y * 0.09)) * 22;
                        this.swayFreq  = 0.55 + Math.abs(Math.sin(x * 0.31 + y * 0.23)) * 0.45;
                    }
                }
                // Clock tower (infinite mode) platform properties
                this.gearDir = 0;   // -1=left  0=static  +1=right
                this.gearSpeed = 0; // rotation speed (rad/s)
                this.platType = 0;  // 0=gear  1=clockhand  2=weight
                if (currentMode === 'infinite' && !this.special) {
                    const h1 = Math.abs(Math.sin(x * 0.3700 + y * 0.1900));
                    const h2 = Math.abs(Math.sin(x * 0.1100 + y * 0.4300));
                    const h3 = Math.abs(Math.sin(x * 0.0700 + y * 0.3100));
                    this.platType = h1 < 0.50 ? 0 : h1 < 0.80 ? 1 : 2;
                    if (this.platType === 0 && !moving && !bouncy) {
                        this.gearDir   = h2 < 0.35 ? -1 : h2 < 0.70 ? 1 : 0;
                        this.gearSpeed = 0.35 + h3 * 1.30;
                    }
                }
                if (!this.moving && !this.isBouncy) this.initSpikes();
            }
            initSpikes() {
                // spikes start at 100m: y < -320 (BASE_H-120=680, 100m=1000px → 680-1000=-320)
                const SPIKE_START_Y = -320;
                if (this.y > SPIKE_START_Y) return;
                const progress = clamp((-this.y - 320) / (Math.abs(TOWER_TOP) - 320), 0, 1);
                const count = Math.min(5, 1 + Math.floor(progress * 4));
                if (count <= 0) return;
                const margin = 12;
                const areaStart = margin;
                const areaEnd = this.w - margin;
                const size = 14; // fixed size for simplicity
                const minGap = rndInt(8, 20);
                // Safe landing zone: left or right corner
                const safeLeft = Math.random() < 0.5;
                const safeStart = safeLeft ? margin : this.w - margin - 30;
                const safeEnd   = safeLeft ? margin + 30 : this.w - margin;
                const positions = [];
                for (let i = 0; i < count; i++) {
                    let attempts = 0;
                    let offset;
                    do {
                        offset = rnd(areaStart, areaEnd - size);
                        attempts++;
                    } while (attempts < 10 && (positions.some(p => Math.abs(p - offset) < size + minGap) || (offset < safeEnd && offset + size > safeStart)));
                    if (attempts < 10) positions.push(offset);
                }
                positions.sort((a, b) => a - b);
                if (positions.length === 0) return;
                // Ensure at least one safe landing spot (additional check)
                const gaps = [positions[0] - areaStart];
                for (let i = 1; i < positions.length; i++) {
                    gaps.push(positions[i] - (positions[i-1] + size));
                }
                gaps.push(areaEnd - (positions[positions.length-1] + size));
                if (!gaps.some(g => g >= 25)) {
                    positions.splice(rndInt(0, positions.length - 1), 1);
                }
                for (const offset of positions) {
                    this.spikes.push({ offset, width: size });
                }
            }
            update() {
                // Crumble mechanic (Fossil Canyon level 2)
                if (this.crumble && this.crumbleTimer >= 0) {
                    this.crumbleTimer += 1 / 60;
                    if (this.crumbleTimer > 0.85 && this.crumbleState < 2) {
                        this.crumbleState = 2; // start falling
                    } else if (this.crumbleState === 0) {
                        this.crumbleState = 1; // cracking
                    }
                }
                if (this.crumbleState === 2) {
                    this.y += 7; // fall fast
                    return;
                }
                if (this.leafSway) {
                    const t = Date.now() / 1000;
                    this.x = this.startX + Math.sin(t * this.swayFreq + this.swayPhase) * this.swayAmp;
                    this.x = clamp(this.x, WALL_W, BASE_W - WALL_W - this.w);
                    return;
                }
                if (!this.moving) return;
                this.x += this.dir * this.speed;
                if (this.x < WALL_W || this.x + this.w > BASE_W - WALL_W) {
                    this.dir *= -1;
                    this.x = clamp(this.x, WALL_W, BASE_W - WALL_W - this.w);
                }
            }
            rect() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
            draw(camY) {
                const sy = this.y - camY;
                if (sy < -20 || sy > BASE_H + 30) return;
                const isTuto = tutorialMode && !this.special;

                if (isTuto) {
                    // Stone platform
                    ctx.fillStyle = '#6b6058';
                    ctx.beginPath(); ctx.roundRect(this.x, sy, this.w, this.h, 3); ctx.fill();
                    // Stone block lines
                    ctx.strokeStyle = '#48382e'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(this.x, sy + 7); ctx.lineTo(this.x + this.w, sy + 7); ctx.stroke();
                    const blockW = Math.max(20, this.w / Math.round(this.w / 30));
                    for (let bx = this.x + blockW; bx < this.x + this.w - 4; bx += blockW) {
                        ctx.beginPath(); ctx.moveTo(bx, sy); ctx.lineTo(bx, sy + 7); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(bx + blockW / 2, sy + 7); ctx.lineTo(bx + blockW / 2, sy + this.h); ctx.stroke();
                    }
                    // Top highlight
                    ctx.strokeStyle = '#9a8878'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(this.x + 2, sy + 1); ctx.lineTo(this.x + this.w - 2, sy + 1); ctx.stroke();
                } else {
                const themeIdx = currentMode === 'level' ? currentLevel : 0;
                const t = Date.now() / 1000;
                const px = this.x, pw = this.w, ph = this.h;

                if (this.special) {
                    // Gold finish platform — universal
                    ctx.fillStyle = '#b8860b';
                    ctx.beginPath(); ctx.roundRect(px, sy + 4, pw, ph - 4, 3); ctx.fill();
                    ctx.fillStyle = '#ffe066';
                    ctx.beginPath(); ctx.roundRect(px, sy, pw, 6, 3); ctx.fill();
                    ctx.strokeStyle = '#fff8aa'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(px + 4, sy + 2); ctx.lineTo(px + pw / 2 - 2, sy + 2); ctx.stroke();
                } else if (themeIdx === 0) {
                    if (this.isBouncy) {
                        // ── CLOCK TOWER SPRING PAD ──
                        // pulse: 0 = compressed, 1 = extended
                        const pulse2 = 0.5 + 0.5 * Math.abs(Math.sin(t * 4.5 + px * 0.05));
                        const springH = 10 + 8 * pulse2;   // 10–18 px total spring height
                        const springBot = sy + ph - 3;      // bottom anchor
                        const springTop = springBot - springH; // top of coils

                        // ── Base plate (anchor to ground) ──
                        ctx.fillStyle = '#2a1408';
                        ctx.beginPath(); ctx.roundRect(px, sy + ph - 3, pw, 3, 1); ctx.fill();
                        ctx.fillStyle = '#6a3810';
                        ctx.beginPath(); ctx.roundRect(px - 2, sy + ph - 4, pw + 4, 2, 1); ctx.fill();

                        // ── Spring coils ──
                        const nSpr = Math.max(2, Math.floor((pw - 8) / 20));
                        const sprW = (pw - 8) / nSpr;
                        const halfW = sprW * 0.40;
                        const numLoops = 3;
                        const loopH = springH / numLoops;

                        for (let si = 0; si < nSpr; si++) {
                            const scx = px + 4 + (si + 0.5) * sprW;

                            // Back arcs (darker, drawn first = behind)
                            for (let loop = 0; loop < numLoops; loop++) {
                                const midY = springBot - (loop + 0.5) * loopH;
                                ctx.save(); ctx.globalAlpha = 0.70;
                                ctx.strokeStyle = '#5a2c08'; ctx.lineWidth = 2;
                                ctx.beginPath();
                                ctx.ellipse(scx, midY + loopH * 0.20, halfW, loopH * 0.40, 0, 0, Math.PI, false);
                                ctx.stroke();
                                ctx.restore();
                            }

                            // Front arcs (bright, drawn on top = in front)
                            for (let loop = 0; loop < numLoops; loop++) {
                                const midY = springBot - (loop + 0.5) * loopH;
                                // main coil body
                                ctx.strokeStyle = '#cc8830'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
                                ctx.beginPath();
                                ctx.ellipse(scx, midY - loopH * 0.20, halfW, loopH * 0.40, 0, Math.PI, Math.PI * 2, false);
                                ctx.stroke();
                                // shine highlight on inner curve
                                ctx.save(); ctx.globalAlpha = 0.55;
                                ctx.strokeStyle = '#f0c055'; ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.ellipse(scx - halfW * 0.3, midY - loopH * 0.35, halfW * 0.45, loopH * 0.20, 0, Math.PI, Math.PI * 2, false);
                                ctx.stroke();
                                ctx.restore();
                            }

                            // Vertical wire on sides connecting all loops
                            ctx.save(); ctx.globalAlpha = 0.45;
                            ctx.strokeStyle = '#9a5820'; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(scx - halfW, springBot); ctx.lineTo(scx - halfW, springTop + loopH * 0.3); ctx.stroke();
                            ctx.beginPath(); ctx.moveTo(scx + halfW, springBot); ctx.lineTo(scx + halfW, springTop + loopH * 0.3); ctx.stroke();
                            ctx.restore();
                        }

                        // ── Top launch plate (gold, floats up/down with spring) ──
                        const platGrd = ctx.createLinearGradient(px, springTop - 5, px + pw, springTop - 5);
                        platGrd.addColorStop(0, '#7a4a18'); platGrd.addColorStop(0.25, '#f0c040');
                        platGrd.addColorStop(0.5, '#fff0a0'); platGrd.addColorStop(0.75, '#f0c040');
                        platGrd.addColorStop(1, '#7a4a18');
                        ctx.fillStyle = platGrd;
                        ctx.beginPath(); ctx.roundRect(px - 1, springTop - 5, pw + 2, 6, 2); ctx.fill();
                        // Rivet marks on plate
                        ctx.fillStyle = '#8a5010';
                        for (const rx3 of [px + 6, px + pw - 6]) {
                            ctx.beginPath(); ctx.arc(rx3, springTop - 2, 2, 0, Math.PI * 2); ctx.fill();
                        }

                        // ── Compressed-spring glow underneath ──
                        ctx.save(); ctx.globalAlpha = 0.32 * pulse2;
                        const ug2 = ctx.createLinearGradient(px, sy + ph, px, sy + ph + 18);
                        ug2.addColorStop(0, '#e8a020'); ug2.addColorStop(1, 'transparent');
                        ctx.fillStyle = ug2; ctx.fillRect(px, sy + ph, pw, 18);
                        ctx.restore();
                    } else if (this.moving) {
                        // ── CLOCK TOWER PENDULUM WEIGHT (moving platform) ──
                        const wGrd = ctx.createLinearGradient(px, sy, px + pw, sy);
                        wGrd.addColorStop(0, '#5a3010'); wGrd.addColorStop(0.2, '#a06020');
                        wGrd.addColorStop(0.5, '#c8843c'); wGrd.addColorStop(0.8, '#a06020');
                        wGrd.addColorStop(1, '#5a3010');
                        ctx.fillStyle = wGrd;
                        ctx.beginPath(); ctx.roundRect(px, sy, pw, ph, 2); ctx.fill();
                        // Engraved border line
                        ctx.strokeStyle = '#d4901a'; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.roundRect(px + 2, sy + 1.5, pw - 4, ph - 3, 1); ctx.stroke();
                        // Rivet dots on ends
                        ctx.fillStyle = '#7a4018';
                        for (const rx2 of [px + 7, px + pw - 7]) {
                            ctx.beginPath(); ctx.arc(rx2, sy + ph / 2, 3.5, 0, Math.PI * 2); ctx.fill();
                            ctx.fillStyle = '#d4901a';
                            ctx.beginPath(); ctx.arc(rx2, sy + ph / 2, 1.8, 0, Math.PI * 2); ctx.fill();
                            ctx.fillStyle = '#7a4018';
                        }
                        // Top highlight
                        ctx.fillStyle = 'rgba(240,180,80,0.25)';
                        ctx.beginPath(); ctx.roundRect(px + 3, sy + 1, pw - 6, 3, 1); ctx.fill();
                    } else {
                        // ── CLOCK TOWER static platforms: gear, clock hand, or brass weight ──
                        if (this.platType === 1) {
                            // ── CLOCK HAND platform ──
                            ctx.fillStyle = '#2a1608';
                            ctx.beginPath(); ctx.roundRect(px, sy + 3, pw, ph - 3, 3); ctx.fill();
                            const hGrd = ctx.createLinearGradient(px, sy, px + pw, sy);
                            hGrd.addColorStop(0, '#6a3810'); hGrd.addColorStop(0.15, '#c8901a');
                            hGrd.addColorStop(0.85, '#c8901a'); hGrd.addColorStop(1, '#6a3810');
                            ctx.fillStyle = hGrd;
                            ctx.beginPath(); ctx.roundRect(px, sy, pw, 5, 3); ctx.fill();
                            // Tick marks along hand
                            ctx.fillStyle = '#d4901a';
                            const nTick = Math.max(2, Math.floor(pw / 28));
                            for (let ti = 1; ti < nTick; ti++) {
                                const tx2 = px + ti * pw / nTick;
                                ctx.fillRect(tx2 - 1, sy + 1, 2, ph - 2);
                            }
                            // Pivot circle at left end
                            ctx.fillStyle = '#c8901a';
                            ctx.beginPath(); ctx.arc(px + 8, sy + ph / 2, 6, 0, Math.PI * 2); ctx.fill();
                            ctx.fillStyle = '#2a1008';
                            ctx.beginPath(); ctx.arc(px + 8, sy + ph / 2, 2.5, 0, Math.PI * 2); ctx.fill();
                        } else if (this.platType === 2) {
                            // ── BRASS WEIGHT platform ──
                            const bGrd = ctx.createLinearGradient(px, sy, px + pw, sy);
                            bGrd.addColorStop(0, '#6a3810'); bGrd.addColorStop(0.25, '#d4a030');
                            bGrd.addColorStop(0.5, '#f0c040'); bGrd.addColorStop(0.75, '#d4a030');
                            bGrd.addColorStop(1, '#6a3810');
                            ctx.fillStyle = bGrd;
                            ctx.beginPath(); ctx.roundRect(px, sy, pw, ph, 2); ctx.fill();
                            ctx.strokeStyle = '#8a5010'; ctx.lineWidth = 0.8;
                            ctx.beginPath(); ctx.moveTo(px + 5, sy + 2); ctx.lineTo(px + pw - 5, sy + 2); ctx.stroke();
                            ctx.beginPath(); ctx.moveTo(px + 5, sy + ph - 2); ctx.lineTo(px + pw - 5, sy + ph - 2); ctx.stroke();
                            // Center emblem gear
                            const ecx = px + pw / 2, ecy = sy + ph / 2;
                            ctx.fillStyle = '#8a5010';
                            ctx.beginPath(); ctx.arc(ecx, ecy, 5, 0, Math.PI * 2); ctx.fill();
                            ctx.fillStyle = '#f0c040';
                            ctx.beginPath(); ctx.arc(ecx, ecy, 2.5, 0, Math.PI * 2); ctx.fill();
                        } else {
                            // ── GEAR platform (default, platType === 0) ──
                            // Platform body: copper/brass
                            const gGrd = ctx.createLinearGradient(px, sy, px, sy + ph);
                            gGrd.addColorStop(0, '#c8843c'); gGrd.addColorStop(1, '#7a4820');
                            ctx.fillStyle = gGrd;
                            ctx.beginPath(); ctx.roundRect(px, sy, pw, ph, 2); ctx.fill();
                            // Gear teeth along bottom edge (animated offset if gear rotates)
                            const toothW = 7, toothH2 = 5;
                            const spacing = toothW + 4;
                            const rotOff = this.gearDir !== 0
                                ? ((t * this.gearSpeed * spacing * 4 * this.gearDir) % spacing + spacing) % spacing
                                : 0;
                            ctx.fillStyle = '#a06028';
                            const numT = Math.ceil(pw / spacing) + 2;
                            for (let ti = -1; ti <= numT; ti++) {
                                const tx2 = px + ti * spacing + rotOff;
                                if (tx2 < px - toothW || tx2 > px + pw + 1) continue;
                                // clip to platform width
                                const clipL = Math.max(tx2, px);
                                const clipR = Math.min(tx2 + toothW, px + pw);
                                if (clipR <= clipL) continue;
                                ctx.fillRect(clipL, sy + ph, clipR - clipL, toothH2);
                            }
                            // Top surface highlight
                            ctx.fillStyle = 'rgba(240,180,80,0.28)';
                            ctx.beginPath(); ctx.roundRect(px + 2, sy + 1, pw - 4, 3, 1); ctx.fill();
                            // Bolt holes
                            ctx.fillStyle = '#5a3010';
                            const nBolts = Math.max(1, Math.floor(pw / 35));
                            for (let bi = 0; bi < nBolts; bi++) {
                                const bx2 = px + (bi + 0.5) * pw / nBolts;
                                ctx.beginPath(); ctx.arc(bx2, sy + ph / 2 + 1, 3, 0, Math.PI * 2); ctx.fill();
                                ctx.fillStyle = '#c8843c';
                                ctx.beginPath(); ctx.arc(bx2, sy + ph / 2 + 1, 1.4, 0, Math.PI * 2); ctx.fill();
                                ctx.fillStyle = '#5a3010';
                            }
                            // Direction arrow hint if gear rotates
                            if (this.gearDir !== 0) {
                                const arX = px + pw / 2, arY = sy + ph / 2;
                                const arLen = Math.min(20, pw * 0.3);
                                ctx.save(); ctx.globalAlpha = 0.55;
                                ctx.strokeStyle = '#f0c040'; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
                                ctx.beginPath();
                                ctx.moveTo(arX - arLen * 0.5 * this.gearDir, arY);
                                ctx.lineTo(arX + arLen * 0.5 * this.gearDir, arY);
                                ctx.stroke();
                                // arrow head
                                const ah = arX + arLen * 0.5 * this.gearDir;
                                ctx.beginPath();
                                ctx.moveTo(ah, arY);
                                ctx.lineTo(ah - 4 * this.gearDir, arY - 3);
                                ctx.moveTo(ah, arY);
                                ctx.lineTo(ah - 4 * this.gearDir, arY + 3);
                                ctx.stroke();
                                ctx.restore();
                            }
                        }
                    }

                } else if (themeIdx === 1) {
                    if (this.isBouncy) {
                        // ── FOREST BOUNCER: mushroom pad — cap rises above platform slot ──
                        const pulse  = 0.5 + 0.5 * Math.abs(Math.sin(t * 4.0 + px * 0.04));
                        const cx     = px + pw / 2;
                        const baseY  = sy + ph;          // floor of platform slot
                        // Cap sits above the slot; bounce squishes/extends it
                        const capH   = 18 + pulse * 10; // 18–28 px cap height above slot
                        const capTopY = sy - capH;       // top of mushroom dome
                        const rimY    = sy + 2;          // rim sits just inside the slot top

                        // Stem — fills the slot
                        const stemW = Math.min(pw * 0.38, 32);
                        const stemGrd = ctx.createLinearGradient(cx - stemW/2, 0, cx + stemW/2, 0);
                        stemGrd.addColorStop(0, '#b8b078'); stemGrd.addColorStop(0.35, '#f0ead0');
                        stemGrd.addColorStop(0.65, '#d8d0a8'); stemGrd.addColorStop(1, '#a0986a');
                        ctx.fillStyle = stemGrd;
                        ctx.beginPath(); ctx.roundRect(cx - stemW/2, sy, stemW, ph, [0,0,3,3]); ctx.fill();
                        // Stem shadow sides
                        ctx.save(); ctx.globalAlpha = 0.25; ctx.fillStyle = '#3a3010';
                        ctx.fillRect(cx - stemW/2, sy, 4, ph);
                        ctx.fillRect(cx + stemW/2 - 4, sy, 4, ph);
                        ctx.restore();

                        // Spore particles floating up from cap
                        ctx.save();
                        for (let i = 0; i < 6; i++) {
                            const spT = ((t * 0.7 + i * 0.28) % 1.0);
                            const spx = cx + Math.sin(i * 1.9 + t * 0.5) * pw * 0.32;
                            const spy = capTopY - spT * 22;
                            const salpha = (0.7 - spT) * 0.65;
                            if (salpha < 0.02) continue;
                            ctx.globalAlpha = salpha;
                            ctx.fillStyle = '#d8f060';
                            ctx.beginPath(); ctx.arc(spx, spy, 1.8 - spT, 0, Math.PI * 2); ctx.fill();
                        }
                        ctx.restore();

                        // Cap dome — drawn above slot
                        const capRx = pw * 0.48 + pulse * 3;
                        const capRy = capH;
                        // Underside flat rim (the landing surface)
                        ctx.fillStyle = '#c8a870';
                        ctx.beginPath(); ctx.ellipse(cx, rimY, capRx + 2, capRy * 0.22, 0, 0, Math.PI * 2); ctx.fill();
                        // Gill lines on underside
                        ctx.save(); ctx.globalAlpha = 0.35; ctx.strokeStyle = '#8a6030'; ctx.lineWidth = 0.9;
                        for (let gi = -5; gi <= 5; gi++) {
                            const gx2 = cx + gi * capRx * 0.18;
                            const gBot = rimY + capRy * 0.20;
                            ctx.beginPath(); ctx.moveTo(gx2, rimY); ctx.lineTo(gx2 + gi * 1.5, gBot); ctx.stroke();
                        }
                        ctx.restore();
                        // Cap body (top dome)
                        const capGrd = ctx.createRadialGradient(cx - capRx * 0.28, capTopY + capH * 0.3, 2, cx, capTopY + capH * 0.55, capRx);
                        capGrd.addColorStop(0, '#ff7050'); capGrd.addColorStop(0.35, '#e02a10');
                        capGrd.addColorStop(0.7, '#c01808'); capGrd.addColorStop(1, '#8a0806');
                        ctx.fillStyle = capGrd;
                        ctx.beginPath(); ctx.ellipse(cx, rimY, capRx, capRy, 0, Math.PI, 0); ctx.fill();
                        // White spots
                        const spotDefs = [{ox:-0.30,oy:0.60,r:0.12},{ox:0.25,oy:0.72,r:0.10},{ox:-0.06,oy:0.84,r:0.08},{ox:0.52,oy:0.42,r:0.07},{ox:-0.50,oy:0.35,r:0.07}];
                        for (const sp of spotDefs) {
                            ctx.fillStyle = 'rgba(255,255,255,0.85)';
                            ctx.beginPath();
                            ctx.ellipse(cx + sp.ox * capRx, rimY - sp.oy * capRy, sp.r * capRx, sp.r * capRy * 0.65, 0, Math.PI, 0);
                            ctx.fill();
                        }
                        // Glow halo around cap
                        ctx.save(); ctx.globalAlpha = 0.20 * pulse;
                        const halog = ctx.createRadialGradient(cx, rimY - capH * 0.5, 4, cx, rimY - capH * 0.5, capRx * 1.2);
                        halog.addColorStop(0, 'rgba(255,120,40,0.7)'); halog.addColorStop(1, 'transparent');
                        ctx.fillStyle = halog;
                        ctx.beginPath(); ctx.ellipse(cx, rimY - capH * 0.5, capRx * 1.2, capRy * 1.1, 0, 0, Math.PI * 2); ctx.fill();
                        ctx.restore();

                    } else if (this.leafType === 1) {
                        // ── FOREST: giant flat leaf platform (horizontal, clearly a landing surface) ──
                        const rngL = seededRandom((this.startX * 7 + this.y * 3) | 0);
                        const leafPalettes = [
                            {top:'#3db820', body:'#2a8a10', under:'#1a5c08', vein:'#1a5808', hi:'#90f050'},
                            {top:'#b4d830', body:'#8ab020', under:'#5a7808', vein:'#5a7810', hi:'#d8f060'},
                            {top:'#e8c830', body:'#c8a010', under:'#8a6c08', vein:'#907808', hi:'#f8e060'},
                            {top:'#e89030', body:'#c87010', under:'#7a4808', vein:'#8a5010', hi:'#f8b050'},
                            {top:'#d85830', body:'#b83a10', under:'#782010', vein:'#7a2810', hi:'#f08050'},
                        ];
                        const pal = leafPalettes[Math.floor(rngL() * leafPalettes.length)];
                        const cx  = px + pw / 2;

                        // The leaf is wider than the platform slot — overhangs by a few px each side
                        const overhang = 5;
                        const lx = px - overhang, rx = px + pw + overhang;
                        const lw = rx - lx;  // full leaf width
                        // Pointed left and right tips, flat top surface
                        const tipDepth = 8;  // how far the tip scoops below sy on each side

                        // Underside / stem
                        ctx.fillStyle = pal.under;
                        ctx.beginPath();
                        ctx.moveTo(lx + tipDepth, sy + ph);  // bottom-left
                        ctx.quadraticCurveTo(cx, sy + ph + 3, rx - tipDepth, sy + ph);  // gentle droop
                        ctx.lineTo(rx, sy + ph * 0.55);      // right notch
                        ctx.quadraticCurveTo(rx + 2, sy + ph * 0.3, rx - tipDepth, sy + 2); // right tip
                        ctx.lineTo(lx + tipDepth, sy + 2);   // top edge
                        ctx.quadraticCurveTo(lx - 2, sy + ph * 0.3, lx, sy + ph * 0.55); // left tip
                        ctx.closePath();
                        ctx.fill();

                        // Main leaf body top surface
                        const leafGrd = ctx.createLinearGradient(cx, sy, cx, sy + ph);
                        leafGrd.addColorStop(0, pal.top);
                        leafGrd.addColorStop(0.5, pal.body);
                        leafGrd.addColorStop(1, pal.under);
                        ctx.fillStyle = leafGrd;
                        ctx.beginPath();
                        // Right tip (pointed)
                        ctx.moveTo(rx - tipDepth, sy + 2);
                        ctx.quadraticCurveTo(rx + 1, sy + ph * 0.28, rx, sy + ph * 0.52);
                        ctx.quadraticCurveTo(rx - tipDepth * 0.5, sy + ph * 0.8, cx + lw * 0.1, sy + ph - 1);
                        ctx.quadraticCurveTo(cx, sy + ph + 2, cx - lw * 0.1, sy + ph - 1);
                        ctx.quadraticCurveTo(lx + tipDepth * 0.5, sy + ph * 0.8, lx, sy + ph * 0.52);
                        // Left tip (pointed)
                        ctx.quadraticCurveTo(lx - 1, sy + ph * 0.28, lx + tipDepth, sy + 2);
                        ctx.lineTo(rx - tipDepth, sy + 2);
                        ctx.fill();

                        // Top sheen strip (looks like a flat surface you can land on)
                        ctx.save(); ctx.globalAlpha = 0.40;
                        const sheenGrd = ctx.createLinearGradient(cx, sy, cx, sy + 5);
                        sheenGrd.addColorStop(0, pal.hi); sheenGrd.addColorStop(1, 'transparent');
                        ctx.fillStyle = sheenGrd;
                        ctx.beginPath();
                        ctx.moveTo(lx + tipDepth + 2, sy + 2);
                        ctx.lineTo(rx - tipDepth - 2, sy + 2);
                        ctx.quadraticCurveTo(rx - tipDepth + 4, sy + 6, cx, sy + 7);
                        ctx.quadraticCurveTo(lx + tipDepth - 4, sy + 6, lx + tipDepth + 2, sy + 2);
                        ctx.fill();
                        ctx.restore();

                        // Central mid-rib (runs left–right across full width)
                        ctx.strokeStyle = pal.vein; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(lx + tipDepth, sy + ph * 0.52);
                        ctx.quadraticCurveTo(cx, sy + ph * 0.48, rx - tipDepth, sy + ph * 0.52);
                        ctx.stroke();

                        // Side veins (diagonal, spread from mid-rib)
                        ctx.save(); ctx.globalAlpha = 0.50; ctx.strokeStyle = pal.vein; ctx.lineWidth = 0.85;
                        const veinCount = Math.max(3, Math.floor(lw / 22));
                        for (let vi = 1; vi < veinCount; vi++) {
                            const vx0 = lx + tipDepth + vi * (lw - tipDepth * 2) / veinCount;
                            const vMidY = sy + ph * 0.50;
                            ctx.beginPath();
                            ctx.moveTo(vx0, vMidY);
                            ctx.lineTo(vx0 - 8, sy + 3);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.moveTo(vx0, vMidY);
                            ctx.lineTo(vx0 + 4, sy + ph - 3);
                            ctx.stroke();
                        }
                        ctx.restore();

                        // Swaying leaf: gentle curl/wave on the top edge
                        if (this.leafSway) {
                            const swayAmt = Math.sin(t * this.swayFreq + this.swayPhase);
                            ctx.save(); ctx.globalAlpha = 0.22; ctx.strokeStyle = pal.hi;
                            ctx.lineWidth = 1.2; ctx.lineCap = 'round';
                            ctx.beginPath();
                            ctx.moveTo(lx + tipDepth + 6, sy + 3);
                            ctx.quadraticCurveTo(cx + swayAmt * 8, sy + 1, rx - tipDepth - 6, sy + 3);
                            ctx.stroke();
                            ctx.restore();
                        }

                    } else {
                        // ── FOREST: branch platform ──
                        const rngB = seededRandom((this.startX * 5 + this.y) | 0);
                        // Bark colours vary slightly per branch
                        const bDark  = `rgb(${48+rngB()*16|0},${24+rngB()*10|0},${6+rngB()*6|0})`;
                        const bLight = `rgb(${82+rngB()*20|0},${44+rngB()*12|0},${12+rngB()*8|0})`;

                        // Branch body
                        ctx.fillStyle = bDark;
                        ctx.beginPath(); ctx.roundRect(px, sy + 4, pw, ph - 4, 5); ctx.fill();
                        // Bark highlight stripe on top-left
                        const bGrd = ctx.createLinearGradient(px, sy + 4, px + pw, sy + 4);
                        bGrd.addColorStop(0, bLight); bGrd.addColorStop(0.3, bDark); bGrd.addColorStop(1, bDark);
                        ctx.fillStyle = bGrd;
                        ctx.beginPath(); ctx.roundRect(px, sy + 4, pw, 5, [5,5,0,0]); ctx.fill();
                        // Bark grain lines
                        ctx.save(); ctx.strokeStyle = bDark; ctx.lineWidth = 0.8; ctx.globalAlpha = 0.5;
                        const grainCount = Math.floor(pw / 16);
                        for (let i = 0; i < grainCount; i++) {
                            const gx = px + 6 + i * (pw - 12) / Math.max(grainCount, 1) + rngB() * 4 - 2;
                            ctx.beginPath(); ctx.moveTo(gx, sy + 5); ctx.lineTo(gx + (rngB() - 0.5) * 6, sy + ph); ctx.stroke();
                        }
                        ctx.restore();

                        // Moss strip on top surface
                        const mossGrd = ctx.createLinearGradient(px, sy, px, sy + 5);
                        mossGrd.addColorStop(0, '#4ab828'); mossGrd.addColorStop(1, '#2e7a14');
                        ctx.fillStyle = mossGrd;
                        ctx.beginPath(); ctx.roundRect(px, sy, pw, 6, [4,4,0,0]); ctx.fill();
                        // Moss bumps
                        ctx.fillStyle = '#5ec830';
                        const bumpCount = Math.floor(pw / 9);
                        for (let i = 0; i < bumpCount; i++) {
                            const bx2 = px + 4 + i * (pw - 8) / Math.max(bumpCount, 1);
                            ctx.beginPath(); ctx.arc(bx2, sy + 1, 2.8 + rngB() * 1.4, Math.PI, 0); ctx.fill();
                        }

                        // Hanging leaves below branch (2–4 leaves)
                        const hangCount = 2 + Math.floor(rngB() * 3);
                        ctx.save(); ctx.globalAlpha = 0.75;
                        for (let i = 0; i < hangCount; i++) {
                            const hx = px + 12 + rngB() * (pw - 24);
                            const hlen = 10 + rngB() * 8;
                            const sway3 = Math.sin(t * 0.8 + hx * 0.05) * 3;
                            // stem
                            ctx.strokeStyle = '#2a6a10'; ctx.lineWidth = 1; ctx.lineCap = 'round';
                            ctx.beginPath(); ctx.moveTo(hx, sy + ph); ctx.lineTo(hx + sway3, sy + ph + hlen); ctx.stroke();
                            // leaf
                            const leafColors = ['#2a8010','#6aaa18','#a0c820','#c8a010'];
                            ctx.fillStyle = leafColors[i % leafColors.length];
                            ctx.beginPath(); ctx.ellipse(hx + sway3, sy + ph + hlen, 6, 4, sway3 * 0.1, 0, Math.PI * 2); ctx.fill();
                        }
                        ctx.restore();

                        // Moving branch: glowing amber edge to signal motion
                        if (this.moving) {
                            ctx.save(); ctx.globalAlpha = 0.45;
                            const mGrd = ctx.createLinearGradient(px, sy, px + pw, sy);
                            mGrd.addColorStop(0, 'transparent'); mGrd.addColorStop(0.5, '#f0c030'); mGrd.addColorStop(1, 'transparent');
                            ctx.strokeStyle = mGrd; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(px + 4, sy + 1); ctx.lineTo(px + pw - 4, sy + 1); ctx.stroke();
                            ctx.restore();
                        }
                    }

                } else if (themeIdx === 2) {
                    if (this.isBouncy) {
                        // ── OCEAN: jellyfish bounce pad ──
                        const pulse = 0.60 + 0.40 * Math.abs(Math.sin(t * 2.8 + px * 0.04));
                        const nDomes = Math.max(2, Math.floor(pw / 22));
                        // Translucent bell domes
                        ctx.save();
                        ctx.globalCompositeOperation = 'lighter';
                        ctx.globalAlpha = 0.22 * pulse;
                        const jGlow = ctx.createRadialGradient(px+pw/2, sy, 0, px+pw/2, sy, pw*0.6);
                        jGlow.addColorStop(0, 'rgba(140,80,255,0.6)');
                        jGlow.addColorStop(1, 'transparent');
                        ctx.fillStyle = jGlow;
                        ctx.beginPath(); ctx.arc(px+pw/2, sy, pw*0.6, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                        ctx.save(); ctx.globalAlpha = 0.55 + 0.20 * pulse;
                        for (let di = 0; di < nDomes; di++) {
                            const dcx = px + (di + 0.5) * pw / nDomes;
                            const dr2 = (ph * 0.85) * pulse;
                            ctx.fillStyle = `rgba(160,100,255,${(0.30 * pulse).toFixed(2)})`;
                            ctx.beginPath();
                            ctx.arc(dcx, sy + ph*0.5, dr2, Math.PI, 0, false);
                            ctx.closePath(); ctx.fill();
                            // Tentacle hints below
                            ctx.strokeStyle = 'rgba(180,120,255,0.25)'; ctx.lineWidth = 0.8;
                            for (let ti = 0; ti < 3; ti++) {
                                const tx2 = dcx + (ti - 1) * dr2 * 0.5;
                                ctx.beginPath();
                                ctx.moveTo(tx2, sy + ph);
                                ctx.quadraticCurveTo(tx2 + Math.sin(t*2+ti)*3, sy+ph+6, tx2, sy+ph+10);
                                ctx.stroke();
                            }
                        }
                        // Top shimmer line
                        ctx.strokeStyle = 'rgba(200,160,255,0.70)'; ctx.lineWidth = 1.8;
                        ctx.beginPath(); ctx.moveTo(px+4, sy+1); ctx.lineTo(px+pw-4, sy+1); ctx.stroke();
                        ctx.globalAlpha = 0.18 * pulse; ctx.lineWidth = 7;
                        ctx.beginPath(); ctx.moveTo(px, sy); ctx.lineTo(px+pw, sy); ctx.stroke();
                        ctx.restore();

                    } else {
                        const rngF = seededRandom((this.startX * 11 + this.y * 7) | 0);
                        ctx.save();

                        if (this.fossType === 0) {
                            // ── CORAL ROCK LEDGE ──
                            const sg = ctx.createLinearGradient(px, sy, px, sy + ph);
                            sg.addColorStop(0,   '#2a6880');
                            sg.addColorStop(0.4, '#1e5068');
                            sg.addColorStop(1,   '#143850');
                            ctx.fillStyle = sg; ctx.fillRect(px, sy, pw, ph);
                            ctx.fillStyle = '#3a8898'; ctx.fillRect(px, sy, pw, 2);
