        function drawCrown(ctx, cx, cy, cW, cH, t) {
            const cL = cx - cW/2;
            const cg = ctx.createRadialGradient(cx, cy, 5, cx, cy, cW*0.85);
            cg.addColorStop(0, `rgba(255,230,80,${0.5 + 0.25*Math.sin(t*1.8)})`);
            cg.addColorStop(1, 'rgba(255,215,0,0)');
            ctx.fillStyle = cg;
            ctx.beginPath(); ctx.arc(cx, cy, cW*0.85, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.beginPath(); ctx.ellipse(cx, cy + cH*0.44, cW*0.46, 9, 0, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(cL,            cy + cH*0.32);
            ctx.lineTo(cL,            cy - cH*0.28);
            ctx.lineTo(cL + cW*0.18,  cy - cH*0.88);
            ctx.lineTo(cL + cW*0.34,  cy - cH*0.18);
            ctx.lineTo(cx,            cy - cH);
            ctx.lineTo(cL + cW*0.66,  cy - cH*0.18);
            ctx.lineTo(cL + cW*0.82,  cy - cH*0.88);
            ctx.lineTo(cL + cW,       cy - cH*0.28);
            ctx.lineTo(cL + cW,       cy + cH*0.32);
            ctx.closePath(); ctx.fill();

            ctx.fillStyle = '#b8860b';
            ctx.fillRect(cL, cy + cH*0.02, cW, cH*0.30);

            ctx.fillStyle = 'rgba(255,255,210,0.4)';
            ctx.beginPath();
            ctx.moveTo(cL+10, cy - cH*0.25); ctx.lineTo(cL + cW*0.18, cy - cH*0.82);
            ctx.lineTo(cL + cW*0.18 + 8, cy - cH*0.82); ctx.lineTo(cL+22, cy - cH*0.25);
            ctx.closePath(); ctx.fill();

            const jewels = [
                { x: cx - cW*0.3, y: cy + cH*0.08, r: 9,  col: '#ff3333' },
                { x: cx,          y: cy - cH*0.04, r: 11, col: '#4499ff' },
                { x: cx + cW*0.3, y: cy + cH*0.08, r: 9,  col: '#33ffaa' },
            ];
            for (const j of jewels) {
                ctx.fillStyle = j.col;
                ctx.beginPath(); ctx.arc(j.x, j.y, j.r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath(); ctx.arc(j.x - j.r*0.28, j.y - j.r*0.3, j.r*0.38, 0, Math.PI*2); ctx.fill();
            }

            // orbiting gold LEDs
            for (let i = 0; i < 12; i++) {
                const a = (i/12)*Math.PI*2 + t*1.2;
                const d = cW*0.72 + Math.sin(t*2.1 + i*1.1)*10;
                const lx = cx + Math.cos(a)*d;
                const ly = cy - cH*0.1 + Math.sin(a)*d*0.42;
                const alpha = 0.4 + 0.6*Math.abs(Math.sin(t*2.8 + i));
                const r = 1.5 + 1.5*Math.abs(Math.sin(t*1.5 + i*0.7));
                ctx.fillStyle = `rgba(255,230,80,${alpha})`;
                ctx.beginPath(); ctx.arc(lx, ly, r, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawSelect() {
            ctx.save();
            const t = Date.now() / 1000;

            ctx.fillStyle = '#000a18';
            ctx.fillRect(0, 0, BASE_W, BASE_H);
            const bg = ctx.createRadialGradient(BASE_W/2, 400, 10, BASE_W/2, 400, 340);
            bg.addColorStop(0, 'rgba(0,40,80,0.4)');
            bg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = bg; ctx.fillRect(0, 0, BASE_W, BASE_H);

            for (let i = 0; i < 18; i++) {
                const bx = (Math.sin(i*113.7)*0.5+0.5)*BASE_W;
                const by = (Math.cos(i*79.1)*0.5+0.5)*BASE_H;
                ctx.fillStyle = `rgba(160,210,255,${0.1 + 0.1*Math.abs(Math.sin(t*1.2+i))})`;
                ctx.beginPath(); ctx.arc(bx, by, 1.2, 0, Math.PI*2); ctx.fill();
            }

            ctx.textAlign = 'center';
            ctx.fillStyle = '#aaddff'; ctx.font = 'bold 24px monospace';
            ctx.fillText('CHOOSE YOUR MODE', BASE_W/2, 46);

            // mode rows data: [label, icon, bg, stroke, bestIdx]
            const modes = [
                { label:'INFINITE',  icon:'∞',  bg:'#021428', stroke:'#55ccff', idx:0, goal:null,   name:'Endless climb' },
                { label:'FOREST',    icon:'1',  bg:'#071a09', stroke:'#4ec96a', idx:1, goal:'500m',  name:'Level 1' },
                { label:'DESERT',    icon:'2',  bg:'#221004', stroke:'#e8922a', idx:2, goal:'1500m', name:'Level 2' },
                { label:'LAVA',      icon:'3',  bg:'#1e0404', stroke:'#ff5522', idx:3, goal:'2500m', name:'Level 3' },
                { label:'MAGIC',     icon:'4',  bg:'#0e0428', stroke:'#bb77ff', idx:4, goal:'3750m', name:'Level 4' },
                { label:'SPACE',     icon:'5',  bg:'#030008', stroke:'#00ffcc', idx:5, goal:'5000m', name:'Level 5' },
            ];

            const rowH = 96, rowW = 420, rowX = BASE_W/2 - rowW/2, rowStart = 62;

            for (let i = 0; i < modes.length; i++) {
                const m = modes[i];
                const ry = rowStart + i * (rowH + 6);
                const best = allTimeBests[m.idx];
                const bestTxt = best > 0 ? `${best}m` : 'עוד לא שיחקת';

                // row background
                ctx.fillStyle = m.bg;
                ctx.beginPath(); ctx.roundRect(rowX, ry, rowW, rowH, 14); ctx.fill();
                // border — pulse for infinite, solid for levels
                const bAlpha = i === 0 ? 0.45 + 0.35*Math.sin(t*2.2) : 0.55;
                ctx.strokeStyle = m.stroke.replace(')', `,${bAlpha})`).replace('rgb','rgba').replace('#', 'rgba(') || m.stroke;
                // simpler approach:
                ctx.globalAlpha = i === 0 ? 0.45 + 0.35*Math.sin(t*2.2) : 0.6;
                ctx.strokeStyle = m.stroke; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.roundRect(rowX, ry, rowW, rowH, 14); ctx.stroke();
                ctx.globalAlpha = 1;

                // icon circle
                ctx.fillStyle = m.stroke;
                ctx.globalAlpha = 0.18;
                ctx.beginPath(); ctx.arc(rowX + 46, ry + rowH/2, 28, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
                ctx.fillStyle = m.stroke; ctx.font = 'bold 28px monospace';
                ctx.fillText(m.icon, rowX + 46, ry + rowH/2 + 10);

                // left text
                ctx.textAlign = 'left';
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 17px monospace';
                ctx.fillText(m.label, rowX + 82, ry + 34);
                ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = '13px monospace';
                ctx.fillText(m.name + (m.goal ? `  —  goal: ${m.goal}` : ''), rowX + 82, ry + 54);

                // best score / completion status
                const hasPlayed = best > 0;
                const won = i > 0 && levelWins[m.idx];
                ctx.textAlign = 'right';
                if (won) {
                    ctx.fillStyle = '#ffe033'; ctx.font = 'bold 15px monospace';
                    ctx.fillText('✓ COMPLETED', rowX + rowW - 18, ry + rowH/2 - 4);
                    ctx.fillStyle = 'rgba(255,220,80,0.5)'; ctx.font = '12px monospace';
                    ctx.fillText(`best: ${best}m`, rowX + rowW - 18, ry + rowH/2 + 14);
                } else if (hasPlayed) {
                    ctx.fillStyle = m.stroke; ctx.font = 'bold 16px monospace';
                    ctx.fillText(`${best}m`, rowX + rowW - 18, ry + rowH/2 + 6);
                    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px monospace';
                    ctx.fillText('BEST', rowX + rowW - 18, ry + rowH/2 - 8);
                } else {
                    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '13px monospace';
                    ctx.fillText('עוד לא שיחקת', rowX + rowW - 18, ry + rowH/2 + 6);
                }

                ctx.textAlign = 'center';
            }

            // ── BACK button ──
            const backY = rowStart + modes.length*(rowH+6) + 8;
            const backW = 160, backH = 40, backX = BASE_W/2 - backW/2;
            ctx.fillStyle = '#0a1020';
            ctx.beginPath(); ctx.roundRect(backX, backY, backW, backH, 11); ctx.fill();
            ctx.strokeStyle = 'rgba(100,130,180,0.4)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(backX, backY, backW, backH, 11); ctx.stroke();
            ctx.fillStyle = '#667799'; ctx.font = 'bold 15px monospace';
            ctx.fillText('← BACK', BASE_W/2, backY + backH/2 + 6);

            ctx.restore();
        }

        function drawWin() {
            ctx.save();
            const t = Date.now() / 1000;

            // deep dark backdrop
            ctx.fillStyle = 'rgba(0,0,8,0.92)';
            ctx.fillRect(0, 0, BASE_W, BASE_H);

            // grand golden radial glow
            const bg1 = ctx.createRadialGradient(BASE_W/2, BASE_H/2, 10, BASE_W/2, BASE_H/2, 380);
            bg1.addColorStop(0, `rgba(120,90,0,${0.4 + 0.15*Math.sin(t*1.4)})`);
            bg1.addColorStop(1, 'rgba(0,0,0,0)');

            for (let i = 0; i < 22; i++) {

            const p1 = 0.5 + 0.4*Math.sin(t*2.5);

            ctx.beginPath(); ctx.roundRect(panelX+2, panelY+2, panelW-4, panelH-4, 26); ctx.stroke();
            ctx.strokeStyle = `rgba(255,180,0,${p1*0.5})`; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(panelX+7, panelY+7, panelW-14, panelH-14, 22); ctx.stroke();

            // VICTORY title
            ctx.textAlign = 'center';
            ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 30;
            ctx.fillStyle = '#ffe800'; ctx.font = 'bold 44px monospace';
            ctx.fillText('VICTORY!', BASE_W/2, panelY + 208);

            ctx.fillStyle = '#ffcc55'; ctx.font = 'bold 18px monospace';
            ctx.fillText('You reached the top!', BASE_W/2, panelY + 238);

            ctx.fillText(currentMode === 'level' ? '✓ LEVEL COMPLETE' : `Height: ${lastRunHigh}m`, BASE_W/2, panelY + 275);
            ctx.fillStyle = '#88bbff'; ctx.font = '17px monospace';
            ctx.fillText(`Best: ${getBest() > 0 ? getBest()+'m' : 'עוד לא שיחקת'}`, BASE_W/2, panelY + 300);

            // gold divider
            const grd = ctx.createLinearGradient(panelX+30, 0, panelX+panelW-30, 0);
            grd.addColorStop(0,'rgba(255,215,0,0)'); grd.addColorStop(0.5,'rgba(255,215,0,0.5)'); grd.addColorStop(1,'rgba(255,215,0,0)');
            ctx.fillStyle = grd; ctx.fillRect(panelX+30, panelY+315, panelW-60, 2);

            // OPEN CHEST — pulsing gold, grand
            const rwW = 230, rwH = 52, rwX = BASE_W/2 - rwW/2, rwY = panelY + 328;

        // ─────────────────────────────────────────────
        //  TAP ACTION (for menu/dead/win transitions)
        // ─────────────────────────────────────────────
        function menuAction(sx, sy) {
            const cx = BASE_W / 2, btnW = 210, btnX = cx - btnW / 2;

            // Tutorial win screen: tap goes to main menu
            if (tutorialComplete) {
                tutorialMode = false; tutorialComplete = false;
                hasActiveGame = false; state = STATE.MAIN;
                return;
            }

            // Tutorial pause: blocked for 1 second, then tap to continue
            if (tutorialPaused) {
                if (tutorialAutoResumeAt > 0 && Date.now() < tutorialAutoResumeAt) return; // still in 1-second block
                // 1 second passed — tap resumes
                tutorialPaused = false;
                tutorialAutoResumeAt = 0;
                return;
            }

            if (state === STATE.LOCKER) {
                // Back button: x=10,y=12,w=44,h=34
                if (sx >= 10 && sx <= 54 && sy >= 12 && sy <= 46) {
                    state = STATE.MAIN; return;
                }
                // Tab buttons
                const tabY = 64, tabH = 32, tabW = 110, tabGap = 8;
                const tabSkinX = BASE_W/2 - tabW - tabGap/2;
                const tabTrailX = BASE_W/2 + tabGap/2;
                if (sy >= tabY && sy <= tabY+tabH) {
                    if (sx >= tabSkinX && sx <= tabSkinX+tabW) { lockerTab = 0; return; }
                    if (sx >= tabTrailX && sx <= tabTrailX+tabW) { lockerTab = 1; return; }
                }

                const cols = 3, cellW = 110, cellH = 110, gap = 12;
                const gx = BASE_W/2 - (cols*cellW+(cols-1)*gap)/2;

                if (lockerTab === 0) {
                    const gridStartY = 106;
                    const totalSkinSlots = SKINS.length + 1;
                    const skinRows = Math.ceil(totalSkinSlots / cols);
                    for (let i = 0; i < SKINS.length; i++) {
                        const cx2 = gx + (i%cols)*(cellW+gap), cy2 = gridStartY + Math.floor(i/cols)*(cellH+gap);
                        if (sx >= cx2 && sx <= cx2+cellW && sy >= cy2 && sy <= cy2+cellH) {
                            selectedSkin = i; return;
                        }
                    }
                    const btnY2 = gridStartY + skinRows*(cellH+gap) + 20;
                    if (sy >= btnY2 && sy <= btnY2+46 && sx >= BASE_W/2-105 && sx <= BASE_W/2+105) {
                        const sk = SKINS[selectedSkin];
                        if (sk.unlocked) { equippedSkin = selectedSkin; saveSkins(); }
                        else if (sk.shopOnly) { state = STATE.SHOP; }
                        else if (sk.price && lockerPoints >= sk.price) {
                            lockerPoints -= sk.price; savePoints(); sk.unlocked = true; equippedSkin = selectedSkin; saveSkins();
                        }
                        return;
                    }
                } else {
                    const tGridY = 106;
                    const totalTrailSlots = TRAILS.length + 1;
                    const trailRows = Math.ceil(totalTrailSlots / cols);
                    for (let i = 0; i < TRAILS.length; i++) {
                        const cx2 = gx + (i%cols)*(cellW+gap), cy2 = tGridY + Math.floor(i/cols)*(cellH+gap);
                        if (sx >= cx2 && sx <= cx2+cellW && sy >= cy2 && sy <= cy2+cellH) {
                            selectedTrail = i; return;
                        }
                    }
                    const tBtnY = tGridY + trailRows*(cellH+gap) + 20;
                    if (sy >= tBtnY && sy <= tBtnY+46 && sx >= BASE_W/2-105 && sx <= BASE_W/2+105) {
                        const tr = TRAILS[selectedTrail];
                        if (tr.unlocked) { equippedTrail = selectedTrail; saveTrails(); }
                        else if (tr.shopOnly) { state = STATE.SHOP; }
                        else if (tr.price && lockerPoints >= tr.price) {
                            lockerPoints -= tr.price; savePoints(); tr.unlocked = true; equippedTrail = selectedTrail; saveTrails();
                        }
                        return;
                    }
                }
                return;
            }
            if (state === STATE.SHOP) {
                // If confirm dialog is open
                if (shopConfirm) {
                    const dW = 320, dH = 260, dX = BASE_W/2 - dW/2, dY = BASE_H/2 - dH/2;
                    const yBtnW = (dW - 60) / 2;
                    const yBtnX = dX + 24, yBtnY = dY + dH - 58;
                    const nBtnX = dX + dW - 24 - yBtnW;
                    // YES
                    if (sx >= yBtnX && sx <= yBtnX+yBtnW && sy >= yBtnY && sy <= yBtnY+40) {
                        const item = shopConfirm;
                        if (lockerPoints >= item.price) {
                            lockerPoints -= item.price; savePoints();
                            item.owned = true; saveShopItems();
                            if (item.type === 'trail') {
                                TRAILS[item.trailIdx].unlocked = true;
                                equippedTrail = item.trailIdx; saveTrails();
                            } else {
                                SKINS[item.skinIdx].unlocked = true;
                                equippedSkin = item.skinIdx; saveSkins();
                                if (item.type === 'bundle' && item.trailIdx != null) {
                                    TRAILS[item.trailIdx].unlocked = true;
                                    equippedTrail = item.trailIdx; saveTrails();
                                }
                            }
                        }
                        shopConfirm = null; return;
                    }
                    // NO
                    if (sx >= nBtnX && sx <= nBtnX+yBtnW && sy >= yBtnY && sy <= yBtnY+40) {
                        shopConfirm = null; return;
                    }
                    // click outside = cancel
                    if (sx < dX || sx > dX+dW || sy < dY || sy > dY+dH) {
                        shopConfirm = null; return;
                    }
                    return;
                }
                // Back button: x=10,y=12,w=44,h=34
                if (sx >= 10 && sx <= 54 && sy >= 12 && sy <= 46) {
                    state = STATE.MAIN; return;
                }
                // Item cards — variable height
                const skinItemH = 90, bundleItemH = 160, itemGap2 = 10;
                const itemW2 = BASE_W - 32, itemX2 = 16;
                let cardY = 70;
                for (let i = 0; i < SHOP_ITEMS.length; i++) {
                    const item = SHOP_ITEMS[i];
                    const cardH = item.type === 'bundle' ? bundleItemH : skinItemH;
                    if (sx >= itemX2 && sx <= itemX2+itemW2 && sy >= cardY && sy <= cardY+cardH) {
                        if (!item.owned) shopConfirm = item;
                        return;
                    }
                    cardY += cardH + itemGap2;
                }
                return;
            }
            if (state === STATE.SELECT) {
                const rowH = 96, rowW = 420, rowX = BASE_W/2 - rowW/2, rowStart = 62;
                // 6 rows: row 0 = infinite, rows 1-5 = levels
                for (let i = 0; i < 6; i++) {
                    const ry = rowStart + i*(rowH+6);
                    if (sy >= ry && sy <= ry+rowH && sx >= rowX && sx <= rowX+rowW) {
                        if (i === 0) { currentMode = 'infinite'; currentLevel = 0; }
                        else { currentMode = 'level'; currentLevel = i; }
                        initWorld(); state = STATE.PLAY; return;
                    }
                }
                // Back button
                const backY = rowStart + 6*(rowH+6) + 8;
                if (sy >= backY && sy <= backY+40 && sx >= BASE_W/2-80 && sx <= BASE_W/2+80) {
                    state = STATE.MAIN; return;
                }
                return;
            }
            if (state === STATE.MAIN) {
                // Click on character preview (skin) → open locker
                if (sy >= 220 && sy <= 400 && sx >= BASE_W/2 - 80 && sx <= BASE_W/2 + 80) {
                    showResetConfirm = false; state = STATE.LOCKER; return;
                }
                // PLAY button: y=425, h=60
                const btnW2 = 220, btnX2 = BASE_W/2 - btnW2/2;
                if (sy >= 425 && sy <= 485 && sx >= btnX2 && sx <= btnX2 + btnW2) {
                    showResetConfirm = false; state = STATE.SELECT; return;
                }
                // TUTORIAL button: y=499, h=50 — disabled (handled elsewhere)
                if (sy >= 499 && sy <= 549 && sx >= btnX2 && sx <= btnX2 + btnW2) {
                    return; // intentionally disabled
                }
                // LOCKER + SHOP buttons: y=563, h=48, side by side
                const sideW = 102, sideGap = 12;
                const leftX = BASE_W/2 - sideW - sideGap/2, rightX = BASE_W/2 + sideGap/2;
                if (sy >= 563 && sy <= 611) {
                    if (sx >= leftX && sx <= leftX + sideW) { showResetConfirm = false; state = STATE.LOCKER; return; }
                    if (sx >= rightX && sx <= rightX + sideW) { showResetConfirm = false; state = STATE.SHOP; return; }
                }
                return;
            }
            if (state === STATE.MENU) {
                // CONTINUE: y=256, h=52
                if (sy >= 256 && sy <= 308 && sx >= btnX && sx <= btnX + btnW) {
                    state = STATE.PLAY; return;
                }
                // NEW GAME: y=320, h=52 (not shown in tutorial)
                if (!tutorialMode && sy >= 320 && sy <= 372 && sx >= btnX && sx <= btnX + btnW) {
                    initWorld(); state = STATE.PLAY; return;
                }
                // CHOOSE LEVEL: y=390 normally, y=320 in tutorial
                const mainMenuY = tutorialMode ? 320 : 390;
                if (sy >= mainMenuY && sy <= mainMenuY + 44 && sx >= btnX && sx <= btnX + btnW) {
                    tutorialMode = false; hasActiveGame = false; state = STATE.SELECT; return;
                }
                return;
            }
            if (state === STATE.DEAD) {
                const panelY = 125;
                const btnW = 210, btnH = 50, btnX = BASE_W/2 - btnW/2;
                const newY = panelY + 248;
                if (sy >= newY && sy <= newY + btnH && sx >= btnX && sx <= btnX + btnW) {
                    initWorld(); state = STATE.PLAY; return;
                }
                const exitY = newY + btnH + 12;
                if (sy >= exitY && sy <= exitY + btnH && sx >= btnX && sx <= btnX + btnW) {
                    state = STATE.MAIN; hasActiveGame = false; currentMode = 'infinite'; currentLevel = 0; return;
                }
                return;
            }
            if (state === STATE.WIN) {
                const panelY = 68;
                const btnW = 220, btnH = 52, btnX = BASE_W/2 - btnW/2;
                const rwW = 230, rwH = 52, rwX = BASE_W/2 - rwW/2, rwY = panelY + 328;
                if (sy >= rwY && sy <= rwY + rwH && sx >= rwX && sx <= rwX + rwW) {
                    // mechanic: to be defined
                    return;
                }
                const newY = panelY + 398;
                if (sy >= newY && sy <= newY + btnH && sx >= btnX && sx <= btnX + btnW) {
                    initWorld(); state = STATE.PLAY; return;
                }
                const exitY = newY + btnH + 14;
                if (sy >= exitY && sy <= exitY + btnH && sx >= btnX && sx <= btnX + btnW) {
                    state = STATE.MAIN; hasActiveGame = false; currentMode = 'infinite'; currentLevel = 0; return;
                }
                return;
            }
        }

        function onTap() { menuAction(BASE_W / 2, 455); }

        canvas.addEventListener('pointerup', e => {
            if (e.pointerType === 'touch') return; // handled by touchend
            const sx = e.clientX / scale, sy = (e.clientY - parseFloat(canvas.style.marginTop || 0)) / scale;
            if (state === STATE.PLAY && inBtn(btnMenuBottom, sx, sy)) { state = STATE.MENU; return; }
            menuAction(sx, sy);
        });

        // ─────────────────────────────────────────────
        //  MAIN LOOP
        // ─────────────────────────────────────────────
        let lastTime = 0;
        let accumulator = 0;
        const FIXED_STEP = 1 / 60;

        function gameUpdate() {
                // Apply deferred freeze (scheduled after powerup pickup — fires next frame)
                if (tutorialFreezeScheduled) {
                    tutorialFreezeScheduled = false;
                    tutorialPaused = true;
                    tutorialAutoResumeAt = Date.now() + 1000; // clicking enabled after 1 second
                }
                if (tutorialPaused || tutorialComplete) return; // freeze while showing tutorial message/win
                // Prev on ground tracking
                const wasOnGround = player.onGround;
                const visible = platforms.filter(p => Math.abs(p.y - player.y) < BASE_H * 2);
                player.update(keys, visible, touch);
                if (wasOnGround && !player.onGround) player.emitJumpParticles(particles);

                updateCamera();
                if (player.y < highestY) highestY = player.y;
                const _maxH = Math.floor((BASE_H - 120 - TOWER_TOP) / 10);
                lastRunHigh = Math.min(Math.max(0, Math.floor((BASE_H - 120 - highestY) / 10)), _maxH);

                // Fall-death: die if you fall 30 meters (300px) from where the jump started
                if (!player.onGround && player.y - jumpStartY >= 300) { handleDeath(); return; }
                // Award 1 point per 40 meters climbed (not in tutorial)
                if (!tutorialMode) {
                    const milestone = Math.floor(lastRunHigh / 40);
                    if (milestone > lastPointMilestone) {
                        const gained = milestone - lastPointMilestone;
                        addPoints(gained);
                        runPointsEarned += gained;
                        lastPointMilestone = milestone;
                    }
                }
                // difficulty: levels 1 to 10, increases every 300 meters
                const metersClimbed = lastRunHigh;
                if (metersClimbed < 200) {
                    difficulty = 1;
                } else if (metersClimbed < 1000) {
                    difficulty = Math.min(4, 1 + Math.floor((metersClimbed - 200) / 250));
                } else {
                    difficulty = Math.min(10, 4 + Math.floor((metersClimbed - 1000) / 300));
                }
                // ghost speed: very slow at first appearance (450m), scales up gradually
                const enemySpeed = metersClimbed < 450 ? 0.25 : Math.min(2.0, 0.25 + (metersClimbed - 450) / 400);

                // Spawn ghosts — start at difficulty 2
                if (difficulty >= 2) {
                    ghostTimer--;
                    if (ghostTimer <= 0) {
                        const interval = Math.max(450, Math.floor(2800 - metersClimbed * 3.5));
                        ghostTimer = rndInt(interval, Math.floor(interval * 1.8));
                        const maxGhosts = metersClimbed < 250 ? 1 : metersClimbed < 500 ? 2 : 3;
                        let spawned = 0;
                        for (const plat of platforms) {
                            if (spawned >= maxGhosts) break;
                            // In level mode: don't spawn on or above the finish platform
                            if (finishPlatRef && plat.y <= finishPlatRef.y) continue;
                            // Never spawn below the starting platform
                            if (plat.y > floorY) continue;
                            if (plat.y > player.y - BASE_H * 2.5 && plat.y < player.y - BASE_H * 2 && (difficulty >= 4 || plat.spikes.length === 0)) {
                                if (Math.random() < 0.18) {
                                    const ghost = new Ghost(rndInt(WALL_W, BASE_W - WALL_W - 28), plat.y - 34 - 10);
                                    ghost.speed *= enemySpeed;
                                    ghosts.push(ghost);
                                    spawned++;
                                }
                            }
                        }
                    }
                }
                // Power state (must be before enemy updates that use slowFactor)
                const slowFactor = player.powerSlow > 0 ? 0.35 : 1.0;
                const shielded = player.powerShield > 0;
                const invincible = player.iframes > 0;

                // Update all
                for (const p of visible) p.update();
                for (const r of rocks) r.update(visible, slowFactor);
                for (const g of ghosts) g.update(slowFactor);
                book.update();
                for (const c of crystals) c.update();
                for (const p of particles) p.update();
                for (const s of snowflakes) s.update();

                // Cull
                rocks.splice(0, rocks.length, ...rocks.filter(r => r.alive));
                ghosts.splice(0, ghosts.length, ...ghosts.filter(g => Math.abs(g.y - player.y) < BASE_H * 3));
                particles.splice(0, particles.length, ...particles.filter(p => p.life > 0));

                const pr = player.rect();

                // Platform spike hazards
                for (const plat of visible) {
                    for (let si = plat.spikes.length - 1; si >= 0; si--) {
                        const sp = plat.spikes[si];
                        const hazard = { x: plat.x + sp.offset, y: plat.y - 10, w: sp.width, h: 5 };
                        if (rectsOverlap(pr, hazard)) {
                            if (invincible) break;
                            if (shielded) {
                                player.powerShield = 0;
                                player.iframes = 90;
                                plat.spikes.splice(si, 1);
                                floatTexts.push(new FloatText(player.x + player.W / 2, player.y - 10, 'SHIELD!', '#c8a0ff'));
                            } else {
                                handleDeath();
                            }
                            break;
                        }
                    }
                    if (state !== STATE.PLAY) break;
                }

                // Spawn power-ups
                powerupTimer--;
                if (powerupTimer <= 0) {
                    powerupTimer = rndInt(180, 360);
                    const nearPlats = platforms.filter(p => {
                        if (p.y > player.y - BASE_H * 2.5 || p.y < player.y - BASE_H * 2) return false;
                        if (finishPlatRef && p.y <= finishPlatRef.y) return false; // level mode: no spawn at/above finish
                        if (p.y > floorY) return false; // never below start
                        return true;
                    });
                    const freePlats = nearPlats.filter(plat => {
                        if (plat.isFinish || plat.spikes.length > 0) return false;
                        const px = plat.x + plat.w / 2;
                        // no existing powerup on this platform
                        if (powerups.some(pu => Math.abs(pu.x - px) < 32 && Math.abs(pu.y - (plat.y - 20)) < 24)) return false;
                        // no existing coin on this platform
                        if (coins.some(c => Math.abs(c.x - px) < 32 && Math.abs(c.y - (plat.y - 20)) < 24)) return false;
                        return true;
                    });
                    if (freePlats.length > 0) {
                        const plat = freePlats[rndInt(0, freePlats.length - 1)];
                        const puPlatform = plat.moving ? plat : null;
                        powerups.push(new PowerUp(plat.x + plat.w / 2, plat.y - 20, puPlatform));
                    }
                }

                // Spawn coin every 50 meters climbed
                if (!tutorialMode) {
                    const coinMilestone = Math.floor(lastRunHigh / 50);
                    if (coinMilestone > lastCoinMilestone) {
                        lastCoinMilestone = coinMilestone;
                        // Pick a random platform near the player but slightly above
                        const coinPlats = platforms.filter(p => {
                            if (p.y <= player.y - BASE_H * 2.2 || p.y >= player.y - BASE_H * 1.2) return false;
                            if (p.isFinish) return false;
                            if (finishPlatRef && p.y <= finishPlatRef.y) return false; // level mode: no spawn at/above finish
                            if (p.y > floorY) return false; // never below start
                            if (p.spikes.length > 0) return false;
                            const coinX = p.x + p.w / 2;
                            // no power-up already sitting on this platform
                            if (powerups.some(pu => Math.abs(pu.x - coinX) < 32 && Math.abs(pu.y - (p.y - 22)) < 24)) return false;
                            // no existing coin on this platform
                            if (coins.some(c => Math.abs(c.x - coinX) < 32 && Math.abs(c.y - (p.y - 22)) < 24)) return false;
                            return true;
                        });
                        if (coinPlats.length > 0) {
                            const cp = coinPlats[rndInt(0, coinPlats.length - 1)];
                            const coinPlatform = cp.moving ? cp : null;
                            coins.push(new Coin(cp.x + cp.w / 2, cp.y - 22, coinPlatform));
                        }
                    }
                }

                // Update & collect power-ups
                for (const pu of powerups) pu.update();
                for (const ft of floatTexts) ft.update();
                floatTexts.splice(0, floatTexts.length, ...floatTexts.filter(ft => ft.life > 0));

                for (const pu of powerups) {
                    if (!pu.alive) continue;
                    if (rectsOverlap(pr, pu.rect())) {
                        pu.alive = false;
                        switch (pu.type.id) {
                            case 'speed': player.powerSpeed = pu.type.duration; break;
                            case 'highjump': player.powerHighJump = pu.type.duration; break;
                            case 'shield': player.powerShield = pu.type.duration; break;
                            case 'slow': player.powerSlow = pu.type.duration; break;
                        }
                        if (tutorialMode && POWERUP_TUTORIAL[pu.type.id]) {
                            tutorialMsg = POWERUP_TUTORIAL[pu.type.id];
                            tutorialFreezeScheduled = true; // freeze deferred to next frame
                        }
                        floatTexts.push(new FloatText(player.x + player.W / 2, player.y - 10, pu.type.label, pu.type.glow));
                        for (let i = 0; i < 16; i++) {
                            particles.push(new Particle(
                                pu.x + rnd(-8, 8), pu.y + Math.sin(pu.bob) * 4,
                                rnd(-3, 3), rnd(-3, 0.5),
                                rndInt(20, 40), pu.type.color, rndInt(2, 5)
                            ));
                        }
                    }
                }
                powerups.splice(0, powerups.length, ...powerups.filter(pu => pu.alive && Math.abs(pu.y - player.y) < BASE_H * 3));

                // Update & collect coins
                for (const c of coins) c.update();
                for (const c of coins) {
                    if (!c.alive) continue;
                    if (rectsOverlap(pr, c.rect())) {
                        c.alive = false;
                        addPoints(1);
                        runPointsEarned += 1;
                        floatTexts.push(new FloatText(player.x + player.W / 2, player.y - 10, '+1 $', '#ffdd00'));
                        for (let i = 0; i < 10; i++) {
                            particles.push(new Particle(
                                c.x + rnd(-6, 6), c.y,
                                rnd(-2.5, 2.5), rnd(-3, 0.5),
                                rndInt(20, 35), '#ffdd00', rndInt(2, 4)
                            ));
                        }
                    }
                }
                coins.splice(0, coins.length, ...coins.filter(c => c.alive && Math.abs(c.y - player.y) < BASE_H * 4));

                for (const g of ghosts) {
                    const gr = { x: g.rect().x + 6, y: g.rect().y + 6, w: g.rect().w - 12, h: g.rect().h - 12 };
                    if (rectsOverlap(pr, gr)) {
                        if (invincible) continue;
                        if (shielded) { player.powerShield = 0; player.iframes = 90; ghosts.splice(ghosts.indexOf(g), 1); floatTexts.push(new FloatText(player.x + player.W / 2, player.y - 10, 'SHIELD!', '#c8a0ff')); }
                        else { handleDeath(); break; }
                    }
                }
                if (finishPlatRef && player.onGround &&
                    Math.abs((player.y + player.H) - finishPlatRef.y) <= 2 &&
                    player.x + player.W > finishPlatRef.x + 4 &&
                    player.x < finishPlatRef.x + finishPlatRef.w - 4) {
                    const winBonus = tutorialMode ? 0 : (LEVEL_GOALS[currentLevel] / 5 | 0);
                    if (winBonus > 0) { runPointsEarned += winBonus; addPoints(winBonus); }
                    cornerAnimFromPts = pointsBeforeRun; cornerAnimToPts = lockerPoints; cornerAnimBonus = false; cornerAnimStart = Date.now();
                    state = STATE.WIN; hasActiveGame = false;
                    saveBest(LEVEL_GOALS[currentLevel]);
                    levelWins[currentLevel] = true; if (_playerStore) _playerStore.set('wins', levelWins);
                }
                const br = book.rect();
                if (currentMode === 'infinite' && rectsOverlap(pr, br) && player.vy >= 0 && player.y + player.H <= br.y + 14) {
                    const winBonus2 = tutorialMode ? 0 : (lastRunHigh / 10 | 0);
                    if (winBonus2 > 0) { runPointsEarned += winBonus2; addPoints(winBonus2); }
                    cornerAnimFromPts = pointsBeforeRun; cornerAnimToPts = lockerPoints; cornerAnimBonus = false; cornerAnimStart = Date.now();
                    state = STATE.WIN; hasActiveGame = false; saveBest(lastRunHigh);
                }

                // ── Tutorial checkpoints ──
                if (tutorialMode && !tutorialPaused && !tutorialComplete) {
                    if (tutorialStep < TUTO_STEPS.length && highestY < TUTO_STEPS[tutorialStep].triggerY) {
                        tutorialPaused = true;
                        tutorialMsg = TUTO_STEPS[tutorialStep].lines;
                        tutorialStep++;
                    }
                    // End platform detection — player lands and stays on special platform
                    for (const p of platforms) {
                        if (p.special && player.onGround && Math.abs(player.y - (p.y - player.H)) < 4) {
                            tutorialComplete = true;
                        }
                    }
                }

                // ── Floor: hard floor at starting platform — player can never fall below it ──
                if (player.y > floorY) {
                    player.y = floorY;
                    player.vy = 0;
                    player.onGround = true;
                    player.jump();
                }

                // ── Fall 30m below lowest visited platform → death ──
                if (!tutorialMode && player.y + player.H > cameraFloorY + 300) {
                    handleDeath();
                }

                // ── Trail particles ──
                emitTrail(player.x + player.W / 2, player.y + player.H / 2, player.vx, player.vy);
                for (let i = trailParticles.length - 1; i >= 0; i--) {
                    const p = trailParticles[i];
                    p.x += p.vx; p.y += p.vy; p.life--;
                    p.vx *= 0.93; p.vy *= 0.90;
                    if (p.life <= 0) trailParticles.splice(i, 1);
                }
        }

        function loop(ts) {
            requestAnimationFrame(loop);
            const dt = Math.min((ts - lastTime) / 1000, 0.1);
            lastTime = ts;

            // Show user tag only on main menu
            const _ut = document.getElementById('userTag');
            if (_ut) _ut.style.display = (state === STATE.MAIN && window.icyCurrentUser) ? 'flex' : 'none';

            // On first login (new account) — auto-start tutorial
            if (window.icyAutoTutorial) {
                window.icyAutoTutorial = false;
                initTutorial();
                state = STATE.PLAY;
            }

            // Update snowflakes for menu animations
            if (state === STATE.MAIN || state === STATE.MENU) {
                for (const s of snowflakes) s.update();
            }

            if (state === STATE.PLAY) {
                accumulator += dt;
                while (accumulator >= FIXED_STEP) {
                    gameUpdate();
                    accumulator -= FIXED_STEP;
                }
            } else {
                accumulator = 0;
            }

            // ─── DRAW ───────────────────────────────
            ctx.save();
            ctx.translate(shakeX, shakeY);

            if (state === STATE.MAIN) {
                // Main menu: draw animated background + snowflakes
                drawBackground(0);
                for (const s of snowflakes) s.draw();
            } else {
                drawBackground(camY);
                // for (const c of crystals) c.draw(camY);
                for (const p of platforms) p.draw(camY);
                // Draw crown above finish platform in level mode
                if (finishPlatRef) {
                    const fsy = finishPlatRef.y - camY;
                    if (fsy > -100 && fsy < BASE_H + 100) {
                        const fcx = finishPlatRef.x + finishPlatRef.w / 2;
                        const tt = Date.now() / 1000;
                        const bob = Math.sin(tt * 2) * 4;
                        drawCrown(ctx, fcx, fsy - 55 + bob, 70, 42, tt);
                    }
                }
                for (const r of rocks) r.draw(camY);
                for (const g of ghosts) g.draw(camY);
                book.draw(camY);
                for (const pu of powerups) pu.draw(camY);
                for (const c of coins) c.draw(camY);
                for (const p of particles) p.draw(camY);
                for (const ft of floatTexts) ft.draw(camY);
                if (state === STATE.PLAY) drawTrailParticles(camY);
                if (state === STATE.PLAY || state === STATE.DEAD) player.draw(camY);
                for (const s of snowflakes) s.draw();
                if (state === STATE.PLAY) drawHUD();
            }

            ctx.restore();

            if (state !== STATE.MAIN) drawTouchButtons();

            if (state === STATE.MAIN) drawMainMenu();
            else if (state === STATE.SELECT) drawSelect();
            else if (state === STATE.LOCKER) drawLocker();
            else if (state === STATE.SHOP) drawShop();
            else if (state === STATE.MENU) drawMenu();
            else if (state === STATE.DEAD) drawDead();
            else if (state === STATE.WIN) drawWin();
            if (tutorialComplete) drawTutorialWin();
            else if (tutorialPaused) drawTutorialPause();

            drawCornerPointsAnim();
        }

        function drawCornerPointsAnim() {
            if (cornerAnimStart < 0) return;
            const elapsed = (Date.now() - cornerAnimStart) / 1000;
            const ANIM_DUR = 3.0;
            if (elapsed >= ANIM_DUR) return;

            const DELAY = 1.0; // show start value for 1 second before counting
            const countElapsed = Math.max(0, elapsed - DELAY);
            const countDur = ANIM_DUR - DELAY;
            const eased = 1 - Math.pow(1 - Math.min(countElapsed / countDur, 1), 3);
            const earned = cornerAnimToPts - cornerAnimFromPts;
            const displayPts = Math.round(cornerAnimFromPts + earned * eased);
            const alpha = elapsed > 2.3 ? Math.max(0, 1 - (elapsed - 2.3) / 0.7) : 1;

            ctx.save();
            ctx.globalAlpha = alpha;

            const boxW = 210, boxH = 42;
            const boxX = BASE_W - boxW - 10;
            const boxY = cornerAnimIsRecord ? 36 : 12;

            // NEW RECORD label above the box
            if (cornerAnimIsRecord) {
                ctx.font = 'bold 13px monospace';
                ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 8;
                ctx.fillStyle = '#ffee44';
                ctx.fillText('★ NEW RECORD!', BASE_W - 10, 22);
                ctx.shadowBlur = 0;
            }

            ctx.fillStyle = cornerAnimBonus ? 'rgba(30,15,0,0.92)' : 'rgba(0,18,10,0.92)';
            ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 10); ctx.fill();
            ctx.strokeStyle = cornerAnimBonus ? 'rgba(255,200,0,0.85)' : 'rgba(60,255,160,0.7)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 10); ctx.stroke();

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = 'bold 15px monospace';
            ctx.fillStyle = cornerAnimBonus ? '#ffcc44' : '#55ffcc';
            const bonusTxt = cornerAnimBonus ? ' ×1.5!' : '';
            ctx.fillText(`⬡ ${displayPts}  (+${earned}${bonusTxt})`, boxX + boxW/2, boxY + boxH/2);
            ctx.restore();
        }

        // ─────────────────────────────────────────────
        //  START
        // ─────────────────────────────────────────────
        // Boot sequence: load player data for any existing session before
        // starting the game loop. For Firebase, this await is real async I/O.
        (async function startGame() {
            const user = await UserSystem.getCurrentUser();
            if (user) {
                await window.initPlayerData(user.userId);
            }
            initWorld();
            hasActiveGame = false;
            requestAnimationFrame(loop);
        })();
    </script>
</body>
