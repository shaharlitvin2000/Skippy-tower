            // Rainbow separator
            const sepG = ctx.createLinearGradient(cx - 140, 0, cx + 140, 0);
            sepG.addColorStop(0, 'transparent'); sepG.addColorStop(0.3, '#ffd700');
            sepG.addColorStop(0.7, '#ff88cc'); sepG.addColorStop(1, 'transparent');
            ctx.strokeStyle = sepG; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.5;
            ctx.beginPath(); ctx.moveTo(cx - 140, 152); ctx.lineTo(cx + 140, 152); ctx.stroke();

                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.roundRect(cx - 158, y - 20, 316, rowH - 4, 8); ctx.fill();
                ctx.beginPath(); ctx.roundRect(cx - 158, y - 20, 316, rowH - 4, 8); ctx.stroke();
                ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.font = 'bold 12px Orbitron, monospace';
                if (s.finishedAt) {
                    finishRank++;
                    const medal = finishRank === 1 ? '🥇' : finishRank === 2 ? '🥈' : finishRank === 3 ? '🥉' : finishRank + '.';
                    ctx.fillStyle = finishRank === 1 ? '#ffd700' : isMe ? '#aaddff' : '#cccccc';
                    ctx.fillText(medal + ' ' + s.name, cx - 148, y - 3);

            ctx.lineWidth = canReturn ? 2 : 1;
            ctx.beginPath(); ctx.roundRect(lobbyBtnX, btnY, lobbyBtnW, lobbyBtnH, 14); ctx.stroke();
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = 'bold 15px Orbitron, monospace';
            ctx.fillStyle = canReturn ? '#ffffff' : '#555555';
            ctx.fillText(canReturn ? '🏠  RETURN TO LOBBY' : '⏳  WAITING FOR HOST…', cx, btnY + 27);

        // Height progress bar — merged into drawHUD unified bar; kept as no-op
        function _drawMpHeightBar() {
            return;
            const barX = BASE_W - 10;
            const barTop = 80, barBot = BASE_H - 80;
            const barH = barBot - barTop;
            const maxH = Math.max(50, Math.floor((BASE_H - 120 - TOWER_TOP) / 10));
            ctx.save();

            // Bar track
            ctx.fillStyle = 'rgba(255,255,255,0.06)';
            ctx.beginPath(); ctx.roundRect(barX - 1, barTop, 3, barH, 2); ctx.fill();

            // Goal tick at top
            ctx.strokeStyle = 'rgba(255,215,0,0.4)'; ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath(); ctx.moveTo(barX - 7, barTop); ctx.lineTo(barX + 7, barTop); ctx.stroke();
            ctx.setLineDash([]);

            // Build player list
            const localCurH = player ? Math.max(0, Math.floor((BASE_H - 120 - player.y) / 10)) : lastRunHigh;
            const all = [{
                curH: localCurH,
                high: lastRunHigh,
                isMe: true,
                skinIdx: equippedSkin || 0,
                finished: !!(mpMyUid && mpFinishTimes[mpMyUid])
            }];
            for (const [uid, pos] of Object.entries(remotePositions)) {
                const remCurH = Math.max(0, Math.floor((BASE_H - 120 - (pos.y || 0)) / 10));
                const slot = mpSlots[uid];
                all.push({
                    curH:  remCurH,
                    high:  pos.maxHeight  || 0,
                    isMe:  false,
                    skinIdx: slot ? slot.skinIdx : _mpUidToSkin(uid),
                    finished: !!(mpFinishTimes[uid] || pos.finishedAt)
                });
            }

            for (const p of all) {
                const highFrac = Math.min(1, p.high / maxH);
                const curFrac  = Math.min(1, p.curH  / maxH);

                const highY = Math.round(barBot - highFrac * barH);
                const curY  = Math.min(barBot, Math.round(barBot - curFrac  * barH));

                const myColor  = '#ffe566';
                const remColor = 'rgba(160,200,255,0.65)';

                ctx.save();

                // ── Session high — small dot on the bar track ──
                ctx.strokeStyle = p.isMe ? myColor : remColor;
                ctx.lineWidth   = p.isMe ? 2 : 1.2;
                ctx.beginPath(); ctx.arc(barX, highY, p.isMe ? 4 : 3, 0, Math.PI * 2); ctx.stroke();

                // ── Current position — skin avatar to the left of the bar ──
                const skin = SKINS[p.skinIdx] || SKINS[0];
                const iconScale = 0.38;
                ctx.globalAlpha = p.isMe ? 1 : 0.82;
                skin.draw(barX - 20, curY, iconScale);

                // ── Finished crown at top ──
                if (p.finished) {
                    ctx.globalAlpha = 1;
                    ctx.textAlign = 'center'; ctx.font = '10px serif';
                    ctx.fillText('👑', barX, barTop - 2);
                }

                ctx.restore();
            }
            ctx.restore();
        }

        // ─── ONLINE DRAW FUNCTIONS ──────────────────────────────────────
        function drawOnline() {
            if (onlineScreen === 'loading')     _drawOnlineLoading();
            else if (onlineScreen === 'hostOptions') _drawOnlineHostOptions();
            else if (onlineScreen === 'lobby')  _drawOnlineLobby();
            else if (onlineScreen === 'joinCode') _drawOnlineJoinCode();
            else if (onlineScreen === 'quickMatch') _drawOnlineQuickMatch();
            else _drawOnlineMain();
        }

        function _drawOnlineLoading() {
            const t = Date.now() / 1000;
            const cx = BASE_W / 2;

            // Purple gradient background
            const bgG = ctx.createLinearGradient(0, 0, 0, BASE_H);
            bgG.addColorStop(0, '#0e0028'); bgG.addColorStop(0.5, '#1a0040'); bgG.addColorStop(1, '#0a001a');
            ctx.fillStyle = bgG; ctx.fillRect(0, 0, BASE_W, BASE_H);

            // Floating ambient orbs
            ctx.save();
            const orbColors = ['#ff44aa','#aa44ff','#44aaff','#44ffaa','#ffaa44'];
            for (let i = 0; i < 5; i++) {
                const ox = cx + Math.cos(t * 0.4 + i * 1.26) * 120;
                const oy = BASE_H / 2 + Math.sin(t * 0.3 + i * 0.9) * 140;
                const orG = ctx.createRadialGradient(ox, oy, 0, ox, oy, 55);
                orG.addColorStop(0, orbColors[i] + '30'); orG.addColorStop(1, 'transparent');
                ctx.fillStyle = orG; ctx.beginPath(); ctx.arc(ox, oy, 55, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();

            // Rainbow spinner ring
            const ringR = 54, ringX = cx, ringY = BASE_H / 2 - 60;
            const spin = t * 2.2;
            ctx.save();
            for (let i = 0; i < 10; i++) {
                const a = spin + i * Math.PI * 2 / 10;
                const hue = (i * 36 + t * 60) % 360;
                const alpha = 0.2 + 0.7 * (i / 10);
                ctx.beginPath();
                ctx.arc(ringX + Math.cos(a) * ringR, ringY + Math.sin(a) * ringR, 7 - i * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue},100%,65%,${alpha.toFixed(2)})`;
                ctx.fill();
            }
            ctx.restore();

            // Inner glow circle
            ctx.save();
            ctx.shadowColor = `hsl(${(t * 80) % 360},100%,65%)`; ctx.shadowBlur = 28;
            ctx.strokeStyle = `hsla(${(t * 80) % 360},100%,70%,0.4)`; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(ringX, ringY, ringR - 12, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();

            // Tower icon inside ring
            ctx.save();
            ctx.font = '32px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('🏗', ringX, ringY);
            ctx.restore();

            // Game title label
            ctx.save();
            const titleLG = ctx.createLinearGradient(cx - 80, 0, cx + 80, 0);
            titleLG.addColorStop(0, '#ff44aa'); titleLG.addColorStop(0.5, '#cc44ff'); titleLG.addColorStop(1, '#44aaff');
            ctx.font = 'bold 13px Orbitron, monospace'; ctx.fillStyle = titleLG;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('SKIPPY TOWER', cx, BASE_H / 2 - 14);
            ctx.restore();

            // message
            const isConnecting = loadingMsg.startsWith('Connecting');
            const ready = loadingMsg.startsWith('Room ready') || loadingMsg.startsWith('Entering') || loadingMsg.startsWith('Game starting');
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

            if (isConnecting) {
                const parts = loadingMsg.replace('Connecting', '').replace(/\s/g,'').split('/');
                const connected = parseInt(parts[0]) || 1;
                const total = parseInt(parts[1]) || 1;
                const allReady = connected >= total;

                ctx.font = 'bold 12px Orbitron, monospace';
                ctx.fillStyle = 'rgba(180,140,255,0.85)';
                ctx.fillText('WAITING FOR PLAYERS', cx, BASE_H / 2 + 16);

                // Player dot indicators with rainbow colors
                const dotR = 11, dotGap = 30, dotsW = total * dotGap - (dotGap - dotR * 2);
                const dotStartX = cx - dotsW / 2 + dotR;
                for (let i = 0; i < total; i++) {
                    const px = dotStartX + i * dotGap, py = BASE_H / 2 + 48;
                    const isMe = i === 0;
                    const isConn = i < connected;
                    const dHue = isMe ? 150 : (220 + i * 30);
                    ctx.save();
                    ctx.shadowColor = isConn ? `hsl(${dHue},100%,65%)` : 'transparent';
                    ctx.shadowBlur = isConn ? 12 : 0;
                    ctx.beginPath(); ctx.arc(px, py, dotR, 0, Math.PI * 2);
                    ctx.fillStyle = isConn ? `hsl(${dHue},90%,55%)` : 'rgba(40,20,70,0.7)';
                    ctx.fill();
                    ctx.strokeStyle = isConn ? `hsl(${dHue},100%,72%)` : 'rgba(80,50,120,0.5)';
                    ctx.lineWidth = 1.8; ctx.stroke();
                    ctx.restore();
                    ctx.font = '9px sans-serif'; ctx.fillStyle = isConn ? '#fff' : 'rgba(120,80,180,0.5)';
                    ctx.fillText(isMe ? '★' : '●', px, py + 1);
                }
                ctx.font = 'bold 16px Orbitron, monospace';
                ctx.fillStyle = allReady ? '#44ff88' : `hsl(${(t * 60) % 360},90%,70%)`;
                ctx.fillText(connected + ' / ' + total + ' connected', cx, BASE_H / 2 + 78);
                if (allReady) {
                    ctx.font = '12px Orbitron, monospace'; ctx.fillStyle = '#44ff88';
                    ctx.fillText('Starting\u2026', cx, BASE_H / 2 + 100);
                }
            } else {
                const dots = ready ? '' : '.'.repeat(Math.floor(t * 2.5) % 4);
                ctx.font = 'bold 16px Orbitron, monospace';
                ctx.fillStyle = ready ? '#44ff88' : `hsl(${(t * 50) % 360},90%,70%)`;
                ctx.fillText((loadingMsg || 'Loading') + dots, cx, BASE_H / 2 + 20);
                if (ready) {
                    ctx.font = '12px Orbitron, monospace'; ctx.fillStyle = 'rgba(100,220,150,0.75)';
                    ctx.fillText('Please wait\u2026', cx, BASE_H / 2 + 46);
                }
            }

            // Countdown overlay once gameStartAt is set
            if (mpGameStartAt > 0) {
                const msLeft = mpGameStartAt - Date.now();
                const rem = Math.max(0, Math.ceil(msLeft / 1000));
                const pulse2 = 0.7 + Math.sin(t * 6) * 0.3;
                ctx.fillStyle = 'rgba(4,10,32,0.72)';
                ctx.fillRect(0, BASE_H / 2 + 110, BASE_W, 100);
                ctx.save();
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = rem <= 1 ? '#44ff88' : `hsl(${(t * 80) % 360},100%,65%)`;
                ctx.shadowBlur = 36 * pulse2;
                ctx.font = 'bold 80px Orbitron, monospace';
                ctx.fillStyle = rem <= 1 ? '#44ff88' : `hsl(${(t * 80) % 360},100%,72%)`;
                ctx.fillText(rem > 0 ? rem : 'GO!', cx, BASE_H / 2 + 160);
                ctx.restore();
            }
        }

            // Start button / countdown / waiting

                ctx.font = 'bold 15px Orbitron, monospace'; ctx.fillStyle = '#dd99ff';

                ctx.fillText(confirmMsg, cx, pY + 44);

        function _jcLayout() {
            // Row 2 has 10 keys (Q…P with I and O as disabled placeholders)
            const kW = 43, kH = 44, kGap = 3;
            const kGridW = 10 * kW + 9 * kGap; // 457 — widest row
            const cx = BASE_W / 2;
            const kX = cx - kGridW / 2;
            const startY = Math.round((BASE_H - 389) / 2);
            const boxY  = startY + 26;
            const kY    = boxY + 58 + 26;
            const botY  = kY + 4 * (kH + kGap) - kGap;
            const backY = botY + kH + 12;
            const delW  = 82, joinW = kGridW - delW - kGap;
            return { kW, kH, kGap, kGridW, kX, startY, boxY, kY, botY, backY, delW, joinW, cx };
        }

        function _drawOnlineJoinCode() {
            const t = Date.now() / 1000;
            const { kW, kH, kGap, kGridW, kX, startY, boxY, kY, botY, backY, delW, joinW, cx } = _jcLayout();

            // Purple gradient background
            const bgG = ctx.createLinearGradient(0, 0, 0, BASE_H);
            bgG.addColorStop(0, '#0e0028'); bgG.addColorStop(0.5, '#1a0040'); bgG.addColorStop(1, '#0a001a');
            ctx.fillStyle = bgG; ctx.fillRect(0, 0, BASE_W, BASE_H);

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

            // Title with rainbow gradient
            ctx.save();
            const ttG2 = ctx.createLinearGradient(cx - 110, 0, cx + 110, 0);
            ttG2.addColorStop(0, '#ff44aa'); ttG2.addColorStop(0.5, '#cc44ff'); ttG2.addColorStop(1, '#44aaff');
            ctx.shadowColor = '#9944ff'; ctx.shadowBlur = 18;
            ctx.font = 'bold 22px Orbitron, monospace'; ctx.fillStyle = ttG2;
            ctx.fillText('JOIN WITH CODE', cx, startY + 10);
            ctx.restore();

            // 6 character boxes
            const boxW = 52, boxGap = 6;
            const totalBoxW = 6 * boxW + 5 * boxGap, boxStartX = cx - totalBoxW / 2;
            for (let i = 0; i < 6; i++) {
                const bx = boxStartX + i * (boxW + boxGap), ch = codeInputText[i] || '';
                const isActive = i === codeInputText.length && codeInputText.length < 6;
                const boxHue = (i * 50 + t * 30) % 360;
                ctx.fillStyle = 'rgba(12,5,35,0.95)';
                ctx.beginPath(); ctx.roundRect(bx, boxY, boxW, 58, 10); ctx.fill();
                ctx.save();
                if (isActive) {
                    ctx.shadowColor = `hsl(${boxHue},100%,65%)`; ctx.shadowBlur = 10;
                    ctx.strokeStyle = `hsla(${boxHue},100%,65%,${0.5 + 0.5 * Math.sin(t * 4)})`;
                } else {
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = ch ? `hsl(${i*50},80%,65%)` : 'rgba(80,50,130,0.35)';
                }
                ctx.lineWidth = isActive ? 2.5 : 1.5;
                ctx.beginPath(); ctx.roundRect(bx, boxY, boxW, 58, 10); ctx.stroke();
                ctx.restore();
                if (ch) { ctx.font = 'bold 26px Orbitron, monospace'; ctx.fillStyle = '#ffffff'; ctx.fillText(ch, bx + boxW/2, boxY + 31); }
                else if (isActive) { ctx.font = 'bold 22px monospace'; ctx.fillStyle = `hsla(${boxHue},100%,65%,0.7)`; ctx.fillText('_', bx + boxW/2, boxY + 31); }
            }

            // progress hint / error
            if (!joinCodeError && codeInputText.length < 6) {
                ctx.font = '11px Orbitron, monospace';
                ctx.fillStyle = 'rgba(160,120,220,0.6)';
                ctx.fillText('Type the 6-letter room code', cx, boxY + 58 + 14);
            }
            if (joinCodeError) {
                ctx.font = 'bold 12px Orbitron, monospace';
                ctx.fillStyle = joinCodeError.startsWith('Joining') ? '#88ccff' : '#ff6655';
                ctx.shadowColor = joinCodeError.startsWith('Joining') ? 'transparent' : 'rgba(255,0,0,0.4)';
                ctx.shadowBlur = 6;
                ctx.fillText(joinCodeError, cx, boxY + 58 + 14);
                ctx.shadowBlur = 0;
            }

            // QWERTY keyboard — I and O are disabled (not in room-code charset, to avoid 1/0 confusion)
            const KB = [
                ['1','2','3','4','5','6','7','8','9'],      // 9 keys
                ['Q','W','E','R','T','Y','U','I','O','P'],  // 10 keys — I and O disabled
                ['A','S','D','F','G','H','J','K','L'],       // 9 keys
                ['Z','X','C','V','B','N','M'],                // 7 keys
            ];
            const KB_DISABLED = new Set(['I','O']);
            for (let r = 0; r < KB.length; r++) {
                const row = KB[r];
                const rowW = row.length * kW + (row.length - 1) * kGap;
                const rowStartX = cx - rowW / 2;
                for (let c = 0; c < row.length; c++) {
                    const key = row[c];
                    const kbx = rowStartX + c * (kW + kGap), kby = kY + r * (kH + kGap);
                    const isNum = r === 0;
                    const isDis = KB_DISABLED.has(key);
                    const kHue = (c * 20 + r * 60) % 360;
                    ctx.fillStyle = isDis ? 'rgba(8,4,18,0.55)' : (isNum ? 'rgba(15,5,40,0.92)' : 'rgba(12,5,32,0.92)');
                    ctx.beginPath(); ctx.roundRect(kbx, kby, kW, kH, 7); ctx.fill();
                    ctx.strokeStyle = isDis ? 'rgba(50,30,80,0.25)' : (isNum ? `hsla(${kHue},80%,60%,0.5)` : `hsla(${kHue},60%,55%,0.38)`);
                    ctx.lineWidth = 1.2;
                    ctx.beginPath(); ctx.roundRect(kbx, kby, kW, kH, 7); ctx.stroke();
                    ctx.font = 'bold 15px Orbitron, monospace';
                    ctx.fillStyle = isDis ? 'rgba(80,60,110,0.35)' : (isNum ? '#ddccff' : '#bbaaff');
                    ctx.fillText(key, kbx + kW / 2, kby + kH / 2 + 1);
                }
            }

            // ⌫ key
            ctx.fillStyle = 'rgba(30,8,8,0.92)';
            ctx.beginPath(); ctx.roundRect(kX, botY, delW, kH, 8); ctx.fill();
            ctx.strokeStyle = 'rgba(255,80,80,0.5)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(kX, botY, delW, kH, 8); ctx.stroke();
            ctx.font = 'bold 18px monospace'; ctx.fillStyle = '#ff9999';
            ctx.fillText('⌫', kX + delW/2, botY + kH/2);

            // JOIN key
            const canJoin = codeInputText.length === 6;
            const jbX = kX + delW + kGap;
            ctx.save();
            if (canJoin) { ctx.shadowColor = '#44ff88'; ctx.shadowBlur = 12; }
            ctx.fillStyle = canJoin ? 'rgba(0,40,18,0.95)' : 'rgba(12,5,28,0.7)';
            ctx.beginPath(); ctx.roundRect(jbX, botY, joinW, kH, 8); ctx.fill();
            ctx.strokeStyle = canJoin ? 'rgba(68,255,136,0.85)' : 'rgba(60,40,100,0.35)';
            ctx.lineWidth = canJoin ? 2 : 1;
            ctx.beginPath(); ctx.roundRect(jbX, botY, joinW, kH, 8); ctx.stroke();
            ctx.font = 'bold 15px Orbitron, monospace'; ctx.fillStyle = canJoin ? '#44ff88' : 'rgba(80,60,120,0.5)';
            ctx.fillText('JOIN ▶', jbX + joinW/2, botY + kH/2);
            ctx.restore();

            // BACK
            ctx.fillStyle = 'rgba(15,5,35,0.85)';
            ctx.beginPath(); ctx.roundRect(cx - 80, backY, 160, 38, 10); ctx.fill();
            ctx.strokeStyle = 'rgba(160,100,255,0.4)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(cx - 80, backY, 160, 38, 10); ctx.stroke();
            ctx.font = 'bold 14px Orbitron, monospace'; ctx.fillStyle = 'rgba(180,140,255,0.8)';
            ctx.fillText('← BACK', cx, backY + 19);
            ctx.textBaseline = 'alphabetic';
        }

            ctx.font = 'bold 18px Orbitron, monospace'; ctx.fillStyle = ttG;
            ctx.fillText('⚙  SETTINGS', cx, panY + 28);

            // Divider
            const dg = ctx.createLinearGradient(panX + 18, 0, panX + panW - 18, 0);
            dg.addColorStop(0, 'transparent'); dg.addColorStop(0.5, 'rgba(200,100,255,0.3)'); dg.addColorStop(1, 'transparent');
            ctx.strokeStyle = dg; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(panX + 18, panY + 50); ctx.lineTo(panX + panW - 18, panY + 50); ctx.stroke();

            // Slider helper
            const sliderX = panX + 22, sliderW = panW - 44, sliderH = 10, thumbR = 9;
            function drawSlider(label, val, yCenter, color) {
                ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.font = '13px Orbitron, monospace'; ctx.fillStyle = 'rgba(200,170,240,0.85)';
                ctx.fillText(label, sliderX, yCenter - 18);
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.beginPath(); ctx.roundRect(sliderX, yCenter - sliderH/2, sliderW, sliderH, 5); ctx.fill();
                const fillW = val * sliderW;
                const fg = ctx.createLinearGradient(sliderX, 0, sliderX + sliderW, 0);
                fg.addColorStop(0, color + 'aa'); fg.addColorStop(1, color);
                ctx.save();
                ctx.beginPath(); ctx.roundRect(sliderX, yCenter - sliderH/2, sliderW, sliderH, 5); ctx.clip();
                ctx.fillStyle = fg;
                ctx.fillRect(sliderX, yCenter - sliderH/2, fillW, sliderH);
                ctx.restore();
                ctx.save(); ctx.shadowColor = color; ctx.shadowBlur = 10;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(sliderX + fillW, yCenter, thumbR, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                ctx.textAlign = 'right'; ctx.font = '12px Orbitron, monospace'; ctx.fillStyle = 'rgba(160,130,200,0.65)';
                ctx.fillText(Math.round(val * 100) + '%', panX + panW - 18, yCenter - 18);

            drawSlider('🎵  MUSIC', MUSIC.getVol(), panY + 96, '#cc44ff');

            ctx.beginPath(); ctx.roundRect(closeX, closeY, closeS, closeS, 6); ctx.stroke();

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('✕', closeX + closeS/2, closeY + closeS/2);
            ctx.restore();

            ctx.textBaseline = 'alphabetic';

        function drawMainMenu() {
            const t = Date.now() / 1000;
            const cx = BASE_W / 2;

            // ── BACKGROUND — vibrant deep purple ──
            const grad = ctx.createLinearGradient(0, 0, 0, BASE_H);
            grad.addColorStop(0,   '#1a0040');
            grad.addColorStop(0.4, '#25006a');
            grad.addColorStop(0.7, '#1a0050');
            grad.addColorStop(1,   '#0e0028');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, BASE_W, BASE_H);

            // Floating colorful orbs (Sling Kong vibes)
            const orbCols = ['#ff4499','#ff8800','#00ccff','#88ff44','#cc44ff','#ffcc00','#44ffcc','#ff6644'];
            for (let i = 0; i < 8; i++) {
                const ox = (Math.sin(i * 2.317) * 0.42 + 0.5) * BASE_W;
                const oy = (Math.cos(i * 1.733) * 0.42 + 0.5) * BASE_H + Math.sin(t * 0.35 + i) * 22;
                const or = 38 + 18 * Math.abs(Math.sin(i * 1.1));
                const [or2,og2,ob2] = hexToRgb(orbCols[i]);
                const orbG = ctx.createRadialGradient(ox, oy, 0, ox, oy, or);
                orbG.addColorStop(0, `rgba(${or2},${og2},${ob2},0.13)`);
                orbG.addColorStop(1, `rgba(${or2},${og2},${ob2},0)`);
                ctx.fillStyle = orbG;
                ctx.beginPath(); ctx.arc(ox, oy, or, 0, Math.PI * 2); ctx.fill();
            }

            // Stars (repurposed as white sparks on purple bg)
            ctx.save();
            for (const s of window._menuStars) {
                const twinkle = 0.25 + 0.75 * Math.abs(Math.sin(t * s.speed * 5 + s.phase));
                ctx.globalAlpha = twinkle * 0.7;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
                if (s.r > 1.4 && twinkle > 0.78) {
                    ctx.globalAlpha = twinkle * 0.45;
                    ctx.strokeStyle = '#ffaaff'; ctx.lineWidth = 0.7;
                    ctx.beginPath();
                    ctx.moveTo(s.x - s.r * 2.8, s.y); ctx.lineTo(s.x + s.r * 2.8, s.y);
                    ctx.moveTo(s.x, s.y - s.r * 2.8); ctx.lineTo(s.x, s.y + s.r * 2.8);
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1; ctx.restore();

            // ── TITLE ──
            const pulse = 0.72 + Math.sin(t * 2.2) * 0.28;
            const titleBob = Math.sin(t * 1.8) * 2.5;

            // Outer mega glow
            const titleGlowG = ctx.createRadialGradient(cx, 68, 0, cx, 68, 200);
            titleGlowG.addColorStop(0, `rgba(200,80,255,${0.28 * pulse})`);
            titleGlowG.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = titleGlowG; ctx.fillRect(0, 0, BASE_W, BASE_H);

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

            // Black outline pass (3px offset all dirs)
            ctx.font = '900 50px Orbitron, monospace';
            ctx.fillStyle = 'rgba(0,0,0,0.9)';
            for (const [dx,dy] of [[-3,3],[3,3],[0,4],[-3,-2],[3,-2]]) {
                ctx.fillText('SKIPPY TOWER', cx + dx, 68 + dy + titleBob);
            }

            // Rainbow gradient title
            const rg = ctx.createLinearGradient(cx - 200, 0, cx + 200, 0);
            rg.addColorStop(0,    '#ff44aa');
            rg.addColorStop(0.2,  '#ff9900');
            rg.addColorStop(0.45, '#ffee00');
            rg.addColorStop(0.7,  '#44ddff');
            rg.addColorStop(1,    '#cc44ff');
            ctx.fillStyle = rg;
            ctx.font = '900 50px Orbitron, monospace';
            ctx.fillText('SKIPPY TOWER', cx, 68 + titleBob);

            // Sparkles along title
            ctx.save();
            for (let i = 0; i < 6; i++) {
                const spx = (cx - 170) + i * 68 + Math.sin(t * 1.2 + i) * 6;
                const spy = 28 + Math.sin(t * 2.1 + i * 1.4) * 7 + titleBob;
                const sa = Math.abs(Math.sin(t * 2.8 + i * 1.1));
                ctx.globalAlpha = sa * 0.95;
                const sparkColor = ['#ffee44','#ff88cc','#44ffcc','#ffaa44','#cc88ff','#88ffaa'][i];
                ctx.fillStyle = sparkColor;
                ctx.beginPath(); ctx.arc(spx, spy, 1.8 + sa * 2.2, 0, Math.PI * 2); ctx.fill();
                if (sa > 0.65) {
                    ctx.strokeStyle = sparkColor; ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(spx - 6, spy); ctx.lineTo(spx + 6, spy);
                    ctx.moveTo(spx, spy - 6); ctx.lineTo(spx, spy + 6);
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1; ctx.restore();

            // Subtitle
            ctx.font = 'bold 12px monospace';
            ctx.fillStyle = 'rgba(220,180,255,0.8)';
            ctx.fillText('Reach the Magic Book at the top!', cx, 100);

            // Rainbow separator
            ctx.save();
            const sepG = ctx.createLinearGradient(WALL_W + 20, 0, BASE_W - WALL_W - 20, 0);
            sepG.addColorStop(0, 'rgba(255,68,170,0)');
            sepG.addColorStop(0.2, 'rgba(255,153,0,0.5)');
            sepG.addColorStop(0.5, 'rgba(68,221,255,0.5)');
            sepG.addColorStop(0.8, 'rgba(204,68,255,0.5)');
            sepG.addColorStop(1, 'rgba(255,68,170,0)');
            ctx.strokeStyle = sepG; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(WALL_W + 20, 116); ctx.lineTo(BASE_W - WALL_W - 20, 116); ctx.stroke();
            ctx.restore();

            // ── CHARACTER PREVIEW CARD ──
            const prevCy = 285;
            const eqSkin = SKINS[equippedSkin] || SKINS[0];
            const eqTrail = TRAILS[equippedTrail];
            const charBob = Math.sin(t * 1.8) * 4;

            // Hero card background
            const cardX = cx - 160, cardY = 125, cardW = 320, cardH = 300;
            const cardBg = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
            cardBg.addColorStop(0, 'rgba(60,0,100,0.45)');
            cardBg.addColorStop(1, 'rgba(30,0,60,0.45)');
            ctx.fillStyle = cardBg;
            ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 22); ctx.fill();
            // Card border — animated rainbow
            const ang = t * 0.8;
            const cBorderG = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY + cardH);
            cBorderG.addColorStop(0, `hsl(${(ang*60)%360},100%,70%)`);
            cBorderG.addColorStop(0.33, `hsl(${(ang*60+120)%360},100%,70%)`);
            cBorderG.addColorStop(0.66, `hsl(${(ang*60+240)%360},100%,70%)`);
            cBorderG.addColorStop(1, `hsl(${(ang*60)%360},100%,70%)`);
            ctx.strokeStyle = cBorderG; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 22); ctx.stroke();
            // Shine strip inside card
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.beginPath(); ctx.roundRect(cardX + 6, cardY + 6, cardW - 12, cardH / 2 - 6, [16,16,0,0]); ctx.fill();

            // Large multi-color glow behind character
            const hueShift = (t * 40) % 360;
            const heroG = ctx.createRadialGradient(cx, prevCy, 0, cx, prevCy, 120);
            heroG.addColorStop(0, `hsla(${hueShift},100%,65%,0.25)`);
            heroG.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = heroG; ctx.fillRect(0, 0, BASE_W, BASE_H);

            // Platform
            const platW = 150, platH = 13, platX = cx - platW / 2, platY = prevCy + 54;
            ctx.save();
            ctx.shadowColor = `hsl(${hueShift},100%,65%)`; ctx.shadowBlur = 18;
            const platG = ctx.createLinearGradient(platX, platY, platX, platY + platH);
            platG.addColorStop(0, `hsl(${hueShift},90%,70%)`);
            platG.addColorStop(1, `hsl(${hueShift},70%,40%)`);
            ctx.fillStyle = platG;
            ctx.beginPath(); ctx.roundRect(platX, platY, platW, platH, 7); ctx.fill();
            ctx.restore();
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.fillRect(platX + 8, platY + 2, platW - 16, 3);

            // Shadow ellipse
            ctx.save(); ctx.globalAlpha = 0.3 + 0.1 * Math.sin(t * 1.8);
            const sEll = ctx.createRadialGradient(cx, platY - 2, 0, cx, platY - 2, 60);
            sEll.addColorStop(0, 'rgba(0,0,0,0.6)'); sEll.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = sEll;
            ctx.beginPath(); ctx.ellipse(cx, platY - 2, 60, 10, 0, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            // Trail preview
            if (eqTrail && eqTrail.unlocked) {
                for (let j = 0; j < 14; j++) {
                    const age = ((t * 2 + j * 0.1) % 1);
                    const tpx = cx - 16 - age * 75;
                    const tpy = prevCy - 2 + Math.sin(age * 5 + j) * 6 + charBob;
                    eqTrail.draw({ x: tpx, y: tpy, r: 2 + (1 - age) * 3.5,
                        hue: hueShift + j * 16, life: (1 - age) * 20, maxLife: 20,
                        wobble: j * 0.8, segs: [[1,2],[-1,2],[1,-1],[0,2]] }, (1 - age) * 0.85);
                }
            }

            // Character — BIG with bob
            ctx.save();
            ctx.translate(cx, prevCy - 2 + charBob);
            ctx.scale(2.4, 2.4);
            eqSkin.draw(0, 0, 1);
            ctx.restore();

            // Skin badge
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const badgeW = 140, badgeH = 26, badgeX = cx - badgeW / 2, badgeY = prevCy + 70;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 13); ctx.fill();
            ctx.strokeStyle = `hsl(${hueShift},100%,70%)`; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 13); ctx.stroke();
            ctx.font = 'bold 13px monospace';
            ctx.fillStyle = `hsl(${hueShift},100%,85%)`;
            ctx.fillText(eqSkin.name, cx, badgeY + badgeH / 2 + 1);

            // Trail name
            if (eqTrail) {
                const trY = badgeY + badgeH + 16;
                ctx.font = 'bold 11px monospace';
                const tWidth = ctx.measureText(eqTrail.name).width;
                const totalW = 10 + 6 + tWidth;

                ctx.fillStyle = eqTrail.color;
                ctx.shadowColor = eqTrail.color; ctx.shadowBlur = 10;
                ctx.fill(); ctx.shadowBlur = 0;
                ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.fillStyle = eqTrail.unlocked ? 'rgba(220,180,255,0.9)' : 'rgba(130,100,160,0.5)';

            // ── BUTTONS ──

            ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 28 * btnGlow;
            const playBg = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
            playBg.addColorStop(0, '#1a7a3a');
            playBg.addColorStop(0.45, '#0f5228');
            playBg.addColorStop(1, '#08280f');
            ctx.fillStyle = playBg;
            ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 20); ctx.fill();
            ctx.strokeStyle = `rgba(50,255,130,${0.7 + btnGlow * 0.3})`; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 20); ctx.stroke();
            ctx.restore();
            ctx.fillStyle = 'rgba(255,255,255,0.10)';
            ctx.beginPath(); ctx.roundRect(btnX + 8, btnY + 6, btnW - 16, btnH / 2 - 4, [14,14,0,0]); ctx.fill();
            ctx.font = '700 30px Orbitron, monospace';
            ctx.fillStyle = '#88ffbb';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 16;
            ctx.fillText('▶  PLAY', cx, btnY + btnH / 2);
            ctx.shadowBlur = 0;

            // 🌐 PLAY ONLINE
            const onlineY = btnY + btnH + 8, onlineH = 52;
            const onlineBg = ctx.createLinearGradient(btnX, onlineY, btnX, onlineY + onlineH);
            onlineBg.addColorStop(0, '#280055'); onlineBg.addColorStop(1, '#160030');
            ctx.fillStyle = onlineBg;
            ctx.beginPath(); ctx.roundRect(btnX, onlineY, btnW, onlineH, 16); ctx.fill();
            ctx.save();
            ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 12;
            ctx.strokeStyle = 'rgba(200,80,255,0.9)'; ctx.lineWidth = 2.2;
            ctx.beginPath(); ctx.roundRect(btnX, onlineY, btnW, onlineH, 16); ctx.stroke();
            ctx.restore();
            ctx.fillStyle = 'rgba(255,255,255,0.06)';
            ctx.beginPath(); ctx.roundRect(btnX + 5, onlineY + 5, btnW - 10, onlineH / 2 - 5, [11,11,0,0]); ctx.fill();
            ctx.font = 'bold 20px monospace'; ctx.fillStyle = '#ee88ff';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 10;

            // LOCKER + SHOP — side buttons

            const leftX = cx - sideW - sideGap / 2, rightX = cx + sideGap / 2;

            ctx.fillStyle = 'rgba(40,0,70,0.9)';
            ctx.beginPath(); ctx.roundRect(leftX, sideY, sideW, sideH, 15); ctx.fill();

            ctx.strokeStyle = 'rgba(200,80,255,0.75)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(leftX, sideY, sideW, sideH, 15); ctx.stroke();

            ctx.font = 'bold 13px monospace'; ctx.fillStyle = '#ee88ff';
            ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 6;
            ctx.fillText('🔓 LOCKER', leftX + sideW / 2, sideY + sideH / 2);
            ctx.shadowBlur = 0;

            // SHOP
            ctx.fillStyle = 'rgba(45,20,0,0.9)';
            ctx.beginPath(); ctx.roundRect(rightX, sideY, sideW, sideH, 15); ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.05)';

        // ── PAUSE MENU ─────────────────────────────────
        function drawMenu() {
            const t = Date.now() / 1000;
            const cx = BASE_W / 2;

            // ── Guest: host has paused the game ──
            if (isMultiplayerGame && mpPausedByHost && !isRoomHost && !mpGameOver) {
                ctx.fillStyle = 'rgba(10,0,30,0.93)'; ctx.fillRect(0, 0, BASE_W, BASE_H);
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.save();
                ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 20;
                ctx.font = 'bold 30px Orbitron, monospace'; ctx.fillStyle = '#ffd700';
                ctx.fillText('⏸  WAITING FOR HOST', cx, BASE_H / 2 - 28);
                ctx.restore();

        // ─────────────────────────────────────────────
        //  TAP ACTION (for menu/dead/win transitions)
        // ─────────────────────────────────────────────
        // Returns true if the settings panel consumed the tap
        function _settingsTap(sx, sy) {
            if (!showSettings) return false;
            const cx = BASE_W / 2;
            const panW = 300, panH = 220;
            const panX = cx - panW / 2, panY = BASE_H / 2 - panH / 2 - 20;
            const sliderX = panX + 22, sliderW = panW - 44;
            // Close button
            const closeX = panX + panW - 36, closeY = panY + 10, closeS = 24;
            if (sx >= closeX && sx <= closeX + closeS && sy >= closeY && sy <= closeY + closeS) {
                SFX.play('click'); showSettings = false; return true;
            }
            // Music slider (yCenter = panY+96)
            const mY = panY + 96;
            if (sy >= mY - 18 && sy <= mY + 18 && sx >= sliderX && sx <= sliderX + sliderW) {
                const v = Math.max(0, Math.min(1, (sx - sliderX) / sliderW));
                MUSIC.setVol(v); return true;
            }

                const rwW = 238, rwH = 54, rwX = BASE_W/2 - rwW/2, rwY = panelY + 330;
                if (sy >= rwY && sy <= rwY + rwH && sx >= rwX && sx <= rwX + rwW) {

                const newY = panelY + 402;

                }

                if (sy >= exitY && sy <= exitY + btnH && sx >= btnX && sx <= btnX + btnW) {
                    SFX.play('click'); state = STATE.MAIN; hasActiveGame = false; currentMode = 'infinite'; currentLevel = 0; return;
                }

            }
        }

        function onTap() { menuAction(BASE_W / 2, 455); }

        canvas.addEventListener('pointermove', e => {
            if (e.pointerType !== 'touch' && state === STATE.SELECT) {
                const { sx: smx, sy: smy } = _xy(e.clientX, e.clientY);

            if (!showSettings || e.buttons === 0) return;
            if (e.pointerType === 'touch') return;
            const { sx, sy } = _xy(e.clientX, e.clientY);
            const cx2 = BASE_W / 2;
            const panX2 = cx2 - 145, panY2 = BASE_H / 2 - 105 - 20;
            const slX = panX2 + 22, slW = 246;
            if (sy >= panY2 + 72 && sy <= panY2 + 108 && sx >= slX && sx <= slX + slW) {
                MUSIC.setVol(Math.max(0, Math.min(1, (sx - slX) / slW)));
            } else if (sy >= panY2 + 137 && sy <= panY2 + 173 && sx >= slX && sx <= slX + slW) {
                SFX.setVol(Math.max(0, Math.min(1, (sx - slX) / slW)));
            }
        });

        canvas.addEventListener('pointerup', e => {
            if (e.pointerType === 'touch') return; // handled by touchend
            const { sx, sy } = _xy(e.clientX, e.clientY);
            if (state === STATE.PLAY && !(isMultiplayerGame && mpGameOver) && inBtn(btnMenuBottom, sx, sy)) { _pauseGame(); return; }
            menuAction(sx, sy);
        });

        // ─────────────────────────────────────────────
        //  MAIN LOOP
        // ─────────────────────────────────────────────
        let lastTime = 0;
        const _FRAME_MS = 1000 / 60; // cap at 60fps regardless of monitor refresh rate
        let accumulator = 0;
        const FIXED_STEP = 1 / 60;

function gameUpdate() {
    // עצירה בזמן טוטוריאל
    if (tutorialFreezeScheduled) {
        tutorialFreezeScheduled = false;
        tutorialPaused = true;
        tutorialAutoResumeAt = Date.now() + 100;
    }
    if (tutorialPaused || tutorialComplete) return;
    
    // הוספת העצירה החדשה להוסט במולטיפלייר
    if (isMultiplayerGame && mpPausedByHost) return; 
    
    if (isMultiplayerGame && mpGameOver) return;
                // Prev on ground tracking
                const wasOnGround = player.onGround;
                const visible = platforms.filter(p => Math.abs(p.y - player.y) < BASE_H * 2);
                player.update(keys, visible, touch);
                if (wasOnGround && !player.onGround) player.emitJumpParticles(particles);

                updateCamera();
                if (player.y < highestY) highestY = player.y;
                const _maxH = Math.floor((BASE_H - 120 - TOWER_TOP) / 10);
                lastRunHigh = Math.min(Math.max(lastRunHigh, Math.floor((BASE_H - 120 - highestY) / 10)), _maxH);

                // Fall-death: die if you fall 30 meters (300px) from where the jump started
                if (!player.onGround && player.y - jumpStartY >= 300) { handleDeath(); return; }
                // Award 1 point per 40 meters climbed (not in tutorial)
                if (!tutorialMode) {
                    const milestone = Math.floor(lastRunHigh / 40);
                    if (milestone > lastPointMilestone) {
                        const gained = milestone - lastPointMilestone;
                        addPoints(gained);
                        runPointsEarned += gained;
                        lastPointMilestone = milestone;
                    }
                }
                // difficulty: levels 1 to 10, increases every 300 meters
                const metersClimbed = lastRunHigh;
                if (metersClimbed < 200) {
                    difficulty = 1;
                } else if (metersClimbed < 1000) {
                    difficulty = Math.min(4, 1 + Math.floor((metersClimbed - 200) / 250));
                } else {
                    difficulty = Math.min(10, 4 + Math.floor((metersClimbed - 1000) / 300));
                }
                // ghost speed: very slow at first appearance (450m), scales up gradually
                const enemySpeed = metersClimbed < 450 ? 0.25 : Math.min(2.0, 0.25 + (metersClimbed - 450) / 400);

                // Spawn ghosts — start at difficulty 2
                if (difficulty >= 2) {
                    ghostTimer--;
                    if (ghostTimer <= 0) {
                        const interval = Math.max(450, Math.floor(2800 - metersClimbed * 3.5));
                        ghostTimer = rndInt(interval, Math.floor(interval * 1.8));
                        const maxGhosts = metersClimbed < 250 ? 1 : metersClimbed < 500 ? 2 : 3;
                        let spawned = 0;
                        for (const plat of platforms) {
                            if (spawned >= maxGhosts) break;
                            // In level mode: don't spawn on or above the finish platform
                            if (finishPlatRef && plat.y <= finishPlatRef.y) continue;
                            // Never spawn below the starting platform
                            if (plat.y > floorY) continue;
                            if (plat.y > player.y - BASE_H * 2.5 && plat.y < player.y - BASE_H * 2 && (difficulty >= 4 || plat.spikes.length === 0)) {
                                if (Math.random() < 0.18) {
                                    const ghost = new Ghost(rndInt(WALL_W, BASE_W - WALL_W - 28), plat.y - 34 - 10);
                                    ghost.speed *= enemySpeed;
                                    ghosts.push(ghost);
                                    spawned++;
                                }
                            }
                        }
                    }
                }
                // Power state (must be before enemy updates that use slowFactor)
                const slowFactor = player.powerSlow > 0 ? 0.35 : 1.0;
                const shielded = player.powerShield > 0;
                const invincible = player.iframes > 0;

                // Update all
                for (const p of visible) p.update();
                for (const r of rocks) r.update(visible, slowFactor);
                for (const g of ghosts) g.update(slowFactor);
                book.update();
                for (const c of crystals) c.update();
                for (const p of particles) p.update();
                for (const s of snowflakes) s.update();

                // Cull
                rocks = rocks.filter(r => r.alive);
                ghosts = ghosts.filter(g => Math.abs(g.y - player.y) < BASE_H * 3);
                particles = particles.filter(p => p.life > 0);

                const pr = player.rect();

                // Platform spike hazards
                for (const plat of visible) {
                    for (let si = plat.spikes.length - 1; si >= 0; si--) {
                        const sp = plat.spikes[si];
                        const hazard = { x: plat.x + sp.offset, y: plat.y - 10, w: sp.width, h: 5 };
                        if (rectsOverlap(pr, hazard)) {
                            if (invincible) break;
                            if (shielded) {
                                player.powerShield = 0;
                                player.iframes = 90;
                                plat.spikes.splice(si, 1);
                                floatTexts.push(new FloatText(player.x + player.W / 2, player.y - 10, 'SHIELD!', '#c8a0ff'));
                            } else {
                                handleDeath();
                            }
                            break;
                        }
                    }
                    if (state !== STATE.PLAY) break;
                }

                // Spawn power-ups
                powerupTimer--;
                if (powerupTimer <= 0) {
                    powerupTimer = rndInt(100, 200);
                    const nearPlats = platforms.filter(p => {
                        if (p.y > player.y - BASE_H * 0.8 || p.y < player.y - BASE_H * 1.5) return false;
                        if (finishPlatRef && p.y <= finishPlatRef.y) return false; // level mode: no spawn at/above finish
                        if (p.y > floorY) return false; // never below start
                        return true;
                    });
                    const freePlats = nearPlats.filter(plat => {
                        if (plat.isFinish || plat.spikes.length > 0) return false;
                        const px = plat.x + plat.w / 2;
                        // no existing powerup on this platform
                        if (powerups.some(pu => Math.abs(pu.x - px) < 32 && Math.abs(pu.y - (plat.y - 20)) < 24)) return false;
                        // no existing coin on this platform
                        if (coins.some(c => Math.abs(c.x - px) < 32 && Math.abs(c.y - (plat.y - 20)) < 24)) return false;
                        return true;
                    });
                    if (freePlats.length > 0) {
                        const plat = freePlats[rndInt(0, freePlats.length - 1)];
                        const puPlatform = plat.moving ? plat : null;
                        powerups.push(new PowerUp(plat.x + plat.w / 2, plat.y - 20, puPlatform));
                    }
                }

                // Spawn coin every 50 meters climbed
                if (!tutorialMode) {
                    const coinMilestone = Math.floor(lastRunHigh / 50);
                    if (coinMilestone > lastCoinMilestone) {
                        lastCoinMilestone = coinMilestone;
                        // Pick a random platform near the player but slightly above
                        const coinPlats = platforms.filter(p => {
                            if (p.y <= player.y - BASE_H * 2.2 || p.y >= player.y - BASE_H * 1.2) return false;
                            if (p.isFinish) return false;
                            if (finishPlatRef && p.y <= finishPlatRef.y) return false; // level mode: no spawn at/above finish
                            if (p.y > floorY) return false; // never below start
                            if (p.spikes.length > 0) return false;
                            const coinX = p.x + p.w / 2;
                            // no power-up already sitting on this platform
                            if (powerups.some(pu => Math.abs(pu.x - coinX) < 32 && Math.abs(pu.y - (p.y - 22)) < 24)) return false;
                            // no existing coin on this platform
                            if (coins.some(c => Math.abs(c.x - coinX) < 32 && Math.abs(c.y - (p.y - 22)) < 24)) return false;
                            return true;
                        });
                        if (coinPlats.length > 0) {
                            const cp = coinPlats[rndInt(0, coinPlats.length - 1)];
                            const coinPlatform = cp.moving ? cp : null;
                            coins.push(new Coin(cp.x + cp.w / 2, cp.y - 22, coinPlatform));
                        }
                    }
                }

                // Update & collect power-ups
                for (const pu of powerups) pu.update();
                for (const ft of floatTexts) ft.update();
                floatTexts = floatTexts.filter(ft => ft.life > 0);

                for (const pu of powerups) {
                    if (!pu.alive) continue;
                    if (rectsOverlap(pr, pu.rect())) {
                        pu.alive = false;
                        SFX.play('powerup');
                        const _puDur = tutorialMode ? 24 : pu.type.duration; // 24 frames = 0.4s in tutorial
                        switch (pu.type.id) {
                            case 'speed': player.powerSpeed = _puDur; break;
                            case 'highjump': player.powerHighJump = _puDur; break;
                            case 'shield': player.powerShield = _puDur; break;
                            case 'slow': player.powerSlow = _puDur; break;
                        }
                        if (tutorialMode && POWERUP_TUTORIAL[pu.type.id]) {
                            tutorialMsg = POWERUP_TUTORIAL[pu.type.id];
                            tutorialFreezeScheduled = true; // freeze deferred to next frame
                        }
                        floatTexts.push(new FloatText(player.x + player.W / 2, player.y - 10, pu.type.label, pu.type.glow));
                        for (let i = 0; i < 16; i++) {
                            particles.push(new Particle(
                                pu.x + rnd(-8, 8), pu.y + Math.sin(pu.bob) * 4,
                                rnd(-3, 3), rnd(-3, 0.5),
                                rndInt(20, 40), pu.type.color, rndInt(2, 5)
                            ));
                        }
                    }
                }
                powerups = powerups.filter(pu => pu.alive && Math.abs(pu.y - player.y) < BASE_H * 3);

                // Update & collect coins
                for (const c of coins) c.update();
                for (const c of coins) {
                    if (!c.alive) continue;
                    if (rectsOverlap(pr, c.rect())) {
                        c.alive = false;
                        SFX.play('coin');
                        addPoints(1);
                        runPointsEarned += 1;
                        floatTexts.push(new FloatText(player.x + player.W / 2, player.y - 10, '+1 $', '#ffdd00'));
                        for (let i = 0; i < 10; i++) {
                            particles.push(new Particle(
                                c.x + rnd(-6, 6), c.y,
                                rnd(-2.5, 2.5), rnd(-3, 0.5),
                                rndInt(20, 35), '#ffdd00', rndInt(2, 4)
                            ));
                        }
                    }
                }
                coins = coins.filter(c => c.alive && Math.abs(c.y - player.y) < BASE_H * 4);

                for (const g of ghosts) {
                    const gr = { x: g.rect().x + 6, y: g.rect().y + 6, w: g.rect().w - 12, h: g.rect().h - 12 };
                    if (rectsOverlap(pr, gr)) {
                        if (invincible) continue;
                        if (shielded) { SFX.play('shield'); player.powerShield = 0; player.iframes = 90; ghosts = ghosts.filter(x => x !== g); floatTexts.push(new FloatText(player.x + player.W / 2, player.y - 10, 'SHIELD!', '#c8a0ff')); }
                        else { handleDeath(); break; }
                    }
                }
                if (finishPlatRef && player.onGround &&
                    Math.abs((player.y + player.H) - finishPlatRef.y) <= 2 &&
                    player.x + player.W > finishPlatRef.x + 4 &&
                    player.x < finishPlatRef.x + finishPlatRef.w - 4) {
                    if (isMultiplayerGame) {
                        const myName = (mpSlots[mpMyUid] && mpSlots[mpMyUid].name) || 'Player';
                        const finT = Date.now();
                        mpFinishTimes[mpMyUid] = finT;
                        _fbDb.collection('rooms').doc(mpRoomId).collection('pos').doc(mpMyUid)
                            .update({ finishedAt: finT }).catch(() => {});
                        _fbDb.collection('rooms').doc(mpRoomId).collection('finishers').doc(mpMyUid)
                            .set({ name: myName, finishedAt: finT }).catch(() => {});
                        _mpTriggerEnd(myName);
                        _mpRespawn();
                    } else {
                        const winBonus = tutorialMode ? 0 : (LEVEL_GOALS[currentLevel] / 5 | 0);
                        if (winBonus > 0) { runPointsEarned += winBonus; addPoints(winBonus); }
                        cornerAnimFromPts = pointsBeforeRun; cornerAnimToPts = lockerPoints; cornerAnimBonus = false; cornerAnimStart = Date.now();
                        SFX.play('win');
                        state = STATE.WIN; hasActiveGame = false;
                        saveBest(LEVEL_GOALS[currentLevel]);
                        levelWins[currentLevel] = true; if (_playerStore) _playerStore.set('wins', levelWins);
                    }
                }
                const br = book.rect();
                if (currentMode === 'infinite' && rectsOverlap(pr, br) && player.vy >= 0 && player.y + player.H <= br.y + 14) {
                    if (isMultiplayerGame) {
                        const myName = (mpSlots[mpMyUid] && mpSlots[mpMyUid].name) || 'Player';
                        const finT = Date.now();
                        mpFinishTimes[mpMyUid] = finT;
                        _fbDb.collection('rooms').doc(mpRoomId).collection('pos').doc(mpMyUid)
                            .update({ finishedAt: finT }).catch(() => {});
                        _fbDb.collection('rooms').doc(mpRoomId).collection('finishers').doc(mpMyUid)
                            .set({ name: myName, finishedAt: finT }).catch(() => {});
                        _mpTriggerEnd(myName);
                        _mpRespawn();
                    } else {
                        const winBonus2 = tutorialMode ? 0 : (lastRunHigh / 10 | 0);
                        if (winBonus2 > 0) { runPointsEarned += winBonus2; addPoints(winBonus2); }
                        cornerAnimFromPts = pointsBeforeRun; cornerAnimToPts = lockerPoints; cornerAnimBonus = false; cornerAnimStart = Date.now();
                        SFX.play('win');
                        state = STATE.WIN; hasActiveGame = false; saveBest(lastRunHigh);
                    }
                }

                // ── Tutorial checkpoints ──
                if (tutorialMode && !tutorialPaused && !tutorialComplete) {
                    if (tutorialStep < TUTO_STEPS.length && highestY < TUTO_STEPS[tutorialStep].triggerY) {
                        tutorialPaused = true;
                        tutorialMsg = TUTO_STEPS[tutorialStep].lines;
                        tutorialStep++;
                    }
                    // End platform detection — player lands and stays on special platform
                    for (const p of platforms) {
                        if (p.special && player.onGround && Math.abs(player.y - (p.y - player.H)) < 4) {
                            tutorialComplete = true;
                        }
                    }
                }

                // ── Floor: hard floor at starting platform — player can never fall below it ──
                if (player.y > floorY) {
                    player.y = floorY;
                    player.vy = 0;
                    player.onGround = true;
                    player.jump();
                }

                // ── Fall 30m below highest landed platform → death ──
                if (!tutorialMode && player.y + player.H > highestLandedPlatY + 300) {
                    handleDeath();
                }

                // ── Trail particles ──
                emitTrail(player.x + player.W / 2, player.y + player.H / 2, player.vx, player.vy);
                for (let i = trailParticles.length - 1; i >= 0; i--) {
                    const p = trailParticles[i];
                    p.x += p.vx; p.y += p.vy; p.life--;
                    p.vx *= 0.93; p.vy *= 0.90;
                    if (p.life <= 0) trailParticles.splice(i, 1);
                }

                // ── Multiplayer position sync ──
                _mpPublishPosition();

                // ── AFK detection (1 min idle → prompt, 30s no response → kick) ──
                if (isMultiplayerGame && !_afkPromptActive) {
                    if (keys.left || keys.right || keys.jump || touch.left || touch.right || touch.jump) _afkLastActivity = Date.now();
                    if (Date.now() - _afkLastActivity > 60000) {
                        _afkPromptActive = true; _afkPromptShownAt = Date.now();
                    }
                } else if (isMultiplayerGame && _afkPromptActive) {
                    if (Date.now() - _afkPromptShownAt > 30000) { _mpExit(); }
                }

                // ── Multiplayer end-game countdown check ──
                if (isMultiplayerGame && mpEndTriggered && !mpGameOver && mpEndAt > 0 && Date.now() >= mpEndAt) {
                    mpGameOver = true;
                    mpResultsReady = false;
                    _mpFetchAndFinalize();
                }
        }

        const _userTagEl = document.getElementById('userTag');
        let _lastUserTagState = null;
        let _lastMusicState = null;
        let _musicDelayTimer = null;

        function loop(ts) {
            requestAnimationFrame(loop);
            if (ts - lastTime < _FRAME_MS) return;
            const dt = Math.min((ts - lastTime) / 1000, 0.1);
            lastTime = ts;

            // Show user tag only on main menu — only touch DOM when state actually changes
            const _wantTag = (state === STATE.MAIN && window.icyCurrentUser) ? 'flex' : 'none';
            if (_wantTag !== _lastUserTagState) {
                if (_userTagEl) _userTagEl.style.display = _wantTag;
                _lastUserTagState = _wantTag;
            }
            // Music: per-level track during play, menu track everywhere else
            const _wantMusic = (state === STATE.PLAY)
                ? (currentMode === 'infinite' ? 'lv0' : 'lv' + currentLevel)
                : 'menu';
            if (_wantMusic !== _lastMusicState) {
                MUSIC.play(_wantMusic);
                _lastMusicState = _wantMusic;
            }

            // Lobby countdown expired — HOST launches the game, guests wait for status change
            if (lobbyStartAt > 0 && state === STATE.ONLINE && onlineScreen === 'lobby' && Date.now() >= lobbyStartAt) {
                lobbyStartAt = 0;
                if (isRoomHost) _onlineHostStart();
                // Guests: _onlineLaunchGame() fires when they see status === 'playing' in _onlineSubRoom
            }

            // Synchronized multiplayer start — transition all clients at the same moment
            if (isMultiplayerGame && mpGameStartAt > 0 && state === STATE.ONLINE && Date.now() >= mpGameStartAt) {
                mpGameStartAt = 0;
                _startGameMusic();
                state = STATE.PLAY;
                onlineScreen = 'main';
            }

            // On first login (new account) — auto-start tutorial
            if (window.icyAutoTutorial) {
                window.icyAutoTutorial = false;
                initTutorial();
                state = STATE.PLAY;
            }

            // Update snowflakes for menu animations
            if (state === STATE.MAIN || state === STATE.MENU) {
                for (const s of snowflakes) s.update();
            }

            if (state === STATE.PLAY) {
                accumulator += dt;
                while (accumulator >= FIXED_STEP) {
                    gameUpdate();
                    accumulator -= FIXED_STEP;
                }
            } else {
                accumulator = 0;
            }

            // ─── DRAW ───────────────────────────────
            ctx.save();
            ctx.translate(shakeX, shakeY);

            if (state === STATE.MAIN) {
                // Main menu: draw animated background + snowflakes
                drawBackground(0);
                for (const s of snowflakes) s.draw();
            } else {
                drawBackground(camY);
                // for (const c of crystals) c.draw(camY);
                for (const p of platforms) p.draw(camY);
                // Draw crown above finish platform in level mode
                if (finishPlatRef) {
                    const fsy = finishPlatRef.y - camY;
                    if (fsy > -100 && fsy < BASE_H + 100) {
                        const fcx = finishPlatRef.x + finishPlatRef.w / 2;
                        const tt = Date.now() / 1000;
                        const bob = Math.sin(tt * 2) * 4;
                        drawCrown(ctx, fcx, fsy - 55 + bob, 70, 42, tt);
                    }
                }
                for (const r of rocks) r.draw(camY);
                for (const g of ghosts) g.draw(camY);
                book.draw(camY);
                for (const pu of powerups) pu.draw(camY);
                for (const c of coins) c.draw(camY);
                for (const p of particles) p.draw(camY);
                for (const ft of floatTexts) ft.draw(camY);
                if (state === STATE.PLAY) drawTrailParticles(camY);
                if (state === STATE.PLAY || state === STATE.DEAD) _drawRemotePlayers(camY);
                if (state === STATE.PLAY || state === STATE.DEAD) player.draw(camY);
                for (const s of snowflakes) s.draw();
                if (state === STATE.PLAY) drawHUD();
                if (isMultiplayerGame) _drawMpCountdown();
                if (isMultiplayerGame) _drawMpHeightBar();
                if (isMultiplayerGame) _drawMpMyHeight();
            }

            ctx.restore();

            if (isMultiplayerGame && mpGameOver) {
                if (mpResultsReady) { _drawMpGameOver(); _drawMpMyHeight(); }
                else _drawMpResultsLoading();
            }
            // Host transfer loading overlay — shown to ALL players while new host takes over
            if (isMultiplayerGame && mpHostTransferring) {
                const cx = BASE_W / 2;
                ctx.fillStyle = 'rgba(4,10,32,0.92)'; ctx.fillRect(0, 0, BASE_W, BASE_H);
                ctx.textAlign = 'center';
                ctx.font = 'bold 26px "Segoe UI",Arial'; ctx.fillStyle = '#78c8ff';
                ctx.shadowColor = '#004488'; ctx.shadowBlur = 18;
                const dots = '.'.repeat(Math.floor(Date.now() / 400) % 4);
                ctx.fillText('👑 Transferring Host' + dots, cx, BASE_H / 2 - 20);
                ctx.shadowBlur = 0;
                ctx.font = '13px "Segoe UI",Arial'; ctx.fillStyle = '#778';
                ctx.fillText('Please wait…', cx, BASE_H / 2 + 16);
            }
            if (isMultiplayerGame) _drawAfkPrompt();

            if (state !== STATE.MAIN && !(isMultiplayerGame && mpGameOver)) drawTouchButtons();

            if (state === STATE.MAIN) drawMainMenu();
            else if (state === STATE.SELECT) drawSelect();
            else if (state === STATE.LOCKER) drawLocker();
            else if (state === STATE.SHOP) drawShop();
            else if (state === STATE.MENU) drawMenu();
            else if (state === STATE.DEAD) drawDead();
            else if (state === STATE.WIN) drawWin();
            else if (state === STATE.ONLINE) drawOnline();
            if (tutorialComplete) drawTutorialWin();
            else if (tutorialPaused) drawTutorialPause();

            drawCornerPointsAnim();

            // ── Host pause overlay ──
            if (isMultiplayerGame && isRoomHost && mpPausedByHost && state === STATE.PLAY) {
                ctx.save();
                ctx.fillStyle = 'rgba(4,10,32,0.5)';
                ctx.fillRect(0, 0, BASE_W, BASE_H);
                ctx.textAlign = 'center';
                ctx.font = 'bold 32px "Segoe UI",Arial'; ctx.fillStyle = '#ffd700';
                ctx.shadowColor = '#aa6600'; ctx.shadowBlur = 16;
                ctx.fillText('⏸ PAUSED', BASE_W / 2, BASE_H / 2 - 30);
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }

        function drawCornerPointsAnim() {
            if (cornerAnimStart < 0) return;
            const elapsed = (Date.now() - cornerAnimStart) / 1000;
            const ANIM_DUR = 3.0;
            if (elapsed >= ANIM_DUR) { cornerAnimStart = -1; return; }

            const DELAY = 1.0; // show start value for 1 second before counting
            const countElapsed = Math.max(0, elapsed - DELAY);
            const countDur = ANIM_DUR - DELAY;
            const eased = 1 - Math.pow(1 - Math.min(countElapsed / countDur, 1), 3);
            const earned = cornerAnimToPts - cornerAnimFromPts;
            const displayPts = Math.round(cornerAnimFromPts + earned * eased);
            const alpha = elapsed > 2.3 ? Math.max(0, 1 - (elapsed - 2.3) / 0.7) : 1;

            ctx.save();
            ctx.globalAlpha = alpha;

            const boxW = 210, boxH = 42;
            const boxX = BASE_W - boxW - 10;
            const boxY = cornerAnimIsRecord ? 36 : 12;

            // NEW RECORD label above the box
            ctx.shadowBlur = 0;
            if (cornerAnimIsRecord) {
                ctx.font = 'bold 13px monospace';
                ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 8;
                ctx.fillStyle = '#ffee44';
                ctx.fillText('★ NEW RECORD!', BASE_W - 10, 22);
                ctx.shadowBlur = 0;
            }

            ctx.fillStyle = cornerAnimBonus ? 'rgba(30,15,0,0.92)' : 'rgba(0,18,10,0.92)';
            ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 10); ctx.fill();
            ctx.strokeStyle = cornerAnimBonus ? 'rgba(255,200,0,0.85)' : 'rgba(60,255,160,0.7)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 10); ctx.stroke();

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = 'bold 15px monospace';
            ctx.fillStyle = cornerAnimBonus ? '#ffcc44' : '#55ffcc';
            const bonusTxt = cornerAnimBonus ? ' ×1.5!' : '';
            ctx.fillText(`⬡ ${displayPts}  (+${earned}${bonusTxt})`, boxX + boxW/2, boxY + boxH/2);
            ctx.restore();
        }

        // ─────────────────────────────────────────────
        //  START
        // ─────────────────────────────────────────────
        // Boot sequence: load player data for any existing session before
        // starting the game loop. For Firebase, this await is real async I/O.
        (async function startGame() {
            const user = await UserSystem.getCurrentUser();
            if (user && typeof window.initPlayerData === 'function') {
await Promise.race([
    window.initPlayerData(user.userId),
    new Promise(res => setTimeout(res, 3000))
]);            }
            _syncTheme(); initWorld();
            hasActiveGame = false;
            requestAnimationFrame(loop);
        })();
    </script>
</body>
