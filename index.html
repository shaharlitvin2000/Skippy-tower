            const skyBot = lerpHex(scenes[si][1], scenes[ni][1], blend);
            const grd = ctx.createLinearGradient(WALL_W, 0, WALL_W, BASE_H);
            grd.addColorStop(0, skyTop); grd.addColorStop(1, skyBot);
            ctx.fillStyle = grd;
            ctx.fillRect(WALL_W, 0, BASE_W - WALL_W * 2, BASE_H);

            function drawThemeBg(sceneIdx) {
                switch (themeIdx) {
                    case 0: drawBgIce(cam, t, sceneIdx); break;
                    case 1: drawBgForest(cam, t, sceneIdx); break;
                    case 2: drawBgDesert(cam, t, sceneIdx); break;
                    case 3: drawBgLava(cam, t, sceneIdx); break;
                    case 4: drawBgMagic(cam, t, sceneIdx); break;
                    case 5: drawBgSpace(cam, t, sceneIdx); break;
                }
            }

            // Draw current scene elements (clipped to play area)
            ctx.save();
            ctx.beginPath(); ctx.rect(WALL_W, 0, BASE_W - WALL_W * 2, BASE_H); ctx.clip();
            drawThemeBg(si);
            ctx.restore();

            // Blend in next scene via offscreen canvas
            if (blend > 0.01) {
                // Reset the offscreen canvas completely — this clears any leftover
                // save/restore stack entries and clipping regions from previous frames,
                // which could otherwise make the player, HUD, and touch buttons invisible.
                _bgOffCanvas.width = _bgOffCanvas.width;
                const savedCtx = ctx;
                ctx = _bgOffCtx;
                _bgOffCtx.save();
                _bgOffCtx.beginPath(); _bgOffCtx.rect(WALL_W, 0, BASE_W - WALL_W * 2, BASE_H); _bgOffCtx.clip();
                drawThemeBg(ni);
                _bgOffCtx.restore();
                ctx = savedCtx;
                ctx.save(); ctx.globalAlpha = blend;
                ctx.drawImage(_bgOffCanvas, 0, 0);
                ctx.restore();
            }

            // Fill walls
            ctx.fillStyle = C.WALL;
            ctx.fillRect(0, 0, WALL_W, BASE_H);
            ctx.fillRect(BASE_W - WALL_W, 0, WALL_W, BASE_H);

            if (themeIdx === 0) {
                // Clock Tower — walls are dark aged wood/stone with brass fixtures
                const camInt2 = Math.floor(cam);
                // Stone block courses (horizontal mortar lines, scrolling)
                const blockH2 = 30;
                for (let row = -1; row < BASE_H / blockH2 + 2; row++) {
                    const worldRow = Math.floor(camInt2 / blockH2) + row;
                    const sy2 = worldRow * blockH2 - camInt2;
                    const rng4 = seededRandom(worldRow * 5381 + 3001);
                    const alpha4 = 0.06 + rng4() * 0.10;
                    ctx.strokeStyle = `rgba(80,45,15,${alpha4})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(0, sy2); ctx.lineTo(WALL_W, sy2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W, sy2); ctx.lineTo(BASE_W, sy2); ctx.stroke();
                    // Vertical mortar offsets (brick pattern)
                    const vx1 = (worldRow % 2 === 0) ? WALL_W * 0.5 : WALL_W * 0.25;
                    const vx2 = BASE_W - WALL_W + ((worldRow % 2 === 0) ? WALL_W * 0.5 : WALL_W * 0.75);
                    ctx.beginPath(); ctx.moveTo(vx1, sy2); ctx.lineTo(vx1, sy2 + blockH2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(vx2, sy2); ctx.lineTo(vx2, sy2 + blockH2); ctx.stroke();
                }
                // Copper pipe rivet rings on walls (world-fixed per chunk)
                const rivChunkH = 200;
                const rcStart = Math.floor(camInt2 / rivChunkH) - 1;
                const rcEnd   = rcStart + Math.ceil(BASE_H / rivChunkH) + 2;
                for (let rc = rcStart; rc <= rcEnd; rc++) {
                    const chunkWY = rc * rivChunkH;
                    const rng5 = seededRandom(rc * 8221 + 1777);
                    const rivY = chunkWY + rng5() * rivChunkH - camInt2;
                    if (rivY < -8 || rivY > BASE_H + 8) continue;
                    ctx.save(); ctx.globalAlpha = 0.35 + rng5() * 0.25;
                    ctx.strokeStyle = '#a07020'; ctx.lineWidth = 2;
                    // Pipe ring on left wall
                    ctx.beginPath(); ctx.roundRect(2, rivY - 3, WALL_W - 4, 6, 2); ctx.stroke();
                    // Pipe ring on right wall
                    ctx.beginPath(); ctx.roundRect(BASE_W - WALL_W + 2, rivY - 3, WALL_W - 4, 6, 2); ctx.stroke();
                    ctx.restore();
                }
                // Inner edge — warm amber glow from clock tower interior
                for (let i = 0; i < 8; i++) {
                    const fade = 1 - i / 8;
                    ctx.strokeStyle = `rgba(180,110,20,${fade * 0.30})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(WALL_W - i, 0); ctx.lineTo(WALL_W - i, BASE_H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + i, 0); ctx.lineTo(BASE_W - WALL_W + i, BASE_H); ctx.stroke();
                }
            } else if (themeIdx === 2) {
                // Ocean Deep — walls are dark underwater rock with bioluminescent streaks
                const camInt = Math.floor(cam);
                const blkH = 40;
                for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                    for (let row = -1; row < BASE_H / blkH + 2; row++) {
                        const worldRow = Math.floor(camInt / blkH) + row;
                        const wy2 = worldRow * blkH - camInt;
                        const rng3 = seededRandom(worldRow * 4441 + (bx > BASE_W / 2 ? 7 : 3));
                        // Dark ocean rock shades
                        ctx.fillStyle = worldRow % 2 === 0 ? '#0d2a3a' : '#0a2030';
                        ctx.fillRect(bx, wy2, bw, blkH + 1);
                        // Subtle blue-green shimmer strip
                        ctx.save(); ctx.globalAlpha = 0.08 + rng3() * 0.07;
                        ctx.fillStyle = '#2288aa';
                        ctx.fillRect(bx, wy2 + 2, bw, Math.floor(blkH * 0.25));
                        ctx.restore();
                        // Bioluminescent dot (rare)
                        if (rng3() < 0.18) {
                            const dotY = wy2 + 4 + rng3() * (blkH - 8);
                            const dotX = bx + 4 + rng3() * (bw - 8);
                            ctx.save(); ctx.globalCompositeOperation = 'lighter';
                            ctx.globalAlpha = 0.30 + rng3() * 0.35;
                            ctx.fillStyle = rng3() > 0.5 ? '#44ffcc' : '#88aaff';
                            ctx.beginPath(); ctx.arc(dotX, dotY, 1.5 + rng3() * 1.5, 0, Math.PI*2); ctx.fill();
                            ctx.restore();
                        }
                    }
                    // Seaweed patch (sparse, world-seeded)
                    for (let row = -1; row < BASE_H / blkH + 2; row++) {
                        const worldRow = Math.floor(camInt / blkH) + row;
                        const wy2 = worldRow * blkH - camInt;
                        const rng4 = seededRandom(worldRow * 2213 + (bx > BASE_W / 2 ? 11 : 5));
                        if (rng4() < 0.25) {
                            const wx2 = bx + bw * 0.4 + rng4() * bw * 0.2;
                            const wh2 = 10 + rng4() * 20;
                            ctx.save(); ctx.globalAlpha = 0.45;
                            ctx.strokeStyle = rng4() > 0.5 ? '#0d7a38' : '#0aaa44';
                            ctx.lineWidth = 1.5; ctx.lineCap = 'round';
                            ctx.beginPath(); ctx.moveTo(wx2, wy2 + blkH);
                            const sway2 = Math.sin(Date.now()/1200 + worldRow * 1.3) * 3;
                            ctx.quadraticCurveTo(wx2 + sway2, wy2 + blkH - wh2*0.5, wx2 + sway2*1.5, wy2 + blkH - wh2);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                }
                // Inner-edge caustic glow
                for (let i = 0; i < 10; i++) {
                    const fade = (1 - i / 10) * (1 - i / 10);
                    ctx.strokeStyle = `rgba(10,30,60,${(fade * 0.50).toFixed(3)})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(WALL_W - i, 0); ctx.lineTo(WALL_W - i, BASE_H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + i, 0); ctx.lineTo(BASE_W - WALL_W + i, BASE_H); ctx.stroke();
                }
                // Cyan edge highlight
                ctx.strokeStyle = 'rgba(40,160,200,0.22)';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(WALL_W, 0); ctx.lineTo(WALL_W, BASE_H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W, 0); ctx.lineTo(BASE_W - WALL_W, BASE_H); ctx.stroke();
            } else if (themeIdx === 1) {
                // Forest Canopy — walls are giant tree bark (vertical grain lines + mossy patches)
                const camInt = Math.floor(cam);
                // Vertical bark grain lines (scrolling with camera)
                const grainSpacing = 6;
                for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                    for (let gx = bx + 2; gx < bx + bw - 2; gx += grainSpacing) {
                        const worldGx = gx + camInt * 0.01;
                        const rng = seededRandom((gx * 37 + Math.floor(camInt / 80)) | 0);
                        const alpha = 0.08 + rng() * 0.14;
                        const lighter = rng() < 0.3;
                        ctx.strokeStyle = lighter ? `rgba(80,50,15,${alpha})` : `rgba(20,10,2,${alpha + 0.05})`;
                        ctx.lineWidth = 1 + (rng() < 0.2 ? 1 : 0);
                        // slightly wavy grain
                        const wave = Math.sin(camInt * 0.02 + gx * 0.3) * 2;
                        ctx.beginPath(); ctx.moveTo(gx + wave, 0); ctx.lineTo(gx - wave, BASE_H); ctx.stroke();
                    }
                }
                // Horizontal bark fissures (world-fixed)
                const fissureSpacing = 55;
                const fStart = Math.floor(camInt / fissureSpacing) - 1;
                const fEnd   = fStart + Math.ceil(BASE_H / fissureSpacing) + 2;
                for (let fi = fStart; fi <= fEnd; fi++) {
                    const wy = fi * fissureSpacing - camInt;
                    const rng = seededRandom(fi * 3571 + 9901);
                    for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                        ctx.save(); ctx.globalAlpha = 0.18 + rng() * 0.18;
                        ctx.strokeStyle = '#1a0c04'; ctx.lineWidth = 1 + (rng() < 0.25 ? 1 : 0);
                        // Wavy horizontal fissure
                        ctx.beginPath();
                        ctx.moveTo(bx, wy + rng() * 6 - 3);
                        ctx.bezierCurveTo(bx + bw * 0.3, wy + rng() * 8 - 4,
                                          bx + bw * 0.7, wy + rng() * 8 - 4,
                                          bx + bw, wy + rng() * 6 - 3);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
                // Moss patches (world-fixed green blobs)
                const mossSpacing = 120;
                const msStart = Math.floor(camInt / mossSpacing) - 1;
                const msEnd   = msStart + Math.ceil(BASE_H / mossSpacing) + 2;
                for (let mi = msStart; mi <= msEnd; mi++) {
                    const rng = seededRandom(mi * 5189 + 1021);
                    const wy = mi * mossSpacing + rng() * mossSpacing - camInt;
                    if (wy < -20 || wy > BASE_H + 20) continue;
                    for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                        ctx.save(); ctx.globalAlpha = 0.30 + rng() * 0.20;
                        const mx = bx + rng() * bw;
                        const mr = 8 + rng() * 12;
                        const mg = ctx.createRadialGradient(mx, wy, 0, mx, wy, mr);
                        mg.addColorStop(0, '#3a9018'); mg.addColorStop(0.6, '#226010'); mg.addColorStop(1, 'transparent');
                        ctx.fillStyle = mg;
                        ctx.beginPath(); ctx.ellipse(mx, wy, mr, mr * 0.55, 0, 0, Math.PI * 2); ctx.fill();
                        ctx.restore();
                    }
                }
                // Inner edge — green forest glow
                for (let i = 0; i < 7; i++) {
                    const fade = 1 - i / 7;
                    const [r, g, b] = hexToRgb(C.WALL_EDGE);
                    ctx.strokeStyle = `rgba(${r},${g},${b},${fade * 0.35})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(WALL_W - i, 0); ctx.lineTo(WALL_W - i, BASE_H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + i, 0); ctx.lineTo(BASE_W - WALL_W + i, BASE_H); ctx.stroke();
                }
            } else if (themeIdx === 5) {
                // Space — metallic hull plating with star map dots and cyan edge lights
                const camInt = Math.floor(cam);
                const plateH = 44;
                for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                    for (let row = -1; row < BASE_H / plateH + 2; row++) {
                        const worldRow = Math.floor(camInt / plateH) + row;
                        const wy = worldRow * plateH - camInt;
                        const rng = seededRandom(worldRow * 6421 + (bx > BASE_W / 2 ? 13 : 7));
                        // Alternating alloy shade
                        ctx.fillStyle = worldRow % 2 === 0 ? '#0d1a28' : '#0a1520';
                        ctx.fillRect(bx, wy, bw, plateH + 1);
                        // Subtle shimmer band near top of each plate
                        ctx.save(); ctx.globalAlpha = 0.07 + rng() * 0.06;
                        ctx.fillStyle = '#2266aa';
                        ctx.fillRect(bx, wy, bw, Math.floor(plateH * 0.22)); ctx.restore();
                        // Horizontal rivet/seam line
                        ctx.save(); ctx.globalAlpha = 0.30;
                        ctx.strokeStyle = '#1a3a58'; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(bx, wy); ctx.lineTo(bx + bw, wy); ctx.stroke(); ctx.restore();
                        // Rivet dots
                        ctx.save(); ctx.globalAlpha = 0.55; ctx.fillStyle = '#203a55';
                        for (const rx of [bx + 5, bx + bw - 5]) {
                            ctx.beginPath(); ctx.arc(rx, wy + 4, 2, 0, Math.PI*2); ctx.fill();
                        }
                        ctx.restore();
                        // Star map dot (rare)
                        if (rng() < 0.15) {
                            const dotY = wy + 8 + rng() * (plateH - 16);
                            const dotX = bx + 6 + rng() * (bw - 12);
                            ctx.save(); ctx.globalCompositeOperation = 'lighter';
                            ctx.globalAlpha = 0.20 + rng() * 0.25;
                            ctx.fillStyle = rng() > 0.5 ? '#88ccff' : '#cc88ff';
                            ctx.beginPath(); ctx.arc(dotX, dotY, 1.2 + rng() * 1.0, 0, Math.PI*2); ctx.fill();
                            ctx.restore();
                        }
                    }
                    // Warning stripe (yellow/black diagonal, near bottom)
                    const stripeY = BASE_H - 32;
                    const stripeH2 = 16;
                    ctx.save();
                    ctx.beginPath(); ctx.rect(bx, stripeY, bw, stripeH2); ctx.clip();
                    ctx.globalAlpha = 0.20;
                    for (let sx = bx - stripeH2; sx < bx + bw + stripeH2; sx += 12) {
                        ctx.fillStyle = sx % 24 < 12 ? '#ffcc00' : '#111111';
                        ctx.beginPath();
                        ctx.moveTo(sx, stripeY); ctx.lineTo(sx + stripeH2, stripeY);
                        ctx.lineTo(sx + stripeH2 + stripeH2, stripeY + stripeH2);
                        ctx.lineTo(sx + stripeH2, stripeY + stripeH2);
                        ctx.closePath(); ctx.fill();
                    }
                    ctx.restore();
                }
                // Cyan edge glow lines
                for (let i = 0; i < 8; i++) {
                    const fade = (1 - i / 8) * (1 - i / 8);
                    ctx.strokeStyle = `rgba(0,170,255,${(fade * 0.28).toFixed(3)})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(WALL_W - i, 0); ctx.lineTo(WALL_W - i, BASE_H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + i, 0); ctx.lineTo(BASE_W - WALL_W + i, BASE_H); ctx.stroke();
                }
                ctx.strokeStyle = 'rgba(0,200,255,0.35)'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(WALL_W, 0); ctx.lineTo(WALL_W, BASE_H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W, 0); ctx.lineTo(BASE_W - WALL_W, BASE_H); ctx.stroke();
            } else {
                // Inner edge glow for other themes
                for (let i = 0; i < 6; i++) {
                    const fade = 1 - i / 6;
                    const [r, g, b] = hexToRgb(C.WALL_EDGE);
                    ctx.strokeStyle = `rgba(${r},${g},${b},${fade * 0.4})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(WALL_W - i, 0); ctx.lineTo(WALL_W - i, BASE_H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + i, 0); ctx.lineTo(BASE_W - WALL_W + i, BASE_H); ctx.stroke();
                }
                // Wall crack layers
                const camInt = Math.floor(cam);
                const layerH = 36;
                for (let row = -1; row < BASE_H / layerH + 2; row++) {
                    const worldRow = Math.floor(camInt / layerH) + row;
                    const wy = worldRow * layerH - camInt;
                    const rng = seededRandom(worldRow * 7919);
                    for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                        ctx.strokeStyle = C.WALL_MID; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(bx, wy); ctx.lineTo(bx + bw, wy); ctx.stroke();
                        const nc = (rng() * 2 | 0) + 1;
                        for (let k = 0; k < nc; k++) {
                            const cx2 = bx + Math.floor(rng() * (bw - 6)) + 3;
                            const ch = Math.floor(rng() * (layerH - 8)) + 4;
                            ctx.beginPath(); ctx.moveTo(cx2, wy); ctx.lineTo(cx2, wy + ch); ctx.stroke();
                        }
                    }
                }
            }
        }

        // ─────────────────────────────────────────────
        //  HUD
        // ─────────────────────────────────────────────
        function drawHUD() {
            const hm = Math.max(0, Math.floor((BASE_H - 120 - player.y) / 10));
            const maxH = Math.max(0, Math.floor((BASE_H - 120 - highestY) / 10));
            if (currentMode === 'level') {
                const barH = 160, barX = BASE_W - 22, barY = 28;
                const pct = clamp(-player.y / Math.abs(TOWER_TOP), 0, 1);
                ctx.fillStyle = '#19264a';
                ctx.beginPath(); ctx.roundRect(barX, barY, 8, barH, 4); ctx.fill();
                if (pct > 0) {
                    ctx.fillStyle = C.UI_ACCENT;
                    ctx.beginPath(); ctx.roundRect(barX, barY + barH - barH * pct, 8, barH * pct, 4); ctx.fill();
                }
                ctx.strokeStyle = C.UI_ACCENT; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.roundRect(barX - 1, barY - 1, 10, barH + 2, 4); ctx.stroke();
                // goal label above bar
                ctx.fillStyle = C.UI_ACCENT; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'right';
                ctx.fillText(`${levelGoal}m`, barX + 8, barY - 4);
                ctx.textAlign = 'left';
            }
            ctx.textAlign = 'left';
            ctx.fillStyle = C.UI_TEXT; ctx.font = 'bold 20px monospace';
            ctx.fillText(`↑ ${hm}m`, 10, 78);
            ctx.fillStyle = '#aaddff'; ctx.font = '13px monospace';
            ctx.fillText(`run: ${maxH}m`, 10, 96);
            const modeBest = getBest();
            ctx.fillStyle = '#ffcc44'; ctx.font = '13px monospace';
            ctx.fillText(`best: ${modeBest > 0 ? modeBest+'m' : '-'}`, 10, 112);

            // Active power-up icons
            const powers = [
                { val: player.powerSpeed, color: '#ff9f20', dur: 300, label: '⚡' },
                { val: player.powerHighJump, color: '#58e88a', dur: 280, label: '↑↑' },
                { val: player.powerShield, color: '#a06cff', dur: 350, label: '◈' },
                { val: player.powerSlow, color: '#20d0ff', dur: 320, label: '❄' },
            ];
            let py = BASE_H - 160;
            for (const pw of powers) {
                if (pw.val <= 0) continue;
                const frac = pw.val / pw.dur;
                const bx = WALL_W + 8, bw = 50, bh = 22;
                ctx.save();
                ctx.globalAlpha = 0.75;
                ctx.fillStyle = '#0a1530';
                ctx.beginPath(); ctx.roundRect(bx, py, bw, bh, 6); ctx.fill();
                ctx.fillStyle = pw.color;
                ctx.beginPath(); ctx.roundRect(bx, py, bw * frac, bh, 6); ctx.fill();
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.fillText(pw.label, bx + 4, py + bh / 2);
                ctx.restore();
                py -= 28;
            }
        }

        // ─────────────────────────────────────────────
        //  SCREENS
        // ─────────────────────────────────────────────
        // ── SHOP ──────────────────────────────────────
        // skin definitions — drawn procedurally
        const SKINS = [
            // 0: Ice Kid — default
            { name:'Ice Kid', unlocked:true,
              draw(cx,cy,s) {
                ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s);
                // drop shadow
                ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.beginPath(); ctx.ellipse(0,20,11,3,0,0,Math.PI*2); ctx.fill();
                // boots
                ctx.fillStyle='#1c140e'; ctx.beginPath(); ctx.roundRect(-11,14,10,6,3); ctx.fill();
                ctx.beginPath(); ctx.roundRect(1,14,10,6,3); ctx.fill();
                ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(-10,14,8,2); ctx.fillRect(2,14,8,2);
                // pants
                ctx.fillStyle='#122d62'; ctx.beginPath(); ctx.roundRect(-10,6,8,10,2); ctx.fill();
                ctx.beginPath(); ctx.roundRect(2,6,8,10,2); ctx.fill();
                ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(-10,10,8,6); ctx.fillRect(2,10,8,6);
                // body gradient
                const bg=ctx.createLinearGradient(-11,-14,11,6);
                bg.addColorStop(0,'#2e5fcc'); bg.addColorStop(1,'#194189');
                ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-11,-14,22,22,5); ctx.fill();
                ctx.fillStyle='rgba(100,160,255,0.22)'; ctx.beginPath(); ctx.roundRect(-11,-14,9,22,5); ctx.fill();
                ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.8;
                ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(0,4); ctx.stroke();
                // scarf
                const sg=ctx.createLinearGradient(-11,-3,11,-3);
                sg.addColorStop(0,'#a82020'); sg.addColorStop(0.5,'#e03030'); sg.addColorStop(1,'#a82020');
                ctx.fillStyle=sg; ctx.beginPath(); ctx.roundRect(-11,-3,22,7,3); ctx.fill();
                ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(-10,-3,20,2);
                // neck
                ctx.fillStyle='#d4b090'; ctx.beginPath(); ctx.roundRect(-4,-16,8,4,2); ctx.fill();
                // head
                const hg=ctx.createLinearGradient(0,-32,0,-14);
                hg.addColorStop(0,'#f0cca8'); hg.addColorStop(1,'#e0b890');
                ctx.fillStyle=hg; ctx.beginPath(); ctx.roundRect(-9,-32,18,17,6); ctx.fill();
                ctx.fillStyle='rgba(0,0,0,0.07)'; ctx.beginPath(); ctx.roundRect(-7,-19,14,5,3); ctx.fill();
                // hood
                const hood=ctx.createLinearGradient(0,-36,0,-18);
                hood.addColorStop(0,'#3a70cc'); hood.addColorStop(1,'#265299');
                ctx.fillStyle=hood; ctx.beginPath(); ctx.roundRect(-11,-36,22,19,8); ctx.fill();
                ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.roundRect(-11,-21,22,5,3); ctx.fill();
                ctx.strokeStyle='rgba(160,210,255,0.35)'; ctx.lineWidth=1;
                ctx.beginPath(); ctx.arc(0,-34,9,Math.PI,0); ctx.stroke();

            ctx.font = 'bold 22px monospace';
            ctx.shadowColor = '#aa44ff'; ctx.shadowBlur = 14;
            ctx.fillStyle = '#cc88ff';
            ctx.fillText('LOCKER', cxL, 30);
            ctx.shadowBlur = 0;
            // Points
            ctx.textAlign = 'right'; ctx.font = 'bold 14px monospace';
            ctx.fillStyle = '#ffcc44';
            ctx.fillText(`⬡ ${lockerPoints} pts`, BASE_W - 12, 36);

            // ── SKINS / TRAILS tabs ──
            const tabY = 64, tabH = 32, tabW = 110, tabGap = 8;
            const tabSkinX = cxL - tabW - tabGap / 2;
            const tabTrailX = cxL + tabGap / 2;
            const tabs = [{ label: 'SKINS', x: tabSkinX }, { label: 'TRAILS', x: tabTrailX }];
            for (let i = 0; i < 2; i++) {
                const active = lockerTab === i;
                const ep = active ? (0.55 + 0.4 * Math.sin(t * 3)) : 0;
                ctx.fillStyle = active ? 'rgba(160,60,255,0.18)' : 'rgba(255,255,255,0.04)';
                ctx.beginPath(); ctx.roundRect(tabs[i].x, tabY, tabW, tabH, 8); ctx.fill();
                ctx.strokeStyle = active ? `rgba(200,80,255,${ep})` : 'rgba(80,60,100,0.4)';
                ctx.lineWidth = active ? 2 : 1;
                if (active) { ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 10 * ep; }
                ctx.beginPath(); ctx.roundRect(tabs[i].x, tabY, tabW, tabH, 8); ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = `bold 13px monospace`;
                ctx.fillStyle = active ? '#ee88ff' : '#886699';
                ctx.fillText(tabs[i].label, tabs[i].x + tabW / 2, tabY + tabH / 2);
            }

            const cols = 3, cellW = 110, cellH = 110, gap = 12;
            const gridW = cols * cellW + (cols - 1) * gap;
            const gx = cxL - gridW / 2;
            // grid starts just below the tabs (tabs end at y=96)
            const gridStartY = 106;

            // ── helper: draw a ??? coming-soon slot ──
            function drawComingSoonCell(cx2, cy2) {
                ctx.fillStyle = 'rgba(255,255,255,0.02)';
                ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.fill();
                ctx.strokeStyle = 'rgba(80,60,100,0.25)'; ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.stroke();
                ctx.setLineDash([]);
                ctx.save(); ctx.globalAlpha = 0.3 + 0.15 * Math.sin(t * 2);
                ctx.font = 'bold 22px monospace'; ctx.fillStyle = '#886699';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('?', cx2 + cellW/2, cy2 + cellH/2 - 6);
                ctx.font = 'bold 9px monospace'; ctx.fillStyle = '#664488';
                ctx.textBaseline = 'alphabetic';
                ctx.fillText('COMING SOON', cx2 + cellW/2, cy2 + cellH - 10);
                ctx.restore();
            }

            if (lockerTab === 0) {
                // ── SKINS TAB ──
                const sel = SKINS[selectedSkin];

                // Grid — ALL skins + ??? slot at end
                const totalSkinSlots = SKINS.length + 1;
                const skinRows = Math.ceil(totalSkinSlots / cols);
                for (let i = 0; i < totalSkinSlots; i++) {
                    const col = i % cols, row = Math.floor(i / cols);
                    const cx2 = gx + col*(cellW+gap), cy2 = gridStartY + row*(cellH+gap);
                    if (i === SKINS.length) { drawComingSoonCell(cx2, cy2); continue; }
                    const sk = SKINS[i];
                    const isSel = i === selectedSkin;
                    ctx.fillStyle = isSel ? 'rgba(160,60,255,0.22)' : 'rgba(255,255,255,0.04)';
                    ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.fill();
                    if (isSel) {
                        const ep = 0.55 + 0.4 * Math.sin(t * 3);
                        ctx.strokeStyle = `rgba(200,80,255,${ep})`; ctx.lineWidth = 2.5;
                        ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 12;
                    } else {
                        ctx.strokeStyle = sk.unlocked ? 'rgba(120,80,200,0.35)' : 'rgba(60,50,80,0.35)';
                        ctx.lineWidth = 1; ctx.shadowBlur = 0;
                    }
                    ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.stroke();
                    ctx.shadowBlur = 0;
                    drawPlayerSkin(sk, cx2+cellW/2, cy2+cellH/2 - 8, 1.2);
                    if (!sk.unlocked) {
                        ctx.fillStyle = 'rgba(0,0,0,0.52)';
                        ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.fill();
                        ctx.font = '20px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillStyle = 'rgba(200,200,255,0.5)';
                        ctx.fillText('🔒', cx2+cellW/2, cy2+cellH/2 - 10);
                        // Name above price
                        ctx.font = 'bold 9px monospace'; ctx.textBaseline = 'alphabetic';
                        ctx.fillStyle = 'rgba(200,180,255,0.75)';
                        ctx.fillText(sk.name, cx2+cellW/2, cy2+cellH-22);
                        ctx.font = 'bold 10px monospace';
                        if (sk.shopOnly) {
                            ctx.fillStyle = '#ddaa44';
                            ctx.fillText('🛒 SHOP', cx2+cellW/2, cy2+cellH-10);
                        } else if (sk.price) {
                            ctx.fillStyle = '#aa88cc';
                            ctx.fillText(`${sk.price} pts`, cx2+cellW/2, cy2+cellH-10);
                        } else {
                            ctx.fillStyle = '#664488';
                            ctx.fillText('???', cx2+cellW/2, cy2+cellH-10);
                        }
                    } else {
                        ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
                        ctx.fillStyle = '#aa66dd'; ctx.textBaseline = 'alphabetic';
                        ctx.fillText(sk.name, cx2+cellW/2, cy2+cellH-10);
                    }
                }
                // Action button — lower (extra gap below grid)
                const btnY2 = gridStartY + skinRows*(cellH+gap) + 20;
                const btnW2 = 210, btnH2 = 46, btnX2 = cxL - btnW2/2;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (sel.unlocked) {
                    const isEq = equippedSkin === selectedSkin;
                    const ep2 = 0.5 + 0.45 * Math.sin(t * 3);
                    ctx.fillStyle = isEq ? '#0a1a0a' : '#1a003a';
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = isEq ? `rgba(80,220,120,${ep2})` : `rgba(200,80,255,${ep2})`;
                    ctx.lineWidth = 2; ctx.shadowColor = isEq ? '#44ff88' : '#cc44ff'; ctx.shadowBlur = 14*ep2;
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.font = 'bold 18px monospace'; ctx.fillStyle = isEq ? '#55ffaa' : '#ee88ff';
                    ctx.fillText(isEq ? '✓ EQUIPPED' : 'EQUIP', cxL, btnY2 + btnH2/2);
                } else if (sel.shopOnly) {
                    ctx.fillStyle = '#100800';
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = 'rgba(180,120,20,0.4)'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 15px monospace'; ctx.fillStyle = '#cc8822';
                    ctx.fillText('🛒 BUY IN SHOP', cxL, btnY2 + btnH2/2);
                } else if (sel.price) {
                    const canAfford = lockerPoints >= sel.price;
                    ctx.fillStyle = canAfford ? '#0a2010' : '#1a0a00';
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = canAfford ? 'rgba(60,220,120,0.7)' : 'rgba(180,80,0,0.5)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 18px monospace'; ctx.fillStyle = canAfford ? '#44ffaa' : '#aa5522';
                    ctx.fillText(`BUY  ⬡ ${sel.price}`, cxL, btnY2 + btnH2/2);
                } else {
                    ctx.fillStyle = '#0a0a0a';
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = 'rgba(80,50,80,0.4)'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.roundRect(btnX2, btnY2, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 16px monospace'; ctx.fillStyle = 'rgba(140,100,140,0.5)';
                    ctx.fillText('🔒 NOT FOR SALE', cxL, btnY2 + btnH2/2);
                }

            } else {
                // ── TRAILS TAB ──
                const selT = TRAILS[selectedTrail];

                // Trail grid — ALL trails + ??? slot at end
                const totalTrailSlots = TRAILS.length + 1;
                const trailRows = Math.ceil(totalTrailSlots / cols);
                const tGridY = gridStartY;
                for (let i = 0; i < totalTrailSlots; i++) {
                    const col = i % cols, row = Math.floor(i / cols);
                    const cx2 = gx + col*(cellW+gap), cy2 = tGridY + row*(cellH+gap);
                    if (i === TRAILS.length) { drawComingSoonCell(cx2, cy2); continue; }
                    const tr = TRAILS[i];
                    const isSel = i === selectedTrail;
                    const isEqT = i === equippedTrail;
                    ctx.fillStyle = isSel ? 'rgba(40,160,220,0.18)' : 'rgba(255,255,255,0.04)';
                    ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.fill();
                    if (isSel) {
                        const ep = 0.55 + 0.4 * Math.sin(t * 3);
                        ctx.strokeStyle = `rgba(80,200,255,${ep})`; ctx.lineWidth = 2.5;
                        ctx.shadowColor = '#44bbff'; ctx.shadowBlur = 12;
                    } else {
                        ctx.strokeStyle = tr.unlocked ? 'rgba(60,140,180,0.4)' : 'rgba(50,50,70,0.35)';
                        ctx.lineWidth = 1; ctx.shadowBlur = 0;
                    }
                    ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.stroke();
                    ctx.shadowBlur = 0;
                    const pcxT = cx2 + cellW/2, pcyT = cy2 + cellH/2 - 8;
                    for (let j = 0; j < 8; j++) {
                        const age = ((t * 1.6 + j * 0.18) % 1);
                        const ang = (j / 8) * Math.PI * 2 + t * 0.4;
                        const r2 = 6 + age * 16;
                        tr.draw({ x: pcxT + Math.cos(ang)*r2, y: pcyT + Math.sin(ang)*r2*0.5,
                                  r: 1.5+(1-age)*2, hue: 190+j*18, life: (1-age)*20, maxLife: 20,
                                  wobble: ang, segs: [[1,2],[-1,2],[1,-1],[0,2]] },
                                 tr.unlocked ? (1-age)*0.75 : (1-age)*0.18);
                    }
                    ctx.save(); ctx.globalAlpha = tr.unlocked ? 1 : 0.3;
                    ctx.fillStyle = tr.color; ctx.shadowColor = tr.color; ctx.shadowBlur = tr.unlocked ? 8 : 0;
                    ctx.beginPath(); ctx.arc(pcxT, cy2+cellH-22, 4, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0; ctx.restore();
                    if (!tr.unlocked) {
                        ctx.fillStyle = 'rgba(0,0,0,0.45)';
                        ctx.beginPath(); ctx.roundRect(cx2, cy2, cellW, cellH, 14); ctx.fill();
                        ctx.font = '20px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillStyle = 'rgba(180,220,255,0.45)';
                        ctx.fillText('🔒', cx2+cellW/2, cy2+cellH/2-8);
                        // Name above price
                        ctx.font = 'bold 9px monospace'; ctx.textBaseline = 'alphabetic';
                        ctx.fillStyle = 'rgba(160,220,255,0.75)';
                        ctx.fillText(tr.name, cx2+cellW/2, cy2+cellH-22);
                        ctx.font = 'bold 10px monospace';
                        if (tr.shopOnly) {
                            ctx.fillStyle = '#ddaa44';
                            ctx.fillText('🛒 SHOP', cx2+cellW/2, cy2+cellH-10);
                        } else {
                            ctx.fillStyle = '#6699aa';
                            ctx.fillText(`${tr.price} pts`, cx2+cellW/2, cy2+cellH-10);
                        }
                    } else {
                        // Name label
                        ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
                        ctx.fillStyle = isEqT ? '#55ffcc' : '#66aacc';
                        ctx.fillText(tr.name, cx2+cellW/2, cy2+cellH-10);
                        // EQUIPPED badge on cell
                        if (isEqT) {
                            ctx.fillStyle = 'rgba(10,40,25,0.88)';
                            ctx.beginPath(); ctx.roundRect(cx2+6, cy2+6, 58, 16, 5); ctx.fill();
                            ctx.strokeStyle = 'rgba(50,210,140,0.65)'; ctx.lineWidth = 1;
                            ctx.beginPath(); ctx.roundRect(cx2+6, cy2+6, 58, 16, 5); ctx.stroke();
                            ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            ctx.fillStyle = '#55ffcc';
                            ctx.fillText('✓ EQUIPPED', cx2+35, cy2+14);
                        }
                    }
                }
                // Action button — lower
                const tBtnY = tGridY + trailRows*(cellH+gap) + 20;
                const btnW2 = 210, btnH2 = 46, btnX2 = cxL - btnW2/2;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (selT.unlocked) {
                    const isEqT = equippedTrail === selectedTrail;
                    const ep2 = 0.5 + 0.45 * Math.sin(t * 3);
                    ctx.fillStyle = isEqT ? '#041814' : '#001828';
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = isEqT ? `rgba(60,220,180,${ep2})` : `rgba(60,180,255,${ep2})`;
                    ctx.lineWidth = 2; ctx.shadowColor = isEqT ? '#44ffcc' : '#44aaff'; ctx.shadowBlur = 14*ep2;
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.font = 'bold 18px monospace'; ctx.fillStyle = isEqT ? '#55ffcc' : '#88ddff';
                    ctx.fillText(isEqT ? '✓ EQUIPPED' : 'EQUIP', cxL, tBtnY + btnH2/2);
                } else if (selT.shopOnly) {
                    ctx.fillStyle = '#080a0a';
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = 'rgba(0,200,180,0.4)'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 15px monospace'; ctx.fillStyle = '#00ccbb';
                    ctx.fillText('🛒 BUY IN SHOP', cxL, tBtnY + btnH2/2);
                } else {
                    const canAfford = lockerPoints >= selT.price;
                    ctx.fillStyle = canAfford ? '#081820' : '#100808';
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.fill();
                    ctx.strokeStyle = canAfford ? 'rgba(60,200,160,0.7)' : 'rgba(160,60,40,0.5)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.roundRect(btnX2, tBtnY, btnW2, btnH2, 14); ctx.stroke();
                    ctx.font = 'bold 18px monospace'; ctx.fillStyle = canAfford ? '#44ffcc' : '#aa4422';
                    ctx.fillText(`BUY  ⬡ ${selT.price}`, cxL, tBtnY + btnH2/2);
                }
            }
            ctx.textBaseline = 'alphabetic';
        }

        function drawShop() {
            const t = Date.now() / 1000;
            const cx = BASE_W / 2;

            // Background
            ctx.fillStyle = '#05030a'; ctx.fillRect(0, 0, BASE_W, BASE_H);
            for (let i = 0; i < 20; i++) {
                const bx = (Math.sin(i*97.3)*0.5+0.5)*BASE_W;
                const by = (Math.cos(i*113.7)*0.5+0.5)*BASE_H;
                ctx.fillStyle = `rgba(255,180,50,${0.04+0.07*Math.abs(Math.sin(t*0.8+i))})`;
                ctx.beginPath(); ctx.arc(bx, by, 1.4, 0, Math.PI*2); ctx.fill();
            }

            // Header
            ctx.fillStyle = 'rgba(6,3,0,0.97)'; ctx.fillRect(0, 0, BASE_W, 58);
            ctx.strokeStyle = 'rgba(220,140,0,0.35)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0,58); ctx.lineTo(BASE_W,58); ctx.stroke();

            // Back button
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.beginPath(); ctx.roundRect(10, 12, 44, 34, 9); ctx.fill();
            ctx.strokeStyle = 'rgba(200,140,0,0.4)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(10, 12, 44, 34, 9); ctx.stroke();
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = 'bold 18px monospace'; ctx.fillStyle = '#ddaa33';
            ctx.fillText('←', 32, 29);

            // Title
            ctx.font = 'bold 22px monospace';
            ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 14;
            ctx.fillStyle = '#ffcc44';
            ctx.fillText('🛒  SHOP', cx, 30);
            ctx.shadowBlur = 0;
            // Points
            ctx.textAlign = 'right'; ctx.font = 'bold 14px monospace';
            ctx.fillStyle = '#ffcc44';
            ctx.fillText(`⬡ ${lockerPoints} pts`, BASE_W - 12, 36);

            // Items list — bundles get a taller card
            const skinItemH = 90, bundleItemH = 160, itemGap = 10;
            const itemW = BASE_W - 32, itemX = 16;
            let curY = 70;
            ctx.textAlign = 'left'; ctx.textBaseline = 'middle';

            for (let i = 0; i < SHOP_ITEMS.length; i++) {
                const item = SHOP_ITEMS[i];
                const isBundle = item.type === 'bundle';
                const isTrail = item.type === 'trail';
                const itemH = isBundle ? bundleItemH : skinItemH;
                const iy = curY;
                curY += itemH + itemGap;

                const owned = item.owned;
                const canAfford = lockerPoints >= item.price;
                const pulse = 0.55 + 0.4 * Math.sin(t * 2.5 + i);

                // card bg
                if (isBundle) {
                    const bgg = ctx.createLinearGradient(itemX, iy, itemX, iy + itemH);
                    bgg.addColorStop(0, owned ? 'rgba(10,28,16,0.95)' : 'rgba(14,10,4,0.95)');
                    bgg.addColorStop(1, owned ? 'rgba(6,18,10,0.95)' : 'rgba(8,5,0,0.95)');
                    ctx.fillStyle = bgg;
                } else {
                    ctx.fillStyle = owned ? 'rgba(10,30,10,0.9)' : 'rgba(12,8,2,0.92)';
                }
                ctx.beginPath(); ctx.roundRect(itemX, iy, itemW, itemH, 14); ctx.fill();

                // card border
                if (owned) {
                    ctx.strokeStyle = `rgba(60,200,100,${pulse * 0.7})`; ctx.lineWidth = 2;
                    ctx.shadowColor = '#44ff88'; ctx.shadowBlur = 8 * pulse;
                } else if (isBundle) {
                    ctx.strokeStyle = `rgba(${canAfford ? item.tagColor.slice(1).match(/../g).map(h=>parseInt(h,16)).join(',') : '80,60,20'},${pulse * 0.85})`;
                    ctx.lineWidth = 2; ctx.shadowColor = canAfford ? item.tagColor : 'transparent';
                    ctx.shadowBlur = canAfford ? 10 * pulse : 0;
                } else {
                    ctx.strokeStyle = `rgba(${canAfford ? '220,160,40' : '100,70,20'},${pulse * 0.7})`;
                    ctx.lineWidth = 1.5; ctx.shadowBlur = 0;
                }
                ctx.beginPath(); ctx.roundRect(itemX, iy, itemW, itemH, 14); ctx.stroke();
                ctx.shadowBlur = 0;

                if (isBundle) {
                    // ── BUNDLE LAYOUT ──
                    const skinHalfH = Math.round(itemH * 0.56); // ~90px
                    const trailHalfH = itemH - skinHalfH;       // ~70px
                    const divY = iy + skinHalfH;
                    const textX = itemX + 84; // right-column text start

                    // Divider line
                    ctx.save(); ctx.globalAlpha = 0.22;
                    ctx.strokeStyle = item.tagColor; ctx.lineWidth = 1;
                    ctx.setLineDash([5, 4]);
                    ctx.beginPath(); ctx.moveTo(itemX + 14, divY); ctx.lineTo(itemX + itemW - 14, divY); ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();

                    // ── SKIN HALF (top) ──
                    // Skin preview — left column, vertically centered
                    ctx.save();
                    ctx.translate(itemX + 50, iy + skinHalfH * 0.52);
                    ctx.scale(1.1, 1.1);
                    SKINS[item.skinIdx].draw(0, 0, 1);
                    ctx.restore();

                    // BUNDLE tag pill — top of right column
                    const tagPillX = textX, tagPillY = iy + 12;
                    ctx.fillStyle = item.tagColor + '28';
                    ctx.beginPath(); ctx.roundRect(tagPillX, tagPillY, 70, 19, 6); ctx.fill();
                    ctx.strokeStyle = item.tagColor + 'cc'; ctx.lineWidth = 1.2;
                    ctx.shadowColor = item.tagColor; ctx.shadowBlur = 5;
                    ctx.beginPath(); ctx.roundRect(tagPillX, tagPillY, 70, 19, 6); ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 9px monospace'; ctx.fillStyle = item.tagColor;
                    ctx.fillText(item.tag, tagPillX + 35, tagPillY + 9.5);

                    // Bundle name — below tag pill
                    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 15px monospace';
                    ctx.fillStyle = owned ? '#88ffaa' : (canAfford ? item.tagColor : '#886644');
                    if (canAfford && !owned) { ctx.shadowColor = item.tagColor; ctx.shadowBlur = 5; }
                    ctx.fillText(item.name, textX, iy + 44);
                    ctx.shadowBlur = 0;

                    // Skin name — below bundle name (muted, small)
                    ctx.font = '11px monospace'; ctx.fillStyle = 'rgba(180,165,130,0.6)';
                    ctx.fillText('Skin: ' + SKINS[item.skinIdx].name, textX, iy + 62);

                    // ── TRAIL HALF (bottom) ──
                    const tr = TRAILS[item.trailIdx];
                    if (tr) {
                        const trCx = itemX + 50, trCy = divY + trailHalfH * 0.5;

                        // TRAIL label
                        ctx.font = 'bold 9px monospace'; ctx.fillStyle = 'rgba(200,180,120,0.5)';
                        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
                        ctx.fillText('TRAIL', textX, divY + 10);

                        // Trail name
                        ctx.font = 'bold 14px monospace';
                        ctx.fillStyle = owned ? '#88eeff' : (canAfford ? '#aaddff' : '#446677');
                        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                        ctx.fillText(tr.name, textX, divY + trailHalfH * 0.62);

                        // Color dot after trail name
                        const tNameW = ctx.measureText(tr.name).width;
                        ctx.save(); ctx.fillStyle = tr.color;
                        ctx.shadowColor = tr.color; ctx.shadowBlur = owned ? 8 : 3;
                        ctx.beginPath(); ctx.arc(textX + tNameW + 10, divY + trailHalfH * 0.62, 4, 0, Math.PI*2); ctx.fill();
                        ctx.shadowBlur = 0; ctx.restore();

                        // Animated trail orbs (left column, trail half)
                        for (let j = 0; j < 10; j++) {
                            const age = ((t * 1.8 + j * 0.2) % 1);
                            const ang = (j / 10) * Math.PI * 2 + t * 0.6;
                            const orb = 14 + age * 17;
                            tr.draw({ x: trCx + Math.cos(ang) * orb, y: trCy + Math.sin(ang) * orb * 0.42,
                                      r: 2.8*(1-age)+0.5, hue: 190+j*18, life: (1-age)*22, maxLife: 22,
                                      wobble: ang, segs: [[2,3],[-2,2],[2,-2],[0,3]] }, (1-age)*0.85);
                        }
                    }

                } else if (isTrail) {
                    // ── TRAIL LAYOUT ──
                    const tr = TRAILS[item.trailIdx];
                    if (tr) {
                        const trCx = itemX + 44, trCy = iy + itemH/2;
                        for (let j = 0; j < 9; j++) {
                            const age = ((t * 1.9 + j * 0.18) % 1);
                            const ang = (j / 9) * Math.PI * 2 + t * 0.5;
                            const orb = 10 + age * 17;
                            tr.draw({ x: trCx + Math.cos(ang)*orb, y: trCy + Math.sin(ang)*orb*0.42,
                                      r: 2.5*(1-age)+0.4, hue: 165+j*22, life: (1-age)*22, maxLife: 22,
                                      wobble: ang, segs: [[2,3],[-2,2],[2,-2],[0,3]] }, (1-age) * (owned ? 0.85 : 0.4));
                        }
                        ctx.beginPath(); ctx.arc(trCx, trCy, 5, 0, Math.PI*2);
                        ctx.fillStyle = tr.color; ctx.shadowColor = tr.color; ctx.shadowBlur = owned ? 10 : 3;
                        ctx.fill(); ctx.shadowBlur = 0;
                    }
                    // tag pill
                    const tagXT = itemX + 80, tagYT = iy + 12;
                    ctx.fillStyle = item.tagColor + '22';
                    ctx.beginPath(); ctx.roundRect(tagXT, tagYT, 72, 18, 6); ctx.fill();
                    ctx.strokeStyle = item.tagColor + '99'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.roundRect(tagXT, tagYT, 72, 18, 6); ctx.stroke();
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 9px monospace'; ctx.fillStyle = item.tagColor;
                    ctx.fillText(item.tag, tagXT + 36, tagYT + 9);
                    // name
                    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 15px monospace';
                    ctx.fillStyle = owned ? '#88ffee' : (canAfford ? item.tagColor : '#226655');
                    if (canAfford && !owned) { ctx.shadowColor = item.tagColor; ctx.shadowBlur = 5; }
                    ctx.fillText(item.name, itemX + 82, iy + 38);
                    ctx.shadowBlur = 0;
                    // desc
                    ctx.font = '11px monospace'; ctx.fillStyle = 'rgba(120,200,190,0.7)';
                    ctx.fillText(item.desc, itemX + 82, iy + 57);
                } else {
                    // ── REGULAR SKIN LAYOUT ──
                    ctx.save();
                    ctx.translate(itemX + 44, iy + itemH/2 + 4);
                    ctx.scale(0.9, 0.9);
                    SKINS[item.skinIdx].draw(0, 0, 1);
                    ctx.restore();

                    // tag pill
                    const tagX = itemX + 80, tagY = iy + 12;
                    ctx.fillStyle = item.tagColor + '22';
                    ctx.beginPath(); ctx.roundRect(tagX, tagY, 72, 18, 6); ctx.fill();
                    ctx.strokeStyle = item.tagColor + '99'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.roundRect(tagX, tagY, 72, 18, 6); ctx.stroke();
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 9px monospace'; ctx.fillStyle = item.tagColor;
                    ctx.fillText(item.tag, tagX + 36, tagY + 9);

                    // name
                    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    ctx.font = 'bold 15px monospace';
                    ctx.fillStyle = owned ? '#88ffaa' : (canAfford ? '#ffdd88' : '#886644');
                    ctx.fillText(item.name, itemX + 82, iy + 38);

                    // desc
                    ctx.font = '11px monospace'; ctx.fillStyle = 'rgba(180,150,100,0.7)';
                    ctx.fillText(item.desc, itemX + 82, iy + 57);
                }

                // price / owned badge (right side) — same for both types
                const badgeX = itemX + itemW - 86, badgeY = iy + (isBundle ? bundleItemH * 0.22 : itemH/2) - 16;
                if (owned) {
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillStyle = 'rgba(40,80,40,0.9)';
                    ctx.beginPath(); ctx.roundRect(badgeX, badgeY, 76, 32, 8); ctx.fill();
                    ctx.strokeStyle = 'rgba(60,200,100,0.5)'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.roundRect(badgeX, badgeY, 76, 32, 8); ctx.stroke();
                    ctx.font = 'bold 12px monospace'; ctx.fillStyle = '#55ffaa';
                    ctx.fillText('✓ OWNED', badgeX + 38, badgeY + 16);
                } else {
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillStyle = canAfford ? 'rgba(40,25,0,0.9)' : 'rgba(20,10,0,0.9)';
                    ctx.beginPath(); ctx.roundRect(badgeX, badgeY, 76, 32, 8); ctx.fill();
                    ctx.strokeStyle = canAfford ? `rgba(220,160,40,${pulse * 0.8})` : 'rgba(100,60,10,0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.roundRect(badgeX, badgeY, 76, 32, 8); ctx.stroke();
                    ctx.font = 'bold 10px monospace'; ctx.fillStyle = '#ffcc44';
                    ctx.fillText('⬡', badgeX + 22, badgeY + 16);
                    ctx.font = 'bold 13px monospace';
                    ctx.fillStyle = canAfford ? '#ffdd44' : '#886622';
                    ctx.fillText(item.price, badgeX + 52, badgeY + 16);
                }
            }

            // ── Confirmation overlay ──
            if (shopConfirm) {
                ctx.fillStyle = 'rgba(0,0,0,0.72)';
                ctx.fillRect(0, 0, BASE_W, BASE_H);

                const dW = 320, dH = 260, dX = cx - dW/2, dY = BASE_H/2 - dH/2;
                ctx.fillStyle = '#08040c';
                ctx.beginPath(); ctx.roundRect(dX, dY, dW, dH, 18); ctx.fill();
                const ep = 0.5 + 0.45 * Math.sin(t * 4);
                ctx.strokeStyle = `rgba(255,180,0,${ep})`; ctx.lineWidth = 2.5;
                ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 16 * ep;
                ctx.beginPath(); ctx.roundRect(dX, dY, dW, dH, 18); ctx.stroke();
                ctx.shadowBlur = 0;

                // Skin or trail preview in dialog
                if (shopConfirm.type === 'trail') {
                    const dtr = TRAILS[shopConfirm.trailIdx];
                    if (dtr) {
                        for (let j = 0; j < 10; j++) {
                            const age = ((t * 2.2 + j * 0.13) % 1);
                            const ang = (j / 10) * Math.PI * 2 + t * 0.7;
                            const orb = 16 + age * 20;
                            dtr.draw({ x: cx + Math.cos(ang)*orb, y: dY+68 + Math.sin(ang)*orb*0.42,
                                       r: 3*(1-age)+0.5, hue: 165+j*22, life: (1-age)*22, maxLife: 22,
                                       wobble: ang, segs: [[2,3],[-2,2],[2,-2],[0,3]] }, (1-age)*0.9);
                        }
                        ctx.beginPath(); ctx.arc(cx, dY+68, 7, 0, Math.PI*2);
                        ctx.fillStyle = dtr.color; ctx.shadowColor = dtr.color; ctx.shadowBlur = 14;
                        ctx.fill(); ctx.shadowBlur = 0;
                    }
                } else {
                    ctx.save();
                    ctx.translate(cx, dY + 68);
                    ctx.scale(1.5, 1.5);
                    SKINS[shopConfirm.skinIdx].draw(0, 0, 1);
                    ctx.restore();
                }

                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = 'bold 16px monospace'; ctx.fillStyle = '#ffdd88';
                ctx.fillText(`Buy "${shopConfirm.name}"?`, cx, dY + 124);
                ctx.font = '12px monospace'; ctx.fillStyle = '#ffcc44';
                ctx.fillText(`⬡ ${shopConfirm.price} pts`, cx, dY + 146);
                ctx.font = '11px monospace'; ctx.fillStyle = 'rgba(180,150,100,0.7)';
                ctx.fillText(shopConfirm.desc, cx, dY + 164);

                // YES button
                const yBtnX = dX + 24, yBtnY = dY + dH - 58, yBtnW = (dW - 60) / 2;
                ctx.fillStyle = '#082008';
                ctx.beginPath(); ctx.roundRect(yBtnX, yBtnY, yBtnW, 40, 10); ctx.fill();
                ctx.strokeStyle = `rgba(60,220,100,${ep})`; ctx.lineWidth = 2;
                ctx.shadowColor = '#44ff88'; ctx.shadowBlur = 10 * ep;
                ctx.beginPath(); ctx.roundRect(yBtnX, yBtnY, yBtnW, 40, 10); ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.font = 'bold 15px monospace'; ctx.fillStyle = '#55ffaa';
                ctx.fillText('✓ YES', yBtnX + yBtnW/2, yBtnY + 20);

                // NO button
                const nBtnX = dX + dW - 24 - yBtnW, nBtnY = yBtnY;
                ctx.fillStyle = '#200808';
                ctx.beginPath(); ctx.roundRect(nBtnX, nBtnY, yBtnW, 40, 10); ctx.fill();
                ctx.strokeStyle = 'rgba(200,60,40,0.6)'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.roundRect(nBtnX, nBtnY, yBtnW, 40, 10); ctx.stroke();
                ctx.font = 'bold 15px monospace'; ctx.fillStyle = '#ff6655';
                ctx.fillText('✕ NO', nBtnX + yBtnW/2, nBtnY + 20);
            }

            ctx.textBaseline = 'alphabetic';
        }

        // ── MAIN MENU ──────────────────────────────────
        // Persistent star field for animated background
        if (!window._menuStars) {
            window._menuStars = Array.from({length: 60}, () => ({
                x: Math.random() * 480,
                y: Math.random() * 800,
                r: 0.5 + Math.random() * 1.8,
                speed: 0.08 + Math.random() * 0.18,
                phase: Math.random() * Math.PI * 2
            }));
            window._menuSnow = Array.from({length: 22}, () => ({
                x: Math.random() * 480,
                y: Math.random() * 800,
                r: 1.5 + Math.random() * 2.5,
                speed: 0.25 + Math.random() * 0.5,
                drift: (Math.random() - 0.5) * 0.3,
                phase: Math.random() * Math.PI * 2
            }));
        }
        function drawMainMenu() {
            const t = Date.now() / 1000;
            const cx = BASE_W / 2;

            // ── BACKGROUND — deep navy to midnight blue ──
            const grad = ctx.createLinearGradient(0, 0, 0, BASE_H);
            grad.addColorStop(0,    'rgba(4,2,28,1)');
            grad.addColorStop(0.3,  'rgba(8,14,60,1)');
            grad.addColorStop(0.65, 'rgba(4,24,72,1)');
            grad.addColorStop(1,    'rgba(2,10,38,1)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, BASE_W, BASE_H);

            // Radial hero glow behind character area
            const heroGlow = ctx.createRadialGradient(cx, 290, 0, cx, 290, 240);
            heroGlow.addColorStop(0, 'rgba(20,50,160,0.22)');
            heroGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = heroGlow;
            ctx.fillRect(0, 0, BASE_W, BASE_H);

            // ── ANIMATED STAR FIELD ──
            ctx.save();
            for (const s of window._menuStars) {
                const twinkle = 0.35 + 0.65 * Math.abs(Math.sin(t * s.speed * 5 + s.phase));
                ctx.globalAlpha = twinkle * 0.9;
                ctx.fillStyle = '#cce8ff';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                // bright cross-sparkle on bigger stars
                if (s.r > 1.4 && twinkle > 0.8) {
                    ctx.globalAlpha = twinkle * 0.5;
                    ctx.strokeStyle = '#aaddff';
                    ctx.lineWidth = 0.7;
                    ctx.beginPath();
                    ctx.moveTo(s.x - s.r * 2.5, s.y); ctx.lineTo(s.x + s.r * 2.5, s.y);
                    ctx.moveTo(s.x, s.y - s.r * 2.5); ctx.lineTo(s.x, s.y + s.r * 2.5);
                    ctx.stroke();
                }
            }
            // Floating snowflakes
            for (const sn of window._menuSnow) {
                const sy = (sn.y + t * sn.speed * 40) % 810 - 10;
                const sx = sn.x + Math.sin(t * 0.5 + sn.phase) * 12;
                ctx.globalAlpha = 0.18 + 0.12 * Math.sin(t * 1.2 + sn.phase);
                ctx.fillStyle = '#ddf4ff';
                ctx.beginPath(); ctx.arc(sx, sy, sn.r, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.restore();

            // Decorative side accent lines
            ctx.save();
            ctx.globalAlpha = 0.14;
            const lineGrad = ctx.createLinearGradient(0, 0, 0, BASE_H);
            lineGrad.addColorStop(0, C.UI_ACCENT); lineGrad.addColorStop(1, 'transparent');
            ctx.strokeStyle = lineGrad; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(WALL_W - 1, 0); ctx.lineTo(WALL_W - 1, BASE_H); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + 1, 0); ctx.lineTo(BASE_W - WALL_W + 1, BASE_H); ctx.stroke();
            ctx.restore();

            // ── TITLE ──
            const pulse = 0.7 + Math.sin(t * 2) * 0.3;
            const shimmer = (Math.sin(t * 3.5) + 1) / 2; // 0..1

            // Outer halo
            drawGlow(ctx, '#60b8ff', cx, 66, 140, Math.floor(55 * pulse));

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

            // Drop-shadow pass
            ctx.font = 'bold 44px monospace';
            ctx.fillStyle = 'rgba(0,8,40,0.9)';
            ctx.fillText('THE ICY TOWER', cx + 3, 71);

            // Shimmer gradient that slides across the title text
            const shimX = (cx - 155) + shimmer * 310;
            const tg = ctx.createLinearGradient(shimX - 80, 46, shimX + 80, 86);
            tg.addColorStop(0,   '#5ab4f0');
            tg.addColorStop(0.4, '#c8eeff');
            tg.addColorStop(0.5, '#ffffff');
            tg.addColorStop(0.6, '#c8eeff');
            tg.addColorStop(1,   '#5ab4f0');
            ctx.fillStyle = tg;
            ctx.fillText('THE ICY TOWER', cx, 68);

            // Sparkle dots along title top edge
            ctx.save();
            for (let i = 0; i < 5; i++) {
                const sp = (t * 0.8 + i * 0.22) % 1;
                const spx = (cx - 148) + i * 74 + Math.sin(t + i) * 8;
                const spy = 30 + Math.sin(t * 2 + i * 1.3) * 6;
                const sa = Math.abs(Math.sin(t * 2.5 + i * 0.9));
                ctx.globalAlpha = sa * 0.9;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(spx, spy, 1.5 + sa * 2, 0, Math.PI * 2); ctx.fill();
                if (sa > 0.7) {
                    ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(spx - 5, spy); ctx.lineTo(spx + 5, spy);
                    ctx.moveTo(spx, spy - 5); ctx.lineTo(spx, spy + 5);
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1;
            ctx.restore();

            // Subtitle
            ctx.font = 'bold 13px monospace';
            ctx.fillStyle = C.BOOK_GLOW;
            ctx.globalAlpha = 0.85;
            ctx.fillText('Reach the Magic Book at the top!', cx, 100);
            ctx.globalAlpha = 1;

            // Separator line
            ctx.strokeStyle = C.UI_ACCENT; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.28;
            ctx.beginPath(); ctx.moveTo(WALL_W + 20, 118); ctx.lineTo(BASE_W - WALL_W - 20, 118); ctx.stroke();
            ctx.globalAlpha = 1;

            // ── CHARACTER PREVIEW ──
            const prevCy = 295;
            const eqSkin = SKINS[equippedSkin] || SKINS[0];
            const eqTrail = TRAILS[equippedTrail];

            // Character glow
            drawGlow(ctx, C.UI_ACCENT, cx, prevCy, 90, Math.floor(38 * pulse));

            // Shadow ellipse under character
            ctx.save();
            ctx.globalAlpha = 0.25 + 0.1 * Math.sin(t * 1.6);
            const shadowEll = ctx.createRadialGradient(cx, prevCy + 58, 0, cx, prevCy + 58, 55);
            shadowEll.addColorStop(0, 'rgba(0,0,0,0.7)');
            shadowEll.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = shadowEll;
            ctx.beginPath(); ctx.ellipse(cx, prevCy + 58, 55, 12, 0, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();

            // Platform
            const platW = 130, platH = 11, platX = cx - platW / 2, platY = prevCy + 50;
            const platGrad = ctx.createLinearGradient(platX, platY, platX, platY + platH);
            platGrad.addColorStop(0, C.PLAT_TOP); platGrad.addColorStop(1, C.PLAT);
            ctx.fillStyle = platGrad;
            ctx.beginPath(); ctx.roundRect(platX, platY, platW, platH, 5); ctx.fill();
            // Platform glow border
            ctx.save();
            ctx.shadowColor = C.UI_ACCENT; ctx.shadowBlur = 10;
            ctx.strokeStyle = C.UI_ACCENT; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.55;
            ctx.beginPath(); ctx.roundRect(platX, platY, platW, platH, 5); ctx.stroke();
            ctx.restore();
            ctx.fillStyle = 'rgba(255,255,255,0.28)';
            ctx.fillRect(platX + 7, platY + 2, platW - 14, 2);

            // Trail
            if (eqTrail && eqTrail.unlocked) {
                for (let j = 0; j < 14; j++) {
                    const age = ((t * 1.8 + j * 0.1) % 1);
                    const px = cx - 18 - age * 70;
                    const py = prevCy - 4 + Math.sin(age * 5 + j * 0.9) * 7;
                    eqTrail.draw({
                        x: px, y: py,
                        r: 2.0 + (1 - age) * 3.5,
                        hue: 190 + j * 16,
                        life: (1 - age) * 20, maxLife: 20,
                        wobble: j * 0.8,
                        segs: [[1,2],[-1,2],[1,-1],[0,2]]
                    }, (1 - age) * 0.9);
                }
            }

            // Character — BIG (scale 2.2) with bob
            const charBob = Math.sin(t * 1.6) * 3;
            ctx.save();
            ctx.translate(cx, prevCy - 4 + charBob);
            ctx.scale(2.2, 2.2);
            eqSkin.draw(0, 0, 1);
            ctx.restore();

            // Skin name badge
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const badgeW = 128, badgeH = 24, badgeX = cx - badgeW / 2, badgeY = prevCy + 64;
            const badgeBg = ctx.createLinearGradient(badgeX, badgeY, badgeX, badgeY + badgeH);
            badgeBg.addColorStop(0, 'rgba(10,30,70,0.85)');
            badgeBg.addColorStop(1, 'rgba(0,15,40,0.85)');
            ctx.fillStyle = badgeBg;
            ctx.beginPath(); ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 9); ctx.fill();
            ctx.save(); ctx.shadowColor = C.UI_ACCENT; ctx.shadowBlur = 8;
            ctx.strokeStyle = C.UI_ACCENT; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.55;
            ctx.beginPath(); ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 9); ctx.stroke();
            ctx.restore();
            ctx.font = 'bold 13px monospace';
            ctx.fillStyle = 'rgba(180,230,255,0.97)';
            ctx.shadowColor = '#44aaff'; ctx.shadowBlur = 6;
            ctx.fillText(eqSkin.name, cx, badgeY + badgeH / 2 + 1);
            ctx.shadowBlur = 0;

            // Trail dot + name
            if (eqTrail) {
                const trY = prevCy + 99;
                ctx.beginPath(); ctx.arc(cx - 32, trY, 4.5, 0, Math.PI * 2);
                ctx.fillStyle = eqTrail.color;
                ctx.shadowColor = eqTrail.color; ctx.shadowBlur = 9;
                ctx.fill(); ctx.shadowBlur = 0;
                ctx.font = 'bold 12px monospace';
                ctx.textAlign = 'left';
                ctx.fillStyle = eqTrail.unlocked ? 'rgba(160,220,255,0.85)' : 'rgba(120,160,180,0.5)';
                ctx.fillText(eqTrail.name, cx - 22, trY + 1);
                ctx.textAlign = 'center';
            }


            // Separator
            ctx.strokeStyle = C.UI_ACCENT; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.22;
            ctx.beginPath(); ctx.moveTo(WALL_W + 20, 420); ctx.lineTo(BASE_W - WALL_W - 20, 420); ctx.stroke();
            ctx.globalAlpha = 1;

            // ── BUTTONS ──
            const btnW = 228, btnH = 62, btnX = cx - btnW / 2;

            // ▶ PLAY — gradient fill, animated glow
            const btnGlow = 0.55 + Math.sin(t * 3) * 0.45;
            const btnY = 428;
            drawGlow(ctx, '#80ffa0', cx, btnY + btnH / 2, 90, Math.floor(60 * btnGlow));
            const playBg = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
            playBg.addColorStop(0, '#0e3c20');
            playBg.addColorStop(1, '#061a10');
            ctx.fillStyle = playBg;
            ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 16); ctx.fill();
            ctx.save(); ctx.shadowColor = '#58e88a'; ctx.shadowBlur = 12;
            ctx.strokeStyle = '#58e88a'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 16); ctx.stroke();
            ctx.restore();
            // Inner shine
            ctx.fillStyle = 'rgba(255,255,255,0.07)';
            ctx.beginPath(); ctx.roundRect(btnX + 5, btnY + 5, btnW - 10, btnH / 2 - 5, [12, 12, 0, 0]); ctx.fill();
            ctx.font = 'bold 30px monospace'; ctx.fillStyle = '#6cf59a';
            ctx.shadowColor = '#58e88a'; ctx.shadowBlur = 10;
            ctx.fillText('▶  PLAY', cx, btnY + btnH / 2 + 1);
            ctx.shadowBlur = 0;

            // 📖 TUTORIAL
            const tutY = 504, tutH = 50;
            const tutBg = ctx.createLinearGradient(btnX, tutY, btnX, tutY + tutH);
            tutBg.addColorStop(0, '#0d1a3c'); tutBg.addColorStop(1, '#070e22');
            ctx.fillStyle = tutBg;
            ctx.beginPath(); ctx.roundRect(btnX, tutY, btnW, tutH, 13); ctx.fill();
            ctx.strokeStyle = C.UI_ACCENT; ctx.lineWidth = 1.8;
            ctx.beginPath(); ctx.roundRect(btnX, tutY, btnW, tutH, 13); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.04)';
            ctx.beginPath(); ctx.roundRect(btnX + 4, tutY + 4, btnW - 8, tutH / 2 - 4, [9, 9, 0, 0]); ctx.fill();
            ctx.font = 'bold 21px monospace'; ctx.fillStyle = C.UI_ACCENT;
            ctx.fillText('📖  TUTORIAL', cx, tutY + tutH / 2 + 1);

            // LOCKER + SHOP side buttons
            const sideW = 106, sideH = 50, sideY = 568, sideGap = 12;
            const leftX = cx - sideW - sideGap / 2, rightX = cx + sideGap / 2;

            // 🔓 LOCKER
            const lockBg = ctx.createLinearGradient(leftX, sideY, leftX, sideY + sideH);
            lockBg.addColorStop(0, '#1c0a2c'); lockBg.addColorStop(1, '#0c0518');
            ctx.fillStyle = lockBg;
            ctx.beginPath(); ctx.roundRect(leftX, sideY, sideW, sideH, 13); ctx.fill();
            ctx.strokeStyle = '#cc44ff'; ctx.lineWidth = 1.8;
            ctx.beginPath(); ctx.roundRect(leftX, sideY, sideW, sideH, 13); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.04)';
            ctx.beginPath(); ctx.roundRect(leftX + 3, sideY + 3, sideW - 6, sideH / 2 - 3, [10, 10, 0, 0]); ctx.fill();
            ctx.font = 'bold 15px monospace'; ctx.fillStyle = '#dd66ff';
            ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 7;
            ctx.fillText('🔓 LOCKER', leftX + sideW / 2, sideY + sideH / 2 + 1);
            ctx.shadowBlur = 0;

            // 🛒 SHOP
            const shopBg = ctx.createLinearGradient(rightX, sideY, rightX, sideY + sideH);
