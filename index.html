    <script>
    // ── SFX — Web Audio procedural sounds (no external files) ──────────────
    const SFX = (() => {
        let _ac = null, _master = null;
        function _ctx() {
            if (!_ac) {
                _ac = new (window.AudioContext || window.webkitAudioContext)();
                _master = _ac.createGain();
                _master.gain.value = parseFloat(localStorage.getItem('icySfxVol') ?? '0.8');
                _master.connect(_ac.destination);
            }
            if (_ac.state === 'suspended') _ac.resume();
            return _ac;
        }
        function _env(ac, vol, t0, decay) {
            const g = ac.createGain();
            g.gain.setValueAtTime(vol, t0);
            g.gain.exponentialRampToValueAtTime(0.0001, t0 + decay);
            g.connect(_master);
            return g;
        }
        function _osc(ac, type, freq, t0, decay, vol) {
            const o = ac.createOscillator();
            o.type = type; o.frequency.setValueAtTime(freq, t0);
            o.connect(_env(ac, vol, t0, decay));
            o.start(t0); o.stop(t0 + decay + 0.05);
        }
        function _sweep(ac, type, f0, f1, t0, decay, vol) {
            const o = ac.createOscillator();
            o.type = type;
            o.frequency.setValueAtTime(f0, t0);
            o.frequency.exponentialRampToValueAtTime(f1, t0 + decay);
            o.connect(_env(ac, vol, t0, decay));
            o.start(t0); o.stop(t0 + decay + 0.05);
        }
        function _noise(ac, t0, decay, vol, cutoff = 300) {
            const size = Math.floor(ac.sampleRate * (decay + 0.05));
            const buf = ac.createBuffer(1, size, ac.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < size; i++) d[i] = Math.random() * 2 - 1;
            const src = ac.createBufferSource(); src.buffer = buf;
            const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = cutoff;
            src.connect(lp); lp.connect(_env(ac, vol, t0, decay));
            src.start(t0); src.stop(t0 + decay + 0.05);
        }
        const S = {
            jump()     { const ac=_ctx(),t=ac.currentTime; _sweep(ac,'sine',220,520,t,0.10,0.36); },
            highjump() {},
            bounce()   { const ac=_ctx(),t=ac.currentTime; _sweep(ac,'sine',180,660,t,0.12,0.40); },
            land()    { const ac=_ctx(),t=ac.currentTime; _noise(ac,t,0.055,0.13,180); _sweep(ac,'sine',110,55,t,0.06,0.12); },
            coin()    { const ac=_ctx(),t=ac.currentTime; _osc(ac,'sine',1047,t,0.07,0.18); _osc(ac,'sine',1319,t+0.055,0.10,0.22); },
            powerup() { const ac=_ctx(),t=ac.currentTime; [523,659,784,1047].forEach((f,i)=>_osc(ac,'sine',f,t+i*0.085,0.14+i*0.02,0.18+i*0.03)); },
            death()   { const ac=_ctx(),t=ac.currentTime; _sweep(ac,'sawtooth',380,55,t,0.65,0.22); _noise(ac,t,0.18,0.12,400); },
            win()     { const ac=_ctx(),t=ac.currentTime; [523,659,784,1047,1319].forEach((f,i)=>_osc(ac,'sine',f,t+i*0.11,0.20,0.22)); },
            shield()  { const ac=_ctx(),t=ac.currentTime; _noise(ac,t,0.09,0.22,600); _sweep(ac,'square',280,140,t,0.12,0.14); },
            click()   { const ac=_ctx(),t=ac.currentTime; _sweep(ac,'sine',700,350,t,0.045,0.14); },
            buy()     { const ac=_ctx(),t=ac.currentTime; _osc(ac,'sine',880,t,0.07,0.18); _osc(ac,'sine',1100,t+0.06,0.12,0.22); },
            enter()   {
                // last note t+0.14, decay 0.14 → silent at t+0.28 → delay 300ms
                const ac=_ctx(),t=ac.currentTime;
                _osc(ac,'sine',784,t,0.08,0.14);
                _osc(ac,'sine',1047,t+0.14,0.14,0.17);
            },
            pause()   {
                // last note t+0.12, decay 0.14 → silent at t+0.26 → delay 280ms
                const ac=_ctx(),t=ac.currentTime;
                _osc(ac,'sine',784,t,0.08,0.11);
                _osc(ac,'sine',523,t+0.12,0.14,0.11);
            },
        };
        return {
            play(name) { try { S[name]?.(); } catch(e) {} },
            setVol(v)  { _ctx(); _master.gain.setTargetAtTime(v, _ac.currentTime, 0.05); localStorage.setItem('icySfxVol', v); },
            getVol()   { return _master ? _master.gain.value : parseFloat(localStorage.getItem('icySfxVol') ?? '0.8'); },
        };
    })();

    const MUSIC = (() => {
        let _ac = null, _mg = null, _current = null, _tmr = null, _stopTimer = null;
        let _beat = 0, _nextT = 0, _pendingTrack = null;

        const F = {
            Bb2:116.54, C3:130.81, D3:146.83, Eb3:155.56, E3:164.81, F3:174.61,
            G3:196, Ab3:207.65, A3:220, Bb3:233.08, B3:246.94,
            C4:261.63, D4:293.66, Eb4:311.13, E4:329.63, F4:349.23,
            G4:392, Ab4:415.30, A4:440, Bb4:466.16, B4:493.88,
            C5:523.25, D5:587.33, Eb5:622.25, E5:659.25, F5:698.46,
            G5:783.99, Ab5:830.61, A5:880, Bb5:932.33, B5:987.77,
            C6:1046.50,
            // bass octaves
            C2:65.41, D2:73.42, E2:82.41, F2:87.31, G2:98, Ab2:103.83, A2:110, Bb2_:116.54,
        };
        F.Bb2 = 116.54;

        function _init() {
            if (_ac) { if (_ac.state === 'suspended') _ac.resume(); return _ac; }
            _ac = new (window.AudioContext || window.webkitAudioContext)();
            _mg = _ac.createGain(); _mg.gain.value = 0; _mg.connect(_ac.destination);
            return _ac;
        }
        function _tone(freq, t, dur, vol, type) {
            if (!freq || vol <= 0) return;
            const ac = _init(), o = ac.createOscillator(), g = ac.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.setValueAtTime(0.001, t);
            g.gain.linearRampToValueAtTime(vol, t + 0.018);
            g.gain.setValueAtTime(vol * 0.55, t + dur * 0.65);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            o.connect(g); g.connect(_mg);
            o.start(t); o.stop(t + dur + 0.03);
        }
        function _fade(to, dur) {
            if (!_mg || !_ac) return;
            const now = _ac.currentTime;
            _mg.gain.cancelScheduledValues(now);
            _mg.gain.setValueAtTime(_mg.gain.value, now);
            _mg.gain.linearRampToValueAtTime(to, now + dur);
        }

        // steps: [lead, bass, pad_a, pad_b]
        // ── MENU: Am, 52 BPM, ambient lobby — very calm, few notes ───────────
        const menuSteps = [
            // Am
            [F.A4,F.A2,F.C4,F.E4],[null,null,null,null],[F.E5,null,null,null],[null,null,null,null],

            // C

            // Em

        // ── lv0 (infinite): C major, 72 BPM, sine — dreamy float, note every 4 steps ─

        const lv1Steps = [
            // F
            [F.F4,F.F2,F.A3,F.C4],[null,null,null,null],[F.A4,null,null,null],[null,null,null,null],
            [F.C5,null,null,null],[null,null,null,null],[F.F5,null,null,null],[null,null,null,null],
            // C
            [F.C5,F.C3,F.E4,F.G4],[null,null,null,null],[F.E5,null,null,null],[null,null,null,null],
            [F.G5,null,null,null],[null,null,null,null],[F.C6,null,null,null],[null,null,null,null],

        // ── lv2: D minor, 88 BPM, sine — dark off-beat groove (bass on beat, lead off) ─
        const lv2Steps = [
            // Dm: bass+pads on 0, lead hits off-beat 1,3,5,7
            [null,F.D3,F.F4,F.A4],[F.D5,null,null,null],[null,null,null,null],[F.F5,null,null,null],

            [null,null,null,null],[F.C5,null,null,null],[null,null,null,null],[F.A4,null,null,null],

        // ── lv3: G minor, 94 BPM, square — 8-bit intense (burst 0,1,2 then rest) ─
        const lv3Steps = [
            // Gm
            [F.G4,F.G2,F.Bb3,F.D4],[F.D5,null,null,null],[F.G5,null,null,null],[null,null,null,null],
            [F.Bb5,null,null,null],[F.D5,null,null,null],[null,null,null,null],[null,null,null,null],
            // Eb
            [F.Eb5,F.Eb3,F.G4,F.Bb4],[F.Bb5,null,null,null],[F.Eb5,null,null,null],[null,null,null,null],

            [F.Bb4,F.Bb2,F.D4,F.F4],[F.F5,null,null,null],[F.Bb5,null,null,null],[null,null,null,null],
            [F.D5,null,null,null],[F.Bb4,null,null,null],[null,null,null,null],[null,null,null,null],

        // ── lv4: Bb major, 98 BPM, triangle — cinematic wide leaps (high↔low every note) ─
        const lv4Steps = [

        // ── lv5: Am Andalusian, 105 BPM, square — sigma peak, rapid 4-note runs ─
        const lv5Steps = [
            // Am: A4→C5→E5→A5 ascending run
            [F.A4,F.A2,F.C4,F.E4],[F.C5,null,null,null],[F.E5,null,null,null],[F.A5,null,null,null],
            [null,null,null,null],[F.E5,null,null,null],[F.A4,null,null,null],[null,null,null,null],
            // G: G4→B4→D5→G5 run
            [F.G4,F.G2,F.B3,F.D4],[F.B4,null,null,null],[F.D5,null,null,null],[F.G5,null,null,null],
            [null,null,null,null],[F.D5,null,null,null],[F.B4,null,null,null],[null,null,null,null],

        const TRACKS = {

            if (!_current) return;
            const tr = TRACKS[_current], ac = _init();
            const step = 60 / tr.bpm / 4;
            while (_nextT < ac.currentTime + 0.6) {
                const s = tr.steps[_beat % tr.steps.length];
                const t = _nextT;
                for (let i = 0; i < 4; i++) _tone(s[i], t, step * tr.len[i], tr.vol[i], tr.typ[i]);

            }
            _tmr = setTimeout(_sched, 150);

        function _doPlay(name) {
            if (!_ac || !_mg) return;
            clearTimeout(_tmr);
            clearTimeout(_stopTimer);
            _current = name; _beat = 0;
            const now = _ac.currentTime;
            const target = parseFloat(localStorage.getItem('icyMusicVol') ?? '0.5') * 0.26;
            _mg.gain.cancelScheduledValues(now);
            _mg.gain.setValueAtTime(target, now);
            _nextT = now;
            _sched();
        }

        return {
            play(name) {
                _init();
                if (_ac.state !== 'running') { _pendingTrack = name; return; }
                _pendingTrack = null;
                if (_current === name) return;
                _doPlay(name);
            },
            stop() {
                clearTimeout(_tmr);
                clearTimeout(_stopTimer);
                _pendingTrack = null;
                if (_ac) _fade(0, 0.4);
                _stopTimer = setTimeout(() => { _current = null; }, 500);
            },
            setVol(v) {
                localStorage.setItem('icyMusicVol', v);
                if (_mg && _ac) _fade(v * 0.26, 0.1);
            },
            getVol() { return parseFloat(localStorage.getItem('icyMusicVol') ?? '0.5'); },
            warmup() {
                try {
                    _init();
                    if (_ac.state === 'suspended') {
                        _ac.resume().then(() => {
                            if (_pendingTrack) { const t = _pendingTrack; _pendingTrack = null; _doPlay(t); }
                        });
                    } else if (_pendingTrack) {
                        const t = _pendingTrack; _pendingTrack = null; _doPlay(t);
                    }
                } catch(e) {}
            },
        };
    })();
    </script>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        //  SAVE SYSTEM — Firebase-ready async storage abstraction
        //
        //  To switch to Firebase, replace only the _adapter block below with
        //  Firestore reads/writes. All game code above remains unchanged.
        //
        //  Key schema:
        //    Global  →  icyTower:global:{key}
        //    Per-user → icyTower:user:{userId}:{key}
        // ═══════════════════════════════════════════════════════════════════════
        const SaveSystem = (() => {
            const PREFIX = 'icyTower';

            // ── ADAPTER ── Firestore ─────────────────────────────────────────
            //  Keys are stored as documents in collection "kv".
            //  Colons replaced with "--" to form valid Firestore document IDs.
            const _toId = (raw) => raw.replace(/:/g, '--');

            // In-memory cache — eliminates repeat Firestore reads within a session.
            // Writes still go to Firestore (debounced). Cache is keyed by rawKey.
            const _cache = {};
            const _MISS = Symbol('miss');

            const _adapter = {
async get(rawKey) {
    if (_cache[rawKey] !== _MISS && rawKey in _cache) return _cache[rawKey];

    try {
        // ⛔ לא מחכים לנצח ל-auth
        await Promise.race([
            _fbAuthReady,
            new Promise(res => setTimeout(res, 3000))
        ]);

        const snap = await Promise.race([
            _fbDb.collection('kv').doc(_toId(rawKey)).get(),
            new Promise((_, rej) => setTimeout(() => rej(new Error('Firestore timeout')), 3000))
        ]);

        const val = snap.exists ? snap.data().v : null;
        _cache[rawKey] = val;
        return val;

    } catch (e) {
        console.warn('[SaveSystem] get fallback:', e.message);
        return _cache[rawKey] || null;
    }
},
                async set(rawKey, value) {
                    _cache[rawKey] = value; // update cache immediately
                    try {
                        await _fbAuthReady;
                        await _fbDb.collection('kv').doc(_toId(rawKey)).set({ v: value, k: rawKey });
                    } catch (e) { console.warn('[SaveSystem] set error', e); }
                },
                async remove(rawKey) {
                    delete _cache[rawKey];
                    try {
                        await _fbAuthReady;
                        await _fbDb.collection('kv').doc(_toId(rawKey)).delete();
                    } catch (e) { console.warn('[SaveSystem] remove error', e); }
                },
                async getAllKeys() {
                    try {
                        await _fbAuthReady;
                        const snap = await _fbDb.collection('kv').where('k', '>=', PREFIX + ':').get();
                        return snap.docs.map(d => d.data().k).filter(Boolean);
                    } catch (e) { console.warn('[SaveSystem] getAllKeys error', e); return []; }
                }
            };
            // ── END ADAPTER ──────────────────────────────────────────────────

            const _gk = (key) => `${PREFIX}:global:${key}`;
            const _uk = (uid, key) => `${PREFIX}:user:${uid}:${key}`;

            return {
                // ── Global (not user-scoped) ──
                async get(key)         { return _adapter.get(_gk(key)); },
                async set(key, value)  { return _adapter.set(_gk(key), value); },
                async remove(key)      { return _adapter.remove(_gk(key)); },
                async getAll() {
                    const pfx = `${PREFIX}:global:`;
                    const result = {};
                    for (const raw of await _adapter.getAllKeys()) {
                        if (raw.startsWith(pfx)) result[raw.slice(pfx.length)] = await _adapter.get(raw);
                    }
                    return result;
                },

                // ── Returns a user-scoped store bound to userId ──
                // Usage:
                //   const store = SaveSystem.forUser(userId);
                //   await store.set('points', 5000);
                //   const pts = await store.get('points');
                forUser(userId) {
                    return {
                        async get(key)        { return _adapter.get(_uk(userId, key)); },
                        async set(key, value) { return _adapter.set(_uk(userId, key), value); },
                        async remove(key)     { return _adapter.remove(_uk(userId, key)); },
                        async getAll() {
                            const pfx = `${PREFIX}:user:${userId}:`;
                            const result = {};
                            for (const raw of await _adapter.getAllKeys()) {
                                if (raw.startsWith(pfx)) result[raw.slice(pfx.length)] = await _adapter.get(raw);
                            }
                            return result;
                        }
                    };
                }
            };
        })();

        // ═══════════════════════════════════════════════════════════════════════
        //  USER SYSTEM
        //  Manages accounts, sessions, and authentication.
        //  Generates a unique userId per user — username is NOT the primary key.
        //
        //  Storage layout (via SaveSystem global namespace):
        //    users   → [{ userId, username, passwordHash, createdAt }]
        //    session → { userId, username }
        // ═══════════════════════════════════════════════════════════════════════
        const UserSystem = (() => {
            let _currentUser = null; // { userId, username }

            function _genId() {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
            }
            // Legacy djb2 — used only to verify old accounts on login
            function _hashLegacy(str) {
                let h = 5381;
                for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
                return (h >>> 0).toString(16);
            }
            function _genSalt() {
                return Array.from(crypto.getRandomValues(new Uint8Array(16)))
                    .map(b => b.toString(16).padStart(2, '0')).join('');
            }
            async function _hashSecure(password, salt) {
                const enc = new TextEncoder();
                const buf = await crypto.subtle.digest('SHA-256', enc.encode(salt + password));
                return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async function _getUsers()       { return (await SaveSystem.get('users'))   || []; }
            async function _saveUsers(users) { return SaveSystem.set('users', users); }

            function _setSession(user) {
                localStorage.setItem('icyTowerSession_v2', JSON.stringify(user));
                _currentUser = user;
            }
            function _clearSession() {
                localStorage.removeItem('icyTowerSession_v2');
                _currentUser = null;
            }

            // One-time migration: import accounts from old icyTowerUsers format
            async function _migrateOldAccounts() {
                if (await SaveSystem.get('__accounts_migrated_v1')) return;
                try {
                    const old = JSON.parse(localStorage.getItem('icyTowerUsers') || '[]')
                        .filter(u => u && typeof u.username === 'string' && typeof u.password === 'string');
                    if (old.length > 0) {
                        const existing = await _getUsers();
                        const seen = new Set(existing.map(u => u.username.toLowerCase()));
                        const toAdd = old
                            .filter(u => !seen.has(u.username.toLowerCase()))
                            .map(u => ({
                                userId:       'legacy_' + _genId(),
                                username:     u.username,
                                passwordHash: u.password, // same djb2 hash algo
                                createdAt:    u.createdAt || new Date().toISOString()
                            }));
                        if (toAdd.length > 0) await _saveUsers([...existing, ...toAdd]);

                        // Migrate active session (old format stored username string)
                        const oldSess = localStorage.getItem('icyTowerSession');
                        const newSess = await SaveSystem.get('session');
                        if (oldSess && !newSess) {
                            const all = await _getUsers();
                            const u = all.find(x => x.username.toLowerCase() === oldSess.toLowerCase());
                            if (u) await SaveSystem.set('session', { userId: u.userId, username: u.username });
                        }
                    }
                } catch (e) { /* non-fatal */ }
                await SaveSystem.set('__accounts_migrated_v1', true);
            }

            return {
                get currentUser() { return _currentUser; },

                // ── Restore session from storage (call on app boot) ──
                async getCurrentUser() {
                    if (_currentUser) return _currentUser;
                    await _migrateOldAccounts();
                    try {
                        const raw = localStorage.getItem('icyTowerSession_v2');
                        if (raw) {
                            const session = JSON.parse(raw);
                            if (session && session.userId && session.username)
                                _currentUser = { userId: session.userId, username: session.username };
                        }
                    } catch(e) {}
                    return _currentUser;
                },

                // ── Register a new account ──
                // Throws: 'USERNAME_TAKEN'
                async register(username, password) {
                    await _migrateOldAccounts();
                    const users = await _getUsers();
                    if (users.some(u => u.username.toLowerCase() === username.toLowerCase()))
                        throw new Error('USERNAME_TAKEN');
                    const salt = _genSalt();
                    const newUser = {
                        userId:       _genId(),
                        username,
                        passwordHash: await _hashSecure(password, salt),
                        salt,
                        createdAt:    new Date().toISOString()
                    };
                    await _saveUsers([...users, newUser]);
                    const session = { userId: newUser.userId, username: newUser.username };
                    _setSession(session);
                    return session;
                },

                // ── Log in with username + password ──
                // Throws: 'USER_NOT_FOUND' | 'WRONG_PASSWORD'
                async login(username, password) {
                    await _migrateOldAccounts();
                    const users = await _getUsers();
                    const user  = users.find(u => u.username.toLowerCase() === username.toLowerCase());
                    if (!user) throw new Error('USER_NOT_FOUND');
                    let valid = false;
                    if (user.salt) {
                        valid = (await _hashSecure(password, user.salt)) === user.passwordHash;
                    } else {
                        // Legacy account — verify with djb2, then upgrade to SHA-256+salt
                        valid = _hashLegacy(password) === user.passwordHash;
                        if (valid) {
                            const salt = _genSalt();
                            user.passwordHash = await _hashSecure(password, salt);
                            user.salt = salt;
                            const all = await _getUsers();
                            const idx = all.findIndex(u => u.userId === user.userId);
                            if (idx >= 0) { all[idx] = user; await _saveUsers(all); }
                        }
                    }
                    if (!valid) throw new Error('WRONG_PASSWORD');
                    const session = { userId: user.userId, username: user.username };
                    _setSession(session);
                    return session;
                },

                // ── Log out current user ──
                async logout() {
                    _clearSession();
                }
            };
        })();

        // ═══════════════════════════════════════════════════════════════════════
        //  AUTH UI
        // ═══════════════════════════════════════════════════════════════════════
        (async function initAuth() {
            const overlay   = document.getElementById('authOverlay');
            const signupDiv = document.getElementById('signupFields');
            const loginDiv  = document.getElementById('loginFields');
            const subtitle  = document.getElementById('authSubtitle');

            function err(id, msg) { const el = document.getElementById(id); if (el) el.textContent = msg; }
            function clearErrors() { err('authErrorUsername', ''); err('authError', ''); err('authError2', ''); }

            function showSignup() {
                signupDiv.style.display = 'block'; loginDiv.style.display = 'none';
                subtitle.textContent = 'CREATE ACCOUNT'; clearErrors();
            }
            function showLogin() {
                signupDiv.style.display = 'none'; loginDiv.style.display = 'block';
                subtitle.textContent = 'WELCOME BACK'; clearErrors();
            }

            document.getElementById('switchToLogin').addEventListener('click', showLogin);
            document.getElementById('switchToSignup').addEventListener('click', showSignup);
            document.getElementById('suUsername').addEventListener('input', () => err('authErrorUsername', ''));

            // ── Sign Up ──
            document.getElementById('signupBtn').addEventListener('click', async function() {
                clearErrors();
                const username = document.getElementById('suUsername').value.trim();
                const password = document.getElementById('suPassword').value;
                const confirm  = document.getElementById('suConfirm').value;

                if (!username)                         return err('authErrorUsername', 'Please enter a username.');
                if (username.length < 3)               return err('authErrorUsername', 'At least 3 characters required.');
                if (!/^[a-zA-Z0-9_]+$/.test(username)) return err('authErrorUsername', 'Letters, numbers and _ only.');
                if (password.length < 6)               return err('authError', 'Password must be at least 6 characters.');
                if (password !== confirm)               return err('authError', 'Passwords do not match.');

                try {
                    await UserSystem.register(username, password);
                    window.icyAutoTutorial = true;
                    await _hideAuth();
                } catch (e) {
                    err('authErrorUsername',
                        e.message === 'USERNAME_TAKEN'
                            ? `⚠ Username "${username}" is already taken.`
                            : 'An error occurred. Please try again.');
                }
            });

            // ── Log In ──
            document.getElementById('loginBtn').addEventListener('click', async function() {
                clearErrors();
                const identifier = document.getElementById('liIdentifier').value.trim().toLowerCase();
                const password   = document.getElementById('liPassword').value;

                if (!identifier) return err('authError2', 'Please enter your username.');
                if (!password)   return err('authError2', 'Please enter your password.');

                try {
                    await UserSystem.login(identifier, password);
                    window.icyAutoTutorial = false;
                    await _hideAuth();
                } catch (e) {
                    const msg = e.message === 'USER_NOT_FOUND' ? 'No account found with that username.'
                              : e.message === 'WRONG_PASSWORD' ? 'Incorrect password.'
                              : 'An error occurred. Please try again.';
                    err('authError2', msg);
                }
            });

            document.getElementById('suConfirm').addEventListener('keydown',  e => { if (e.key === 'Enter') document.getElementById('signupBtn').click(); });
            document.getElementById('liPassword').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });

            // ── User tag helpers ──
            function _showUserTag(name) {
                const tag = document.getElementById('userTag');
                if (!tag) return;
                document.getElementById('userTagName').textContent = name;
                tag.style.display = 'flex';
            }
            function _hideUserTag() {
                const tag = document.getElementById('userTag');

        let _worldRng = Math.random.bind(Math);

            let s = seed >>> 0;

                s = (s + 0x9e3779b9) >>> 0;
                let z = Math.imul(s ^ (s >>> 16), 0x85ebca6b) >>> 0;

            grd.addColorStop(0, `rgba(${r},${g},${b},${alpha / 255})`);
            grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

        class Particle {
            constructor(x, y, vx = 0, vy = 0, life = 30, color = C.PARTICLE, size = 3) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.life = this.maxLife = life; this.color = color; this.size = size;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.08; this.life--; }
            draw(camY) {
                if (this.life <= 0) return;
                const alpha = this.life / this.maxLife;
                const r = Math.max(1, this.size * alpha);
                const sy = this.y - camY;
                if (sy < -10 || sy > BASE_H + 10) return;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, sy, r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        // ─────────────────────────────────────────────

        // ─────────────────────────────────────────────
        class SnowFlake {
            constructor(startRandom = true) { this._reset(startRandom ? rnd(0, BASE_H) : 0); }
            _reset(y = 0) {
                this.x = rnd(WALL_W + 2, BASE_W - WALL_W - 2);
                this.y = y;
                this.vy = rnd(0.4, 1.6); this.vx = rnd(-0.25, 0.25);
                this.size = rndInt(1, 3); this.alpha = rnd(90, 200) / 255;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.x = clamp(this.x, WALL_W + 2, BASE_W - WALL_W - 2);
                if (this.y > BASE_H + 4) this._reset(0);
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = C.SNOW;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        // ─────────────────────────────────────────────

        // ─────────────────────────────────────────────
        class Platform {
            constructor(x, y, w, moving = false, bouncy = false) {
                this.x = x; this.y = y; this.w = w; this.h = 14;
                this.moving = moving;
                this.dir = _worldRng() < 0.5 ? -1 : 1;
                this.speed = rnd(0.9, 2.0);
                this.range = rndInt(40, 90);
                this.startX = x;
                this.special = false; // gold finish platform in tutorial
                this.spikes = [];
                this.isBouncy = bouncy;
                // Fossil Canyon (level 2) platform properties
                this.fossType = 0;      // 0=bone  1=shell/fossil  2=sandstone
                this.crumble = false;   // crumbles after being stepped on
                this.crumbleTimer = -1; // -1=untriggered, 0+=elapsed seconds
                this.crumbleState = 0;  // 0=solid  1=cracking  2=fallen
                if (currentMode === 'level' && currentLevel === 2 && !this.special) {
                    const h1 = Math.abs(Math.sin(x * 0.1931 + y * 0.2741));
                    this.fossType = h1 < 0.38 ? 0 : h1 < 0.68 ? 1 : 2;
                    // crumble disabled — clean gameplay, no surprise mechanics
                    this.crumble = false;
                }
                // Forest canopy (level 1) platform properties
                this.leafType = 0;    // 0=branch  1=leaf
                this.leafSway = false; // true = leaf sways in wind
                this.swayPhase = 0;
                this.swayAmp = 0;
                this.swayFreq = 0;
                if (currentMode === 'level' && currentLevel === 1 && !this.special) {
                    const h1 = Math.abs(Math.sin(x * 0.2713 + y * 0.1591));
                    this.leafType = h1 < 0.52 ? 0 : 1;
                    if (this.leafType === 1 && !moving && !bouncy) {
                        const h2 = Math.abs(Math.sin(x * 0.0937 + y * 0.3179));
                        this.leafSway = h2 < 0.60; // 60% of leaves sway
                        this.swayPhase = (x * 0.4 + y * 0.2) % (Math.PI * 2);
                        this.swayAmp   = 18 + Math.abs(Math.sin(x * 0.17 + y * 0.09)) * 22;
                        this.swayFreq  = 0.55 + Math.abs(Math.sin(x * 0.31 + y * 0.23)) * 0.45;
                    }
                }
                // Clock tower (infinite mode) platform properties
                this.gearDir = 0;   // -1=left  0=static  +1=right
                this.gearSpeed = 0; // rotation speed (rad/s)
                this.platType = 0;  // 0=gear  1=clockhand  2=weight
                if (currentMode === 'infinite' && !this.special) {
                    const h1 = Math.abs(Math.sin(x * 0.3700 + y * 0.1900));
                    const h2 = Math.abs(Math.sin(x * 0.1100 + y * 0.4300));
                    const h3 = Math.abs(Math.sin(x * 0.0700 + y * 0.3100));
                    this.platType = h1 < 0.50 ? 0 : h1 < 0.80 ? 1 : 2;

            initSpikes() {

                const progress = clamp((-this.y - 320) / (Math.abs(TOWER_TOP) - 320), 0, 1);
                const count = Math.min(5, 1 + Math.floor(progress * 4));
                if (count <= 0) return;

                const areaStart = margin;
                const areaEnd = this.w - margin;
                const size = 14; // fixed size for simplicity
                const minGap = rndInt(8, 20);
                // Safe landing zone: left or right corner
                const safeLeft = _worldRng() < 0.5;
                const safeStart = safeLeft ? margin : this.w - margin - 30;
                const safeEnd   = safeLeft ? margin + 30 : this.w - margin;
                const positions = [];
                for (let i = 0; i < count; i++) {
                    let attempts = 0;
                    let offset;
                    do {
                        offset = rnd(areaStart, areaEnd - size);
                        attempts++;

                    if (attempts < 10) positions.push(offset);

                positions.sort((a, b) => a - b);
                if (positions.length === 0) return;

                const gaps = [positions[0] - areaStart];
                for (let i = 1; i < positions.length; i++) {
                    gaps.push(positions[i] - (positions[i-1] + size));
                }
                gaps.push(areaEnd - (positions[positions.length-1] + size));
                if (!gaps.some(g => g >= 25)) {
                    positions.splice(rndInt(0, positions.length - 1), 1);
                }
                for (const offset of positions) {
                    this.spikes.push({ offset, width: size });

            update() {

                }

                }
                if (!this.moving) return;

                if (this.x < WALL_W || this.x + this.w > BASE_W - WALL_W) {

            }
            rect() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
            draw(camY) {

                        ctx.beginPath(); ctx.moveTo(bx, sy); ctx.lineTo(bx, sy + 7); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(bx + blockW / 2, sy + 7); ctx.lineTo(bx + blockW / 2, sy + this.h); ctx.stroke();
                    }

                    ctx.strokeStyle = '#9a8878'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(this.x + 2, sy + 1); ctx.lineTo(this.x + this.w - 2, sy + 1); ctx.stroke();
                } else {
                const themeIdx = currentTheme;
                const t = Date.now() / 1000;
                const px = this.x, pw = this.w, ph = this.h;

                if (this.special) {

                    ctx.fillStyle = '#b8860b';
                    ctx.beginPath(); ctx.roundRect(px, sy + 4, pw, ph - 4, 3); ctx.fill();
                    ctx.fillStyle = '#ffe066';
                    ctx.beginPath(); ctx.roundRect(px, sy, pw, 6, 3); ctx.fill();
                    ctx.strokeStyle = '#fff8aa'; ctx.lineWidth = 1;

                } else if (themeIdx === 0) {
                    if (this.isBouncy) {
                        // ── CLOCK TOWER SPRING PAD ──
                        // pulse: 0 = compressed, 1 = extended
                        const pulse2 = 0.5 + 0.5 * Math.abs(Math.sin(t * 4.5 + px * 0.05));
                        const springH = 10 + 8 * pulse2;   // 10–18 px total spring height
                        const springBot = sy + ph - 3;      // bottom anchor

                        ctx.beginPath(); ctx.roundRect(px, sy + ph - 3, pw, 3, 1); ctx.fill();

                        for (let si = 0; si < nSpr; si++) {

                                ctx.strokeStyle = '#5a2c08'; ctx.lineWidth = 2;

                    } else if (this.leafType === 1) {
                        // ── FOREST: giant flat leaf platform (horizontal, clearly a landing surface) ──

                        const leafPalettes = [
                            {top:'#3db820', body:'#2a8a10', under:'#1a5c08', vein:'#1a5808', hi:'#90f050'},
                            {top:'#b4d830', body:'#8ab020', under:'#5a7808', vein:'#5a7810', hi:'#d8f060'},
                            {top:'#e8c830', body:'#c8a010', under:'#8a6c08', vein:'#907808', hi:'#f8e060'},
                            {top:'#e89030', body:'#c87010', under:'#7a4808', vein:'#8a5010', hi:'#f8b050'},
                            {top:'#d85830', body:'#b83a10', under:'#782010', vein:'#7a2810', hi:'#f08050'},
                        ];
                        const pal = leafPalettes[Math.floor(rngL() * leafPalettes.length)];
                        const cx  = px + pw / 2;

                        // The leaf is wider than the platform slot — overhangs by a few px each side
                        const overhang = 5;
                        const lx = px - overhang, rx = px + pw + overhang;
                        const lw = rx - lx;  // full leaf width
                        // Pointed left and right tips, flat top surface
                        const tipDepth = 8;  // how far the tip scoops below sy on each side

                        // Underside / stem
                        ctx.fillStyle = pal.under;
                        ctx.beginPath();
                        ctx.moveTo(lx + tipDepth, sy + ph);  // bottom-left
                        ctx.quadraticCurveTo(cx, sy + ph + 3, rx - tipDepth, sy + ph);  // gentle droop
                        ctx.lineTo(rx, sy + ph * 0.55);      // right notch
                        ctx.quadraticCurveTo(rx + 2, sy + ph * 0.3, rx - tipDepth, sy + 2); // right tip
                        ctx.lineTo(lx + tipDepth, sy + 2);   // top edge
                        ctx.quadraticCurveTo(lx - 2, sy + ph * 0.3, lx, sy + ph * 0.55); // left tip
                        ctx.closePath();
