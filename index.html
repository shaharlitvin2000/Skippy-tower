            ctx.fillStyle = '#7a9fc4';
            ctx.beginPath();
            ctx.moveTo(WALL_W, mBase);
            ctx.lineTo(WALL_W + 20,  mBase - 160);
            ctx.lineTo(WALL_W + 70,  mBase - 90);
            ctx.lineTo(WALL_W + 110, mBase - 200);
            ctx.lineTo(WALL_W + 160, mBase - 130);
            ctx.lineTo(cx - 30,      mBase - 240);
            ctx.lineTo(cx + 30,      mBase - 170);
            ctx.lineTo(cx + 90,      mBase - 260);
            ctx.lineTo(cx + 150,     mBase - 150);
            ctx.lineTo(BASE_W - WALL_W - 60, mBase - 220);
            ctx.lineTo(BASE_W - WALL_W - 20, mBase - 110);
            ctx.lineTo(BASE_W - WALL_W,      mBase);
            ctx.closePath(); ctx.fill();

            // Near mountains (darker)
            ctx.fillStyle = '#4e7090';
            ctx.beginPath();
            ctx.moveTo(WALL_W, mBase);
            ctx.lineTo(WALL_W + 40,  mBase - 100);
            ctx.lineTo(WALL_W + 90,  mBase - 55);
            ctx.lineTo(WALL_W + 130, mBase - 140);
            ctx.lineTo(WALL_W + 190, mBase - 80);
            ctx.lineTo(cx,           mBase - 170);
            ctx.lineTo(cx + 60,      mBase - 100);
            ctx.lineTo(cx + 120,     mBase - 155);
            ctx.lineTo(cx + 170,     mBase - 70);
            ctx.lineTo(BASE_W - WALL_W - 40, mBase - 120);
            ctx.lineTo(BASE_W - WALL_W,      mBase);
            ctx.closePath(); ctx.fill();

            // ── Stone walls ──
            ctx.fillStyle = '#5c4830';
            ctx.fillRect(0, 0, WALL_W, BASE_H);
            ctx.fillRect(BASE_W - WALL_W, 0, WALL_W, BASE_H);

            // Stone block lines on walls
            const blockH = 28, halfW = WALL_W / 2;
            const camOff = camInt % blockH;
            for (let row = -1; row < BASE_H / blockH + 2; row++) {
                const wy = row * blockH - camOff;
                const even = ((Math.floor((camInt + row * blockH) / blockH)) % 2 === 0);
                ctx.strokeStyle = '#3a2818'; ctx.lineWidth = 1.5;
                // Horizontal line
                for (const [bx, bw] of [[0, WALL_W], [BASE_W - WALL_W, WALL_W]]) {
                    ctx.beginPath(); ctx.moveTo(bx, wy); ctx.lineTo(bx + bw, wy); ctx.stroke();
                    // Vertical divider (offset each row for brick effect)
                    const vx = bx + (even ? halfW : halfW * 0.5);
                    ctx.beginPath(); ctx.moveTo(vx, wy); ctx.lineTo(vx, wy + blockH); ctx.stroke();
                }
            }

            // Inner edge shadow
            for (let i = 0; i < 5; i++) {
                const t = 1 - i / 5;
                ctx.strokeStyle = `rgba(0,0,0,${t * 0.3})`;
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(WALL_W - i, 0); ctx.lineTo(WALL_W - i, BASE_H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(BASE_W - WALL_W + i, 0); ctx.lineTo(BASE_W - WALL_W + i, BASE_H); ctx.stroke();
            }
        }

        function lerpHex(a, b, t) {
            const [ar,ag,ab] = hexToRgb(a), [br,bg,bb] = hexToRgb(b);
            return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
        }

        function getSceneInfo(cam) {
            const h = Math.max(0, -cam);
            const f = h / SCENE_H;
            const si = Math.floor(f) % 10;
            const ni = (si + 1) % 10;
            const prog = f - Math.floor(f);
            const blend = prog > 0.75 ? (prog - 0.75) / 0.25 : 0;
            return { si, ni, blend };
        }

        // ── per-theme world-positional backgrounds (one continuous scene per level) ─────

        function getBgRange() {
            const BASE_Y = 680;
            const APEX_Y = currentMode === 'level' ? TOWER_TOP : (BASE_Y - 15000);
            return { BASE_Y, APEX_Y, totalH: BASE_Y - APEX_Y };
        }

        // Helper: draw a gear shape (centred at 0,0) — used by background and platforms
        function drawGearShape(ctx, r, teeth, toothH) {
            const ri = r - toothH;
            ctx.beginPath();
            for (let k = 0; k < teeth; k++) {
                const a0 = (k / teeth) * Math.PI * 2;
                const a1 = ((k + 0.35) / teeth) * Math.PI * 2;
                const a2 = ((k + 0.65) / teeth) * Math.PI * 2;
                const a3 = ((k + 1.00) / teeth) * Math.PI * 2;
                if (k === 0) ctx.moveTo(Math.cos(a0) * ri, Math.sin(a0) * ri);
                else         ctx.lineTo(Math.cos(a0) * ri, Math.sin(a0) * ri);
                ctx.lineTo(Math.cos(a1) * r,  Math.sin(a1) * r);
                ctx.lineTo(Math.cos(a2) * r,  Math.sin(a2) * r);
                ctx.lineTo(Math.cos(a3) * ri, Math.sin(a3) * ri);
            }
            ctx.closePath();
        }

        function drawBgIce(cam, t) {
            const { BASE_Y, APEX_Y, totalH } = getBgRange();
            const playL = WALL_W, playR = BASE_W - WALL_W, playW = playR - playL;
            const cx2 = BASE_W / 2;

            // ── Ambient lantern glow pulses (world-fixed warm light sources) ──
            for (let i = 0; i < 14; i++) {
                const rng = seededRandom(i * 5501 + 11);
                const wy = APEX_Y + rng() * totalH;
                const sy = wy - cam;
                if (sy < -160 || sy > BASE_H + 160) continue;
                const sx = playL + 20 + rng() * (playW - 40);
                const r = 55 + rng() * 95;
                const pulse = 0.5 + 0.5 * Math.sin(t * (0.6 + rng() * 0.8) + i * 1.8);
                const gg = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
                gg.addColorStop(0, `rgba(210,140,30,${0.22 * pulse})`);
                gg.addColorStop(0.5, `rgba(160,90,15,${0.08 * pulse})`);
                gg.addColorStop(1, 'transparent');
                ctx.save(); ctx.fillStyle = gg;
                ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            // ── Background clock faces (semi-transparent, fixed in world) ──
            for (let i = 0; i < 10; i++) {
                const rng = seededRandom(i * 7331 + 77);
                const wy = APEX_Y + rng() * totalH;
                const sy = wy - cam;
                if (sy < -200 || sy > BASE_H + 200) continue;
                const sx = playL + 30 + rng() * (playW - 60);
                const cr = 38 + rng() * 65;
                const fa = 0.07 + rng() * 0.09;
                ctx.save();
                ctx.globalAlpha = fa;
                ctx.strokeStyle = '#c8901a'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(sx, sy, cr, 0, Math.PI * 2); ctx.stroke();
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(sx, sy, cr * 0.86, 0, Math.PI * 2); ctx.stroke();
                // Hour tick marks
                for (let h = 0; h < 12; h++) {
                    const a = (h / 12) * Math.PI * 2 - Math.PI / 2;
                    ctx.lineWidth = h % 3 === 0 ? 2 : 1;
                    ctx.beginPath();
                    ctx.moveTo(sx + Math.cos(a) * cr * 0.80, sy + Math.sin(a) * cr * 0.80);
                    ctx.lineTo(sx + Math.cos(a) * cr * 0.92, sy + Math.sin(a) * cr * 0.92);
                    ctx.stroke();
                }
                // Hands (slow unique motion per clock)
                const hourA = t * 0.018 + rng() * Math.PI * 2;
                const minA  = t * 0.11  + rng() * Math.PI * 2;
                ctx.lineCap = 'round'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx + Math.cos(hourA) * cr * 0.52, sy + Math.sin(hourA) * cr * 0.52);
                ctx.stroke();
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx + Math.cos(minA) * cr * 0.72, sy + Math.sin(minA) * cr * 0.72);
                ctx.stroke();
                ctx.globalAlpha = fa * 3.5;
                ctx.fillStyle = '#c8901a';
                ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            // ── Large background gears (spinning, atmospheric depth) ──
            for (let i = 0; i < 18; i++) {
                const rng = seededRandom(i * 4441 + 333);
                const wy = APEX_Y + rng() * totalH;
                const sy = wy - cam;
                if (sy < -200 || sy > BASE_H + 200) continue;
                const sx = playL + 12 + rng() * (playW - 24);
                const gr = 18 + rng() * 60;
                const teeth = 8 + (rng() * 14 | 0);
                const toothH = gr * 0.18;
                const rotDir = rng() > 0.5 ? 1 : -1;
                const rotSpd = 0.08 + rng() * 0.35;
                const angle  = t * rotSpd * rotDir + rng() * Math.PI * 2;
                const alpha  = 0.06 + rng() * 0.11;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(sx, sy); ctx.rotate(angle);
                ctx.fillStyle = 'rgba(120,72,20,0.4)';
                ctx.strokeStyle = '#c8901a'; ctx.lineWidth = 1;
                drawGearShape(ctx, gr, teeth, toothH);
                ctx.fill(); ctx.stroke();
                // Inner ring
                ctx.beginPath(); ctx.arc(0, 0, gr * 0.50, 0, Math.PI * 2); ctx.stroke();
                // Hub hole
                ctx.fillStyle = 'rgba(20,10,4,0.8)';
                ctx.beginPath(); ctx.arc(0, 0, gr * 0.22, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            // ── Hanging chains (vertical, world-fixed) ──
            for (let i = 0; i < 22; i++) {
                const rng = seededRandom(i * 3307 + 555);
                const wy = APEX_Y + rng() * totalH;
                const sy0 = wy - cam;
                if (sy0 < -250 || sy0 > BASE_H) continue;
                const sx = playL + 14 + rng() * (playW - 28);
                const chainLen = 80 + rng() * 220;
                const linkH = 7, linkW = 4;
                ctx.save();
                ctx.globalAlpha = 0.16 + rng() * 0.14;
                ctx.strokeStyle = '#7a4820'; ctx.lineWidth = 1;
                const steps = Math.ceil(chainLen / linkH);
                for (let li = 0; li < steps && sy0 + li * linkH < BASE_H + 12; li++) {
                    const ly = sy0 + li * linkH;
                    const vert = li % 2 === 0;
                    ctx.beginPath();
                    if (vert) ctx.ellipse(sx, ly + linkH * 0.5, linkW * 0.5, linkH * 0.5, 0, 0, Math.PI * 2);
                    else      ctx.ellipse(sx, ly + linkH * 0.5, linkH * 0.5, linkW * 0.5, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }

            // ── Copper pipe segments along walls ──
            for (let i = 0; i < 18; i++) {
                const rng = seededRandom(i * 6113 + 999);
                const wy = APEX_Y + rng() * totalH;
                const sy = wy - cam;
                if (sy < -40 || sy > BASE_H + 40) continue;
                const onLeft = rng() > 0.5;
                const sx = onLeft ? playL + 2 + rng() * 20 : playR - 2 - rng() * 20;
                const pLen = 40 + rng() * 140;
                const pW = 4 + rng() * 5;
                const vert = rng() > 0.3;
                ctx.save(); ctx.globalAlpha = 0.24 + rng() * 0.16;
                ctx.fillStyle = '#9a5828';
                if (vert) {
                    ctx.beginPath(); ctx.roundRect(sx - pW / 2, sy, pW, pLen, 2); ctx.fill();
                    ctx.fillStyle = '#cc8840';
                    ctx.beginPath(); ctx.roundRect(sx - pW * 0.18, sy + 2, pW * 0.32, pLen - 4, 1); ctx.fill();
                    ctx.fillStyle = '#6a3818';
                    for (const ry of [sy + 5, sy + pLen - 5]) {
                        ctx.beginPath(); ctx.roundRect(sx - pW / 2 - 2, ry, pW + 4, 4, 1); ctx.fill();
                    }
                } else {
                    ctx.beginPath(); ctx.roundRect(sx, sy - pW / 2, pLen, pW, 2); ctx.fill();
                    ctx.fillStyle = '#cc8840';
                    ctx.beginPath(); ctx.roundRect(sx + 2, sy - pW * 0.18, pLen - 4, pW * 0.32, 1); ctx.fill();
                }
                ctx.restore();
            }

            // ── Floating brass dust motes (atmospheric particles) ──
            for (let i = 0; i < 40; i++) {
                const rng = seededRandom(i * 7771 + 88);
                const speed  = 8 + rng() * 20;
                const driftX = (rng() - 0.5) * 12;
                const sy = ((rng() * BASE_H * 3 + t * speed) % BASE_H + BASE_H) % BASE_H;
                const sx = ((playL + 8 + rng() * (playW - 16) + t * driftX * 0.4 - playL + playW * 10) % playW + playW) % playW + playL;
                if (sx < playL + 2 || sx > playR - 2) continue;
                const r = 0.6 + rng() * 1.6;
                ctx.save(); ctx.globalAlpha = 0.12 + rng() * 0.28;
                ctx.fillStyle = rng() > 0.5 ? '#d4a030' : '#c8843c';
                ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            // ── Apex: grand master clock face (finish line) ──
            const apSY = APEX_Y - cam;
            if (apSY > -300 && apSY < BASE_H + 300) {
                const pulse = 0.6 + 0.4 * Math.sin(t * 1.6);
                ctx.save();
                // Warm golden glow halo
                const halo = ctx.createRadialGradient(cx2, apSY + 75, 0, cx2, apSY + 75, 220);
                halo.addColorStop(0, `rgba(220,160,30,${0.55 * pulse})`);
                halo.addColorStop(0.4, `rgba(180,100,15,${0.22 * pulse})`);
                halo.addColorStop(1, 'transparent');
                ctx.fillStyle = halo;
                ctx.beginPath(); ctx.arc(cx2, apSY + 75, 220, 0, Math.PI * 2); ctx.fill();
                // Clock face background
                const cr2 = 72;
                ctx.globalAlpha = 0.88 * pulse;
                ctx.fillStyle = '#200e04';
                ctx.beginPath(); ctx.arc(cx2, apSY + 75, cr2, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#f0c040'; ctx.lineWidth = 3.5;
                ctx.beginPath(); ctx.arc(cx2, apSY + 75, cr2, 0, Math.PI * 2); ctx.stroke();
                ctx.strokeStyle = '#d4901a'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(cx2, apSY + 75, cr2 * 0.87, 0, Math.PI * 2); ctx.stroke();
                // Hour markers
                for (let h = 0; h < 12; h++) {
                    const a = (h / 12) * Math.PI * 2 - Math.PI / 2;
                    const maj = h % 3 === 0;
                    ctx.strokeStyle = '#f0c040';
                    ctx.lineWidth = maj ? 3 : 1.5;
                    ctx.beginPath();
                    ctx.moveTo(cx2 + Math.cos(a) * cr2 * (maj ? 0.70 : 0.78), apSY + 75 + Math.sin(a) * cr2 * (maj ? 0.70 : 0.78));
                    ctx.lineTo(cx2 + Math.cos(a) * cr2 * 0.87,               apSY + 75 + Math.sin(a) * cr2 * 0.87);
                    ctx.stroke();
                }
                // Clock hands (real-time motion)
                ctx.lineCap = 'round';
                const hA = t * 0.05236  - Math.PI / 2; // hour hand (full rotation per 2min at game speed)
                const mA = t * 0.6283   - Math.PI / 2; // minute hand (full rotation per 10sec)
                const sA = t * Math.PI * 2 - Math.PI / 2; // second hand (per second)
                ctx.strokeStyle = '#f0c040'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(cx2, apSY + 75); ctx.lineTo(cx2 + Math.cos(hA) * cr2 * 0.50, apSY + 75 + Math.sin(hA) * cr2 * 0.50); ctx.stroke();
                ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(cx2, apSY + 75); ctx.lineTo(cx2 + Math.cos(mA) * cr2 * 0.70, apSY + 75 + Math.sin(mA) * cr2 * 0.70); ctx.stroke();
                ctx.strokeStyle = '#ff4428'; ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.moveTo(cx2, apSY + 75); ctx.lineTo(cx2 + Math.cos(sA) * cr2 * 0.80, apSY + 75 + Math.sin(sA) * cr2 * 0.80); ctx.stroke();
                // Counter-weight (behind 12 o'clock)
                ctx.strokeStyle = '#c8901a'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(cx2, apSY + 75); ctx.lineTo(cx2 + Math.cos(sA + Math.PI) * cr2 * 0.22, apSY + 75 + Math.sin(sA + Math.PI) * cr2 * 0.22); ctx.stroke();
                // Center pivot
                ctx.fillStyle = '#f0c040';
                ctx.beginPath(); ctx.arc(cx2, apSY + 75, 5.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#2a1004';
                ctx.beginPath(); ctx.arc(cx2, apSY + 75, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        function drawBgForest(cam, t) {
            const { BASE_Y, APEX_Y, totalH } = getBgRange();
            const playL = WALL_W, playR = BASE_W - WALL_W, playW = playR - playL;
            const cx2 = BASE_W / 2;

            // ── Central giant tree trunk — runs the full height of the level ──
            // Two thick trunks flanking the left and right sides
            const trunkW = 38;
            const trunkLx = playL + 18;
            const trunkRx = playR - 18;

            // Bark colour stripes (seeded per vertical chunk of 80px)
            const chunkH = 80;
            for (let wyChunk = Math.floor(cam / chunkH) * chunkH - chunkH;
                     wyChunk <= cam + BASE_H + chunkH; wyChunk += chunkH) {
                const rng = seededRandom(wyChunk * 31 + 7);
                const sy = wyChunk - cam;
                const dark  = `rgb(${28+rng()*14|0},${14+rng()*8|0},${4+rng()*4|0})`;
                const light = `rgb(${52+rng()*18|0},${28+rng()*10|0},${8+rng()*6|0})`;
                // Left trunk
                ctx.fillStyle = dark;
                ctx.fillRect(trunkLx - trunkW/2, sy, trunkW, chunkH + 1);
                // bark highlight stripe
                ctx.fillStyle = light;
                ctx.fillRect(trunkLx - trunkW/2 + 5, sy, 7, chunkH + 1);
                ctx.fillStyle = 'rgba(0,0,0,0.18)';
                ctx.fillRect(trunkLx + trunkW/2 - 8, sy, 8, chunkH + 1);
                // Right trunk (mirror)
                ctx.fillStyle = dark;
                ctx.fillRect(trunkRx - trunkW/2, sy, trunkW, chunkH + 1);
                ctx.fillStyle = light;
                ctx.fillRect(trunkRx + trunkW/2 - 12, sy, 7, chunkH + 1);
                ctx.fillStyle = 'rgba(0,0,0,0.18)';
                ctx.fillRect(trunkRx - trunkW/2, sy, 8, chunkH + 1);
            }
            // Knot holes on trunks (world-fixed)
            for (let i = 0; i < 18; i++) {
                const rng = seededRandom(i * 1777 + 41);
                const wy = APEX_Y + 300 + rng() * (totalH - 500);
                const sy = wy - cam;
                if (sy < -14 || sy > BASE_H + 14) continue;
                const side = rng() < 0.5 ? trunkLx : trunkRx;
                const ox = (rng() - 0.5) * 10;
                ctx.save();
                ctx.fillStyle = '#1a0a03';
                ctx.beginPath(); ctx.ellipse(side + ox, sy, 7, 5, rng() * 0.6, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#3a1a08';
                ctx.beginPath(); ctx.ellipse(side + ox - 1, sy - 1, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            // ── Background foliage clusters (behind the play area) ──
            const leafSpace = 160;
            for (let wy = Math.floor(cam / leafSpace) * leafSpace - leafSpace;
                     wy <= cam + BASE_H + leafSpace * 2; wy += leafSpace) {
                if (wy < APEX_Y + 200 || wy > BASE_Y + 400) continue;
                const rng = seededRandom(wy * 23 + 119);
                const sy = wy - cam;
                // 2-4 leaf clusters per row
                const clusterCount = 2 + Math.floor(rng() * 3);
                for (let ci = 0; ci < clusterCount; ci++) {
                    const lx2 = playL + 30 + rng() * (playW - 60);
                    const r   = 22 + rng() * 30;
                    const hue = 90 + rng() * 40;  // green to yellow-green
                    const lit = 10 + rng() * 12;
                    ctx.save();
                    ctx.globalAlpha = 0.18 + rng() * 0.14;
                    ctx.fillStyle = `hsl(${hue},55%,${lit}%)`;
                    ctx.beginPath(); ctx.arc(lx2, sy, r, 0, Math.PI * 2); ctx.fill();
                    // lighter centre highlight
                    ctx.globalAlpha = 0.08;
                    ctx.fillStyle = `hsl(${hue},70%,${lit + 12}%)`;
                    ctx.beginPath(); ctx.arc(lx2 - r * 0.2, sy - r * 0.25, r * 0.55, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
            }

            // ── Sunbeams filtering through canopy ──
            const beamCount = 6;
            for (let i = 0; i < beamCount; i++) {
                const rng = seededRandom(i * 2311 + 77);
                const bx  = playL + 20 + rng() * (playW - 40);
                // Beam top is above apex, bottom is well below base
                const beamTopW = 12 + rng() * 18;
                const beamBotW = beamTopW + 60 + rng() * 50;
                const topSY = APEX_Y - 100 - cam;
                const botSY = BASE_Y + 200 - cam;
                if (botSY < 0 || topSY > BASE_H) continue;
                const shimmer = 0.032 + 0.018 * Math.sin(t * 0.7 + i * 1.3);
                ctx.save();
                ctx.globalAlpha = shimmer;
                const bg = ctx.createLinearGradient(bx, topSY, bx, botSY);
                bg.addColorStop(0, 'rgba(255,240,160,0.0)');
                bg.addColorStop(0.2, 'rgba(255,240,160,1.0)');
                bg.addColorStop(0.7, 'rgba(200,220,80,0.6)');
                bg.addColorStop(1,   'rgba(180,210,60,0.0)');
                ctx.fillStyle = bg;
                ctx.beginPath();
                ctx.moveTo(bx - beamTopW, topSY);
                ctx.lineTo(bx + beamTopW, topSY);
                ctx.lineTo(bx + beamBotW, botSY);
                ctx.lineTo(bx - beamBotW, botSY);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            // ── Hanging vines from trunk knots ──
            for (let i = 0; i < 14; i++) {
                const rng = seededRandom(i * 919 + 53);
                const wy = APEX_Y + 200 + rng() * (totalH - 400);
                const sy = wy - cam;
                if (sy < -180 || sy > BASE_H + 20) continue;
                const side = rng() < 0.5 ? trunkLx + trunkW/2 : trunkRx - trunkW/2;
                const dir  = side < cx2 ? 1 : -1;
                const len  = 80 + rng() * 120;
                const sway = Math.sin(t * 0.6 + i * 1.1) * 8 * dir;
                ctx.save();
                ctx.strokeStyle = '#2a5a10'; ctx.lineWidth = 2; ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(side, sy);
                ctx.bezierCurveTo(side + dir * 10 + sway, sy + len * 0.35,
                                  side + dir * 18 + sway * 1.4, sy + len * 0.65,
                                  side + dir * 14 + sway * 1.8, sy + len);
                ctx.stroke();
                // Leaf at vine tip
                ctx.globalAlpha = 0.8;
                ctx.fillStyle = '#3a8a18';
                const tipX = side + dir * 14 + sway * 1.8;
                const tipY = sy + len;
                ctx.beginPath();
                ctx.ellipse(tipX, tipY, 8, 5, dir * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // ── Floating pollen / spores ──
            for (let i = 0; i < 30; i++) {
                const rng = seededRandom(i * 4073 + 89);
                const baseWy = APEX_Y + 100 + rng() * Math.max(1, totalH - 200);
                const drift  = Math.sin(t * (0.4 + rng() * 0.5) + rng() * 6) * 12;
                const bob    = Math.cos(t * (0.6 + rng() * 0.4) + i) * 8;
                const fy     = baseWy - cam + bob;
                const fx     = playL + 20 + rng() * (playW - 40) + drift;
                if (fy < -6 || fy > BASE_H + 6) continue;
                const alpha  = 0.25 + 0.40 * Math.abs(Math.sin(t * 1.1 + i));
                const r      = 1.2 + rng() * 1.8;
                ctx.save();
                ctx.globalAlpha = alpha;
                const pg = ctx.createRadialGradient(fx, fy, 0, fx, fy, r * 3);
                pg.addColorStop(0, 'rgba(240,240,140,0.9)');
                pg.addColorStop(0.5, 'rgba(200,240,80,0.4)');
                pg.addColorStop(1,   'rgba(160,220,60,0)');
                ctx.fillStyle = pg;
                ctx.beginPath(); ctx.arc(fx, fy, r * 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fffff0';
                ctx.beginPath(); ctx.arc(fx, fy, r * 0.6, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            // ── Dappled light patches on the "floor" of each section ──
            for (let i = 0; i < 20; i++) {
                const rng = seededRandom(i * 1337 + 61);
                const wy = APEX_Y + 200 + rng() * (totalH - 300);
                const sy = wy - cam;
                if (sy < -30 || sy > BASE_H + 30) continue;
                const lx2 = playL + 25 + rng() * (playW - 50);
                const rx2 = 30 + rng() * 20, ry2 = 5 + rng() * 5;
                const shimmer2 = 0.04 + 0.03 * Math.sin(t * 0.9 + i * 0.7);
                ctx.save();
                ctx.globalAlpha = shimmer2;
                const dlg = ctx.createRadialGradient(lx2, sy, 0, lx2, sy, rx2);
                dlg.addColorStop(0, 'rgba(255,240,120,1)');
                dlg.addColorStop(1, 'rgba(180,220,60,0)');
                ctx.fillStyle = dlg;
                ctx.beginPath(); ctx.ellipse(lx2, sy, rx2, ry2, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            // ── Forest floor at the base ──
            const bY = BASE_Y - cam;
            if (bY > -200 && bY < BASE_H + 200) {
                // Ground moss layer
                ctx.save();
                const floorGrd = ctx.createLinearGradient(0, bY, 0, bY + 80);
                floorGrd.addColorStop(0, '#1a5a0c');
                floorGrd.addColorStop(0.3, '#12400a');
                floorGrd.addColorStop(1,   '#0a2006');
                ctx.fillStyle = floorGrd;
                ctx.fillRect(playL, bY, playW, 80);
                // Fern fronds
                ctx.strokeStyle = '#2a7010'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
                for (let j = 0; j < 16; j++) {
                    const rng = seededRandom(j * 887 + 5);
                    const fx2  = playL + 10 + rng() * (playW - 20);
                    const flen = 18 + rng() * 20;
                    const fdir = (rng() - 0.5) * 1.2;
                    ctx.beginPath();
                    ctx.moveTo(fx2, bY + 2);
                    ctx.quadraticCurveTo(fx2 + Math.cos(fdir) * flen * 0.6,
                                         bY - Math.sin(Math.abs(fdir) + 0.3) * flen * 0.6,
                                         fx2 + Math.cos(fdir) * flen,
                                         bY - 4);
                    ctx.stroke();
                }
                ctx.restore();
            }

            // ── Finish: bright canopy opening at apex ──
            const apSY = APEX_Y - cam;
            if (apSY > -300 && apSY < BASE_H + 300) {
                const pulse = 0.65 + 0.35 * Math.sin(t * 1.6);
                ctx.save();
                // Big sky glow
                const ag = ctx.createRadialGradient(cx2, apSY + 40, 0, cx2, apSY + 40, 260);
                ag.addColorStop(0,   `rgba(220,255,120,${0.55 * pulse})`);
                ag.addColorStop(0.4, `rgba(140,220,60,${0.25 * pulse})`);
                ag.addColorStop(1,   'transparent');
                ctx.fillStyle = ag;
                ctx.beginPath(); ctx.arc(cx2, apSY + 40, 260, 0, Math.PI * 2); ctx.fill();
                // Dense canopy clusters
                const canopyPts = [
                    {ox:-70, oy:90, r:75}, {ox:60, oy:100, r:70}, {ox:0, oy:60, r:85},
                    {ox:-100, oy:120, r:55}, {ox:100, oy:115, r:55}, {ox:30, oy:130, r:65},
                ];
                for (const cp of canopyPts) {
                    ctx.fillStyle = '#0c4010';
                    ctx.beginPath(); ctx.arc(cx2 + cp.ox, apSY + cp.oy, cp.r, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#1a6018';
                    ctx.beginPath(); ctx.arc(cx2 + cp.ox - 8, apSY + cp.oy - 10, cp.r * 0.6, 0, Math.PI * 2); ctx.fill();
                }
                // Golden sunlight bursts from above
                for (let i = 0; i < 10; i++) {
                    const a = (i / 10) * Math.PI * 2 + t * 0.08;
                    const dist = 70 + 18 * Math.sin(t * 1.2 + i * 0.9);
                    const bx2  = cx2 + Math.cos(a) * dist;
                    const bsy  = apSY + 30 + Math.sin(a) * 30;
                    const alpha2 = (0.55 + 0.35 * Math.sin(t * 2.1 + i)) * pulse;
                    ctx.globalAlpha = alpha2;
                    ctx.fillStyle = '#f8e848';
                    ctx.beginPath(); ctx.arc(bx2, bsy, 4 + 2 * Math.sin(t + i), 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }

        function drawBgDesert(cam, t) {
            // ── OCEAN DEEP — ascending through the sea ──
            const { BASE_Y, APEX_Y, totalH } = getBgRange();
            const playL = WALL_W, playR = BASE_W - WALL_W, playW = playR - playL;
            const cx2 = BASE_W / 2;

            // ── 1. Water depth gradient ──
            const bgGrd = ctx.createLinearGradient(0, 0, 0, BASE_H);
            bgGrd.addColorStop(0.00, '#0c4a70');
            bgGrd.addColorStop(0.35, '#083a5a');
            bgGrd.addColorStop(0.70, '#051e3e');
            bgGrd.addColorStop(1.00, '#020c28');
            ctx.fillStyle = bgGrd;
            ctx.fillRect(0, 0, BASE_W, BASE_H);

            // ── 2. Caustic light rays from above ──
            ctx.save();
            ctx.beginPath(); ctx.rect(playL, 0, playW, BASE_H); ctx.clip();
            for (let i = 0; i < 7; i++) {
                const rng = seededRandom(i * 113 + 7);
                const bx  = playL + playW * (0.05 + i * 0.14 + rng() * 0.04);
                const bw  = 10 + rng() * 28;
                const ba  = (0.032 + rng() * 0.028) * (0.7 + 0.3 * Math.sin(t * 0.25 + i * 1.7));
                const ang = (rng() - 0.5) * 0.10;
                const dx  = Math.tan(ang) * BASE_H;
                const rg  = ctx.createLinearGradient(0, 0, 0, BASE_H);
                rg.addColorStop(0,   `rgba(100,220,255,${(ba * 1.5).toFixed(3)})`);
                rg.addColorStop(0.5, `rgba(50,160,220,${(ba * 0.6).toFixed(3)})`);
                rg.addColorStop(1,   'rgba(20,60,140,0)');
                ctx.fillStyle = rg;
                ctx.beginPath();
                ctx.moveTo(bx - bw/2, 0); ctx.lineTo(bx + bw/2, 0);
                ctx.lineTo(bx + dx + bw/2, BASE_H); ctx.lineTo(bx + dx - bw/2, BASE_H);
                ctx.closePath(); ctx.fill();
            }
            ctx.restore();

            // ── 3. Far coral-reef silhouettes (parallax 0.02x) ──
            {
                const effCam = cam * 0.02;
                const layers = [
                    { col: '#061828', alphaF: 0.92, baseF: 0.88, seed: 3311, nPeaks: 8 },
                    { col: '#092035', alphaF: 0.65, baseF: 0.76, seed: 7723, nPeaks: 11 },
                ];
                for (const lyr of layers) {
                    const baseY = BASE_H * lyr.baseF - effCam * lyr.baseF;
                    ctx.save(); ctx.globalAlpha = lyr.alphaF; ctx.fillStyle = lyr.col;
                    ctx.beginPath();
                    ctx.moveTo(playL - 5, BASE_H + 5);
                    ctx.lineTo(playL - 5, baseY);
                    const rng = seededRandom(lyr.seed);
                    for (let p = 0; p <= lyr.nPeaks; p++) {
                        const mx = playL + (playW / lyr.nPeaks) * p;
                        const mh = 20 + rng() * 90;
                        const isCoral = rng() > 0.45;
                        if (isCoral) {
                            ctx.lineTo(mx - playW/lyr.nPeaks*0.30, baseY);
                            ctx.arc(mx, baseY - mh * 0.55, mh * 0.55, Math.PI, 0, false);
                        } else {
                            ctx.lineTo(mx - playW/lyr.nPeaks*0.36, baseY);
                            ctx.lineTo(mx, baseY - mh);
                            ctx.lineTo(mx + playW/lyr.nPeaks*0.36, baseY);
                        }
                    }
                    ctx.lineTo(playR + 5, baseY);
                    ctx.lineTo(playR + 5, BASE_H + 5);
                    ctx.closePath(); ctx.fill(); ctx.restore();
                }
            }

            // ── 4. Seaweed strands (parallax 0.05x) ──
            {
                const effCam = cam * 0.05, slotH = 240;
                const s0 = Math.floor(effCam / slotH) - 1;
                const s1 = s0 + Math.ceil(BASE_H / slotH) + 2;
                for (let slot = s0; slot <= s1; slot++) {
                    const rng = seededRandom(slot * 1553 + 23);
                    const nW  = 1 + Math.floor(rng() * 5);
                    for (let wi = 0; wi < nW; wi++) {
                        const wx  = playL + 8 + rng() * (playW - 16);
                        const wy  = (slot + rng()) * slotH - effCam;
                        const wh  = 35 + rng() * 75;
                        const wlw = 1.5 + rng() * 2.0;
                        const wc  = rng() > 0.5 ? '#0c8040' : '#0aaa38';
                        if (wy < -90 || wy > BASE_H + 90) continue;
                        ctx.save(); ctx.globalAlpha = 0.50 + rng() * 0.35;
                        ctx.strokeStyle = wc; ctx.lineWidth = wlw; ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(wx, wy);
                        const nSeg = 6;
                        for (let si2 = 1; si2 <= nSeg; si2++) {
                            const segY = wy - (wh / nSeg) * si2;
                            const sway = Math.sin(t * 0.85 + slot * 1.3 + wi * 2.1 + si2 * 0.6) * (4 + si2 * 2.5);
                            ctx.lineTo(wx + sway, segY);
                        }
                        ctx.stroke();
                        // Tip leaf
                        const tipY = wy - wh;
                        const tipSway = Math.sin(t * 0.85 + slot * 1.3 + wi * 2.1 + nSeg * 0.6) * (4 + nSeg * 2.5);
                        ctx.fillStyle = wc;
                        ctx.beginPath();
                        ctx.ellipse(wx + tipSway, tipY, 4, 8, 0, 0, Math.PI*2);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // ── 5. Fish schools (parallax 0.08x) ──
            {
                const effCam = cam * 0.08, slotH = 350;
                const s0 = Math.floor(effCam / slotH) - 1;
                const s1 = s0 + Math.ceil(BASE_H / slotH) + 2;
                const fishCols = ['#ffaa22','#ff6644','#22ccee','#ff88bb','#88ddff','#ffdd44'];
                for (let slot = s0; slot <= s1; slot++) {
                    const rng = seededRandom(slot * 887 + 3);
                    const nF  = 2 + Math.floor(rng() * 5);
                    const gx  = playL + 20 + rng() * (playW - 40);
                    const gy  = (slot + rng()) * slotH - effCam;
                    const col = fishCols[Math.floor(rng() * fishCols.length)];
                    if (gy < -30 || gy > BASE_H + 30) continue;
                    for (let fi = 0; fi < nF; fi++) {
                        const fx = gx + (rng() - 0.5) * 60 + Math.sin(t * 0.7 + slot * 2 + fi) * 14;
                        const fy = gy + (rng() - 0.5) * 28 + Math.sin(t * 0.9 + fi * 1.4) * 5;
                        const fs = 3.5 + rng() * 4;
                        const facing = Math.sin(t * 0.7 + slot * 2 + fi) > 0 ? 1 : -1;
                        if (fx < playL - 10 || fx > playR + 10) continue;
                        ctx.save(); ctx.globalAlpha = 0.55 + rng() * 0.30;
                        ctx.fillStyle = col;
                        ctx.beginPath(); ctx.ellipse(fx, fy, fs, fs * 0.5, 0, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath();
                        ctx.moveTo(fx - facing * fs * 0.9, fy);
                        ctx.lineTo(fx - facing * (fs + fs*0.7), fy - fs*0.55);
                        ctx.lineTo(fx - facing * (fs + fs*0.7), fy + fs*0.55);
                        ctx.closePath(); ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.beginPath(); ctx.arc(fx + facing * fs * 0.5, fy - fs*0.1, fs * 0.18, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // ── 6. Rising bubbles ──
            for (let i = 0; i < 28; i++) {
                const rng   = seededRandom(i * 1337 + 11);
                const speed = 8 + rng() * 18;
                const bx3   = playL + 8 + rng() * (playW - 16);
                const phase = rng() * BASE_H;
                const by    = BASE_H - ((t * speed + phase) % (BASE_H + 20));
                const bsz   = 1.5 + rng() * 3.0;
                const dx3   = Math.sin(t * 0.7 + i * 2.3) * 3;
                if (by < -6 || by > BASE_H + 6) continue;
                ctx.save(); ctx.globalAlpha = 0.10 + rng() * 0.14;
                ctx.strokeStyle = '#88ddff'; ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.arc(bx3 + dx3, by, bsz, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = 'rgba(200,240,255,0.22)';
                ctx.beginPath(); ctx.arc(bx3 + dx3, by, bsz, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // ── 7. Jellyfish (parallax 0.06x) ──
            {
                const effCam = cam * 0.06, slotH = 480;
                const s0 = Math.floor(effCam / slotH) - 1;
                const s1 = s0 + Math.ceil(BASE_H / slotH) + 2;
                const jColsBase = ['180,100,255','60,200,255','255,110,190'];
                for (let slot = s0; slot <= s1; slot++) {
                    const rng  = seededRandom(slot * 2231 + 17);
                    const jx   = playL + 15 + rng() * (playW - 30);
                    const jy   = (slot + rng()) * slotH - effCam;
                    const jr   = 12 + rng() * 16;
                    const pulse = 0.65 + 0.35 * Math.sin(t * 1.4 + slot * 2.3);
                    const cRgb = jColsBase[Math.floor(rng() * jColsBase.length)];
                    const sway = Math.sin(t * 0.5 + slot * 1.7) * 5;
                    if (jy < -70 || jy > BASE_H + 70) continue;
                    ctx.save(); ctx.globalAlpha = 0.38 + rng() * 0.22;
                    ctx.globalCompositeOperation = 'lighter';
                    const jGrd = ctx.createRadialGradient(jx+sway, jy, 0, jx+sway, jy, jr*2.4);
                    jGrd.addColorStop(0,   `rgba(${cRgb},0.35)`);
                    jGrd.addColorStop(1,   'transparent');
                    ctx.fillStyle = jGrd;
                    ctx.beginPath(); ctx.arc(jx+sway, jy, jr*2.4, 0, Math.PI*2); ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = `rgba(${cRgb},${(0.28*pulse).toFixed(2)})`;
                    ctx.beginPath();
                    ctx.arc(jx+sway, jy, jr * pulse, Math.PI, 0, false);
                    ctx.closePath(); ctx.fill();
                    ctx.strokeStyle = `rgba(${cRgb},0.25)`; ctx.lineWidth = 1.0; ctx.lineCap = 'round';
                    const nT = 5 + Math.floor(rng() * 4);
                    for (let ti = 0; ti < nT; ti++) {
                        const tx = jx + sway + (ti/(nT-1) - 0.5) * jr * 1.6;
                        const tLen = 14 + rng() * 22;
                        const twav = Math.sin(t * 1.2 + ti * 0.9 + slot) * 5;
                        ctx.beginPath();
                        ctx.moveTo(tx, jy);
                        ctx.quadraticCurveTo(tx + twav, jy + tLen*0.5, tx - twav*0.5, jy + tLen);
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            // ── 8. Goal / APEX ──
            const apSY = APEX_Y - cam;
            if (apSY > -200 && apSY < BASE_H + 200) {
                ctx.save();
                const pulse = 0.72 + 0.28 * Math.sin(t * 1.9);
                const apG = ctx.createRadialGradient(cx2, apSY, 0, cx2, apSY, 120);
                apG.addColorStop(0,   `rgba(100,220,255,${(0.55 * pulse).toFixed(3)})`);
                apG.addColorStop(0.4, `rgba(40,140,220,${(0.22 * pulse).toFixed(3)})`);
                apG.addColorStop(1,   'transparent');
                ctx.fillStyle = apG;
                ctx.beginPath(); ctx.arc(cx2, apSY, 120, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#50ddf8'; ctx.globalAlpha = 0.85 * pulse;
                ctx.fillRect(playL + 10, apSY - 3, playW - 20, 4);
                ctx.restore();
            }
        }

        function drawBgLava(cam, t) {
            // ── CHINESE FESTIVAL DAY — Bright sky, jade dragon, kites, cranes ──
            const { BASE_Y, APEX_Y, totalH } = getBgRange();
            const playL = WALL_W, playR = BASE_W - WALL_W, playW = playR - playL;
            const cx2 = BASE_W / 2;

            // ── 1. Bright sky gradient ──
            const bgGrd = ctx.createLinearGradient(0, 0, 0, BASE_H);
            bgGrd.addColorStop(0.00, '#4ab8f0');
            bgGrd.addColorStop(0.35, '#72d0f8');
            bgGrd.addColorStop(0.70, '#b8ecff');
            bgGrd.addColorStop(1.00, '#ddf5ff');
            ctx.fillStyle = bgGrd;
            ctx.fillRect(0, 0, BASE_W, BASE_H);

            // ── 2. Sun ──
            {
                const sunX = playL + playW * 0.72;
                const sunY = BASE_H * 0.11 - cam * 0.005;
                const sunR = 22;
                const sunPulse = 0.88 + 0.12 * Math.sin(t * 1.2);
                ctx.save(); ctx.globalCompositeOperation = 'lighter';
                const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR * 3.5);
                sunGlow.addColorStop(0,   'rgba(255,220,60,0.55)');
                sunGlow.addColorStop(0.5, 'rgba(255,170,20,0.18)');
                sunGlow.addColorStop(1,   'transparent');
                ctx.fillStyle = sunGlow;
                ctx.beginPath(); ctx.arc(sunX, sunY, sunR * 3.5, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                ctx.save(); ctx.globalAlpha = 0.55 * sunPulse;
                ctx.strokeStyle = '#ffde3c'; ctx.lineWidth = 2;
                for (let ri = 0; ri < 8; ri++) {
                    const ang = (ri / 8) * Math.PI * 2 + t * 0.2;
                    const r1 = sunR + 5, r2 = sunR + 14 + Math.sin(t * 1.8 + ri) * 3;
                    ctx.beginPath();
                    ctx.moveTo(sunX + Math.cos(ang)*r1, sunY + Math.sin(ang)*r1);
                    ctx.lineTo(sunX + Math.cos(ang)*r2, sunY + Math.sin(ang)*r2);
                    ctx.stroke();
                }
                ctx.restore();
                ctx.save();
                ctx.fillStyle = '#ffe040';
                ctx.beginPath(); ctx.arc(sunX, sunY, sunR * sunPulse, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff8a0';
                ctx.beginPath(); ctx.arc(sunX - sunR*0.28, sunY - sunR*0.28, sunR*0.38, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // ── 2b. Rainbow arc ──
            {
                const rbCx  = cx2 * 0.55;
                const rbCy  = BASE_H * 0.68 - cam * 0.018;
                const rbPulse = 0.72 + 0.28 * Math.sin(t * 0.4);
                const bands = [
                    { r: 145, col: 'rgba(255,60,60,'   },
                    { r: 133, col: 'rgba(255,140,0,'   },
                    { r: 121, col: 'rgba(255,230,0,'   },
                    { r: 109, col: 'rgba(60,210,60,'   },
                    { r:  97, col: 'rgba(30,140,255,'  },
                    { r:  85, col: 'rgba(110,60,220,'  },
                ];
                ctx.save();
                ctx.globalAlpha = 0.38 * rbPulse;
                for (const b of bands) {
                    ctx.strokeStyle = b.col + '1)';
                    ctx.lineWidth = 11;
                    ctx.beginPath();
                    ctx.arc(rbCx, rbCy, b.r, Math.PI, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }

            // ── 3. Far mountain silhouettes (parallax 0.02x) — green/teal ──
            {
                const effCam = cam * 0.02;
                const layers = [
                    { peaks: 5, baseF: 0.78, heightMax: 200, col: '#2a6b5a', alphaF: 0.80 },
                    { peaks: 7, baseF: 0.65, heightMax: 140, col: '#3d8870', alphaF: 0.60 },
                ];
                for (const lyr of layers) {
                    const baseY = BASE_H * lyr.baseF - effCam * (lyr.baseF + 0.1);
                    ctx.save(); ctx.globalAlpha = lyr.alphaF;
                    ctx.fillStyle = lyr.col;
                    ctx.beginPath();
                    ctx.moveTo(playL - 5, BASE_H + 5);
                    ctx.lineTo(playL - 5, baseY);
                    const rng = seededRandom(lyr.peaks * 333 + 7);
                    for (let p = 0; p <= lyr.peaks; p++) {
                        const mx = playL + (playW / lyr.peaks) * p;
                        const mh = 40 + rng() * lyr.heightMax;
                        ctx.lineTo(mx - playW / lyr.peaks * 0.38, baseY);
                        ctx.lineTo(mx, baseY - mh);
                        ctx.lineTo(mx + playW / lyr.peaks * 0.38, baseY);
                    }
                    ctx.lineTo(playR + 5, baseY);
                    ctx.lineTo(playR + 5, BASE_H + 5);
                    ctx.closePath(); ctx.fill();
                    ctx.restore();
                }
            }

            // ── 4. White mist bands (parallax 0.035x) ──
            {
                const effCam = cam * 0.035, slotH = 190;
                const s0 = Math.floor(effCam / slotH) - 1;
                const s1 = s0 + Math.ceil(BASE_H / slotH) + 2;
                for (let slot = s0; slot <= s1; slot++) {
                    const rng  = seededRandom(slot * 1231 + 5);
                    const my   = (slot + 0.5) * slotH - effCam;
                    const mw   = playW * (0.48 + rng() * 0.46);
                    const mh   = 14 + rng() * 28;
                    const mx   = cx2 + (rng() - 0.5) * playW * 0.28;
                    const mal  = 0.06 + rng() * 0.07;
                    const drift = Math.sin(t * 0.14 + slot * 1.7) * 14;
                    if (my < -50 || my > BASE_H + 50) continue;
                    ctx.save(); ctx.globalAlpha = mal;
                    const mG = ctx.createRadialGradient(mx + drift, my, 0, mx + drift, my, mw);
                    mG.addColorStop(0,   'rgba(255,255,255,0.90)');
                    mG.addColorStop(0.5, 'rgba(200,230,255,0.50)');
                    mG.addColorStop(1,   'transparent');
                    ctx.fillStyle = mG;
                    ctx.beginPath(); ctx.ellipse(mx + drift, my, mw, mh, 0, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }
            }

            // ── 5. Fluffy cartoon clouds (parallax 0.05x) ──
            {
                const effCam = cam * 0.05, slotH = 280;
                const s0 = Math.floor(effCam / slotH) - 1;
                const s1 = s0 + Math.ceil(BASE_H / slotH) + 2;
                for (let slot = s0; slot <= s1; slot++) {
                    const rng  = seededRandom(slot * 2341 + 19);
                    const ccx  = playL + 30 + rng() * (playW - 60);
                    const ccy  = (slot + rng() * 0.8) * slotH - effCam;
                    const cw   = 28 + rng() * 36;
                    const drift = Math.sin(t * 0.09 + slot * 2.3) * 8;
                    if (ccy < -60 || ccy > BASE_H + 60) continue;
                    ctx.save(); ctx.globalAlpha = 0.82 + rng() * 0.15;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(ccx + drift,           ccy,           cw * 0.55, 0, Math.PI*2);
                    ctx.arc(ccx + drift - cw*0.42, ccy + cw*0.12, cw * 0.42, 0, Math.PI*2);
                    ctx.arc(ccx + drift + cw*0.42, ccy + cw*0.12, cw * 0.40, 0, Math.PI*2);
                    ctx.arc(ccx + drift,           ccy + cw*0.24, cw * 0.48, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // ── 6. Colorful Chinese lanterns (parallax 0.07x) ──
            {
                const effCam = cam * 0.07, slotH = 300;
                const s0 = Math.floor(effCam / slotH) - 1;
                const s1 = s0 + Math.ceil(BASE_H / slotH) + 2;
                const lanternCols  = ['#ee2200','#f0a000','#00aa44','#cc2288','#2255cc'];
                const lanternInner = ['#ff8844','#ffdd44','#88ee88','#ee66bb','#88aaff'];
                for (let slot = s0; slot <= s1; slot++) {
                    const rng = seededRandom(slot * 887 + 3);
                    const nL  = 1 + Math.floor(rng() * 3);
                    for (let li = 0; li < nL; li++) {
                        const lx   = playL + 18 + rng() * (playW - 36);
                        const ly   = (slot + rng()) * slotH - effCam;
                        const lw   = 7 + rng() * 10;
                        const lh   = lw * 1.5;
                        const sway = Math.sin(t * 0.55 + slot * 1.3 + li * 2.1) * 2.5;
                        const glow = 0.70 + 0.30 * Math.sin(t * 1.5 + slot + li * 1.8);
                        const colI = Math.floor(rng() * lanternCols.length);
                        if (ly < -40 || ly > BASE_H + 40) continue;
                        ctx.save();
                        ctx.globalCompositeOperation = 'lighter';
                        ctx.globalAlpha = 0.28 * glow;
                        const lG = ctx.createRadialGradient(lx+sway, ly, 0, lx+sway, ly, lw*3);
                        lG.addColorStop(0,   'rgba(255,220,100,0.90)');
                        lG.addColorStop(0.5, 'rgba(255,160,40,0.40)');
                        lG.addColorStop(1,   'transparent');
                        ctx.fillStyle = lG;
                        ctx.beginPath(); ctx.arc(lx+sway, ly, lw*3, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                        ctx.save(); ctx.globalAlpha = 0.90 + rng() * 0.10;
                        ctx.fillStyle = lanternCols[colI];
                        ctx.beginPath(); ctx.ellipse(lx+sway, ly, lw*0.50, lh*0.50, 0, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#c8a000';
                        ctx.fillRect(lx+sway - lw*0.24, ly - lh*0.50 - 2, lw*0.48, 4);
                        ctx.fillRect(lx+sway - lw*0.24, ly + lh*0.50 - 2, lw*0.48, 4);
                        ctx.globalAlpha *= glow * 0.80;
                        ctx.fillStyle = lanternInner[colI];
                        ctx.beginPath(); ctx.ellipse(lx+sway, ly, lw*0.28, lh*0.30, 0, 0, Math.PI*2); ctx.fill();
                        ctx.globalAlpha = 0.50;
                        ctx.strokeStyle = '#c8a000'; ctx.lineWidth = 0.8;
                        ctx.beginPath(); ctx.moveTo(lx+sway, ly+lh*0.50+2); ctx.lineTo(lx+sway, ly+lh*0.50+9); ctx.stroke();
                        ctx.restore();
                    }
                }
            }

            // ── 7. Flying cranes (parallax 0.09x) ──
            {
                const effCam = cam * 0.09, slotH = 400;
                const s0 = Math.floor(effCam / slotH) - 1;
                const s1 = s0 + Math.ceil(BASE_H / slotH) + 2;
                for (let slot = s0; slot <= s1; slot++) {
                    const rng = seededRandom(slot * 1543 + 41);
                    const nC  = 1 + Math.floor(rng() * 3);
                    for (let ci = 0; ci < nC; ci++) {
                        const bx   = playL + 15 + rng() * (playW - 30);
                        const by   = (slot + rng()) * slotH - effCam;
                        const bSz  = 5 + rng() * 7;
                        const wingUp = Math.sin(t * 2.8 + slot * 1.5 + ci * 2.2) * 0.45;
                        if (by < -20 || by > BASE_H + 20) continue;
                        ctx.save(); ctx.globalAlpha = 0.65 + rng() * 0.25;
                        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
                        ctx.beginPath(); ctx.moveTo(bx - bSz, by); ctx.lineTo(bx + bSz, by); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(bx - bSz*0.3, by); ctx.lineTo(bx - bSz*1.1, by - bSz*(0.5+wingUp)); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(bx + bSz*0.3, by); ctx.lineTo(bx + bSz*1.1, by - bSz*(0.5+wingUp)); ctx.stroke();
                        ctx.restore();
                    }
                }
            }

            // ── 8. Colorful kites (parallax 0.11x) ──
            {
                const effCam = cam * 0.11, slotH = 500;
                const s0 = Math.floor(effCam / slotH) - 1;
                const s1 = s0 + Math.ceil(BASE_H / slotH) + 2;
                const kiteCols = ['#ee2200','#f0a000','#2255cc','#00aa44'];
                for (let slot = s0; slot <= s1; slot++) {
                    const rng = seededRandom(slot * 1997 + 57);
                    const kx  = playL + 20 + rng() * (playW - 40);
                    const ky  = (slot + rng()) * slotH - effCam;
                    const kw  = 9 + rng() * 10;
                    const kh  = kw * 1.4;
                    const sway = Math.sin(t * 0.35 + slot * 2.1) * 6;
                    const colI = Math.floor(rng() * kiteCols.length);
                    if (ky < -50 || ky > BASE_H + 50) continue;
                    ctx.save(); ctx.globalAlpha = 0.85;
                    ctx.fillStyle = kiteCols[colI];
                    ctx.beginPath();
                    ctx.moveTo(kx + sway, ky - kh*0.5);
                    ctx.lineTo(kx + sway + kw*0.5, ky);
                    ctx.lineTo(kx + sway, ky + kh*0.5);
                    ctx.lineTo(kx + sway - kw*0.5, ky);
                    ctx.closePath(); ctx.fill();
                    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 0.8; ctx.globalAlpha = 0.50;
                    ctx.beginPath(); ctx.moveTo(kx+sway, ky-kh*0.5); ctx.lineTo(kx+sway, ky+kh*0.5); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(kx+sway-kw*0.5, ky); ctx.lineTo(kx+sway+kw*0.5, ky); ctx.stroke();
                    ctx.strokeStyle = kiteCols[colI]; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.60;
                    ctx.beginPath();
                    ctx.moveTo(kx + sway, ky + kh*0.5);
                    for (let ti = 1; ti <= 5; ti++) {
                        const tw = Math.sin(t*1.5 + ti*0.8 + slot) * 6;
                        ctx.lineTo(kx + sway + tw, ky + kh*0.5 + ti * 8);
                    }
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // ── 9. Cherry blossom petals ──
            for (let i = 0; i < 20; i++) {
                const rng   = seededRandom(i * 1337 + 11);
                const speed = 5 + rng() * 8;
                const px    = playL + 10 + rng() * (playW - 20);
                const phase = rng() * BASE_H;
                const py    = BASE_H - ((t * speed + phase) % (BASE_H + 28));
                const pSz   = 1.5 + rng() * 2.0;
                const dx    = Math.sin(t * 0.45 + i * 2.3) * 8;
                const flick = 0.50 + 0.50 * Math.sin(t * 2.2 + i * 1.9);
                if (py < -5 || py > BASE_H + 5) continue;
                ctx.save(); ctx.globalAlpha = (0.30 + rng() * 0.40) * flick;
                ctx.fillStyle = rng() > 0.5 ? '#ffaacc' : '#ffccdd';
                ctx.beginPath(); ctx.arc(px+dx, py, pSz, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // ── 10. APEX — THE LIVING JADE DRAGON ──
            const apSY = APEX_Y - cam;
            if (apSY > -450 && apSY < BASE_H + 450) {
                ctx.save();
                const ap7   = 0.70 + 0.30 * Math.sin(t * 2.0);
                const apGrd = ctx.createRadialGradient(cx2, apSY, 0, cx2, apSY, 260);
                apGrd.addColorStop(0,    'rgba(0,180,80,' + (0.28*ap7).toFixed(2) + ')');
                apGrd.addColorStop(0.45, 'rgba(0,120,50,' + (0.13*ap7).toFixed(2) + ')');
                apGrd.addColorStop(1,    'transparent');
                ctx.fillStyle = apGrd;
                ctx.beginPath(); ctx.arc(cx2, apSY, 260, 0, Math.PI*2); ctx.fill();

                const loopSec = 10.0;
                const phase7  = (t % loopSec) / loopSec;
                const goRight = phase7 < 0.5;
                const posF    = goRight ? phase7 * 2 : (phase7 - 0.5) * 2;
                const hx      = goRight ? playL-100 + posF*(playW+200) : playR+100 - posF*(playW+200);
                const hy_base = apSY - 45;
                const N = 20, segGap = 14, undulate = 36, waveFreq = 2.6;

                const segs = [];
                for (let i = 0; i <= N; i++) {
                    segs.push({
                        x: hx + (goRight ? -1 : 1) * i * segGap,
                        y: hy_base + undulate * Math.sin(waveFreq * t - i * 0.36)
                    });
                }

                ctx.save();
                ctx.beginPath(); ctx.rect(playL - 5, -30, playW + 10, BASE_H + 60); ctx.clip();

                for (let i = N; i >= 1; i--) {
                    const sx = segs[i].x, sy = segs[i].y;
                    if (sx < playL - 28 || sx > playR + 28) continue;
                    const prog = (N - i) / N;
                    const r    = 4 + prog * 6;
                    ctx.fillStyle = '#004422';
                    ctx.beginPath(); ctx.arc(sx, sy, r+1.8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = prog > 0.45 ? '#22aa55' : '#179944';
                    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'rgba(100,255,150,0.35)';
                    ctx.beginPath(); ctx.arc(sx, sy+r*0.35, r*0.55, 0, Math.PI*2); ctx.fill();
                }

                for (let i = 3; i < N; i += 3) {
                    const sx = segs[i].x, sy = segs[i].y;
                    if (sx < playL-10 || sx > playR+10) continue;
                    const prog = (N-i)/N, fDir = goRight ? -1 : 1;
                    ctx.save(); ctx.globalAlpha = 0.78; ctx.fillStyle = '#c8d800';
                    ctx.beginPath();
                    ctx.moveTo(sx, sy-(4+prog*5));
                    ctx.lineTo(sx+fDir*3, sy-(4+prog*5)-(7+prog*10));
                    ctx.lineTo(sx+fDir*8, sy-(4+prog*5)-(7+prog*10)*0.45);
                    ctx.closePath(); ctx.fill(); ctx.restore();
                }

                const hx2 = segs[0].x, hy2 = segs[0].y;
                if (hx2 > playL-38 && hx2 < playR+38) {
                    const fDir = goRight ? 1 : -1;
                    ctx.fillStyle = '#004422';
                    ctx.beginPath(); ctx.arc(hx2, hy2, 14, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#22aa55';
                    ctx.beginPath(); ctx.arc(hx2, hy2, 12, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#179944';
                    ctx.beginPath(); ctx.ellipse(hx2+fDir*12, hy2+3, 9, 5.5, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#22aa55';
                    ctx.beginPath(); ctx.ellipse(hx2+fDir*11, hy2+2, 7, 4, 0, 0, Math.PI*2); ctx.fill();
                    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.70*ap7;
                    ctx.fillStyle='#aaff44'; ctx.beginPath(); ctx.arc(hx2+fDir*18,hy2+2,3.5,0,Math.PI*2); ctx.fill(); ctx.restore();
                    ctx.fillStyle = '#c8a000';
                    ctx.beginPath(); ctx.moveTo(hx2-fDir*2,hy2-12); ctx.lineTo(hx2-fDir*7,hy2-26); ctx.lineTo(hx2+fDir*3,hy2-12); ctx.closePath(); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(hx2+fDir*3,hy2-10); ctx.lineTo(hx2+fDir*7,hy2-20); ctx.lineTo(hx2+fDir*8,hy2-10); ctx.closePath(); ctx.fill();
                    ctx.save(); ctx.strokeStyle='#c8a000'; ctx.lineWidth=1.3; ctx.globalAlpha=0.75;
                    ctx.beginPath(); ctx.moveTo(hx2+fDir*16,hy2); ctx.quadraticCurveTo(hx2+fDir*26,hy2-10,hx2+fDir*20,hy2-20); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(hx2+fDir*16,hy2+3); ctx.quadraticCurveTo(hx2+fDir*28,hy2+6,hx2+fDir*22,hy2+16); ctx.stroke();
                    ctx.restore();
                    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(hx2+fDir*4,hy2-4,4,0,Math.PI*2); ctx.fill();
                    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.95;
                    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(hx2+fDir*4,hy2-4,2.8,0,Math.PI*2); ctx.fill(); ctx.restore();
                    ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(hx2+fDir*4,hy2-4,0.8,2.4,0,0,Math.PI*2); ctx.fill();

                    const cd = Math.abs(hx2-cx2)/(playW*0.5);
                    if (cd < 0.55) {
                        const fStr = (1-cd/0.55)*ap7;
                        for (let fi=0; fi<10; fi++) {
                            const fr=seededRandom(fi*77+(t*4|0)*13);
                            const fd=14+fi*9+fr()*8, fSp=(fr()-0.5)*14+Math.sin(t*6+fi)*5, fs=4+fr()*3.5-fi*0.3;
                            if (fs<0.6) continue;
                            ctx.save(); ctx.globalCompositeOperation='lighter';
                            ctx.globalAlpha=(0.60-fi*0.055)*fStr;
                            ctx.fillStyle=fi<3?'#ffe044':fi<7?'#88ff44':'#44ccff';
                            ctx.beginPath(); ctx.arc(hx2+fDir*fd,hy2+3+fSp,fs,0,Math.PI*2); ctx.fill(); ctx.restore();
                        }
                    }
                }
                ctx.restore(); // clip
                ctx.restore(); // apex save
            }
        }

        function drawBgMagic(cam, t) {
            // ── ENCHANTED REALM — warm magical atmosphere ──
            const { BASE_Y, APEX_Y, totalH } = getBgRange();
            const playL = WALL_W, playR = BASE_W - WALL_W, playW = playR - playL;
            const cx2 = BASE_W / 2;

            // ── 1. Crescent moon ──
            {
                const mX = playL + playW * 0.22;
                const mY = BASE_H * 0.13 - cam * 0.003;
                const mR = 26;
                ctx.save();
                const mHalo = ctx.createRadialGradient(mX, mY, 0, mX, mY, mR * 4.5);
                mHalo.addColorStop(0,   'rgba(220,180,255,0.20)');
                mHalo.addColorStop(0.5, 'rgba(170,120,255,0.08)');
                mHalo.addColorStop(1,   'transparent');
                ctx.fillStyle = mHalo;
                ctx.beginPath(); ctx.arc(mX, mY, mR * 4.5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ecdeff';
                ctx.beginPath(); ctx.arc(mX, mY, mR, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#160440';
                ctx.beginPath(); ctx.arc(mX + mR * 0.42, mY, mR * 0.88, 0, Math.PI*2); ctx.fill();
                ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.20;
                ctx.fillStyle = '#cc88ff';
                ctx.beginPath(); ctx.arc(mX, mY, mR * 1.20, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                ctx.restore();
            }

            // ── 3. Stars with cross sparkle on brightest ──
            for (let i = 0; i < 200; i++) {
                const rng = seededRandom(i * 1337 + 41);
                const wy  = APEX_Y + rng() * totalH;
                const sy2 = wy - cam;
                if (sy2 < -4 || sy2 > BASE_H + 4) continue;
                const sx  = playL + rng() * playW;
                const sr  = 0.3 + rng() * 1.7;
                const tw  = 0.30 + 0.70 * Math.abs(Math.sin(t * (0.8 + rng()*2.5) + rng()*20));
                const col = rng() > 0.78 ? '#ffd8aa' : rng() > 0.55 ? '#ffaaee' : rng() > 0.35 ? '#ccbbff' : '#ffffff';
                ctx.save(); ctx.globalAlpha = tw * (0.45 + rng() * 0.45); ctx.fillStyle = col;
                ctx.beginPath(); ctx.arc(sx, sy2, sr, 0, Math.PI*2); ctx.fill();
                if (sr > 1.2 && tw > 0.72) {
                    ctx.globalAlpha *= 0.50; ctx.strokeStyle = col; ctx.lineWidth = 0.6; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(sx-sr*2.2,sy2); ctx.lineTo(sx+sr*2.2,sy2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(sx,sy2-sr*2.2); ctx.lineTo(sx,sy2+sr*2.2); ctx.stroke();
                }
                ctx.restore();
            }

            // ── 4. Far crystal spire silhouettes (parallax 0.02x) ──
            {
                const effCam = cam * 0.02;
                const layers = [
                    { col: '#0e0228', alphaF: 0.88, baseF: 0.82, seed: 5531, nP: 10 },
                    { col: '#160438', alphaF: 0.55, baseF: 0.70, seed: 9917, nP: 14 },
                ];
                for (const lyr of layers) {
                    const baseY = BASE_H * lyr.baseF - effCam * lyr.baseF;
                    ctx.save(); ctx.globalAlpha = lyr.alphaF; ctx.fillStyle = lyr.col;
                    ctx.beginPath();
                    ctx.moveTo(playL - 5, BASE_H + 5); ctx.lineTo(playL - 5, baseY);
                    const rng = seededRandom(lyr.seed);
                    for (let p = 0; p <= lyr.nP; p++) {
                        const mx  = playL + (playW / lyr.nP) * p;
                        const mh  = 28 + rng() * 110;
                        const cw  = 7 + rng() * 13;
                        const typ = rng();
                        if (typ > 0.45) {
                            // Narrow crystal shard
                            ctx.lineTo(mx - cw, baseY);
                            ctx.lineTo(mx - cw * 0.35, baseY - mh * 0.52);
                            ctx.lineTo(mx, baseY - mh);
                            ctx.lineTo(mx + cw * 0.35, baseY - mh * 0.52);
                            ctx.lineTo(mx + cw, baseY);
                        } else {
                            // Rounded blob
                            ctx.lineTo(mx - cw, baseY);
                            ctx.arc(mx, baseY - mh * 0.50, mh * 0.50, Math.PI, 0, false);
                        }
                    }
                    ctx.lineTo(playR + 5, baseY); ctx.lineTo(playR + 5, BASE_H + 5);
                    ctx.closePath(); ctx.fill(); ctx.restore();
                }
            }

            // ── 5. Floating magical wisps (parallax 0.06x) ──
            {
                const effCam = cam * 0.06, slotH = 300;
                const s0 = Math.floor(effCam / slotH) - 1;
                const s1 = s0 + Math.ceil(BASE_H / slotH) + 2;
                const wCols = ['200,110,255','255,130,200','90,200,255','255,220,80','160,255,180'];
                for (let slot = s0; slot <= s1; slot++) {
                    const rng = seededRandom(slot * 1663 + 29);
                    const nW  = 1 + Math.floor(rng() * 3);
                    for (let wi = 0; wi < nW; wi++) {
                        const wx    = playL + 15 + rng() * (playW - 30);
                        const wy    = (slot + rng()) * slotH - effCam;
                        const wr    = 5 + rng() * 9;
                        const sway  = Math.sin(t * 0.55 + slot * 1.3 + wi * 2.1) * 9;
                        const float = Math.sin(t * 0.85 + slot * 1.7 + wi * 1.3) * 5;
                        const pulse = 0.60 + 0.40 * Math.sin(t * 1.8 + slot * 2 + wi * 1.5);
                        const cRgb  = wCols[Math.floor(rng() * wCols.length)];
                        if (wy < -40 || wy > BASE_H + 40) continue;
                        ctx.save();
                        ctx.globalCompositeOperation = 'lighter';
                        ctx.globalAlpha = 0.52 * pulse;
                        const wGrd = ctx.createRadialGradient(wx+sway, wy+float, 0, wx+sway, wy+float, wr*3.2);
                        wGrd.addColorStop(0,   `rgba(${cRgb},0.70)`);
                        wGrd.addColorStop(0.4, `rgba(${cRgb},0.22)`);
                        wGrd.addColorStop(1,   'transparent');
                        ctx.fillStyle = wGrd;
                        ctx.beginPath(); ctx.arc(wx+sway, wy+float, wr*3.2, 0, Math.PI*2); ctx.fill();
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.globalAlpha = 0.80 * pulse;
                        ctx.fillStyle = `rgba(${cRgb},0.85)`;
                        ctx.beginPath(); ctx.arc(wx+sway, wy+float, wr, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = 'rgba(255,255,255,0.55)';
                        ctx.beginPath(); ctx.arc(wx+sway-wr*0.30, wy+float-wr*0.30, wr*0.30, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // ── 6. Fairy dust drifting upward ──
            for (let i = 0; i < 40; i++) {
                const rng   = seededRandom(i * 2331 + 7);
                const speed = 5 + rng() * 11;
                const fpx   = playL + 10 + rng() * (playW - 20);
                const phase = rng() * BASE_H;
                const fpy   = BASE_H - ((t * speed + phase) % (BASE_H + 20));
                const psz   = 0.8 + rng() * 1.5;
                const dx    = Math.sin(t * 0.55 + i * 2.1) * 7;
                const flick = 0.45 + 0.55 * Math.sin(t * 3.0 + i * 1.7);
                if (fpy < -5 || fpy > BASE_H + 5) continue;
                ctx.save(); ctx.globalAlpha = (0.22 + rng() * 0.40) * flick;
                ctx.fillStyle = rng() > 0.60 ? '#ffaaff' : rng() > 0.30 ? '#ffddaa' : '#aaddff';
                ctx.beginPath(); ctx.arc(fpx+dx, fpy, psz, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // ── 7. Glowing runic sigils on walls ──
            const rSpace = 180;
            for (let wy = Math.floor(cam / rSpace) * rSpace - rSpace; wy <= cam + BASE_H + rSpace; wy += rSpace) {
                if (wy < APEX_Y + 200 || wy > BASE_Y - 80) continue;
                const sy2 = wy - cam;
                for (const side of [playL + 12, playR - 12]) {
                    const gl  = 0.45 + 0.45 * Math.sin(t * 1.5 + wy * 0.01);
                    const ang = t * 0.4 + wy * 0.005;
                    ctx.save();
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.globalAlpha = 0.20 * gl;
                    const rgGrd = ctx.createRadialGradient(side, sy2, 0, side, sy2, 20);
                    rgGrd.addColorStop(0, 'rgba(220,160,255,1)'); rgGrd.addColorStop(1, 'transparent');
                    ctx.fillStyle = rgGrd;
                    ctx.beginPath(); ctx.arc(side, sy2, 20, 0, Math.PI*2); ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = `rgba(190,130,255,${(0.55*gl).toFixed(2)})`; ctx.lineWidth = 1.3;
                    ctx.beginPath(); ctx.arc(side, sy2, 13, 0, Math.PI*2); ctx.stroke();
                    ctx.save(); ctx.translate(side, sy2); ctx.rotate(ang);
                    ctx.strokeStyle = `rgba(240,200,255,${(0.75*gl).toFixed(2)})`; ctx.lineWidth = 1.0;
                    for (let pi = 0; pi < 4; pi++) {
                        const a = (pi/4)*Math.PI*2;
                        ctx.beginPath(); ctx.moveTo(Math.cos(a)*5, Math.sin(a)*5); ctx.lineTo(Math.cos(a)*12, Math.sin(a)*12); ctx.stroke();
                    }
                    ctx.restore();
                    ctx.fillStyle = `rgba(255,220,255,${(0.85*gl).toFixed(2)})`;
                    ctx.beginPath(); ctx.arc(side, sy2, 2.8, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }
            }

            // ── 8. APEX: grand enchanted portal ──
            const apSY = APEX_Y - cam;
            if (apSY > -400 && apSY < BASE_H + 400) {
                ctx.save();
                ctx.translate(cx2, apSY + 60);

                // Outer ambient glow cloud
                const outerGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, 310);
                outerGrd.addColorStop(0,    'rgba(210,100,255,0.42)');
                outerGrd.addColorStop(0.35, 'rgba(140,60,220,0.22)');
                outerGrd.addColorStop(0.65, 'rgba(255,130,220,0.10)');
                outerGrd.addColorStop(1,    'transparent');
                ctx.fillStyle = outerGrd; ctx.beginPath(); ctx.arc(0, 0, 310, 0, Math.PI*2); ctx.fill();

                // Dashed rotating rings
                ctx.save(); ctx.rotate(t * 0.14);
                for (let ri = 0; ri < 4; ri++) {
                    const rr = 78 + ri * 24;
                    ctx.strokeStyle = `rgba(${ri<2?'220,155,255':'255,175,225'},${(0.60-ri*0.11).toFixed(2)})`;
                    ctx.lineWidth = 2.2 - ri*0.35;
                    ctx.setLineDash([rr*0.30, rr*0.12]);
                    ctx.lineDashOffset = t * (18 + ri*9);
                    ctx.beginPath(); ctx.arc(0, 0, rr, 0, Math.PI*1.88); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 0, rr, Math.PI, Math.PI*1.88+Math.PI); ctx.stroke();
                }
                ctx.setLineDash([]); ctx.restore();

                // Orbiting star markers
                ctx.save(); ctx.rotate(t * 0.28);
                for (let i = 0; i < 8; i++) {
                    const a  = (i/8)*Math.PI*2;
                    const pr = 130;
                    const gw = 0.65 + 0.35 * Math.sin(t*2.5 + i*0.785);
                    ctx.fillStyle = `rgba(255,215,255,${(0.85*gw).toFixed(2)})`;
                    ctx.beginPath(); ctx.arc(Math.cos(a)*pr, Math.sin(a)*pr, 4+gw*2, 0, Math.PI*2); ctx.fill();
                    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.18*gw;
                    ctx.strokeStyle='#cc99ff'; ctx.lineWidth=1;
                    ctx.beginPath(); ctx.moveTo(Math.cos(a)*62,Math.sin(a)*62); ctx.lineTo(Math.cos(a)*pr,Math.sin(a)*pr); ctx.stroke();
                    ctx.restore();
                }
                ctx.restore();

                // Inner petal swirl
                ctx.save(); ctx.rotate(-t * 0.48);
                for (let i = 0; i < 6; i++) {
                    const a   = (i/6)*Math.PI*2;
                    const pR  = 36;
                    const pgw = 0.70 + 0.30 * Math.sin(t*1.8 + i);
                    const pGrd = ctx.createRadialGradient(Math.cos(a)*pR, Math.sin(a)*pR, 0, Math.cos(a)*pR, Math.sin(a)*pR, 12);
                    pGrd.addColorStop(0, `rgba(255,200,255,${(0.90*pgw).toFixed(2)})`); pGrd.addColorStop(1, 'transparent');
                    ctx.fillStyle = pGrd;
                    ctx.beginPath(); ctx.arc(Math.cos(a)*pR, Math.sin(a)*pR, 12, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();

                // Core flash
                const flash = 0.72 + 0.28 * Math.sin(t * 2.8);
                ctx.save(); ctx.globalCompositeOperation='lighter';
                ctx.globalAlpha=0.88*flash; ctx.fillStyle='#ffffff';
                ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha=0.40*flash; ctx.fillStyle='#cc88ff';
                ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                ctx.restore(); // translate
            }
        }

        function drawBgSpace(cam, t, si) {
            const SC = si * 432109;
            const cx2 = BASE_W / 2;
            const playL = WALL_W, playR = BASE_W - WALL_W, playW = playR - playL;
            const { BASE_Y, APEX_Y, totalH } = getBgRange();

            // Convert world Y → screen Y
            const wsY = (wy) => wy - cam;

            // Smooth fade in/out near screen edges
            const ef = (sy, margin) => clamp(Math.min(sy + margin, BASE_H + margin - sy) / margin, 0, 1);

            // ── 1. Starfield — fixed to screen, 220 stars ──
            for (let i = 0; i < 220; i++) {
                const rng = seededRandom(SC + i * 1999 + 3);
                const sx = playL + rng() * playW;
                const sy = rng() * BASE_H;
                const sz = rng() * 1.9 + 0.2;
                const twinkle = 0.35 + 0.65 * Math.abs(Math.sin(t * (0.5 + rng() * 2.5) + rng() * 15));
                const col = rng() > 0.88 ? '#ffe8aa' : (rng() > 0.72 ? '#aaccff' : '#ffffff');
                ctx.save(); ctx.globalAlpha = twinkle * (0.25 + rng() * 0.65);
                ctx.fillStyle = col; ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI*2); ctx.fill();
                if (sz > 1.3 && twinkle > 0.7) {
                    ctx.globalAlpha *= 0.55;
                    ctx.strokeStyle = col; ctx.lineWidth = 0.7;
                    const arm = sz * 2.8;
                    ctx.beginPath(); ctx.moveTo(sx - arm, sy); ctx.lineTo(sx + arm, sy); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(sx, sy - arm); ctx.lineTo(sx, sy + arm); ctx.stroke();
                }
                ctx.restore();
            }

            // ── 2. Nebulas — fixed world positions, one per zone ──
            const nebulas = [
                { frac: 0.02, fx: 0.55, rgb: '80,180,255',   r: 75  },
                { frac: 0.08, fx: 0.25, rgb: '160,50,255',   r: 90  },
                { frac: 0.14, fx: 0.72, rgb: '30,150,255',   r: 100 },
                { frac: 0.20, fx: 0.40, rgb: '255,60,160',   r: 85  },
                { frac: 0.26, fx: 0.65, rgb: '40,210,180',   r: 95  },
                { frac: 0.32, fx: 0.20, rgb: '120,60,255',   r: 110 },
                { frac: 0.38, fx: 0.78, rgb: '255,90,60',    r: 80  },
                { frac: 0.44, fx: 0.35, rgb: '80,180,255',   r: 100 },
                { frac: 0.50, fx: 0.60, rgb: '200,50,200',   r: 90  },
                { frac: 0.56, fx: 0.22, rgb: '40,210,180',   r: 85  },
                { frac: 0.62, fx: 0.68, rgb: '160,50,255',   r: 105 },
                { frac: 0.68, fx: 0.42, rgb: '255,60,160',   r: 88  },
                { frac: 0.74, fx: 0.75, rgb: '30,150,255',   r: 95  },
                { frac: 0.80, fx: 0.30, rgb: '120,60,255',   r: 100 },
                { frac: 0.86, fx: 0.58, rgb: '255,90,60',    r: 90  },
                { frac: 0.92, fx: 0.18, rgb: '80,180,255',   r: 80  },
            ];
            for (const nb of nebulas) {
                const wy = APEX_Y + totalH * nb.frac;
                const ny = wsY(wy);
                const fade = ef(ny, nb.r * 3.2);
                if (fade <= 0) continue;
                const nx = playL + playW * nb.fx;
                const pulse = 0.82 + 0.18 * Math.sin(t * 0.25 + nb.frac * 14);
                ctx.save(); ctx.globalCompositeOperation = 'lighter';
                const ng = ctx.createRadialGradient(nx, ny, 0, nx, ny, nb.r);
                ng.addColorStop(0,   `rgba(${nb.rgb},${(0.13 * pulse * fade).toFixed(3)})`);
                ng.addColorStop(0.5, `rgba(${nb.rgb},${(0.06 * pulse * fade).toFixed(3)})`);
                ng.addColorStop(1,   'transparent');
                ctx.fillStyle = ng;
                ctx.beginPath(); ctx.arc(nx, ny, nb.r, 0, Math.PI*2); ctx.fill();
                // Secondary wisp
                const ox = nx + (nb.fx > 0.5 ? -1 : 1) * nb.r * 0.55;
                const oy = ny - nb.r * 0.30;
                const ng2 = ctx.createRadialGradient(ox, oy, 0, ox, oy, nb.r * 0.55);
