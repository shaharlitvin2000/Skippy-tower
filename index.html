                        const leafGrd = ctx.createLinearGradient(cx, sy, cx, sy + ph);
                        leafGrd.addColorStop(0, pal.top);
                        leafGrd.addColorStop(0.5, pal.body);
                        leafGrd.addColorStop(1, pal.under);
                        ctx.fillStyle = leafGrd;
                        ctx.beginPath();
                        // Right tip (pointed)
                        ctx.moveTo(rx - tipDepth, sy + 2);
                        ctx.quadraticCurveTo(rx + 1, sy + ph * 0.28, rx, sy + ph * 0.52);
                        ctx.quadraticCurveTo(rx - tipDepth * 0.5, sy + ph * 0.8, cx + lw * 0.1, sy + ph - 1);
                        ctx.quadraticCurveTo(cx, sy + ph + 2, cx - lw * 0.1, sy + ph - 1);
                        ctx.quadraticCurveTo(lx + tipDepth * 0.5, sy + ph * 0.8, lx, sy + ph * 0.52);
                        // Left tip (pointed)
                        ctx.quadraticCurveTo(lx - 1, sy + ph * 0.28, lx + tipDepth, sy + 2);
                        ctx.lineTo(rx - tipDepth, sy + 2);
                        ctx.fill();

                        // Top sheen strip (looks like a flat surface you can land on)
                        ctx.save(); ctx.globalAlpha = 0.40;
                        const sheenGrd = ctx.createLinearGradient(cx, sy, cx, sy + 5);
                        sheenGrd.addColorStop(0, pal.hi); sheenGrd.addColorStop(1, 'transparent');
                        ctx.fillStyle = sheenGrd;
                        ctx.beginPath();
                        ctx.moveTo(lx + tipDepth + 2, sy + 2);
                        ctx.lineTo(rx - tipDepth - 2, sy + 2);
                        ctx.quadraticCurveTo(rx - tipDepth + 4, sy + 6, cx, sy + 7);
                        ctx.quadraticCurveTo(lx + tipDepth - 4, sy + 6, lx + tipDepth + 2, sy + 2);
                        ctx.fill();
                        ctx.restore();

                        // Central mid-rib (runs left–right across full width)
                        ctx.strokeStyle = pal.vein; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(lx + tipDepth, sy + ph * 0.52);
                        ctx.quadraticCurveTo(cx, sy + ph * 0.48, rx - tipDepth, sy + ph * 0.52);
                        ctx.stroke();

                        // Side veins (diagonal, spread from mid-rib)
                        ctx.save(); ctx.globalAlpha = 0.50; ctx.strokeStyle = pal.vein; ctx.lineWidth = 0.85;
                        const veinCount = Math.max(3, Math.floor(lw / 22));
                        for (let vi = 1; vi < veinCount; vi++) {
                            const vx0 = lx + tipDepth + vi * (lw - tipDepth * 2) / veinCount;
                            const vMidY = sy + ph * 0.50;
                            ctx.beginPath();
                            ctx.moveTo(vx0, vMidY);
                            ctx.lineTo(vx0 - 8, sy + 3);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.moveTo(vx0, vMidY);
                            ctx.lineTo(vx0 + 4, sy + ph - 3);
                            ctx.stroke();
                        }
                        ctx.restore();

                        // Swaying leaf: gentle curl/wave on the top edge
                        if (this.leafSway) {
                            const swayAmt = Math.sin(t * this.swayFreq + this.swayPhase);
                            ctx.save(); ctx.globalAlpha = 0.22; ctx.strokeStyle = pal.hi;
                            ctx.lineWidth = 1.2; ctx.lineCap = 'round';
                            ctx.beginPath();
                            ctx.moveTo(lx + tipDepth + 6, sy + 3);
                            ctx.quadraticCurveTo(cx + swayAmt * 8, sy + 1, rx - tipDepth - 6, sy + 3);
                            ctx.stroke();
                            ctx.restore();
                        }

                    } else {
                        // ── FOREST: branch platform ──
                        const rngB = seededRandom((this.startX * 5 + this.y) | 0);
                        // Bark colours vary slightly per branch
                        const bDark  = `rgb(${48+rngB()*16|0},${24+rngB()*10|0},${6+rngB()*6|0})`;
                        const bLight = `rgb(${82+rngB()*20|0},${44+rngB()*12|0},${12+rngB()*8|0})`;

                        // Branch body
                        ctx.fillStyle = bDark;
                        ctx.beginPath(); ctx.roundRect(px, sy + 4, pw, ph - 4, 5); ctx.fill();
                        // Bark highlight stripe on top-left
                        const bGrd = ctx.createLinearGradient(px, sy + 4, px + pw, sy + 4);
                        bGrd.addColorStop(0, bLight); bGrd.addColorStop(0.3, bDark); bGrd.addColorStop(1, bDark);
                        ctx.fillStyle = bGrd;
                        ctx.beginPath(); ctx.roundRect(px, sy + 4, pw, 5, [5,5,0,0]); ctx.fill();
                        // Bark grain lines
                        ctx.save(); ctx.strokeStyle = bDark; ctx.lineWidth = 0.8; ctx.globalAlpha = 0.5;
                        const grainCount = Math.floor(pw / 16);
                        for (let i = 0; i < grainCount; i++) {
                            const gx = px + 6 + i * (pw - 12) / Math.max(grainCount, 1) + rngB() * 4 - 2;
                            ctx.beginPath(); ctx.moveTo(gx, sy + 5); ctx.lineTo(gx + (rngB() - 0.5) * 6, sy + ph); ctx.stroke();
                        }
                        ctx.restore();

                        // Moss strip on top surface
                        const mossGrd = ctx.createLinearGradient(px, sy, px, sy + 5);
                        mossGrd.addColorStop(0, '#4ab828'); mossGrd.addColorStop(1, '#2e7a14');
                        ctx.fillStyle = mossGrd;
                        ctx.beginPath(); ctx.roundRect(px, sy, pw, 6, [4,4,0,0]); ctx.fill();
                        // Moss bumps
                        ctx.fillStyle = '#5ec830';
                        const bumpCount = Math.floor(pw / 9);
                        for (let i = 0; i < bumpCount; i++) {
                            const bx2 = px + 4 + i * (pw - 8) / Math.max(bumpCount, 1);
                            ctx.beginPath(); ctx.arc(bx2, sy + 1, 2.8 + rngB() * 1.4, Math.PI, 0); ctx.fill();
                        }

                        // Hanging leaves below branch (2–4 leaves)
                        const hangCount = 2 + Math.floor(rngB() * 3);
                        ctx.save(); ctx.globalAlpha = 0.75;
                        for (let i = 0; i < hangCount; i++) {
                            const hx = px + 12 + rngB() * (pw - 24);
                            const hlen = 10 + rngB() * 8;
                            const sway3 = Math.sin(t * 0.8 + hx * 0.05) * 3;
                            // stem
                            ctx.strokeStyle = '#2a6a10'; ctx.lineWidth = 1; ctx.lineCap = 'round';
                            ctx.beginPath(); ctx.moveTo(hx, sy + ph); ctx.lineTo(hx + sway3, sy + ph + hlen); ctx.stroke();
                            // leaf
                            const leafColors = ['#2a8010','#6aaa18','#a0c820','#c8a010'];
                            ctx.fillStyle = leafColors[i % leafColors.length];
                            ctx.beginPath(); ctx.ellipse(hx + sway3, sy + ph + hlen, 6, 4, sway3 * 0.1, 0, Math.PI * 2); ctx.fill();
                        }
                        ctx.restore();

                        // Moving branch: glowing amber edge to signal motion
                        if (this.moving) {
                            ctx.save(); ctx.globalAlpha = 0.45;
                            const mGrd = ctx.createLinearGradient(px, sy, px + pw, sy);
                            mGrd.addColorStop(0, 'transparent'); mGrd.addColorStop(0.5, '#f0c030'); mGrd.addColorStop(1, 'transparent');
                            ctx.strokeStyle = mGrd; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(px + 4, sy + 1); ctx.lineTo(px + pw - 4, sy + 1); ctx.stroke();
                            ctx.restore();
                        }
                    }

                } else if (themeIdx === 2) {
                    if (this.isBouncy) {
                        // ── OCEAN: jellyfish bounce pad ──
                        const pulse = 0.60 + 0.40 * Math.abs(Math.sin(t * 2.8 + px * 0.04));
                        const nDomes = Math.max(2, Math.floor(pw / 22));
                        // Translucent bell domes
                        ctx.save();
                        ctx.globalCompositeOperation = 'lighter';
                        ctx.globalAlpha = 0.22 * pulse;
                        const jGlow = ctx.createRadialGradient(px+pw/2, sy, 0, px+pw/2, sy, pw*0.6);
                        jGlow.addColorStop(0, 'rgba(140,80,255,0.6)');
                        jGlow.addColorStop(1, 'transparent');
                        ctx.fillStyle = jGlow;
                        ctx.beginPath(); ctx.arc(px+pw/2, sy, pw*0.6, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                        ctx.save(); ctx.globalAlpha = 0.55 + 0.20 * pulse;
                        for (let di = 0; di < nDomes; di++) {
                            const dcx = px + (di + 0.5) * pw / nDomes;
                            const dr2 = (ph * 0.85) * pulse;
                            ctx.fillStyle = `rgba(160,100,255,${(0.30 * pulse).toFixed(2)})`;
                            ctx.beginPath();
                            ctx.arc(dcx, sy + ph*0.5, dr2, Math.PI, 0, false);
                            ctx.closePath(); ctx.fill();
                            // Tentacle hints below
                            ctx.strokeStyle = 'rgba(180,120,255,0.25)'; ctx.lineWidth = 0.8;
                            for (let ti = 0; ti < 3; ti++) {
                                const tx2 = dcx + (ti - 1) * dr2 * 0.5;
                                ctx.beginPath();
                                ctx.moveTo(tx2, sy + ph);
                                ctx.quadraticCurveTo(tx2 + Math.sin(t*2+ti)*3, sy+ph+6, tx2, sy+ph+10);
                                ctx.stroke();
                            }
                        }
                        // Top shimmer line
                        ctx.strokeStyle = 'rgba(200,160,255,0.70)'; ctx.lineWidth = 1.8;
                        ctx.beginPath(); ctx.moveTo(px+4, sy+1); ctx.lineTo(px+pw-4, sy+1); ctx.stroke();
                        ctx.globalAlpha = 0.18 * pulse; ctx.lineWidth = 7;
                        ctx.beginPath(); ctx.moveTo(px, sy); ctx.lineTo(px+pw, sy); ctx.stroke();
                        ctx.restore();

                    } else {
                        const rngF = seededRandom((this.startX * 11 + this.y * 7) | 0);
                        ctx.save();

                        if (this.fossType === 0) {
                            // ── CORAL ROCK LEDGE ──
                            const sg = ctx.createLinearGradient(px, sy, px, sy + ph);
                            sg.addColorStop(0,   '#2a6880');
                            sg.addColorStop(0.4, '#1e5068');
                            sg.addColorStop(1,   '#143850');
                            ctx.fillStyle = sg; ctx.fillRect(px, sy, pw, ph);
                            ctx.fillStyle = '#3a8898'; ctx.fillRect(px, sy, pw, 2);
                            ctx.fillStyle = '#0c2838'; ctx.fillRect(px, sy + ph - 2, pw, 2);
                            // Coral accent bumps on top
                            ctx.save(); ctx.globalAlpha = 0.70;
                            const nCoral = 2 + Math.floor(rngF() * 4);
                            for (let ci = 0; ci < nCoral; ci++) {
                                const crx = px + 6 + rngF() * (pw - 12);
                                const crCol = rngF() > 0.5 ? '#ff6688' : '#ff9944';
                                ctx.fillStyle = crCol;
                                ctx.beginPath(); ctx.arc(crx, sy, 2.5 + rngF() * 2, Math.PI, 0, false); ctx.fill();
                            }
                            ctx.restore();
                            // Stone texture lines
                            ctx.save(); ctx.globalAlpha = 0.18;
                            ctx.strokeStyle = '#0a2838'; ctx.lineWidth = 0.8;
                            ctx.beginPath(); ctx.moveTo(px, sy + 7); ctx.lineTo(px+pw, sy+7); ctx.stroke();
                            ctx.restore();

                        } else if (this.fossType === 1) {
                            // ── SUNKEN SHIP PLANK ──
                            const wg = ctx.createLinearGradient(px, sy, px, sy + ph);
                            wg.addColorStop(0,   '#3a4a38');
                            wg.addColorStop(0.4, '#2a3828');
                            wg.addColorStop(1,   '#1a2818');
                            ctx.fillStyle = wg; ctx.fillRect(px, sy, pw, ph);
                            ctx.fillStyle = '#4a5a48'; ctx.fillRect(px, sy, pw, 2);
                            ctx.fillStyle = '#101810'; ctx.fillRect(px, sy + ph - 2, pw, 2);
                            // Plank grain
                            ctx.save(); ctx.globalAlpha = 0.22;
                            ctx.strokeStyle = '#1a2a18'; ctx.lineWidth = 0.7;
                            const nG = 2 + Math.floor(rngF() * 3);
                            for (let gi = 0; gi < nG; gi++) {
                                const gy = sy + 3 + gi * (ph - 6) / Math.max(1, nG - 0.5);
                                ctx.beginPath();
                                ctx.moveTo(px + rngF() * 8, gy);
                                ctx.lineTo(px + pw - rngF() * 8, gy + (rngF()-0.5)*1.5);
                                ctx.stroke();
                            }
                            ctx.restore();
                            // Barnacle dots
                            ctx.save(); ctx.globalAlpha = 0.65;
                            const nBarn = 2 + Math.floor(rngF() * 4);
                            for (let bi = 0; bi < nBarn; bi++) {
                                const bx3 = px + 5 + rngF() * (pw - 10);
                                const by3 = sy + 3 + rngF() * (ph - 6);
                                ctx.fillStyle = '#6a8868';
                                ctx.beginPath(); ctx.arc(bx3, by3, 2 + rngF(), 0, Math.PI*2); ctx.fill();
                                ctx.fillStyle = '#8aaa88';
                                ctx.beginPath(); ctx.arc(bx3 - 0.5, by3 - 0.5, 1, 0, Math.PI*2); ctx.fill();
                            }
                            ctx.restore();
                            // Cyan top edge glow (bioluminescence)
                            ctx.save(); ctx.globalAlpha = 0.35;
                            ctx.strokeStyle = '#44ddcc'; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(px+3, sy+1); ctx.lineTo(px+pw-3, sy+1); ctx.stroke();
                            ctx.restore();

                        } else {
                            // ── KELP / STONE SHELF ──
                            const kg = ctx.createLinearGradient(px, sy, px, sy + ph);
                            kg.addColorStop(0,   '#186040');
                            kg.addColorStop(0.5, '#104830');
                            kg.addColorStop(1,   '#0a3020');
                            ctx.fillStyle = kg; ctx.fillRect(px, sy, pw, ph);
                            ctx.fillStyle = '#20884c'; ctx.fillRect(px, sy, pw, 2);
                            // Kelp strands hanging off top
                            ctx.save(); ctx.globalAlpha = 0.75;
                            const nKelp = Math.max(2, Math.floor(pw / 16));
                            for (let ki = 0; ki < nKelp; ki++) {
                                const kx2 = px + (ki + 0.5) * pw / nKelp;
                                const klen = 6 + rngF() * 8;
                                const ksway = Math.sin(t * 0.8 + ki * 1.4 + px * 0.02) * 2.5;
                                ctx.strokeStyle = rngF() > 0.5 ? '#0d8040' : '#0aaa38';
                                ctx.lineWidth = 1.5; ctx.lineCap = 'round';
                                ctx.beginPath();
                                ctx.moveTo(kx2, sy);
                                ctx.quadraticCurveTo(kx2 + ksway, sy - klen*0.5, kx2 + ksway*1.5, sy - klen);
                                ctx.stroke();
                            }
                            ctx.restore();
                            ctx.save(); ctx.globalAlpha = 0.28;
                            ctx.strokeStyle = '#44ccaa'; ctx.lineWidth = 1.2;
                            ctx.beginPath(); ctx.moveTo(px+3, sy+1); ctx.lineTo(px+pw-3, sy+1); ctx.stroke();
                            ctx.restore();
                        }

                        // Moving platform: cyan shimmer
                        if (this.moving) {
                            ctx.save(); ctx.globalAlpha = 0.45;
                            const mg = ctx.createLinearGradient(px, sy, px + pw, sy);
                            mg.addColorStop(0, 'transparent'); mg.addColorStop(0.5, '#44ddff'); mg.addColorStop(1, 'transparent');
                            ctx.strokeStyle = mg; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(px + 4, sy + 1); ctx.lineTo(px + pw - 4, sy + 1); ctx.stroke();
                            ctx.restore();
                        }
                        ctx.restore();
                    }

                } else if (themeIdx === 3) {
                    if (this.isBouncy) {
                        // ── CHINESE FESTIVAL CLOUD PAD ──
                        const pulse = 0.62 + 0.38 * Math.abs(Math.sin(t * 3.5 + px * 0.05));
                        const cloudPuffs = Math.max(3, Math.floor(pw / 18));
                        // White fluffy cloud body
                        ctx.save();
                        ctx.fillStyle = `rgba(255,255,255,${0.88 + 0.12 * pulse})`;
                        for (let i = 0; i < cloudPuffs; i++) {
                            const ccx = px + (i + 0.5) * pw / cloudPuffs;
                            const cr = (ph * 0.95) * pulse;
                            ctx.beginPath(); ctx.arc(ccx, sy + ph * 0.5, cr, 0, Math.PI*2); ctx.fill();
                        }
                        ctx.restore();
                        // Sky-blue shimmer on upper half
                        ctx.save(); ctx.globalAlpha = 0.32 * pulse;
                        ctx.fillStyle = '#88ddff';
                        for (let i = 0; i < cloudPuffs; i++) {
                            const ccx = px + (i + 0.5) * pw / cloudPuffs;
                            ctx.beginPath(); ctx.arc(ccx, sy + ph * 0.2, ph * 0.55 * pulse, 0, Math.PI*2); ctx.fill();
                        }
                        ctx.restore();
                        // Gold sparkles
                        ctx.save(); ctx.globalCompositeOperation = 'lighter';
                        for (let i = 0; i < 5; i++) {
                            const spx = px + (0.1 + i * 0.2) * pw;
                            const spy = sy + Math.sin(t * 3.2 + i * 1.5) * 2;
                            ctx.globalAlpha = (0.35 + 0.65 * Math.sin(t * 4.5 + i * 2.3)) * pulse;
                            ctx.fillStyle = '#ffee88';
                            ctx.beginPath(); ctx.arc(spx, spy, 1.8, 0, Math.PI*2); ctx.fill();
                        }
                        ctx.restore();
                        // Bottom shadow
                        ctx.save(); ctx.globalAlpha = 0.15;
                        const cShadow = ctx.createLinearGradient(px, sy + ph, px, sy + ph + 6);
                        cShadow.addColorStop(0, 'rgba(100,180,255,0.6)'); cShadow.addColorStop(1, 'transparent');
                        ctx.fillStyle = cShadow; ctx.fillRect(px, sy + ph, pw, 6);
                        ctx.restore();
                    } else {
                        // ── CHINESE FESTIVAL: red lacquered wood beam ──
                        const woodG = ctx.createLinearGradient(px, sy, px, sy + ph);
                        woodG.addColorStop(0, '#dd2a00');
                        woodG.addColorStop(0.3, '#ee3300');
                        woodG.addColorStop(0.7, '#cc2200');
                        woodG.addColorStop(1, '#aa1800');
                        ctx.fillStyle = woodG;
                        ctx.beginPath(); ctx.roundRect(px, sy + 2, pw, ph - 2, 3); ctx.fill();
                        // Gold top trim
                        ctx.fillStyle = '#c8a000';
                        ctx.fillRect(px, sy + 1, pw, 3);
                        // Gold end caps
                        ctx.fillStyle = '#e0b400';
                        ctx.beginPath(); ctx.roundRect(px, sy + 1, 8, ph - 1, 2); ctx.fill();
                        ctx.beginPath(); ctx.roundRect(px + pw - 8, sy + 1, 8, ph - 1, 2); ctx.fill();
                        // Gold dividers between panels
                        const nDiv = Math.max(1, Math.floor(pw / 40));
                        for (let i = 1; i < nDiv; i++) {
                            const dvx = px + (pw / nDiv) * i;
                            ctx.fillStyle = '#b89000';
                            ctx.fillRect(dvx - 1, sy + 2, 2, ph - 2);
                        }
                        // Shine stripe on top
                        ctx.save(); ctx.globalAlpha = 0.28;
                        ctx.strokeStyle = '#ffdd88'; ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.moveTo(px + 10, sy + 2.5); ctx.lineTo(px + pw - 10, sy + 2.5); ctx.stroke();
                        ctx.restore();
                        // Bottom shadow glow
                        const shimPulse = 0.55 + 0.45 * Math.sin(t * 2.2 + px * 0.04);
                        ctx.save(); ctx.globalAlpha = 0.16 * shimPulse;
                        const eg2 = ctx.createLinearGradient(px, sy + ph, px, sy + ph + 7);
                        eg2.addColorStop(0, '#ffcc44'); eg2.addColorStop(1, 'transparent');
                        ctx.fillStyle = eg2; ctx.fillRect(px, sy + ph, pw, 7);
                        ctx.restore();
                    }

                } else if (themeIdx === 4) {
                    if (this.isBouncy) {
                        // ── MAGIC JUMP PAD: arcane teleport circle ──
                        const pulse = 0.65 + 0.35 * Math.sin(t * 3 + px * 0.03);
                        // Dark base
                        ctx.fillStyle = '#1a0444';
                        ctx.beginPath(); ctx.roundRect(px, sy + 2, pw, ph - 2, 4); ctx.fill();
                        // Swirling gradient surface
                        const mGrad = ctx.createLinearGradient(px, sy, px + pw, sy + ph);
                        mGrad.addColorStop(0, `rgba(180,60,255,${0.7 * pulse})`);
                        mGrad.addColorStop(0.5, `rgba(80,160,255,${0.5 * pulse})`);
                        mGrad.addColorStop(1, `rgba(180,60,255,${0.7 * pulse})`);
                        ctx.fillStyle = mGrad;
                        ctx.beginPath(); ctx.roundRect(px, sy, pw, ph, 4); ctx.fill();
                        // Rotating magic circle
                        ctx.save(); ctx.translate(px + pw / 2, sy + ph / 2); ctx.rotate(t * 1.5);
                        ctx.globalAlpha = 0.8 * pulse;
                        ctx.strokeStyle = '#ff88ff'; ctx.lineWidth = 1.2;
                        const cr = Math.min(pw / 2 - 4, ph / 2 + 2);
                        ctx.beginPath(); ctx.arc(0, 0, cr, 0, Math.PI * 2); ctx.stroke();
                        // Inner star points
                        ctx.strokeStyle = '#ccaaff'; ctx.lineWidth = 0.8;
                        for (let i = 0; i < 5; i++) {
                            const a1 = (i / 5) * Math.PI * 2 - Math.PI / 2;
                            const a2 = ((i + 2) / 5) * Math.PI * 2 - Math.PI / 2;
                            ctx.beginPath(); ctx.moveTo(Math.cos(a1) * cr * 0.85, Math.sin(a1) * cr * 0.85);
                            ctx.lineTo(Math.cos(a2) * cr * 0.85, Math.sin(a2) * cr * 0.85); ctx.stroke();
                        }
                        ctx.restore();
                        // Glowing top rim
                        ctx.save(); ctx.globalAlpha = pulse;
                        ctx.strokeStyle = '#ee88ff'; ctx.lineWidth = 2.5;
                        ctx.beginPath(); ctx.moveTo(px + 4, sy + 1); ctx.lineTo(px + pw - 4, sy + 1); ctx.stroke();
                        ctx.globalAlpha = 0.3 * pulse; ctx.lineWidth = 8;
                        ctx.beginPath(); ctx.moveTo(px, sy); ctx.lineTo(px + pw, sy); ctx.stroke();
                        ctx.restore();
                    } else {
                        // ── MAGIC: normal arcane slab ──
                        const magPulse = 0.65 + 0.35 * Math.sin(t * 2.2 + px * 0.03);
                        const bodyC2 = '#2a0a5a';
                        ctx.fillStyle = bodyC2;
                        ctx.beginPath(); ctx.roundRect(px, sy + 3, pw, ph - 3, 4); ctx.fill();
                        const rngM = seededRandom((this.startX * 9 + this.y) | 0);
                        ctx.save(); ctx.globalAlpha = 0.35 * magPulse; ctx.strokeStyle = '#dd88ff'; ctx.lineWidth = 1;
                        const runeCount = Math.floor(pw / 25);
                        for (let i = 0; i < runeCount; i++) {
                            const rx = px + 8 + i * (pw - 16) / Math.max(runeCount, 1); const ry = sy + 6; const rs = 3 + rngM() * 2;
                            if (rngM() > 0.5) { ctx.beginPath(); ctx.moveTo(rx - rs, ry); ctx.lineTo(rx + rs, ry); ctx.moveTo(rx, ry - rs); ctx.lineTo(rx, ry + rs); ctx.stroke(); }
                            else { ctx.beginPath(); ctx.moveTo(rx, ry - rs); ctx.lineTo(rx + rs, ry); ctx.lineTo(rx, ry + rs); ctx.lineTo(rx - rs, ry); ctx.closePath(); ctx.stroke(); }
                        }
                        ctx.restore();
                        ctx.save(); ctx.globalAlpha = 0.8 * magPulse;
                        ctx.strokeStyle = '#cc88ff'; ctx.lineWidth = 2.5;
                        ctx.beginPath(); ctx.moveTo(px + 4, sy + 1); ctx.lineTo(px + pw - 4, sy + 1); ctx.stroke();
                        ctx.globalAlpha = 0.25 * magPulse; ctx.lineWidth = 7;
                        ctx.beginPath(); ctx.moveTo(px, sy + 1); ctx.lineTo(px + pw, sy + 1); ctx.stroke();
                        ctx.restore();
                    }

                } else {
                    if (this.isBouncy) {
                        // ── SPACE JUMP PAD: rocket booster pad ──
                        const pulse = 0.65 + 0.35 * Math.sin(t * 4 + px * 0.04);
                        // Dark hull
                        ctx.fillStyle = '#0a1a28';
                        ctx.beginPath(); ctx.roundRect(px, sy + 1, pw, ph - 1, 3); ctx.fill();
                        // Metallic sheen
                        const spG = ctx.createLinearGradient(px, sy, px + pw, sy + ph);
                        spG.addColorStop(0, 'rgba(0,200,255,0.2)'); spG.addColorStop(0.5, 'rgba(0,255,180,0.35)'); spG.addColorStop(1, 'rgba(0,200,255,0.2)');
                        ctx.fillStyle = spG;
                        ctx.beginPath(); ctx.roundRect(px, sy, pw, ph, 3); ctx.fill();
                        // Thruster nozzles on top
                        const nNozzles = Math.max(2, Math.floor(pw / 20));
                        for (let i = 0; i < nNozzles; i++) {
                            const nx = px + (i + 0.5) * pw / nNozzles;
                            // Nozzle body
                            ctx.fillStyle = '#334455';
                            ctx.beginPath(); ctx.roundRect(nx - 4, sy - 2, 8, 5, 1); ctx.fill();
                            ctx.strokeStyle = '#00ccff'; ctx.lineWidth = 1;
                            ctx.beginPath(); ctx.roundRect(nx - 4, sy - 2, 8, 5, 1); ctx.stroke();
                            // Flame jet
                            const flame = 0.5 + 0.5 * Math.sin(t * 9 + i * 2.3);
                            ctx.save();
                            ctx.globalAlpha = 0.7 * flame * pulse;
                            const fg = ctx.createLinearGradient(nx, sy - 2, nx, sy - 10 - flame * 5);
                            fg.addColorStop(0, '#00ffcc'); fg.addColorStop(0.5, '#00aaff'); fg.addColorStop(1, 'transparent');
                            ctx.fillStyle = fg;
                            ctx.beginPath(); ctx.moveTo(nx - 3, sy - 2); ctx.lineTo(nx + 3, sy - 2); ctx.lineTo(nx + (1 - flame) * 1.5, sy - 10 - flame * 5); ctx.lineTo(nx - (1 - flame) * 1.5, sy - 10 - flame * 5); ctx.closePath(); ctx.fill();
                            ctx.restore();
                        }
                        // LED border
                        ctx.save(); ctx.globalAlpha = pulse;
                        ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.roundRect(px + 1, sy + 1, pw - 2, ph - 2, 3); ctx.stroke();
                        ctx.globalAlpha = 0.2 * pulse; ctx.lineWidth = 8;
                        ctx.beginPath(); ctx.moveTo(px, sy); ctx.lineTo(px + pw, sy); ctx.stroke();
                        ctx.restore();
                    } else {
                        // ── SPACE: normal platform — 3 variants (seed on stable y so moving platforms don't flicker) ──
                        const spVar = seededRandom(Math.round(this.y) * 7 + 99)();
                        const ledPulse = 0.55 + 0.45 * Math.sin(t * 3.2 + this.y * 0.04);
                        if (spVar < 0.34) {
                            // Variant A: Space station hull plate (dark alloy + cyan tech stripe)
                            const hullG = ctx.createLinearGradient(px, sy, px, sy + ph);
                            hullG.addColorStop(0, '#152535'); hullG.addColorStop(1, '#0a1820');
                            ctx.fillStyle = hullG;
                            ctx.beginPath(); ctx.roundRect(px, sy + 2, pw, ph - 2, 3); ctx.fill();
                            // Panel dividers
                            ctx.strokeStyle = 'rgba(0,140,200,0.20)'; ctx.lineWidth = 1;
                            const segW2 = Math.max(18, pw / Math.round(pw / 24));
                            for (let bx = px + segW2; bx < px + pw - 4; bx += segW2) {
                                ctx.beginPath(); ctx.moveTo(bx, sy + 2); ctx.lineTo(bx, sy + ph); ctx.stroke();
                            }
                            // Rivet dots at corners
                            ctx.save(); ctx.globalAlpha = 0.65; ctx.fillStyle = '#2a4060';
                            for (const rx of [px + 5, px + pw - 5]) {
                                ctx.beginPath(); ctx.arc(rx, sy + ph - 4, 2.2, 0, Math.PI*2); ctx.fill();
                            }
                            ctx.restore();
                            // Cyan LED edge strip
                            ctx.save(); ctx.globalAlpha = 0.90 * ledPulse; ctx.strokeStyle = '#00ccff'; ctx.lineWidth = 2;
                            ctx.beginPath(); ctx.moveTo(px + 3, sy + 1); ctx.lineTo(px + pw - 3, sy + 1); ctx.stroke();
                            ctx.globalAlpha = 0.20 * ledPulse; ctx.lineWidth = 8;
                            ctx.beginPath(); ctx.moveTo(px, sy + 1); ctx.lineTo(px + pw, sy + 1); ctx.stroke(); ctx.restore();
                            // Corner LED lights
                            ctx.save(); ctx.globalAlpha = ledPulse; ctx.fillStyle = '#00ccff';
                            ctx.beginPath(); ctx.arc(px + 4, sy + 4, 2.2, 0, Math.PI*2); ctx.fill();
                            ctx.beginPath(); ctx.arc(px + pw - 4, sy + 4, 2.2, 0, Math.PI*2); ctx.fill(); ctx.restore();
                        } else if (spVar < 0.67) {
                            // Variant B: Solar panel array (dark frame + blue photovoltaic cells)
                            ctx.fillStyle = '#0d1820';
                            ctx.beginPath(); ctx.roundRect(px, sy + 2, pw, ph - 2, 3); ctx.fill();
                            // Solar cells grid
                            const cellW = Math.max(12, pw / Math.round(pw / 16));
                            const cellPulse = 0.50 + 0.50 * Math.sin(t * 1.8 + px * 0.02);
                            for (let cx3 = px + 2; cx3 < px + pw - 2; cx3 += cellW) {
                                const cw = Math.min(cellW - 2, px + pw - cx3 - 2);
                                if (cw < 4) continue;
                                const cGrd = ctx.createLinearGradient(cx3, sy + 2, cx3 + cw, sy + ph);
                                cGrd.addColorStop(0, `rgba(20,80,160,${0.60 + 0.25*cellPulse})`);
                                cGrd.addColorStop(1, `rgba(10,40,100,${0.40 + 0.15*cellPulse})`);
                                ctx.fillStyle = cGrd;
                                ctx.fillRect(cx3, sy + 3, cw, ph - 4);
                                // Cell highlight sheen
                                ctx.save(); ctx.globalAlpha = 0.18 * cellPulse;
                                ctx.fillStyle = '#88ccff';
                                ctx.fillRect(cx3, sy + 3, cw * 0.45, ph - 4); ctx.restore();
                            }
                            // Frame edge
                            ctx.save(); ctx.globalAlpha = 0.85 * ledPulse; ctx.strokeStyle = '#2266aa'; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.roundRect(px, sy + 2, pw, ph - 2, 3); ctx.stroke(); ctx.restore();
                            // Glow from collected sunlight
                            ctx.save(); ctx.globalCompositeOperation = 'lighter';
                            ctx.globalAlpha = 0.12 * cellPulse;
                            ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 6;
                            ctx.beginPath(); ctx.moveTo(px + 2, sy + 1); ctx.lineTo(px + pw - 2, sy + 1); ctx.stroke(); ctx.restore();
                        } else {
                            // Variant C: Asteroid slab (rocky grey-brown with craters)
                            const rockG = ctx.createLinearGradient(px, sy, px + pw, sy + ph);
                            rockG.addColorStop(0, '#5a5c68'); rockG.addColorStop(0.5, '#42444e'); rockG.addColorStop(1, '#2c2e38');
                            ctx.fillStyle = rockG;
                            ctx.beginPath(); ctx.roundRect(px, sy + 2, pw, ph - 2, 2); ctx.fill();
                            // Rocky surface texture (seeded craters)
                            const rngR = seededRandom(px * 17 + this.y * 11);
                            const nC = 2 + Math.floor(rngR() * 4);
                            for (let ci = 0; ci < nC; ci++) {
                                const crX = px + 6 + rngR() * (pw - 12);
                                const crY = sy + 3 + rngR() * (ph - 4);
                                const crR = 1.5 + rngR() * 3;
                                ctx.save(); ctx.globalAlpha = 0.35;
                                ctx.fillStyle = '#1e2028';
                                ctx.beginPath(); ctx.arc(crX, crY, crR, 0, Math.PI*2); ctx.fill();
                                ctx.globalAlpha = 0.20; ctx.fillStyle = '#8888a0';
                                ctx.beginPath(); ctx.arc(crX - crR*0.3, crY - crR*0.3, crR*0.5, 0, Math.PI*2); ctx.fill();
                                ctx.restore();
                            }
                            // Highlight edge from starlight
                            ctx.save(); ctx.globalAlpha = 0.50; ctx.strokeStyle = '#9090a8'; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(px + 2, sy + 2); ctx.lineTo(px + pw - 2, sy + 2); ctx.stroke(); ctx.restore();
                            // Faint cyan mineral vein glow
                            ctx.save(); ctx.globalCompositeOperation = 'lighter';
                            ctx.globalAlpha = 0.08 * ledPulse; ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 6;
                            ctx.beginPath(); ctx.moveTo(px, sy + 1); ctx.lineTo(px + pw, sy + 1); ctx.stroke(); ctx.restore();
                        }
                    }
                }

                // ── Bouncy: floating ↑↑ arrows above the pad ──
                if (this.isBouncy) {
                    const midX = px + pw / 2;
                    ctx.save();
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    for (let i = 0; i < 2; i++) {
                        const offset = i * 7;
                        const travel = ((t * 1.4 + i * 0.5) % 1); // 0→1 loop
                        const ay = sy - 10 - offset - travel * 10;
                        const alpha = travel < 0.7 ? (0.9 - travel * 0.5) : (0.9 - travel * 0.5) * ((1 - travel) / 0.3);
                        ctx.globalAlpha = Math.max(0, alpha);
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(midX, ay + 6); ctx.lineTo(midX, ay); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(midX - 4, ay + 4); ctx.lineTo(midX, ay); ctx.lineTo(midX + 4, ay + 4); ctx.stroke();
                    }
                    ctx.restore();
                }

                // ── Spikes ──
                if (this.spikes.length) {
                    for (const sp of this.spikes) {
                        const spikeH = 26;
                        const center = this.x + sp.offset + sp.width * 0.5;
                        const vLeft  = center - sp.width;
                        const vRight = center + sp.width;
                        const [dr, dg, db] = hexToRgb(C.DANGER);
                        const [hr, hg, hb] = hexToRgb(C.DANGER_HIGHLIGHT);
                        const dangerPulse = 0.55 + 0.45 * Math.sin(t * 3.5 + center * 0.07);

                        // Universal danger glow pool
                        ctx.save();
                        ctx.globalCompositeOperation = 'lighter';
                        ctx.globalAlpha = 0.16 * dangerPulse;
                        const dgGrd = ctx.createRadialGradient(center, sy, 0, center, sy, sp.width * 2.4);
                        dgGrd.addColorStop(0, `rgb(${dr},${dg},${db})`);
                        dgGrd.addColorStop(1, 'transparent');
                        ctx.fillStyle = dgGrd;
                        ctx.beginPath(); ctx.arc(center, sy, sp.width * 2.4, 0, Math.PI*2); ctx.fill();
                        ctx.restore();

                        if (themeIdx === 0) {
                            // ── Clock Tower: serrated bronze spike ──
                            ctx.save();
                            ctx.fillStyle = 'rgba(0,0,0,0.55)';
                            ctx.beginPath(); ctx.moveTo(vLeft+3,sy+2); ctx.lineTo(center+3,sy-spikeH+2); ctx.lineTo(vRight+3,sy+2); ctx.closePath(); ctx.fill();
                            const cGrd = ctx.createLinearGradient(center, sy, center, sy-spikeH);
                            cGrd.addColorStop(0,'#2a1404'); cGrd.addColorStop(0.55,'#8a5018'); cGrd.addColorStop(1,'#d4901a');
                            ctx.fillStyle = cGrd;
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(vRight,sy); ctx.closePath(); ctx.fill();
                            ctx.fillStyle = 'rgba(255,200,60,0.28)';
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(center,sy); ctx.closePath(); ctx.fill();
                            // Serration notches
                            ctx.save(); ctx.globalAlpha = 0.60; ctx.strokeStyle = '#d4901a'; ctx.lineWidth = 0.9;
                            for (let ni = 1; ni <= 3; ni++) {
                                const ny = sy - (spikeH/(3+1))*ni;
                                const hw = sp.width*(1 - ni/3.5);
                                ctx.beginPath(); ctx.moveTo(center-hw,ny); ctx.lineTo(center-hw-3,ny-2); ctx.lineTo(center-hw,ny-4); ctx.stroke();
                                ctx.beginPath(); ctx.moveTo(center+hw,ny); ctx.lineTo(center+hw+3,ny-2); ctx.lineTo(center+hw,ny-4); ctx.stroke();
                            }
                            ctx.restore();
                            ctx.strokeStyle='rgba(0,0,0,0.75)'; ctx.lineWidth=1.3;
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(vRight,sy); ctx.closePath(); ctx.stroke();
                            ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.65*dangerPulse;
                            ctx.fillStyle='#ffcc44'; ctx.beginPath(); ctx.arc(center,sy-spikeH,2.8,0,Math.PI*2); ctx.fill();
                            ctx.restore();
                            ctx.restore();

                        } else if (themeIdx === 1) {
                            // ── Forest: sharpened stake with poison tip ──
                            ctx.save();
                            ctx.fillStyle = 'rgba(0,0,0,0.45)';
                            ctx.beginPath(); ctx.moveTo(vLeft+2,sy+2); ctx.lineTo(center+2,sy-spikeH+2); ctx.lineTo(vRight+2,sy+2); ctx.closePath(); ctx.fill();
                            const wGrd = ctx.createLinearGradient(center,sy,center,sy-spikeH);
                            wGrd.addColorStop(0,'#3a1806'); wGrd.addColorStop(0.68,'#6a3010'); wGrd.addColorStop(0.84,'#2a7010'); wGrd.addColorStop(1,'#88ee22');
                            ctx.fillStyle = wGrd;
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(vRight,sy); ctx.closePath(); ctx.fill();
                            // Wood grain marks
                            ctx.save(); ctx.globalAlpha=0.22; ctx.strokeStyle='#1a0c04'; ctx.lineWidth=0.8;
                            for (let gi=1; gi<=2; gi++) {
                                const gy=sy-spikeH*gi*0.28; const ghw=sp.width*(1-gi*0.28*0.5);
                                ctx.beginPath(); ctx.moveTo(center-ghw*0.5,gy); ctx.lineTo(center+ghw*0.4,gy+1.5); ctx.stroke();
                            }
                            ctx.restore();
                            ctx.strokeStyle='rgba(0,0,0,0.60)'; ctx.lineWidth=1.2;
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(vRight,sy); ctx.closePath(); ctx.stroke();
                            ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.70*dangerPulse;
                            ctx.fillStyle='#66ff22'; ctx.beginPath(); ctx.arc(center,sy-spikeH,3.2,0,Math.PI*2); ctx.fill();
                            ctx.restore();
                            ctx.restore();

                        } else if (themeIdx === 2) {
                            // ── Ocean: sea urchin ──
                            const ur = sp.width * 0.76;
                            const ux = center, uy = sy - ur * 0.62;
                            ctx.save();
                            ctx.fillStyle = 'rgba(0,0,0,0.45)';
                            ctx.beginPath(); ctx.arc(ux+2,uy+2,ur,0,Math.PI*2); ctx.fill();
                            const uGrd = ctx.createRadialGradient(ux-ur*0.25,uy-ur*0.25,ur*0.1,ux,uy,ur);
                            uGrd.addColorStop(0,`rgb(${Math.min(255,dr+45)},${Math.min(255,dg+25)},${Math.min(255,db+25)})`);
                            uGrd.addColorStop(0.6,`rgb(${dr},${dg},${db})`);
                            uGrd.addColorStop(1,`rgb(${Math.max(0,dr-50)},${Math.max(0,dg-30)},${Math.max(0,db-30)})`);
                            ctx.fillStyle = uGrd;
                            ctx.beginPath(); ctx.arc(ux,uy,ur,0,Math.PI*2); ctx.fill();
                            const nSpines = 16;
                            for (let si2=0; si2<nSpines; si2++) {
                                const ang = (si2/nSpines)*Math.PI*2;
                                const spLen = si2%3===0 ? 11 : si2%3===1 ? 7 : 5;
                                ctx.strokeStyle = si2%3===0 ? `rgb(${hr},${hg},${hb})` : `rgb(${dr},${dg},${db})`;
                                ctx.lineWidth = si2%3===0 ? 1.5 : 1.0; ctx.lineCap='round'; ctx.globalAlpha=0.90;
                                ctx.beginPath();
                                ctx.moveTo(ux+Math.cos(ang)*ur*0.76, uy+Math.sin(ang)*ur*0.76);
                                ctx.lineTo(ux+Math.cos(ang)*(ur+spLen), uy+Math.sin(ang)*(ur+spLen));
                                ctx.stroke();
                            }
                            ctx.globalAlpha=0.40; ctx.fillStyle=`rgb(${hr},${hg},${hb})`;
                            ctx.beginPath(); ctx.arc(ux-ur*0.30,uy-ur*0.30,ur*0.28,0,Math.PI*2); ctx.fill();
                            ctx.restore();

                        } else if (themeIdx === 3) {
                            // ── Chinese Festival: bamboo spear ──
                            ctx.save();
                            ctx.fillStyle = 'rgba(0,0,0,0.48)';
                            ctx.beginPath(); ctx.moveTo(vLeft+2,sy+2); ctx.lineTo(center+2,sy-spikeH+2); ctx.lineTo(vRight+2,sy+2); ctx.closePath(); ctx.fill();
                            // Bamboo segments
                            const nSeg = 3, segH = (spikeH*0.70)/nSeg;
                            for (let si2=0; si2<nSeg; si2++) {
                                const segBot=sy-segH*si2, segTop=sy-segH*(si2+1);
                                const hw=sp.width*(1-(si2+0.5)/nSeg*0.40);
                                const topHw=sp.width*(1-(si2+1)/nSeg*0.40);
                                ctx.fillStyle = si2%2===0 ? '#2a8820' : '#228018';
                                ctx.beginPath(); ctx.moveTo(center-hw,segBot); ctx.lineTo(center+hw,segBot); ctx.lineTo(center+topHw,segTop); ctx.lineTo(center-topHw,segTop); ctx.closePath(); ctx.fill();
                                // Highlight
                                ctx.save(); ctx.globalAlpha=0.30; ctx.fillStyle='#66cc44';
                                ctx.beginPath(); ctx.moveTo(center-hw,segBot); ctx.lineTo(center-topHw,segTop); ctx.lineTo(center-topHw+1,segTop); ctx.lineTo(center-hw+2,segBot); ctx.closePath(); ctx.fill();
                                ctx.restore();
                                if (si2<nSeg-1) { ctx.fillStyle='#1a6015'; ctx.fillRect(center-hw,segTop-1.5,hw*2,3); }
                            }
                            // Red sharp tip
                            const tipBase=sy-spikeH*0.70, tipHw=sp.width*(1-0.70*0.40);
                            const tipGrd=ctx.createLinearGradient(center,tipBase,center,sy-spikeH);
                            tipGrd.addColorStop(0,'#cc2200'); tipGrd.addColorStop(1,'#ff7744');
                            ctx.fillStyle=tipGrd;
                            ctx.beginPath(); ctx.moveTo(center-tipHw,tipBase); ctx.lineTo(center+tipHw,tipBase); ctx.lineTo(center,sy-spikeH); ctx.closePath(); ctx.fill();
                            ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.65*dangerPulse;
                            ctx.fillStyle='#ff5500'; ctx.beginPath(); ctx.arc(center,sy-spikeH,3.2,0,Math.PI*2); ctx.fill();
                            ctx.restore();
                            ctx.restore();

                        } else if (themeIdx === 4) {
                            // ── Magic: amethyst crystal shard ──
                            ctx.save();
                            ctx.fillStyle = 'rgba(0,0,0,0.55)';
                            ctx.beginPath(); ctx.moveTo(vLeft+2,sy+2); ctx.lineTo(center+2,sy-spikeH+2); ctx.lineTo(vRight+2,sy+2); ctx.closePath(); ctx.fill();
                            const cryGrd = ctx.createLinearGradient(vLeft,sy,vRight,sy-spikeH);
                            cryGrd.addColorStop(0,'#200040'); cryGrd.addColorStop(0.5,'#7722bb'); cryGrd.addColorStop(1,'#ddbbff');
                            ctx.fillStyle = cryGrd;
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(vRight,sy); ctx.closePath(); ctx.fill();
                            // Bright inner facet
                            ctx.fillStyle = 'rgba(210,160,255,0.50)';
                            ctx.beginPath(); ctx.moveTo(vLeft+sp.width*0.3,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(center,sy); ctx.closePath(); ctx.fill();
                            // Dark facet right
                            ctx.fillStyle = 'rgba(30,0,60,0.55)';
                            ctx.beginPath(); ctx.moveTo(center,sy-spikeH); ctx.lineTo(vRight,sy); ctx.lineTo(center,sy); ctx.closePath(); ctx.fill();
                            // Glowing outline
                            ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.50*dangerPulse;
                            ctx.strokeStyle='#cc88ff'; ctx.lineWidth=1.8;
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(vRight,sy); ctx.closePath(); ctx.stroke();
                            ctx.restore();
                            // White tip sparkle
                            ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.90*dangerPulse;
                            ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(center,sy-spikeH,2.4,0,Math.PI*2); ctx.fill();
                            ctx.restore();
                            ctx.restore();

                        } else {
                            // ── Space: plasma lance ──
                            ctx.save();
                            ctx.fillStyle = 'rgba(0,0,0,0.50)';
                            ctx.beginPath(); ctx.moveTo(vLeft+2,sy+2); ctx.lineTo(center+2,sy-spikeH+2); ctx.lineTo(vRight+2,sy+2); ctx.closePath(); ctx.fill();
                            const pGrd = ctx.createLinearGradient(center,sy,center,sy-spikeH);
                            pGrd.addColorStop(0,'#020c14'); pGrd.addColorStop(0.6,'#0a3a4a'); pGrd.addColorStop(1,'#00ffcc');
                            ctx.fillStyle = pGrd;
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(vRight,sy); ctx.closePath(); ctx.fill();
                            ctx.fillStyle = 'rgba(0,255,200,0.38)';
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(center,sy); ctx.closePath(); ctx.fill();
                            ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.lineWidth=1.2;
                            ctx.beginPath(); ctx.moveTo(vLeft,sy); ctx.lineTo(center,sy-spikeH); ctx.lineTo(vRight,sy); ctx.closePath(); ctx.stroke();
                            ctx.save(); ctx.globalCompositeOperation='lighter';
                            ctx.globalAlpha=0.85*dangerPulse; ctx.fillStyle='#00ffcc';
                            ctx.beginPath(); ctx.arc(center,sy-spikeH,3.5,0,Math.PI*2); ctx.fill();
                            ctx.globalAlpha=0.25*dangerPulse;
                            ctx.beginPath(); ctx.arc(center,sy-spikeH,8,0,Math.PI*2); ctx.fill();
                            ctx.restore();
                            ctx.restore();
                        }
                    }
                }

                }
            }
        }

        // ─────────────────────────────────────────────
        //  PLAYER
        // ─────────────────────────────────────────────
        class Player {
            constructor() {
                this.W = 22; this.H = 28;
                this.reset();
            }
            reset() {
                this.x = BASE_W / 2 - this.W / 2;
                this.y = BASE_H - 120;
                this.vx = 0; this.vy = 0;
                this.onGround = false; this.facing = 1;
                this.animTick = 0; this.landShake = 0;
                this.lastVy = 0;
                // Power-up states
                this.powerSpeed = 0;
                this.powerHighJump = 0;
                this.powerShield = 0;
                this.powerSlow = 0;
                this.iframes = 0;
                this.justLanded = false;
                this.landCooldown = 0;  // frames to wait before auto-jumping again
                this.landPause = 0;     // frames to freeze horizontal movement after landing
            }
            rect() { return { x: this.x, y: this.y, w: this.W, h: this.H }; }
            jump(bounceMult = 1.0) {
                const speedMult = this.powerHighJump > 0 ? 1.4 : 1.0;
                this.vy = -6.4 * speedMult * bounceMult;
                this.onGround = false;
                jumpStartY = this.y;
                SFX.play(bounceMult > 1 ? 'bounce' : this.powerHighJump > 0 ? 'highjump' : 'jump');
                if (this.y > cameraFloorY) cameraFloorY = this.y; // only move floor down, never up
                if (this.y < bestJumpStartY) bestJumpStartY = this.y;
            }
            update(keys, platforms, touch) {
                // Tick power-ups
                if (this.powerSpeed > 0) this.powerSpeed--;
                if (this.powerHighJump > 0) this.powerHighJump--;
                if (this.powerShield > 0) this.powerShield--;
                if (this.powerSlow > 0) this.powerSlow--;
                if (this.landCooldown > 0) this.landCooldown--;
                if (this.landPause > 0) this.landPause--;
                if (this.iframes > 0) this.iframes--;

                let acc = 0;
                if (keys['left'] || touch.left) { acc = -1; this.facing = -1; }
                if (keys['right'] || touch.right) { acc = 1; this.facing = 1; }
                const maxSpd = this.powerSpeed > 0 ? 5 : 3.5;
                this.vx += acc * (this.powerSpeed > 0 ? 0.55 : 0.4);
                this.vx *= this.onGround ? 0.70 : 0.86;
                this.vx = clamp(this.vx, -maxSpd, maxSpd);
                this.vy += GRAVITY;
                this.vy = clamp(this.vy, -25, MAX_FALL);

                this.lastVy = this.vy;
                this.x += this.vx;
                this.x = clamp(this.x, WALL_W, BASE_W - WALL_W - this.W);
                this.y += this.vy;
                const wasGround = this.onGround;
                this.onGround = false;
                this.justLanded = false;
                let landedOnSpecial = false;
                let landedOnBouncy = false;
                for (const plat of platforms) {
                    if (plat.crumbleState === 2) continue; // fallen platform — no collision
                    const r = plat.rect();
                    if (rectsOverlap({ x: this.x, y: this.y, w: this.W, h: this.H }, r)) {
                        if (this.vy >= 0 && (this.y + this.H - this.vy) <= r.y + r.h / 2 + 16) {
                            this.y = r.y - this.H;
                            if (this.vy > 7) this.landShake = Math.floor(this.vy * 1.2);
                            this.vy = 0; this.onGround = true;
                            if (!wasGround) { this.justLanded = true; this.landPause = 6; }
                            if (plat.y < highestLandedPlatY) highestLandedPlatY = plat.y;
                            if (plat.moving) this.x += plat.dir * plat.speed;
                            // Gear push: rotating gear surface drifts the player sideways
                            if (plat.gearDir && currentMode === 'infinite') this.vx += plat.gearDir * 0.26;
                            // Trigger crumble when first stepped on
                            if (plat.crumble && plat.crumbleTimer < 0) plat.crumbleTimer = 0;
                            if (plat.special) landedOnSpecial = true;
                            if (plat.isBouncy) landedOnBouncy = true;
                        }
                    }
                }
                // AUTO-JUMP: skip on special (tutorial end) platform
                if (this.justLanded && this.landCooldown <= 0 && !landedOnSpecial) {
                    this.landCooldown = 10;
                    this.jump(landedOnBouncy ? 1.75 : 1.0);
                }
                // Manual jump
                if ((keys['jump'] || touch.jump) && this.onGround && this.landCooldown <= 0) {
                    this.jump(landedOnBouncy ? 1.75 : 1.0);
                }
                if (Math.abs(this.vx) > 0.5) this.animTick++;
                if (this.landShake > 0) this.landShake--;
            }
            emitJumpParticles(particles) {
                for (let i = 0; i < 10; i++) {
                    particles.push(new Particle(
                        this.x + this.W / 2 + rnd(-6, 6), this.y + this.H,
                        rnd(-2, 2), rnd(0.3, 2),
                        rndInt(12, 26), C.SNOW, rndInt(2, 4)
                    ));
                }
            }
            draw(camY) {
                const sx = Math.floor(this.x), sy = Math.floor(this.y - camY);
                const cx = sx + this.W / 2;
                const cy = sy + this.H / 2;
                if (sy < -60 || sy > BASE_H + 60) return;
                const t = Date.now() / 1000;

                // ── HIGH JUMP: spring glow + upward arrows under feet ──
                if (this.powerHighJump > 0) {
                    const fadeJ = Math.min(this.powerHighJump / 30, 1);
                    // Pulsing green glow beneath feet
                    const springPulse = 0.6 + 0.4 * Math.sin(t * 12);
                    ctx.save();
                    ctx.globalAlpha = 0.35 * fadeJ * springPulse;
                    const gJ = ctx.createRadialGradient(cx, sy + this.H, 0, cx, sy + this.H, 20);
                    gJ.addColorStop(0, '#80ffaa'); gJ.addColorStop(1, 'transparent');
                    ctx.fillStyle = gJ;
                    ctx.beginPath(); ctx.ellipse(cx, sy + this.H, 20, 9, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                    // Three upward arrows
                    ctx.save();
                    ctx.globalAlpha = 0.75 * fadeJ;
                    ctx.strokeStyle = '#58e88a'; ctx.lineWidth = 2; ctx.lineCap = 'round';
                    for (let i = -1; i <= 1; i++) {
                        const ax = cx + i * 7;
                        const bounce = Math.sin(t * 8 + i * 1.5) * 3;
                        const ay = sy + this.H + 5 + bounce;
                        ctx.beginPath(); ctx.moveTo(ax, ay + 9); ctx.lineTo(ax, ay); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(ax - 3, ay + 4); ctx.lineTo(ax, ay); ctx.lineTo(ax + 3, ay + 4); ctx.stroke();
                    }
                    ctx.restore();
                }

                // ── SPEED: motion trail streaks ──
                if (this.powerSpeed > 0) {
                    const fadeS = Math.min(this.powerSpeed / 30, 1);
                    ctx.save();
                    ctx.globalAlpha = 0.5 * fadeS;
                    ctx.strokeStyle = '#ffb030'; ctx.lineWidth = 2; ctx.lineCap = 'round';
                    const dir = -this.facing;
                    for (let i = 0; i < 4; i++) {
                        const lx = cx + dir * (10 + i * 6);
                        const ly = sy + 10 + i * 6;
                        const len = 8 - i * 1.5;
                        const wave = Math.sin(t * 10 + i * 0.8) * 2;
                        ctx.globalAlpha = (0.5 - i * 0.1) * fadeS;
                        ctx.beginPath(); ctx.moveTo(lx, ly + wave); ctx.lineTo(lx + dir * len, ly + wave); ctx.stroke();
                    }
                    // Orange glow around body
                    ctx.globalAlpha = 0.18 * fadeS * (0.7 + 0.3 * Math.sin(t * 8));
                    const gS = ctx.createRadialGradient(cx, cy, 4, cx, cy, 22);
                    gS.addColorStop(0, '#ffcc44'); gS.addColorStop(1, 'transparent');
                    ctx.fillStyle = gS;
                    ctx.beginPath(); ctx.ellipse(cx, cy, 22, 18, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }

                // Glow
                drawGlow(ctx, C.GLOW, cx, cy, 26, 32);

                // ── SLOW (active): frost / ice aura ──
                if (this.powerSlow > 0) {
                    const fadeI = Math.min(this.powerSlow / 30, 1);
                    ctx.save();
                    // Icy ring
                    ctx.globalAlpha = 0.22 * fadeI;
                    const gI = ctx.createRadialGradient(cx, cy, 8, cx, cy, 28);
                    gI.addColorStop(0, '#a0f0ff'); gI.addColorStop(1, 'transparent');
                    ctx.fillStyle = gI;
                    ctx.beginPath(); ctx.ellipse(cx, cy, 28, 22, 0, 0, Math.PI * 2); ctx.fill();
                    // Orbiting snowflake dots
                    ctx.globalAlpha = 0.8 * fadeI;
                    ctx.fillStyle = '#c8f4ff';
                    for (let i = 0; i < 5; i++) {
                        const angle = t * 2.5 + (i / 5) * Math.PI * 2;
                        const rx = cx + Math.cos(angle) * 18;
                        const ry = cy + Math.sin(angle) * 14;
                        ctx.beginPath(); ctx.arc(rx, ry, 2.5, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.restore();
                }

                // Draw equipped skin, flipped to face movement direction
                const skin = SKINS[equippedSkin] || SKINS[0];
                ctx.save();
                ctx.translate(cx, sy + 17);
                ctx.scale(this.facing * 0.7, 0.7);
                skin.draw(0, 0, 1);
                ctx.restore();

                // ── SHIELD: bubble around player ──
                if (this.powerShield > 0) {
                    const fadeB = Math.min(this.powerShield / 30, 1);
                    const pulse = 0.75 + 0.25 * Math.sin(t * 4);
                    ctx.save();
                    // Outer glow
                    ctx.globalAlpha = 0.18 * fadeB * pulse;
                    const gB = ctx.createRadialGradient(cx, cy, 14, cx, cy, 32);
                    gB.addColorStop(0, '#cc88ff'); gB.addColorStop(1, 'transparent');
                    ctx.fillStyle = gB;
                    ctx.beginPath(); ctx.arc(cx, cy, 32, 0, Math.PI * 2); ctx.fill();
                    // Bubble ring
                    ctx.globalAlpha = 0.55 * fadeB * pulse;
                    ctx.strokeStyle = '#dd99ff'; ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI * 2); ctx.stroke();
                    // Inner shimmer highlight
                    ctx.globalAlpha = 0.25 * fadeB;
                    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2;
                    ctx.beginPath(); ctx.arc(cx - 5, cy - 7, 10, -Math.PI * 0.8, -Math.PI * 0.1); ctx.stroke();
                    ctx.restore();
                }

                // Breath puff
                if (!this.onGround && this.vy < -3) {
                    ctx.save(); ctx.globalAlpha = 0.35; ctx.fillStyle = C.ICE_SHINE;
                    dot(cx + this.facing * 5 + rnd(-2, 2), sy + 7 + rnd(-1, 2), 2);
                    ctx.restore();
                }
            }
        }

        function line(x1, y1, x2, y2) { ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); }
        function dot(x, y, r) { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); }
        function rectsOverlap(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }

        // ─────────────────────────────────────────────
        //  ROCK (falling ice chunk)
        // ─────────────────────────────────────────────
        class Rock {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vy = rnd(2.0, 4.5); this.vx = rnd(-0.6, 0.6);
                this.size = rndInt(10, 20); this.angle = 0;
                this.spin = rnd(-3, 3); this.alive = true;
            }
            update(platforms, slow = 1) {
                this.vy += 0.14 * slow; this.x += this.vx * slow; this.y += this.vy * slow; this.angle += this.spin * slow;
                if (this.x < WALL_W || this.x > BASE_W - WALL_W - this.size) this.vx *= -1;
                const r = { x: this.x, y: this.y, w: this.size, h: this.size };
                for (const plat of platforms) {
                    if (rectsOverlap(r, plat.rect()) && this.vy > 0) {
                        this.y = plat.y - this.size;
                        this.vy *= -0.4; this.spin *= 0.5;
                        if (Math.abs(this.vy) < 0.5) this.vy = 0;
                    }
                }
            }
            rect() { return { x: this.x, y: this.y, w: this.size, h: this.size }; }
            draw(camY) {
                const sy = this.y - camY;
                if (sy < -50 || sy > BASE_H + 50) return;
                const n = 6, cx = this.x + this.size / 2, cy = sy + this.size / 2;
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(this.angle * Math.PI / 180);
                ctx.fillStyle = C.ICE_ROCK;
                ctx.beginPath();
                for (let i = 0; i < n; i++) {
                    const a = (i / n) * Math.PI * 2;
                    const r = (this.size / 2) + (i % 2 === 0 ? 3 : -2);
                    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                }
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = C.ICE_ROCK_EDGE; ctx.lineWidth = 1; ctx.stroke();
                ctx.strokeStyle = C.ICE_SHINE;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(this.size / 3, 0); ctx.stroke();
                ctx.restore();
            }
        }

        // ─────────────────────────────────────────────
        //  GHOST
        // ─────────────────────────────────────────────
        class Ghost {
            constructor(x, y) {
                this.x = x; this.y = y; this.startX = x;
                this.dir = _worldRng() < 0.5 ? -1 : 1;
                this.speed = rnd(0.7, 1.6);
                this.range = rndInt(60, 140);
                this.bob = rnd(0, Math.PI * 2);
                this.W = 28; this.H = 34;
            }
            update(slow = 1) {
                this.x += this.dir * this.speed * slow;
                this.bob += 0.06;
                if (Math.abs(this.x - this.startX) > this.range) this.dir *= -1;
            }
            rect() { return { x: this.x, y: this.y, w: this.W, h: this.H }; }
            draw(camY) {
                const sx = Math.floor(this.x);
                const sy = Math.floor(this.y - camY) + Math.floor(Math.sin(this.bob) * 4);
                if (sy < -50 || sy > BASE_H + 50) return;
                drawGlow(ctx, C.GHOST, sx + this.W / 2, sy + this.H / 2, 30, 35);
                const [r, g, b] = hexToRgb(C.GHOST);
                ctx.save();
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = C.GHOST;
                ctx.beginPath(); ctx.roundRect(sx, sy, this.W, this.H - 8, 10); ctx.fill();
                for (let i = 0; i < 3; i++) {
                    const cx = sx + i * (this.W / 3) + this.W / 6;
                    dot(cx, sy + this.H - 8, this.W / 6);
                }
                ctx.globalAlpha = 1;
                ctx.fillStyle = C.GHOST_EYE;
                dot(sx + 8, sy + 12, 4); dot(sx + 18, sy + 12, 4);
                ctx.fillStyle = C.WHITE;
                dot(sx + 8, sy + 12, 2); dot(sx + 18, sy + 12, 2);
                ctx.restore();
            }
        }

        // ─────────────────────────────────────────────
        //  POWER-UPS
        // ─────────────────────────────────────────────
        const POWERUP_TYPES = [
            { id: 'speed', color: '#ff9f20', glow: '#ffb840', icon: '⚡', label: 'SPEED!', duration: 300 },
            { id: 'highjump', color: '#58e88a', glow: '#80ffa0', icon: '🟢', label: 'HIGH JUMP!', duration: 280 },
            { id: 'shield', color: '#a06cff', glow: '#c8a0ff', icon: '🛡', label: 'SHIELD!', duration: 350 },
            { id: 'slow', color: '#20d0ff', glow: '#80f0ff', icon: '❄', label: 'SLOW!', duration: 320 },
        ];

        class PowerUp {
            constructor(x, y, platform = null) {
                this.x = x; this.y = y;
                this.type = POWERUP_TYPES[rndInt(0, POWERUP_TYPES.length - 1)];
                this.bob = rnd(0, Math.PI * 2);
                this.alive = true;
                this.size = 16;
                this.platform = platform;
                this.offsetX = platform ? x - platform.x : 0;
            }
            update() {
                this.bob += 0.07;
                if (this.platform) this.x = this.platform.x + this.offsetX;
            }
            rect() { return { x: this.x - this.size, y: this.y - this.size + Math.sin(this.bob) * 4, w: this.size * 2, h: this.size * 2 }; }
            draw(camY) {
                const sy = this.y + Math.sin(this.bob) * 4 - camY;
                if (sy < -40 || sy > BASE_H + 40) return;
                drawGlow(ctx, this.type.glow, this.x, sy, 28, 70);
                // Pulsing ring
                const pulse = Math.abs(Math.sin(this.bob)) * 0.4 + 0.6;
                ctx.save();
                ctx.globalAlpha = 0.5 * pulse;
                ctx.strokeStyle = this.type.glow; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(this.x, sy, this.size + 4 * pulse, 0, Math.PI * 2); ctx.stroke();
                ctx.restore();
                // Main circle
                ctx.fillStyle = this.type.color;
                ctx.beginPath(); ctx.arc(this.x, sy, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(this.x, sy, this.size, 0, Math.PI * 2); ctx.stroke();
                // Icon letter
                ctx.fillStyle = '#fff';
                ctx.font = `bold 14px monospace`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const letters = { speed: '⚡', highjump: '↑↑', shield: '◈', slow: '❄' };
                ctx.fillText(letters[this.type.id] || '?', this.x, sy + 1);
            }
        }

        // ─────────────────────────────────────────────
        //  COIN
        // ─────────────────────────────────────────────
        class Coin {
            constructor(x, y, platform = null) {
                this.x = x; this.y = y;
                this.bob = rnd(0, Math.PI * 2);
                this.alive = true;
                this.size = 14;
                this.platform = platform;
                this.offsetX = platform ? x - platform.x : 0;
            }
            update() {
                this.bob += 0.09;
                if (this.platform) this.x = this.platform.x + this.offsetX;
            }
            rect() { return { x: this.x - this.size, y: this.y - this.size + Math.sin(this.bob) * 4, w: this.size * 2, h: this.size * 2 }; }
            draw(camY) {
                const sy = this.y + Math.sin(this.bob) * 4 - camY;
                if (sy < -40 || sy > BASE_H + 40) return;
                const pulse = 0.6 + 0.4 * Math.abs(Math.sin(this.bob));
                drawGlow(ctx, '#ffdd00', this.x, sy, 22, Math.floor(52 * pulse));
                ctx.save();
                ctx.globalAlpha = 0.45 * pulse;
                ctx.strokeStyle = '#ffe066'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(this.x, sy, this.size + 3 * pulse, 0, Math.PI * 2); ctx.stroke();
                ctx.restore();
                const cg = ctx.createRadialGradient(this.x - 4, sy - 4, 1, this.x, sy, this.size);
                cg.addColorStop(0, '#fff8aa'); cg.addColorStop(0.4, '#ffdd00'); cg.addColorStop(1, '#cc8800');
                ctx.fillStyle = cg;
                ctx.beginPath(); ctx.arc(this.x, sy, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#ffee55'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(this.x, sy, this.size, 0, Math.PI * 2); ctx.stroke();
                // Star symbol
                ctx.fillStyle = 'rgba(120,60,0,0.75)';
                ctx.font = `bold ${Math.round(this.size * 1.1)}px monospace`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('★', this.x, sy + 1);
            }
        }

        // Floating text popup
        class FloatText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 70; this.maxLife = 70;
            }
            update() { this.y -= 0.8; this.life--; }
            draw(camY) {
                if (this.life <= 0) return;
                const sy = this.y - camY;
                if (sy < -20 || sy > BASE_H + 20) return;
                ctx.save();
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.font = 'bold 18px monospace';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.text, this.x, sy);
                ctx.restore();
            }
        }

        // ─────────────────────────────────────────────
        //  MAGIC BOOK (goal)
        // ─────────────────────────────────────────────
        class MagicBook {
            constructor() {
                this.x = BASE_W / 2 - 20; this.y = TOWER_TOP - 40;
                this.w = 40; this.h = 50; this.bob = 0; this.glow = 0;
            }
            update() { this.bob += 0.04; this.glow += 0.07; }
            rect() { return { x: this.x, y: this.y + Math.sin(this.bob) * 5, w: this.w, h: this.h }; }
            draw(camY) {
                const bx = this.x, by = this.y + Math.sin(this.bob) * 5 - camY;
                if (by < -100 || by > BASE_H + 100) return;
                const g = Math.floor(Math.abs(Math.sin(this.glow)) * 60) + 30;
                drawGlow(ctx, '#ffc832', bx + this.w / 2, by + this.h / 2, 60, g);
                drawGlow(ctx, C.CRYSTAL, bx + this.w / 2, by + this.h / 2, 30, g);
                ctx.fillStyle = '#a06418';
                ctx.beginPath(); ctx.roundRect(bx, by, this.w, this.h, 4); ctx.fill();
                ctx.fillStyle = C.BOOK;
                ctx.beginPath(); ctx.roundRect(bx + 4, by + 4, this.w - 8, this.h - 8, 3); ctx.fill();
                ctx.fillStyle = '#b47828';
                ctx.beginPath(); ctx.roundRect(bx, by, 6, this.h, 2); ctx.fill();
                ctx.strokeStyle = C.BOOK_GLOW; ctx.lineWidth = 1;
                for (let i = 0; i < 3; i++) {
                    const ry = by + 12 + i * 10;
                    ctx.beginPath(); ctx.moveTo(bx + 10, ry); ctx.lineTo(bx + this.w - 10, ry); ctx.stroke();
                }
                // Orbiting sparkles
                ctx.fillStyle = '#ffe080';
                for (let i = 0; i < 4; i++) {
                    const a = this.glow + i * Math.PI / 2;
                    dot(bx + this.w / 2 + Math.cos(a) * 28, by + this.h / 2 + Math.sin(a) * 28, 3);
                }
            }
        }

        // ─────────────────────────────────────────────
        //  ICE CRYSTAL (torch replacement)
        // ─────────────────────────────────────────────
        class IceCrystal {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.flicker = rnd(0, Math.PI * 2);
                this.phaseSpeed = rnd(0.06, 0.12);
            }
            update() { this.flicker += this.phaseSpeed + rnd(0, 0.05); }
            draw(camY) {
                const sx = this.x, sy = Math.floor(this.y - camY);
                if (sy < -60 || sy > BASE_H + 60) return;
                const pulse = Math.abs(Math.sin(this.flicker)) * 0.35 + 0.65;
                drawGlow(ctx, C.CRYSTAL_GLOW, sx, sy - 6, (22 * pulse) + 10, 55);
                ctx.fillStyle = C.WALL_MID;
                ctx.beginPath(); ctx.roundRect(sx - 4, sy + 2, 8, 8, 2); ctx.fill();
                // Central shard
                const hc = Math.floor(16 * pulse);
                tri(sx - 3, sy + 2, sx + 3, sy + 2, sx, sy + 2 - hc, C.CRYSTAL, C.STALA_TIP);
                // Side shards
                const hl = Math.floor(10 * pulse);
                tri(sx - 5, sy + 3, sx - 1, sy + 3, sx - 4, sy + 3 - hl, '#4a90c0', C.STALA_TIP);
                tri(sx + 1, sy + 3, sx + 5, sy + 3, sx + 4, sy + 3 - hl, '#4a90c0', C.STALA_TIP);
                ctx.fillStyle = C.ICE_SHINE; dot(sx, sy + 2 - hc, 2);
            }
        }
        function tri(x1, y1, x2, y2, x3, y3, fill, stroke) {
            ctx.fillStyle = fill;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.closePath(); ctx.fill();
            if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
        }

        // ─────────────────────────────────────────────
        //  LEVEL GENERATOR
        // ─────────────────────────────────────────────
        function generatePlatforms(fromY, toY, anchor = null) {
            const plats = [];
            let y = fromY;
            let prevCenter = anchor ? anchor.x + anchor.w / 2 : null;
            let safeCounter = 0;
            let nextSafe = rndInt(3, 7);
            let bouncyCounter = 0;
            let nextBouncy = rndInt(8, 12);
            while (y > toY) {
                const difficulty = 1 + Math.max(0, (-y / 2000) * 0.25);
                const minW = Math.max(50, 130 - difficulty * 20 | 0);
                const maxW = Math.max(minW + 20, 200 - difficulty * 30 | 0);
                const w = rndInt(minW, maxW);
                const moving = _worldRng() < Math.min(0.08 * difficulty, 0.35);

                let x;
                const halfW = w / 2;
                const travel = fromY - y;
                const early = travel < 360;
                if (prevCenter !== null) {
                    const maxOffset = early ? 70 : 100;
                    const centerMin = Math.max(WALL_W + halfW, prevCenter - maxOffset);
                    const centerMax = Math.min(BASE_W - WALL_W - halfW, prevCenter + maxOffset);
                    if (centerMin <= centerMax) {
                        const target = rnd(centerMin, centerMax);
                        x = Math.round(target - halfW);
                    } else {
                        x = rndInt(WALL_W, BASE_W - WALL_W - w);

                } else {

            // Desired target = player position, but clamped so we never go below the anchor
            const target = Math.min(playerTarget, camFloor);

            // Spring physics — fast when going up, slightly slower when going down
            if (target < camY) {
                camYVel += (target - camY) * 0.10; // going up: snappy
            } else {
                camYVel += (target - camY) * 0.04; // going down: gentle lag
            }
            camYVel *= 0.78;
            camY += camYVel;

            // Hard clamp — never exceed the 30m anchor, with tiny elastic bounce
            if (camY > camFloor) {
                camY = camFloor;
                camYVel = Math.min(camYVel, 0) * -0.18; // tiny bounce back
            }

            // Absolute floor clamp (spawn level)
